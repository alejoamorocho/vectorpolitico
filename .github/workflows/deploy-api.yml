name: deploy-api (Cloudflare Workers, manual)

# Despliegue del API a Cloudflare Workers + D1.
# INACTIVO POR DEFECTO: solo se dispara manualmente. Requiere los
# secrets CLOUDFLARE_API_TOKEN y la variable CLOUDFLARE_ACCOUNT_ID.

on:
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Aplicar migraciones y deploy Worker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/api
        run: pnpm test --run
        continue-on-error: true

      - name: Apply D1 migrations (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply brujula-politica --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
