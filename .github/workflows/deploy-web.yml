name: deploy-web (Cloudflare Pages, manual)

# Despliegue a Cloudflare Pages.
# INACTIVO POR DEFECTO: el deploy regular del sitio es a GitHub Pages
# (deploy-gh-pages.yml). Este workflow solo se dispara manualmente y
# requiere los secrets CLOUDFLARE_API_TOKEN y la variable
# CLOUDFLARE_ACCOUNT_ID configurados.

on:
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build y deploy a Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/web
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=brujula-politica-web --branch=main
