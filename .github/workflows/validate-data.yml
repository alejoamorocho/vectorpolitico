name: validate-data

on:
  pull_request:
    paths:
      - 'packages/data/**'
      - 'packages/etl/src/models.py'
      - 'packages/etl/src/validate.py'
      - 'packages/etl/src/generate_ideologies.py'
      - 'packages/schema/**'
  push:
    branches: [main]
    paths:
      - 'packages/data/**'

jobs:
  validate:
    name: Validar JSONs contra schema Pydantic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'packages/etl/requirements.txt'

      - name: Install Python deps
        working-directory: packages/etl
        run: pip install -r requirements.txt

      - name: Verificar que el generador de ideologías sea determinista
        working-directory: packages/etl
        run: |
          # ideologies.json es la fuente de verdad (layout afinado + contenido
          # editorial enriquecido que no vive en el YAML). El generador solo
          # recalcula el auto-layout y PRESERVA el contenido editorial existente.
          # Aquí verificamos únicamente que el generador sea determinista:
          # dos corridas independientes deben producir un output idéntico.
          python -m src.generate_ideologies --output /tmp/ideologies-a.json
          python -m src.generate_ideologies --output /tmp/ideologies-b.json
          if ! diff /tmp/ideologies-a.json /tmp/ideologies-b.json; then
            echo "::error::El generador de ideologías no es determinista (dos corridas difieren)."
            exit 1
          fi

      - name: Validate all data files
        working-directory: packages/etl
        run: python -m src.validate ../data/colombia ../data/ideologies.json

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck
