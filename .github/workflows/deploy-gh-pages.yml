name: Deploy a GitHub Pages

# Despliega el sitio estático de Astro a GitHub Pages.
# Se dispara automáticamente en cada push a main que toque la web.
#
# Activación previa requerida: en Settings → Pages → Source → "GitHub Actions".
#
# Esta es la ruta de deploy ACTIVA. Los workflows deploy-web.yml y
# deploy-api.yml están en modo manual (workflow_dispatch) y solo se
# usan cuando se configuren los secrets de Cloudflare.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build estático con base path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web for GitHub Pages
        working-directory: apps/web
        run: pnpm build:gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy a GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
