# Pre-commit hooks para Brújula Política
# Instalación:
#   pip install pre-commit
#   pre-commit install
#
# Por qué esto existe: este proyecto es open source y un leak de secrets
# (especialmente ANTHROPIC_API_KEY o CLOUDFLARE_API_TOKEN) sería crítico.
# Estas hooks son la primera línea de defensa antes de que un commit
# llegue al repositorio remoto.

repos:
  # ── Gitleaks — detecta secrets en el diff ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── pre-commit-hooks — básicos ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict

  # ── Python: ruff para ETL ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^packages/etl/

  # ── TypeScript/Prettier ──
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [typescript, tsx, javascript, jsx, json, yaml, markdown, astro]
        additional_dependencies:
          - prettier@3.3.2
          - prettier-plugin-astro@0.14.0
