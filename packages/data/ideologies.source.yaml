quadrants:
  auth_left:
    color: '#dc2626'
    families:
    - name: extreme-auth-left
      weight: 3
      children:
      - id: hive-mind-collectivism
        name: Hive Mind Collectivism
        weight: 2
        description: Visión totalitaria máxima donde la individualidad se disuelve en un colectivo unificado
          bajo una única voluntad. Posición teórica extrema del cuadrante.
        longDescription: 'El colectivismo de mente colmena es una posición teórica extrema que disuelve
          la identidad individual en una conciencia colectiva unificada. Su tesis central sostiene que
          el individuo no tiene valor autónomo: la unidad social —la clase, el partido, la nación proletaria
          o incluso la especie— es la única entidad moralmente significativa. Toda decisión, producción
          y pensamiento deben subordinarse a los fines del conjunto.


          No existe un origen histórico preciso ni un fundador reconocido; se trata de una categoría analítica
          empleada por filósofos políticos para describir el extremo lógico del pensamiento colectivista.
          La denominación evoca la imagen de la colmena de abejas, en la que ningún individuo actúa por
          cuenta propia. Pensadores como Ayn Rand usaron el término en sentido crítico para caracterizar
          al socialismo totalitario; desde el campo marxista, autores como Herbert Marcuse advirtieron
          del peligro de que el Estado revolucionario absorbiera completamente la subjetividad.


          En su forma más rigurosa, esta posición lleva a la supresión de la disidencia interna, la uniformidad
          ideológica forzada y la planificación centralizada absoluta. La literatura distópica —desde
          Zamyatin hasta Huxley— exploró sus consecuencias. Regímenes como el jucheano o el maoísta en
          sus fases más radicales han sido descritos como aproximaciones prácticas.


          Dentro del cuadrante autoritario-izquierda se ubica en el extremo máximo de autoridad y colectivización,
          por encima incluso del estalinismo ortodoxo. Su posición en el compás político refleja una autoridad
          estatal o partidaria sin contrapeso y una supresión casi total de la autonomía individual en
          nombre del bien común.'
        historicalContext: Como categoría analítica, el concepto circula en filosofía política desde el
          siglo XX. Las primeras críticas sistemáticas aparecen en Rand (1943) y Popper (1945). Regímenes
          con rasgos afines emergieron durante las guerras culturales maoístas (1966-1976) y el experimento
          jucheano en Corea del Norte (desde 1948). No existe un movimiento político que se autodenomino
          con este término; permanece como herramienta de análisis comparado.
        contemporaryRelevance: 'El concepto reaparece en debates sobre inteligencia artificial y posthumanismo:
          algunos críticos aplican la etiqueta a visiones que proponen una conciencia colectiva digital.
          También se usa en polémica política para caracterizar movimientos que priorizan la homogeneidad
          ideológica sobre la deliberación interna. No tiene representación partidaria formal en ningún
          país.'
        commonCriticisms: Desde el liberalismo se sostiene que la disolución del individuo es incompatible
          con cualquier noción de derechos humanos. Los críticos marxistas humanistas —como la Escuela
          de Fráncfort— señalan que el colectivismo extremo reproduce la alienación que pretende superar,
          solo que ahora el sujeto alienado es la propia colectividad. Los anarquistas argumentan que
          requiere un aparato coercitivo monumental para sostenerse.
        keyThinkers:
        - Herbert Marcuse
        - Ayn Rand (crítica)
        - Karl Popper (crítica)
        - B.F. Skinner
        historicalExamples:
        - Guardia Roja en la Revolución Cultural china (1966-1976)
        - Corea del Norte bajo juche (1948-presente)
        - Kampuchea Democrática bajo los Jemeres Rojos (1975-1979)
        wikipediaUrl: https://es.wikipedia.org/wiki/Colectivismo
      - id: ingsocism
        name: IngSoc
        nameEn: IngSocism
        weight: 2
        description: Socialismo inglés ficticio de "1984" de Orwell. Totalitarismo de partido único con
          control total del lenguaje, la historia y el pensamiento.
        keyThinkers:
        - George Orwell
        - Hannah Arendt
        - Arthur Koestler
        - Slavoj Žižek
        longDescription: 'El Ingsoc (Socialismo Inglés) es la ideología ficticia del régimen totalitario
          descrito por George Orwell en su novela ''1984'' (1949). Aunque no existe como corriente política
          real, se ha convertido en referencia teórica canónica para analizar el totalitarismo de izquierda
          llevado a su extremo lógico.


          Su tesis central combina control absoluto del Estado sobre el pensamiento, la historia y el
          lenguaje (mediante la ''neolengua''), con una jerarquía burocrática permanente que simula retórica
          igualitaria mientras reproduce desigualdad. El partido —el Gran Hermano— no busca el bien colectivo:
          busca el poder por el poder mismo.


          Orwell concibió el Ingsoc como síntesis crítica del estalinismo soviético y del fascismo europeo,
          mostrando que ambos convergen en su desprecio por la verdad y la autonomía humana. La novela
          fue escrita tras la experiencia de Orwell en la Guerra Civil Española, donde observó las purgas
          estalinistas al interior del movimiento republicano.


          Conceptos derivados —el Gran Hermano, el doblepensar, el crimen de pensamiento, el Ministerio
          de la Verdad— se usan ampliamente en análisis políticos contemporáneos. Pensadores como Hannah
          Arendt, Norman Podhoretz y Slavoj Žižek han dialogado con la obra de Orwell al teorizar el totalitarismo.


          En el compás político se ubica en el extremo del cuadrante autoritario-izquierda porque combina
          la retórica colectivista y la propiedad estatal de los medios de producción con el máximo autoritarismo
          posible. Su carácter ficticio no le resta valor analítico: es una herramienta teórica, no una
          propuesta programática.'
        historicalContext: Orwell publicó '1984' en 1949, año en que la Guerra Fría comenzaba a definirse.
          La novela sintetiza su experiencia en la España republicana (1936-1937) y su lectura crítica
          del estalinismo. Fue prohibida en la URSS y en los países del Bloque del Este. Tras 1989, con
          la caída del Muro de Berlín, su uso como referencia analítica se generalizó. En el siglo XXI
          resurge en debates sobre vigilancia masiva y posverdad.
        contemporaryRelevance: El vocabulario orwelliano —Big Brother, doublethink, memory hole— se emplea
          en análisis de regímenes autoritarios actuales (China, Rusia, Corea del Norte) y en debates
          sobre vigilancia estatal, desinformación y control de redes sociales. Organizaciones de derechos
          digitales invocan el marco con frecuencia.
        commonCriticisms: Desde la izquierda se sostiene que Orwell caricaturizó el socialismo para favorecer
          la propaganda anticomunista de la Guerra Fría. Críticos poscoloniales señalan que '1984' ignora
          el imperialismo occidental como forma de control comparable. Desde el conservadurismo, en cambio,
          se la usa como advertencia contra cualquier expansión del Estado.
        historicalExamples:
        - URSS bajo Stalin como referente implícito (1924-1953)
        - Corea del Norte como aproximación práctica (1948-presente)
        - Kampuchea Democrática (1975-1979)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ingsoc
      - id: eco-fascism
        name: Eco-Fascismo
        nameEn: Eco-Fascism
        weight: 2
        description: Fusión de nacionalismo étnico con conservación ambiental coercitiva. Defiende acciones
          autoritarias drásticas para proteger la naturaleza.
        longDescription: 'El ecofascismo es una corriente ideológica que combina el autoritarismo político
          con el ambientalismo radical. Su tesis central sostiene que la crisis ecológica —sobrepoblación,
          agotamiento de recursos, destrucción de ecosistemas— solo puede resolverse mediante un Estado
          fuerte que imponga restricciones coercitivas a la reproducción humana, la migración y el consumo,
          frecuentemente recurriendo a argumentos racistas o eugenésicos.


          La corriente hunde sus raíces en el ecologismo de la Alemania nazi: figuras como Walther Darré
          y Heinrich Himmler impulsaron políticas de ''sangre y suelo'' que vinculaban la pureza racial
          con la protección de la tierra. En el período contemporáneo, el término se aplica a grupos que
          justifican el recorte de la inmigración como política ambiental, o que abogan por reducción
          poblacional forzada.


          Aunque no existe un movimiento organizado con este nombre, el ecofascismo ha reaparecido en
          manifiestos de autores de atentados terroristas (Christchurch, 2019; El Paso, 2019), que citaban
          argumentos de sobrepoblación y degradación ambiental para justificar la violencia. Pensadores
          como Pentti Linkola (Finlandia) son referentes reconocidos por su defensa explícita de reducir
          la población humana mediante medidas autoritarias.


          En el compás se ubica en el cuadrante autoritario-izquierda por su énfasis en el control estatal
          y la restricción de las libertades individuales en nombre del colectivo —aquí entendido como
          la especie y el ecosistema— aunque sus variantes más racistas cruzan hacia el autoritario-derecha.'
        historicalContext: Las raíces intelectuales se encuentran en el ecologismo conservador alemán
          del siglo XIX y en la política agraria del Tercer Reich (1933-1945). En los años setenta, el
          movimiento de ecología profunda de Arne Næss planteó preguntas sobre el valor intrínseco de
          la naturaleza sin tintes autoritarios. El término ecofascismo fue acuñado críticamente por Janet
          Biehl y Murray Bookchin en los años noventa para advertir sobre derivas autoritarias dentro
          del movimiento verde.
        contemporaryRelevance: Grupos de extrema derecha en Europa y América del Norte han adoptado retórica
          ecofascista en redes sociales. Los manifiestos de los atacantes de Christchurch y El Paso (2019)
          citaron argumentos ecofascistas. El debate sobre 'ecofascismo' vs. 'ecosocialismo' estructura
          parte del debate político ambiental contemporáneo.
        commonCriticisms: Desde el ecosocialismo se sostiene que el ecofascismo culpa a los pobres y a
          los migrantes en lugar de atacar el capitalismo como causa estructural de la crisis ambiental.
          Los liberales señalan que viola derechos fundamentales de reproducción y movimiento. Los ecólogos
          sociales (Bookchin) argumentan que la dominación de la naturaleza tiene la misma raíz que la
          dominación humana, por lo que el ecofascismo es contradictorio en sus propios términos.
        keyThinkers:
        - Pentti Linkola
        - Walther Darré
        - Murray Bookchin (crítica)
        - Janet Biehl (crítica)
        historicalExamples:
        - Política de 'sangre y suelo' en la Alemania nazi (1933-1945)
        - Manifiestos de Brenton Tarrant y Patrick Crusius (2019)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ecofascismo
    - name: marxismo-leninismo
      weight: 5
      children:
      - id: stalinism
        name: Estalinismo
        nameEn: Stalinism
        weight: 3
        description: 'Interpretación autoritaria del marxismo-leninismo asociada a Iósif Stalin: centralización
          total del Estado, planificación rígida y represión masiva.'
        keyThinkers:
        - Iósif Stalin
        - Andréi Zhdánov
        - Viacheslav Mólotov
        - Lazar Kaganóvich
        longDescription: 'El estalinismo es la doctrina política y económica asociada al gobierno de Iósif
          Stalin en la Unión Soviética (1924-1953) y a los regímenes que adoptaron su modelo. Su tesis
          central es que el socialismo puede y debe construirse en un solo país antes de extenderse al
          resto del mundo, en oposición directa al trotskismo y su teoría de la revolución permanente.


          Sus pilares son: la colectivización forzada de la agricultura, la industrialización acelerada
          mediante planes quinquenales, el partido único como vanguardia absoluta del proletariado, el
          culto a la personalidad del líder, y el uso sistemático del terror estatal como herramienta
          de gobierno. Las purgas de 1936-1938 y el Gulag son sus expresiones más documentadas.


          Stalin elaboró sus posiciones en textos como ''El marxismo y el problema nacional'' (1913) y
          ''Los fundamentos del leninismo'' (1924). El estalinismo se presenta como continuación del leninismo,
          aunque los críticos —desde Trotski hasta Jruschov— señalan rupturas profundas: la burocratización
          del partido, la renuncia al internacionalismo activo y la personificación del poder.


          En su aplicación práctica generó la URSS industrializada que derrotó al nazismo en la Segunda
          Guerra Mundial, pero también entre 6 y 20 millones de muertos por represión, hambruna artificial
          (Holodomor) y trabajos forzados. Regímenes afines —China maoísta, Albania bajo Hoxha, Corea
          del Norte— adoptaron variantes del modelo.


          En el compás se ubica en el vértice del cuadrante autoritario-izquierda: control estatal total
          de la economía, partido único, represión de la oposición y retórica igualitaria combinada con
          jerarquía burocrática real.'
        historicalContext: Stalin ascendió al poder tras la muerte de Lenin (1924), desplazando a Trotski,
          Zinóviev y Bujarin. Los planes quinquenales (1928-1941) transformaron la URSS de economía agraria
          en potencia industrial. Las Grandes Purgas (1936-1938) eliminaron a la vieja guardia bolchevique.
          Tras la victoria en la Segunda Guerra Mundial, el modelo se exportó a Europa del Este. Con la
          muerte de Stalin (1953), Jruschov denunció el culto a la personalidad en el Informe Secreto
          (1956), iniciando la destalinización.
        contemporaryRelevance: Partidos comunistas en Rusia, Grecia (KKE) y América Latina mantienen posiciones
          afines. En Rusia persiste una revalorización nostálgica de Stalin como figura que modernizó
          el país y venció al nazismo. El debate sobre rehabilitación histórica de Stalin estructura parte
          de la política de memoria en la Rusia de Putin.
        commonCriticisms: Los trotskistas sostienen que el estalinismo traicionó la revolución al privilegiar
          la burocracia sobre la clase obrera. Los liberales y socialdemócratas señalan el costo humano
          —millones de muertos— como condena moral irrebatible. Los anarquistas argumentan que el estalinismo
          es la prueba de que todo Estado, aunque socialista, tiende a la dominación. Historiadores revisionistas
          debaten el número exacto de víctimas, aunque el crimen de lesa humanidad no está en disputa.
        historicalExamples:
        - URSS bajo Stalin (1924-1953)
        - Albania bajo Enver Hoxha (1944-1985)
        - Kampuchea Democrática bajo Pol Pot (1975-1979)
        - Etiopía bajo el Derg (1974-1991)
        wikipediaUrl: https://es.wikipedia.org/wiki/Estalinismo
      - id: maoism
        name: Maoísmo
        nameEn: Maoism
        weight: 3
        description: 'Variante china del marxismo-leninismo formulada por Mao Zedong: guerra campesina,
          revolución cultural permanente y partido como vanguardia.'
        keyThinkers:
        - Mao Zedong
        - Lin Biao
        - Jiang Qing
        - Abimael Guzmán (Sendero Luminoso)
        longDescription: 'El maoísmo es la corriente marxista-leninista desarrollada por Mao Zedong durante
          la revolución china y su posterior gobierno (1949-1976). Su tesis central adapta el marxismo
          a sociedades campesinas: la vanguardia revolucionaria no es el proletariado urbano —como en
          Lenin— sino el campesinado, y la revolución avanza desde el campo hacia las ciudades mediante
          guerra popular prolongada.


          Mao elaboró sus posiciones en textos como ''Sobre la práctica'', ''Sobre la contradicción''
          y el ''Libro Rojo''. A diferencia del estalinismo, el maoísmo subraya la primacía de la superestructura
          ideológica sobre la base económica: las ideas y la voluntad pueden transformar la realidad material,
          de ahí el énfasis en campañas de rectificación ideológica constante.


          La Revolución Cultural (1966-1976) fue el intento más radical de aplicar este principio: masas
          movilizadas para purgar al partido y la sociedad de elementos ''burgueses''. Resultó en caos
          institucional, persecución de intelectuales y entre 500.000 y 2 millones de muertos directos.
          La colectivización del Gran Salto Adelante (1958-1962) produjo una hambruna estimada en 15-55
          millones de muertos.


          En el contexto global, el maoísmo inspiró movimientos guerrilleros en América Latina (Sendero
          Luminoso en Perú), Asia (Nepal, India naxalita) y África. Se distingue del leninismo por su
          base campesina, del estalinismo por su voluntarismo ideológico y del trotskismo por rechazar
          la revolución permanente en favor de la revolución en etapas adaptada a cada contexto nacional.'
        historicalContext: 'El Partido Comunista Chino bajo Mao tomó el poder en 1949 tras derrotar al
          Kuomintang. El Gran Salto Adelante (1958-1962) intentó industrialización acelerada con resultado
          catastrófico. La Revolución Cultural (1966-1976) radicalizó el proceso. Tras la muerte de Mao
          (1976), Deng Xiaoping inició la reforma que daría origen al dengismo. El maoísmo persistió en
          movimientos guerrilleros: Sendero Luminoso (Perú, 1980-2000), PCN-M (Nepal, 1996-2006), naxalitas
          (India, desde 1967).'
        contemporaryRelevance: Persiste como ideología activa en India (movimiento naxalita), donde grupos
          armados controlan zonas rurales. En Nepal, el partido maoísta participó en el gobierno democrático
          tras el acuerdo de paz de 2006. En América Latina mantiene presencia marginal en algunos grupos.
          El Partido Comunista Chino actual rechaza el maoísmo radical, aunque conserva retórica selectiva.
        commonCriticisms: Los críticos marxistas sostienen que el maoísmo sustituyó el análisis de clases
          por voluntarismo político, con consecuencias devastadoras. Desde el liberalismo se señala el
          costo humano de las campañas de masas. Los trotskistas argumentan que el maoísmo reprodujo el
          estalinismo con características campesinas. Historiadores señalan que la Revolución Cultural
          destruyó décadas de capital institucional y humano.
        historicalExamples:
        - República Popular China bajo Mao (1949-1976)
        - Sendero Luminoso en Perú (1980-2000)
        - Partido Comunista de Nepal-Maoísta (1996-2006)
        - Movimiento naxalita en India (1967-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Mao%C3%ADsmo
      - id: leninism
        name: Leninismo
        nameEn: Leninism
        weight: 3
        description: Teoría del partido de vanguardia que guía al proletariado hacia la revolución. Base
          del marxismo-leninismo soviético.
        keyThinkers:
        - Vladímir Ilich Lenin
        - Grigori Zinóviev
        - Nikolái Bujarin
        - Rosa Luxemburg (crítica)
        - Antonio Gramsci
        longDescription: 'El leninismo es la teoría y práctica política desarrollada por Vladímir Ilich
          Lenin, fundamento de la revolución bolchevique de 1917 y de los partidos comunistas del siglo
          XX. Su tesis central gira en torno a la vanguardia: el partido comunista, formado por revolucionarios
          profesionales con conciencia de clase, debe dirigir al proletariado hacia la revolución, dado
          que las masas no adquieren conciencia revolucionaria de manera espontánea.


          Lenin sistematizó esta posición en ''¿Qué hacer?'' (1902) y desarrolló la teoría del imperialismo
          en ''El imperialismo, fase superior del capitalismo'' (1916), argumentando que el capitalismo
          global se reproduce mediante la explotación colonial. Propuso el Estado obrero como instrumento
          transitorio de la ''dictadura del proletariado'', necesaria para destruir el Estado burgués
          antes de que ambos se extingan.


          A diferencia del estalinismo, el leninismo originario mantuvo debate interno dentro del partido
          y no teorizó el ''socialismo en un solo país''. A diferencia del trotskismo, no elaboró la teoría
          de la revolución permanente como programa sistemático. A diferencia del maoísmo, sitúa la vanguardia
          revolucionaria en el proletariado urbano industrial, no en el campesinado.


          El Estado soviético que Lenin construyó entre 1917 y 1924 estableció el partido único, la represión
          de la oposición socialista (mencheviques, socialrevolucionarios) y la NEP como retirada táctica.
          Sus herederos disputaron durante décadas cuál era la interpretación auténtica de su legado.'
        historicalContext: Lenin fundó el partido bolchevique en 1903, ganó la Revolución de Octubre de
          1917, consolidó el Estado soviético durante la Guerra Civil (1917-1922) y fundó la Internacional
          Comunista (1919). Murió en 1924, dejando un poder disputado. Su pensamiento fue codificado como
          'marxismo-leninismo' por Stalin, aunque leninistas heterodoxos (luxemburguistas, consejoistas)
          impugnan esa apropiación.
        contemporaryRelevance: Los partidos comunistas de todo el mundo invocan el leninismo como herencia
          fundacional. En América Latina, organizaciones como el FARC-EP en Colombia incorporaron elementos
          leninistas en su estructura de partido-guerrilla. El debate sobre si una organización de vanguardia
          es compatible con la democracia interna sigue siendo central en la izquierda radical.
        commonCriticisms: Rosa Luxemburg criticó en vida que la teoría del partido-vanguardia asfixia
          la iniciativa de las masas y lleva inevitablemente a la dictadura sobre el proletariado en lugar
          de del proletariado. Los anarquistas señalan que el Estado obrero tiende a perpetuarse. Los
          socialdemócratas argumentan que la 'dictadura del proletariado' es incompatible con el pluralismo
          democrático.
        historicalExamples:
        - Revolución bolchevique en Rusia (1917)
        - Estado soviético bajo Lenin (1917-1924)
        - Vietnam del Norte bajo Ho Chi Minh (1945-1969)
        - Cuba bajo el Partido Comunista (1959-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Leninismo
      - id: trotskyism
        name: Trotskismo
        nameEn: Trotskyism
        weight: 2
        description: Corriente marxista-leninista que defiende la revolución permanente internacional
          y rechaza el "socialismo en un solo país".
        keyThinkers:
        - León Trotski
        - Nahuel Moreno
        - Ernest Mandel
        - Ted Grant
        - Tony Cliff
        longDescription: 'El trotskismo es la corriente marxista fundada por León Trotski a partir de
          su ruptura con el estalinismo en los años veinte. Su tesis central es la teoría de la revolución
          permanente: la revolución socialista no puede consolidarse en un solo país; debe extenderse
          internacionalmente o será derrotada o degenerará en burocracia. La URSS estalinista es, para
          Trotski, un ''Estado obrero degenerado'': conserva la propiedad colectiva de los medios de producción
          pero está gobernado por una burocracia parasitaria que traicionó la revolución.


          Trotski desarrolló estas ideas en ''La revolución permanente'' (1930) y ''La revolución traicionada''
          (1936). Propuso la Cuarta Internacional (1938) como alternativa a la Tercera Internacional dominada
          por Moscú. A diferencia del estalinismo, el trotskismo mantiene el internacionalismo como principio
          irrenunciable. A diferencia del leninismo ortodoxo, critica la degeneración burocrática del
          partido. A diferencia del maoísmo, rechaza el campesinado como sujeto revolucionario principal.


          El trotskismo se ramificó en decenas de organizaciones tras el asesinato de Trotski (1940):
          la corriente morenoísta en América Latina, el SWP estadounidense, el USFI europeo, el SLL inglés.
          Sus debates internos sobre la naturaleza de la URSS (Estado obrero degenerado, capitalismo de
          Estado, sociedad post-capitalista) definen gran parte de su historia.


          En el compás se ubica en el cuadrante autoritario-izquierda por su defensa del Estado obrero
          y la vanguardia revolucionaria, aunque más próximo al eje de equilibrio que el estalinismo,
          dado su énfasis en la democracia obrera interna.'
        historicalContext: León Trotski fue uno de los líderes de la Revolución de 1917 y comandante del
          Ejército Rojo. Fue expulsado del PCUS en 1927 y del país en 1929. Fundó la Cuarta Internacional
          en 1938. Fue asesinado por un agente estalinista en México en 1940. Durante la Guerra Fría,
          organizaciones trotskistas operaron en la clandestinidad en los países del Bloque del Este y
          en varios países occidentales. En América Latina, la corriente morenoísta (Nahuel Moreno) tuvo
          influencia en Argentina, Bolivia y Colombia.
        contemporaryRelevance: El trotskismo mantiene presencia en sindicatos y movimientos estudiantiles
          en Francia, Reino Unido, Argentina y México. Partidos como el NPA francés o el PTS argentino
          participan en elecciones. En Colombia, el PST y organizaciones afines han tenido presencia histórica
          en el movimiento obrero. El debate sobre 'entrismo' —ingresar a partidos reformistas para radicalizarlos
          desde dentro— sigue siendo táctico relevante.
        commonCriticisms: Los estalinistas acusan al trotskismo de ser agente del imperialismo y de fragmentar
          el movimiento comunista. Los socialdemócratas señalan que su programa de partido-vanguardia
          reproduce el autoritarismo leninista. Críticos internos señalan la tendencia a la escisión permanente
          como debilidad estructural del movimiento. Los anarquistas comparten la crítica a la burocracia
          estalinista pero rechazan el recurso al Estado obrero.
        historicalExamples:
        - Oposición de Izquierda en la URSS (1923-1929)
        - Cuarta Internacional (1938-presente)
        - PST argentino en los años setenta
        - LCR/NPA en Francia (1969-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Trotskismo
      - id: juche
        name: Juche
        weight: 2
        description: 'Ideología oficial de Corea del Norte: marxismo-leninismo con nacionalismo étnico
          extremo, autosuficiencia económica y culto a la dinastía Kim.'
        keyThinkers:
        - Kim Il-sung
        - Kim Jong-il
        - Hwang Jang-yop (ideólogo y luego desertor)
        longDescription: 'El juche (주체, ''sujeto'' o ''autoconfianza'') es la ideología oficial de la
          República Popular Democrática de Corea, desarrollada por Kim Il-sung a partir de los años cincuenta
          y codificada como doctrina de Estado en los años setenta. Su tesis central rechaza explícitamente
          la dependencia del marxismo-leninismo soviético o del maoísmo chino: Corea debe construir su
          propio camino socialista basado en la autosuficiencia nacional (charip), la autodefensa militar
          (chawi) y la independencia política (chaju).


          El juche sitúa al ser humano —no a las leyes materiales de la historia— como fuerza motriz del
          desarrollo. Kim Il-sung argumentó que Corea no podía seguir mecánicamente los modelos extranjeros:
          su sociedad, su historia y su cultura exigen una revolución propia. En la práctica, esto justificó
          la ruptura con Moscú en los años sesenta, la economía autárquica y el militarismo extremo.


          Su hijo Kim Jong-il sistematizó la doctrina en el texto ''El principio del juche'' (1982) y
          añadió el concepto de songun (política militar primero), que prioriza el ejército sobre todos
          los demás sectores sociales. El actual líder, Kim Jong-un, ha reintroducido retórica de desarrollo
          económico sin abandonar la centralidad del aparato militar y el culto a la dinastía.


          En el compás se ubica en el extremo autoritario-izquierda: control total del Estado sobre la
          economía y la sociedad, represión de toda oposición, pero con una retórica nacionalista que
          lo distingue del internacionalismo comunista clásico.'
        historicalContext: Kim Il-sung articuló el juche en discursos desde 1955, como alternativa al
          dogmatismo pro-soviético. Corea del Norte rompió con la URSS durante el conflicto chino-soviético
          (1960). La constitución de 1972 consagró el juche como ideología oficial. Tras el colapso soviético
          (1991), Corea del Norte sobrevivió en aislamiento. La hambruna de 1994-1998 (Arduous March)
          mató entre 240.000 y 3.5 millones de personas. El programa nuclear se aceleró desde los años
          2000.
        contemporaryRelevance: El juche sigue siendo la ideología oficial de Corea del Norte bajo Kim
          Jong-un. El programa nuclear y de misiles balísticos es la expresión más visible de la doctrina
          de autodefensa. Pequeñas organizaciones juche existen en varios países como grupos de estudio,
          sin relevancia política.
        commonCriticisms: Los críticos marxistas señalan que el juche abandona el internacionalismo de
          clase en favor del nacionalismo estatal, alejándose del socialismo. Analistas de derechos humanos
          documentan el sistema de campos de trabajo (kwanliso), el control totalitario de la información
          y las ejecuciones sumarias. Economistas señalan el fracaso del modelo autárquico en proveer
          bienestar a la población.
        historicalExamples:
        - RPDC bajo Kim Il-sung (1948-1994)
        - RPDC bajo Kim Jong-il (1994-2011)
        - RPDC bajo Kim Jong-un (2011-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Juche
      - id: anti-revisionism
        name: Antirrevisionismo
        nameEn: Anti-Revisionism
        weight: 2
        description: Corriente marxista-leninista que rechaza las reformas post-estalinistas y se considera
          la única heredera legítima del leninismo ortodoxo.
        longDescription: 'El antirrevisionismo es la posición que defiende la fidelidad a los textos y
          principios originales del marxismo-leninismo —o del marxismo-leninismo-maoísmo— frente a lo
          que considera desviaciones, concesiones o traiciones. El término adquirió su significado político
          preciso cuando el Partido Comunista Chino acusó al Partido Comunista Soviético, tras el Informe
          Secreto de Jruschov (1956), de haber abandonado los principios del leninismo y del estalinismo
          en nombre de la ''coexistencia pacífica''.


          Para los antirrevisionistas, la coexistencia pacífica con el imperialismo, el rechazo del culto
          a Stalin y las reformas económicas son capitulaciones ante la burguesía. El auténtico marxismo-leninismo
          exige la lucha de clases intransigente, el apoyo a los movimientos de liberación nacional y
          la construcción de partidos de vanguardia sin compromisos con el reformismo.


          La disputa sino-soviética (1956-1966) radicalizó el antirrevisionismo: China, Albania (bajo
          Hoxha) y numerosos partidos disidentes se declararon antirrevisionistas y rompieron con Moscú.
          En América Latina, grupos antirrevisionistas se vincularon al maoísmo o al hoxhaísmo, rechazando
          tanto al PCUS como al eurocomunismo.


          En el compás se ubica claramente en el cuadrante autoritario-izquierda, con énfasis en la ortodoxia
          doctrinal, el partido de vanguardia y la hostilidad al reformismo y al socialismo democrático.'
        historicalContext: El término 'revisionismo' fue acuñado por Lenin para atacar a Eduard Bernstein,
          quien propuso adaptar el marxismo a la participación electoral. Adquirió nuevo significado en
          1956 cuando Mao acusó a Jruschov de revisionismo. La disputa sino-soviética (1960-1989) estructuró
          el antirrevisionismo como corriente internacional. Albania bajo Hoxha fue el Estado antirrevisionista
          más coherente hasta 1985. En los años setenta y ochenta, numerosos partidos maoístas se declararon
          antirrevisionistas.
        contemporaryRelevance: Grupos antirrevisionistas —tanto maoístas como hoxhaístas— persisten en
          Europa, América Latina y Asia como organizaciones pequeñas. El Partido Comunista de la India
          (Marxista-Leninista) y varios grupos naxalitas se identifican con esta corriente. En Colombia,
          algunas organizaciones del movimiento comunista histórico mantienen posiciones antirrevisionistas.
        commonCriticisms: 'Los socialdemócratas señalan que el antirrevisionismo produce dogmatismo y
          aislamiento político. Los trotskistas arguyen que la defensa del estalinismo es una contradicción
          fundamental: no se puede defender la revolución mientras se rehabilita la burocracia. Los propios
          marxistas heterodoxos señalan que el apego a textos canónicos impide el análisis de realidades
          nuevas.'
        keyThinkers:
        - Mao Zedong
        - Enver Hoxha
        - Bill Bland
        - Hardial Bains
        historicalExamples:
        - Ruptura sino-soviética (1960-1989)
        - Albania hoxhaísta (1944-1985)
        - Partido del Trabajo de Albania (1941-1991)
        - PCI(M-L) en India (1969-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Antirrevisionismo
      - id: ho-chi-minh-thought
        name: Pensamiento Ho Chi Minh
        nameEn: Ho Chi Minh Thought
        weight: 2
        description: Aplicación vietnamita del marxismo-leninismo a la lucha anticolonial y la reunificación
          nacional. Ideología oficial de Vietnam.
        keyThinkers:
        - Hồ Chí Minh
        - Võ Nguyên Giáp
        - Lê Duẩn
        - Trường Chinh
        longDescription: 'El pensamiento Ho Chi Minh es la doctrina política asociada a Hồ Chí Minh, fundador
          de la República Democrática de Vietnam y líder del movimiento de independencia vietnamita. Su
          tesis central sintetiza el marxismo-leninismo con el nacionalismo anticolonial: la liberación
          nacional es la precondición de la revolución socialista en los países colonizados, y ambas luchas
          son inseparables.


          Ho Chi Minh adaptó el leninismo a la realidad de un país campesino bajo dominación colonial
          francesa y luego estadounidense. A diferencia del maoísmo, el pensamiento Ho Chi Minh no teorizó
          una ruptura con la URSS ni con China; mantuvo relaciones pragmáticas con ambas potencias mientras
          conducía una guerra de guerrillas prolongada. Su obra ''Camino hacia la revolución'' (1927)
          y sus escritos sobre la unidad nacional son los textos fundacionales.


          La dimensión organizativa del pensamiento Ho Chi Minh —el Viet Minh como frente amplio que incluía
          no comunistas, la disciplina del partido sin terror masivo al estilo estalinista— lo distingue
          de otras corrientes del cuadrante. Ho Chi Minh buscó apoyo de los aliados occidentales en la
          posguerra (1945) antes de comprometerse totalmente con el bloque soviético.


          En Vietnam, el pensamiento Ho Chi Minh es la doctrina oficial del Partido Comunista de Vietnam
          y se enseña en todas las instituciones educativas. Ha influido en movimientos de liberación
          en África y América Latina que combinaron socialismo con nacionalismo antiimperialista.'
        historicalContext: Ho Chi Minh fundó el Partido Comunista Indochino en 1930. Lideró la independencia
          de Vietnam en 1945 frente a Japón y Francia. La Guerra de Indochina (1946-1954) culminó en la
          derrota francesa en Dien Bien Phu. La Guerra de Vietnam (1955-1975) enfrentó al Vietnam del
          Norte con Estados Unidos y resultó en la unificación del país bajo el Partido Comunista en 1975.
          Ho Chi Minh murió en 1969, antes de ver la victoria.
        contemporaryRelevance: El Partido Comunista de Vietnam —uno de los cinco países comunistas de
          partido único que sobreviven— invoca el pensamiento Ho Chi Minh como guía oficial. Vietnam combina
          economía de mercado (Doi Moi desde 1986) con control político del partido. El debate entre la
          herencia revolucionaria de Ho Chi Minh y las reformas económicas actuales estructura la política
          interna vietnamita.
        commonCriticisms: Los críticos liberales señalan que el régimen actual de Vietnam, aunque reformado
          económicamente, mantiene la represión política y la ausencia de libertad de prensa. Los trotskistas
          argumentan que la prioridad de la liberación nacional sobre la revolución de clase reproduce
          el estalinismo en versión tropical. Historiadores señalan que Ho Chi Minh no fue ajeno a purgas
          y represión interna durante la reforma agraria (1953-1956).
        historicalExamples:
        - República Democrática de Vietnam (1945-1975)
        - Vietnam unificado bajo el PCV (1975-presente)
        - Frente de Liberación Nacional de Vietnam del Sur (1960-1975)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ho_Chi_Minh
      - id: dengism
        name: Dengismo
        nameEn: Dengism
        weight: 2
        description: 'Socialismo con características chinas de Deng Xiaoping: mercado controlado por el
          partido único, apertura al capital sin liberalización política.'
        keyThinkers:
        - Deng Xiaoping
        - Zhao Ziyang
        - Jiang Zemin
        - Xi Jinping
        longDescription: 'El dengismo es la doctrina político-económica asociada a Deng Xiaoping, quien
          dirigió China desde 1978 hasta principios de los noventa. Su tesis central es el ''socialismo
          con características chinas'': el Partido Comunista mantiene el monopolio político y la dirección
          ideológica del Estado, pero introduce mecanismos de mercado, inversión extranjera y propiedad
          privada como instrumentos para el desarrollo de las fuerzas productivas.


          Deng rompió con el maoísmo al sostener que el nivel de desarrollo económico —no la pureza ideológica—
          determina si una sociedad puede avanzar hacia el comunismo. Su famosa frase ''no importa el
          color del gato sino que cace ratones'' resume el pragmatismo que sustituyó al voluntarismo de
          Mao. Las Cuatro Modernizaciones (agricultura, industria, defensa, ciencia y tecnología) fueron
          el programa concreto.


          Las reformas dengistas transformaron a China en la segunda economía del mundo, sacaron a cientos
          de millones de personas de la pobreza y crearon una burguesía nacional de considerable peso.
          Al mismo tiempo, la represión del movimiento estudiantil en Tiananmen (1989) mostró que la apertura
          económica no implicaba liberalización política.


          Los sucesores de Deng —Jiang Zemin, Hu Jintao, Xi Jinping— han continuado y adaptado el modelo.
          Xi Jinping reintrodujo retórica más ideológica y centralizó el poder, lo que algunos analistas
          describen como un alejamiento del dengismo clásico hacia un ''neostalinismo con mercado''. En
          el compás se ubica en el cuadrante autoritario-izquierda: partido único, economía mixta con
          planificación estatal, y represión de la oposición política.'
        historicalContext: Deng Xiaoping recuperó el poder en 1978, tras la muerte de Mao y el fin de
          la Banda de los Cuatro. Las Zonas Económicas Especiales comenzaron en 1980. Las reformas rurales
          descolectivizaron la agricultura. Tiananmen (1989) marcó el límite de la apertura política.
          La incorporación a la OMC (2001) aceleró la integración global. Bajo Xi Jinping (desde 2012)
          el partido aumentó el control, aunque sin revertir la economía de mercado.
        contemporaryRelevance: China es hoy la segunda economía mundial y el principal desafío geopolítico
          a la hegemonía estadounidense. El modelo dengista es citado como alternativa al 'Consenso de
          Washington' en el Sur Global. Debates sobre si el modelo chino es 'capitalismo de Estado' o
          'socialismo de mercado' estructuran la economía política comparada contemporánea.
        commonCriticisms: Los marxistas ortodoxos señalan que el dengismo abandonó el socialismo al restaurar
          el capitalismo bajo control burocrático. Los liberales argumentan que sin pluralismo político
          la prosperidad es frágil y la corrupción estructural. Los trotskistas lo caracterizan como 'capitalismo
          de Estado' que usa retórica socialista para legitimar la dominación de una burocracia. Organizaciones
          de derechos humanos documentan la represión en Xinjiang, Tíbet y contra disidentes.
        historicalExamples:
        - China bajo Deng Xiaoping (1978-1992)
        - Zonas Económicas Especiales de China (1980-presente)
        - China bajo Xi Jinping (2012-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Dengismo
      - id: titoism
        name: Titoísmo
        nameEn: Titoism
        weight: 2
        description: Variante yugoslava del comunismo que combinaba autogestión obrera con partido único
          y distancia del bloque soviético.
        keyThinkers:
        - Josip Broz Tito
        - Edvard Kardelj
        - Milovan Đilas (luego disidente)
        - Boris Kidrič
        longDescription: 'El titoísmo es la variante del comunismo desarrollada por Josip Broz Tito en
          Yugoslavia (1945-1980), caracterizada por la independencia respecto a la URSS, la autogestión
          obrera y el liderazgo del Movimiento de Países No Alineados. Su tesis central sostiene que cada
          partido comunista debe desarrollar su propio camino al socialismo según las condiciones nacionales,
          rechazando la tutela de Moscú.


          La ruptura entre Tito y Stalin (1948) —el llamado ''Informe Cominform''— fue el primer desafío
          abierto a la hegemonía soviética dentro del bloque comunista. Yugoslavia desarrolló el sistema
          de ''autogestión obrera'' (samoupravljanje): las empresas eran gestionadas por consejos de trabajadores,
          no por burócratas estatales. Este modelo intentaba superar la centralización estalinista sin
          abandonar la propiedad social de los medios de producción.


          En política exterior, Tito cofundó el Movimiento de Países No Alineados (Bandung, 1955; Belgrado,
          1961) junto con Nasser y Nehru, posicionando a Yugoslavia entre los dos bloques de la Guerra
          Fría. Este pragmatismo internacional permitió recibir ayuda tanto de Occidente como de Oriente.


          El titoísmo influyó en el eurocomunismo, en corrientes de izquierda que buscaban una vía al
          socialismo independiente de Moscú, y en debates sobre la democracia obrera. La desintegración
          de Yugoslavia tras la muerte de Tito (1980-1991) planteó la pregunta de si el titoísmo era sostenible
          más allá de la figura personal del líder.'
        historicalContext: 'Tito lideró los partisanos yugoslavos en la Segunda Guerra Mundial, liberando
          el país sin tropas soviéticas. Rompió con Stalin en 1948 y sobrevivió al intento de desestabilización
          soviético. Fundó el Movimiento de No Alineados en 1961. Murió en 1980. La tensión étnica latente
          durante el período titoísta estalló tras su muerte: la disolución de Yugoslavia (1991-2001)
          produjo cuatro guerras y la creación de siete Estados.'
        contemporaryRelevance: El titoísmo como doctrina no tiene herederos organizados. Sin embargo,
          el modelo de autogestión obrera yugoslavo es estudiado como referencia en debates sobre economía
          participativa y democracia en el trabajo. El Movimiento de No Alineados persiste institucionalmente
          aunque con menor peso geopolítico. En los Balcanes, la memoria del titoísmo es objeto de disputas
          políticas.
        commonCriticisms: 'Los estalinistas acusaron a Tito de agente imperialista por romper con Moscú.
          Los liberales señalan que Yugoslavia siguió siendo una dictadura de partido único con represión
          de la disidencia. Los críticos marxistas señalan que la autogestión nunca fue completamente
          genuina: el partido mantuvo el control político. Analistas señalan que el titoísmo no resolvió
          las tensiones nacionales que explotaron tras 1980.'
        historicalExamples:
        - Yugoslavia socialista (1945-1980)
        - Movimiento de Países No Alineados (1961-presente)
        - Ruptura Tito-Stalin (1948)
        wikipediaUrl: https://es.wikipedia.org/wiki/Titoísmo
      - id: castroism
        name: Castrismo
        nameEn: Castroism
        weight: 2
        description: 'Variante cubana del socialismo de Estado, surgida de la Revolución Cubana de 1959:
          partido único, economía planificada y política antimperialista.'
        keyThinkers:
        - Fidel Castro
        - Ernesto 'Che' Guevara
        - Raúl Castro
        - Régis Debray
        longDescription: 'El castrismo es la doctrina político-revolucionaria asociada a Fidel Castro
          y la Revolución Cubana (1959). Su tesis central plantea que la revolución socialista puede triunfar
          sin esperar la formación de un proletariado industrial maduro: un núcleo guerrillero reducido
          (el foco insurreccional o foquismo, teorizado por Ernesto ''Che'' Guevara y Régis Debray) puede
          crear las condiciones subjetivas para la revolución mediante la lucha armada en el campo.


          El castrismo sintetiza el leninismo, el martianismo (herencia de José Martí) y el nacionalismo
          latinoamericano. A diferencia del marxismo-leninismo soviético, el castrismo llegó al poder
          sin un partido comunista organizado de antemano: el Movimiento 26 de Julio era una organización
          nacionalista que se autodefinió marxista-leninista solo en 1961, tras el triunfo de la revolución.


          En su aplicación, la Revolución Cubana nacionalizó la economía, eliminó el analfabetismo, estableció
          un sistema de salud universal y resistió cincuenta años de bloqueo estadounidense. Exportó su
          modelo mediante apoyo a guerrillas latinoamericanas (FARC, ELN en Colombia) y misiones internacionales
          en África (Angola, Etiopía). Mantiene el partido único y reprime la disidencia política.


          El castrismo influyó profundamente en la izquierda latinoamericana durante la segunda mitad
          del siglo XX. Debates sobre su vigencia estructuran la política de izquierda en la región hasta
          hoy.'
        historicalContext: Fidel Castro lideró el desembarco del Granma en 1956 y la guerrilla en Sierra
          Maestra. El régimen de Batista cayó el 1 de enero de 1959. La crisis de los misiles (1962) fue
          el punto más álgido de la Guerra Fría en el Caribe. Cuba exportó revolucionarios al Congo (1965)
          y Angola (1975-1991). Fidel Castro transfirió el poder a su hermano Raúl en 2008 y murió en
          2016. Miguel Díaz-Canel preside desde 2018.
        contemporaryRelevance: Cuba mantiene el régimen de partido único bajo el Partido Comunista de
          Cuba. La crisis económica de los años noventa (Período Especial) y el recrudecimiento del bloqueo
          en los años 2020 generaron protestas sin precedentes (julio 2021). El castrismo sigue siendo
          referencia para la izquierda latinoamericana, aunque su modelo genera debate interno creciente.
        commonCriticisms: Los liberales señalan que el castrismo estableció una dictadura que reprime
          la oposición, prohíbe partidos alternativos y controla la prensa. Los trotskistas argumentan
          que el castrismo reproduce la burocracia estalinista sin la base de un partido obrero genuino.
          Algunos sectores de izquierda señalan contradicciones entre el discurso antiimperialista y la
          dependencia económica de Venezuela y China.
        historicalExamples:
        - Cuba revolucionaria (1959-presente)
        - Apoyo a la MPLA en Angola (1975-1991)
        - Influencia en el FSLN nicaragüense (1979)
        - Relación con las FARC en Colombia
        wikipediaUrl: https://es.wikipedia.org/wiki/Castrismo
      - id: chavism
        name: Chavismo
        nameEn: Chavism
        weight: 2
        description: Movimiento venezolano fundado por Hugo Chávez que combina nacionalismo, populismo
          de izquierda y control estatal de la economía.
        keyThinkers:
        - Hugo Chávez
        - Heinz Dieterich (teórico del 'socialismo del siglo XXI')
        - Marta Harnecker
        - Nicolás Maduro
        longDescription: 'El chavismo es la doctrina político-ideológica construida alrededor de Hugo
          Chávez y la Revolución Bolivariana en Venezuela (1999-2013). Su tesis central es el ''socialismo
          del siglo XXI'': una vía al socialismo que no replica el modelo soviético sino que combina la
          tradición bolivariana latinoamericana, el participacionismo político, la redistribución de la
          renta petrolera y el antiimperialismo con elementos del marxismo adaptado a las condiciones
          latinoamericanas.


          Chávez ganó las elecciones presidenciales en 1998 con un discurso que mezclaba nacionalismo,
          populismo y crítica al neoliberalismo. Las políticas sociales (misiones bolivarianas: salud,
          educación, vivienda) redujeron la pobreza y la desigualdad durante los años de bonanza petrolera.
          La nueva Constitución de 1999 introdujo mecanismos de democracia directa y participativa.


          En su evolución, el chavismo se radicalizó hacia el socialismo del siglo XXI a partir de 2005,
          con nacionalizaciones, apoyo a Cuba y construcción del ALBA (Alternativa Bolivariana para América
          Latina). Nicolás Maduro, sucesor de Chávez tras su muerte en 2013, ha mantenido el régimen bajo
          condiciones de colapso económico severo, emigración masiva y autoritarismo creciente.


          El chavismo es referente central de debate político en Colombia, por su proximidad geográfica
          e influencia en corrientes de izquierda como el petrismo. En el compás se ubica en el cuadrante
          autoritario-izquierda: redistribución, nacionalizaciones y retórica igualitaria combinadas con
          concentración creciente del poder ejecutivo.'
        historicalContext: Hugo Chávez intentó un golpe de Estado en 1992, fue amnistiado y ganó las elecciones
          en 1998. La Constitución bolivariana se aprobó en 1999. El golpe frustrado de 2002 reforzó su
          base popular. El boom petrolero (2003-2013) financió las misiones sociales. Chávez murió de
          cáncer en marzo de 2013. Maduro ganó elecciones cuestionadas en 2013 y mantuvo el poder pese
          a la crisis económica. En 2019 Juan Guaidó se autoproclamó presidente interino con reconocimiento
          occidental.
        contemporaryRelevance: Venezuela sigue siendo gobernada por el Partido Socialista Unido de Venezuela
          (PSUV) bajo Maduro, con la economía devastada, más de 7 millones de emigrantes y denuncias de
          violaciones sistemáticas de derechos humanos. El chavismo es referente de debate en Colombia
          —Gustavo Petro ha buscado distanciarse del modelo venezolano mientras mantiene vínculos históricos
          con la izquierda bolivariana.
        commonCriticisms: 'Los críticos liberales y de derecha sostienen que el chavismo destruyó la economía
          venezolana mediante populismo, corrupción y desinstitucionalización. Los trotskistas y marxistas
          ortodoxos señalan que el chavismo nunca fue un socialismo genuino: mantuvo la propiedad privada
          y dependió de la renta petrolera sin transformar las relaciones de producción. Analistas de
          izquierda crítica (como Edgardo Lander) señalan que el extractivismo chavista reprodujo la dependencia
          en lugar de superarla.'
        historicalExamples:
        - Venezuela bajo Hugo Chávez (1999-2013)
        - ALBA (2004-presente)
        - Venezuela bajo Nicolás Maduro (2013-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Chavismo
    - name: variantes-marxistas
      weight: 4
      children:
      - id: orthodox-marxism
        name: Marxismo ortodoxo
        nameEn: Orthodox Marxism
        weight: 2
        description: Interpretación estricta de los textos clásicos de Marx y Engels sin las revisiones
          bernsteinianas o leninistas posteriores.
        longDescription: 'El marxismo ortodoxo designa la fidelidad estricta al corpus teórico de Karl
          Marx y Friedrich Engels, rechazando tanto las revisiones reformistas (Bernstein) como las adaptaciones
          leninistas-estalinistas. Su tesis central es que el capitalismo contiene contradicciones estructurales
          que lo llevarán inevitablemente a su crisis y sustitución por el socialismo, siguiendo las leyes
          del materialismo histórico sin necesidad de voluntarismo político externo.


          La Segunda Internacional (1889-1916) fue el principal vehículo del marxismo ortodoxo, con figuras
          como Karl Kautsky, Rudolf Hilferding y Rosa Luxemburg. Kautsky, el ''Papa del marxismo'', sostuvo
          que el partido socialdemócrata debía esperar el desarrollo de las fuerzas productivas y ganar
          mayorías electorales, sin recurrir a la insurrección. Lenin lo atacó duramente en ''¿Qué hacer?''
          y luego en ''La revolución proletaria y el renegado Kautsky''.


          El marxismo ortodoxo distingue entre el socialismo científico —análisis de las tendencias objetivas
          del capitalismo— y las decisiones tácticas del movimiento obrero. Mantiene el internacionalismo,
          la teoría del valor-trabajo y la dialéctica materialista como ejes teóricos inamovibles. A diferencia
          del leninismo, no exige un partido de vanguardia; a diferencia del reformismo, no renuncia a
          la transformación radical de las relaciones de producción.


          En el compás se ubica en el cuadrante autoritario-izquierda por su defensa de la transformación
          estructural del capitalismo y el protagonismo de la clase obrera organizada, aunque no necesariamente
          mediante medios insurreccionales.'
        historicalContext: Marx y Engels publicaron el 'Manifiesto Comunista' en 1848 y 'El Capital' entre
          1867 y 1894. La Primera Internacional reunió corrientes marxistas y anarquistas (1864-1876).
          La Segunda Internacional estructuró el movimiento obrero internacional hasta 1914. La ruptura
          de 1914 —la mayoría de los partidos socialistas apoyaron la guerra— fragmentó el marxismo ortodoxo.
          Kautsky y Bernstein representaron las dos líneas de la fractura.
        contemporaryRelevance: El marxismo ortodoxo como posición diferenciada tiene escasa presencia
          organizacional contemporánea. Sus categorías teóricas —plusvalía, fetichismo de la mercancía,
          composición orgánica del capital— siguen siendo herramientas centrales en la economía política
          crítica académica y en publicaciones como la 'New Left Review'.
        commonCriticisms: Los leninistas sostienen que el economicismo del marxismo ortodoxo conduce al
          reformismo y la pasividad política. Los socialdemócratas argumentan que la expectativa de colapso
          inevitable del capitalismo lleva a rechazar reformas reales y concretas. Los posmarxistas señalan
          que las categorías de Marx deben ser revisadas a la luz de las transformaciones del capitalismo
          contemporáneo.
        keyThinkers:
        - Karl Marx
        - Friedrich Engels
        - Karl Kautsky
        - Rosa Luxemburg
        - Rudolf Hilferding
        historicalExamples:
        - Segunda Internacional (1889-1914)
        - SPD alemán antes de 1914
        - Debate Bernstein-Kautsky (1898-1902)
        wikipediaUrl: https://es.wikipedia.org/wiki/Marxismo
      - id: national-bolshevism
        name: Nacional-bolchevismo
        nameEn: National Bolshevism
        weight: 2
        description: Síntesis heterodoxa que combina socialismo estatal con nacionalismo étnico, a veces
          clasificada como "third position".
        longDescription: 'El nacionalbolchevismo es una corriente ideológica que intenta fusionar el bolchevismo
          soviético —la revolución anticapitalista, el anti-imperialismo, el estatismo— con el nacionalismo
          étnico o pangermánico, rechazando tanto el liberalismo occidental como el capitalismo internacional.
          Su tesis central es que la auténtica revolución debe ser simultáneamente nacional y social:
          romper con el capital financiero internacional y con el Estado burgués, construyendo una comunidad
          nacional fuerte bajo dirección estatal.


          En la Alemania de la República de Weimar, figuras como Ernst Niekisch y Karl Otto Paetel intentaron
          construir un frente entre comunistas y sectores nacionalistas radicales contra el capitalismo
          liberal y contra el nazismo hitleriano, al que consideraban una traición al auténtico socialismo.
          En Rusia, Eduard Limónov y Aleksandr Dugín fundaron el Partido Nacional Bolchevique en los años
          noventa, combinando retórica marxista-leninista con ultranacionalismo eurasiático.


          El nacionalbolchevismo es ideológicamente inestable: su rechazo simultáneo de capitalismo y
          liberalismo lo convierte en aliado circunstancial tanto de la extrema izquierda como de la extrema
          derecha. En el compás político se ubica en la frontera entre los cuadrantes autoritario-izquierda
          y autoritario-derecha, cruzando el eje en función del énfasis dado a lo nacional versus lo social.


          De esta corriente se derivan las etiquetas ''ni rojos ni pardos'' o ''herradura ideológica''
          que algunos analistas aplican a movimientos que combinan retóricas de izquierda y derecha extrema.'
        historicalContext: Las primeras formulaciones emergieron en la República de Weimar (1919-1933),
          con intelectuales como Niekisch que buscaban una 'tercera vía' entre fascismo y comunismo. El
          Partido Nacional Bolchevique de Limónov y Dugín fue fundado en Rusia en 1992. Fue prohibido
          en 2007 por el Tribunal Supremo ruso. Dugín evolucionó hacia el eurasianismo, alejándose del
          nacionalbolchevismo inicial.
        contemporaryRelevance: Grupos identificados con el nacionalbolchevismo existen en Rusia, Ucrania
          y Europa del Este. La corriente ha influido en sectores del movimiento antimaidan y en algunos
          grupos de la extrema izquierda europea que simpatizan con Putin como símbolo del anti-imperialismo
          occidental. Su presencia en América Latina es mínima.
        commonCriticisms: Los marxistas sostienen que el nacionalbolchevismo traiciona el internacionalismo
          de clase al priorizar la nación sobre la solidaridad obrera global. Los liberales lo caracterizan
          como fascismo con retórica de izquierda. Los antifascistas señalan que la fusión de simbolismo
          rojo y negro ('strasserismo rojo') confunde fronteras ideológicas y facilita la captación desde
          la extrema derecha.
        keyThinkers:
        - Ernst Niekisch
        - Eduard Limónov
        - Aleksandr Dugín (primera etapa)
        - Karl Otto Paetel
        historicalExamples:
        - Movimiento niekischiano en Alemania (1919-1933)
        - Partido Nacional Bolchevique en Rusia (1992-2007)
        wikipediaUrl: https://es.wikipedia.org/wiki/Nacionalbolchevismo
      - id: strasserism
        name: Strasserismo
        nameEn: Strasserism
        weight: 2
        description: Ala "izquierda" del nazismo asociada a los hermanos Strasser, que enfatizaba el anticapitalismo
          y el corporativismo sobre el racismo puro.
        keyThinkers:
        - Gregor Strasser
        - Otto Strasser
        longDescription: 'El strasserismo es la corriente nacional-socialista asociada a Gregor y Otto
          Strasser, que se enfrentó a Hitler dentro del Partido Nacionalsocialista Obrero Alemán (NSDAP)
          durante los años veinte y principios de los treinta. Su tesis central es que el nacionalsocialismo
          debe ser genuinamente socialista: nacionalizar las grandes empresas, distribuir la tierra, eliminar
          a la aristocracia financiera y construir un Estado corporativista de base obrera, en lugar de
          aliarse con la burguesía y los grandes capitalistas como hizo Hitler.


          Gregor Strasser dirigió la fracción norte del NSDAP y promovió el programa ''socialista'' del
          partido hasta que fue marginado por Hitler en 1932 y asesinado en la Noche de los Cuchillos
          Largos (1934). Otto Strasser abandonó el partido antes, fundando la ''Unión Revolucionaria Nacional''
          y luego el movimiento ''Frente Negro''.


          El strasserismo comparte con el nazismo el antisemitismo, el nacionalismo étnico y el autoritarismo,
          pero rechaza el capitalismo como sistema y propone una economía de Estado organicista. Se ubica
          en la frontera entre autoritario-izquierda y autoritario-derecha: su economía dirigista y anticapitalista
          lo acerca al primer cuadrante, pero su racismo, antisemitismo y base étnica lo acercan al segundo.


          El strasserismo no fue nunca un movimiento de masas autónomo; su peso histórico es reducido.
          Sin embargo, persiste como referencia en neonazismos que buscan distanciarse del capitalismo
          o que intentan captar sectores obreros.'
        historicalContext: Gregor Strasser fue jefe de organización del NSDAP y rival de Hitler dentro
          del partido (1925-1932). Su renuncia en 1932 debilitó la facción socialista del nazismo. La
          Noche de los Cuchillos Largos (30 de junio de 1934) lo asesinó. Otto Strasser fundó el Frente
          Negro en 1930 y emigró durante el Tercer Reich. Tras la guerra, intentó sin éxito recuperar
          influencia política en Alemania Occidental.
        contemporaryRelevance: El strasserismo tiene presencia en grupos neonazis europeos y estadounidenses
          que enfatizan el anticapitalismo como elemento de captación entre sectores obreros. No tiene
          representación electoral significativa en ningún país. Se discute como fenómeno en estudios
          sobre extremismo.
        commonCriticisms: Los marxistas señalan que el strasserismo mantiene el antisemitismo y el racismo
          que hacen imposible cualquier alianza genuina con el movimiento obrero. Los liberales lo caracterizan
          como una variante del fascismo que añade retórica anticapitalista sin abandonar la esencia autoritaria
          y racial. Los historiadores señalan que su distancia real con el nazismo hitleriano era táctica,
          no principista.
        historicalExamples:
        - Facción Strasser en el NSDAP (1925-1932)
        - Frente Negro de Otto Strasser (1930-1933)
        - Noche de los Cuchillos Largos (1934)
        wikipediaUrl: https://es.wikipedia.org/wiki/Strasserismo
      - id: monarcho-communism
        name: Monarco-comunismo
        nameEn: Monarcho-Communism
        weight: 1
        description: Síntesis excéntrica que combina una monarquía hereditaria simbólica con economía
          colectivista estatal.
        longDescription: 'El monarcocomunismo es una posición teórica marginal que postula la compatibilidad
          —o incluso la complementariedad— entre la institución monárquica y el sistema comunista. Su
          tesis central sostiene que la monarquía, despojada de sus funciones capitalistas, puede ser
          un símbolo de unidad nacional y continuidad histórica compatible con la propiedad colectiva
          de los medios de producción y la planificación estatal.


          No existe un movimiento político organizado bajo este nombre, ni pensadores canónicos que lo
          hayan elaborado sistemáticamente. Se trata de una posición experimental que aparece en debates
          teóricos en internet y en grupos marginales que buscan ''terceras vías'' entre el republicanismo
          liberal y el comunismo clásico. Algunos apuntan a experiencias históricas como precedentes:
          regímenes marxistas con liderazgo cuasi-monárquico (Corea del Norte con su dinastía Kim, el
          jefe tradicional africano combinado con socialismo estatal en países como Tanzania o Etiopía).


          La mayor parte de la tradición marxista rechaza la monarquía como institución incompatible con
          la abolición de la distinción de clases: una familia hereditaria en el poder contradice los
          principios de igualdad y soberanía popular. La posición monarcocomunista solo es coherente en
          versiones que separan la función ceremonial de la monarquía del poder real.


          En el compás se ubica en el cuadrante autoritario-izquierda por su combinación de colectivismo
          económico con jerarquía hereditaria en la cúspide del Estado.'
        historicalContext: No existe una historia lineal del monarcocomunismo como corriente organizada.
          La RPDC ha funcionado de facto como monarquía comunista desde la sucesión Kim Il-sung → Kim
          Jong-il → Kim Jong-un. Tanzania bajo Julius Nyerere mantuvo elementos de autoridad tradicional
          combinados con socialismo africano (ujamaa). El debate teórico existe principalmente en foros
          académicos y en internet.
        contemporaryRelevance: Como posición teórica existe en discusiones de filosofía política experimental
          y en comunidades de debate ideológico en línea. No tiene presencia en ningún partido o movimiento
          político relevante. Se cita como ejemplo de las posibilidades combinatorias del espectro ideológico
          en trabajos de teoría política.
        commonCriticisms: Los marxistas señalan que la monarquía hereditaria es la expresión más pura
          de la distinción de clases y contradicción flagrante del ideal comunista. Los republicanos argumentan
          que toda soberanía legítima debe emanar del pueblo, no de la sangre. Los anarquistas señalan
          que combina dos formas de dominación en lugar de eliminar alguna.
        keyThinkers:
        - Sin pensadores canónicos establecidos
        historicalExamples:
        - RPDC como monarquía comunista de facto (1948-presente)
        - Tanzania bajo Nyerere con elementos de autoridad tradicional (1961-1985)
        wikipediaUrl: https://es.wikipedia.org/wiki/Monarquía
      - id: posadism
        name: Posadismo
        nameEn: Posadism
        weight: 1
        description: Corriente trotskista argentina de J. Posadas que defendía la guerra nuclear como
          catalizador revolucionario y creía en contacto con extraterrestres.
        keyThinkers:
        - J. Posadas (Homero Cristalli)
        longDescription: 'El posadismo es una corriente trotskista heterodoxa desarrollada por el argentino
          J. Posadas (Homero Rómulo Cristalli) desde los años cuarenta, conocida por combinar el marxismo-leninismo
          con tesis sobre inteligencia extraterrestre, la comunicación con delfines como formas de conciencia
          avanzada y la conveniencia de una guerra nuclear que destruya el capitalismo para permitir la
          revolución socialista global.


          En su núcleo más serio, el posadismo es una corriente trotskista latinoamericana que tuvo presencia
          real en Argentina, Cuba, Brasil y Uruguay durante los años cincuenta y sesenta, participando
          en debates obreros y apoyando la Revolución Cubana. Posadas era un organizador obrero con militancia
          real en el movimiento sindical argentino.


          Las tesis ''exóticas'' —especulaciones sobre civilizaciones extraterrestres avanzadas que habrían
          superado el capitalismo para poder sobrevivir el espacio interestelar, y que podrían ser aliadas
          de la revolución— aparecen en textos de los años sesenta. Posadas argumentó que la carrera espacial
          y los avistamientos de OVNIs eran evidencia de contacto con esas civilizaciones.


          El posadismo nunca fue un movimiento de masas pero alcanzó cierta implantación sindical en América
          Latina. Tras la muerte de Posadas (1981) y la derrota de las izquierdas en el Cono Sur, se fragmentó.
          Hoy es conocido principalmente como curiosidad histórica e internet meme de la izquierda, aunque
          existen grupos autoproclamados posadistas en varios países.'
        historicalContext: J. Posadas fundó el Bureau Latinoamericano de la Cuarta Internacional en 1953
          y el Partido Obrero Revolucionario (POR) en Argentina. Tuvo presencia en el sindicalismo argentino
          y latinoamericano en los años cincuenta. Los textos sobre extraterrestres y delfines se publicaron
          en los años sesenta. Posadas murió en Roma en 1981. La tradición persiste en grupos pequeños
          en Europa y América Latina.
        contemporaryRelevance: El posadismo revivió como fenómeno de cultura popular en internet desde
          los años 2010, cuando sus tesis sobre extraterrestres fueron redescubiertas con tono humorístico.
          Grupos posadistas activos existen en el Reino Unido, Alemania y Argentina, mezclando la herencia
          trotskista seria con la dimensión excéntrica. El término 'posadismo' es usado coloquialmente
          para referirse a posiciones de izquierda que van más allá de lo convencional.
        commonCriticisms: La mayoría del movimiento trotskista rechazó las tesis extraterrestres como
          locura o provocación que dañaba la credibilidad del marxismo. Los críticos señalan que la combinación
          de militancia obrera real con especulación pseudocientífica es testimonio de la crisis de perspectiva
          de la izquierda radical latinoamericana en los años sesenta. Historiadores señalan que es difícil
          separar el posadismo serio del excéntrico porque el propio Posadas los mezclaba.
        historicalExamples:
        - POR argentino en los años cincuenta y sesenta
        - Bureau Latinoamericano de la Cuarta Internacional (1953-1981)
        wikipediaUrl: https://es.wikipedia.org/wiki/Posadismo
      - id: socialist-transhumanism
        name: Transhumanismo socialista
        nameEn: Socialist Transhumanism
        weight: 2
        description: Síntesis que combina colectivismo económico con modificación tecnológica de la especie
          humana dirigida por el Estado.
        longDescription: 'El transhumanismo socialista es una corriente que combina la teoría socialista
          con la agenda transhumanista: el uso de la tecnología para superar las limitaciones biológicas
          humanas —enfermedad, envejecimiento, muerte— debe estar disponible para todos, no solo para
          quienes puedan pagarlo. Su tesis central sostiene que sin igualdad en el acceso a las tecnologías
          de mejoramiento humano, el transhumanismo liberal reproducirá y amplificará las desigualdades
          capitalistas.


          El transhumanismo socialista emerge como crítica al transhumanismo de mercado (representado
          por figuras como Peter Thiel o Ray Kurzweil), que confía en que la innovación privada extenderá
          los beneficios tecnológicos. Para los transhumanistas socialistas, la propiedad colectiva de
          la infraestructura tecnológica y la planificación democrática del desarrollo científico son
          condiciones necesarias para que la mejora humana sea universal.


          En su versión más radical se solapa con el comunismo de lujo totalmente automatizado: la automatización
          debe liberar a los humanos del trabajo, pero solo el socialismo puede garantizar que esa liberación
          sea para todos y no solo para los propietarios de los robots. Pensadores como Bastani (FALC)
          o Nick Land (en su versión capitalista aceleracionista) representan los dos extremos del debate.


          En el compás se ubica en el cuadrante autoritario-izquierda por su defensa de la planificación
          colectiva del desarrollo tecnológico, aunque tiene variantes más libertarias que se aproximan
          al cuadrante libertario-izquierda.'
        historicalContext: El transhumanismo como corriente emergió en los años ochenta con el World Transhumanist
          Association (ahora Humanity+). La variante socialista se articuló en los años 2000 en respuesta
          a la concentración del desarrollo tecnológico en Silicon Valley. El Instituto para la Ética
          y las Tecnologías Emergentes (IEET) fue un foro relevante para el transhumanismo progresista.
        contemporaryRelevance: El debate sobre propiedad de la IA, acceso equitativo a la biotecnología
          y regulación del transhumanismo es activo en política tecnológica. Corrientes dentro del Partido
          Laborista británico y de la izquierda europea han incorporado agenda de igualdad tecnológica.
          El aceleracionismo de izquierda (l/acc) y el FALC son corrientes contemporáneas relacionadas.
        commonCriticisms: Los marxistas ortodoxos señalan que el transhumanismo socialista sobreestima
          la tecnología como motor del cambio y subestima las relaciones de producción. Los ecosocialistas
          argumentan que el énfasis en crecimiento tecnológico reproduce el productivismo capitalista.
          Los humanistas conservadores señalan que la alteración de la naturaleza humana plantea preguntas
          éticas que ningún sistema político puede resolver.
        keyThinkers:
        - James Hughes
        - Andy Miah
        - Aaron Bastani (FALC)
        - Nick Bostrom (transhumanismo liberal como contrapunto)
        historicalExamples:
        - Instituto para la Ética y las Tecnologías Emergentes (IEET, 2004-presente)
        - Debates sobre IA y propiedad en el contexto de ChatGPT y DeepMind (2020s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Transhumanismo
      - id: fully-automated-luxury-communism
        name: FALGSC
        nameEn: Fully Automated Luxury Gay Space Communism
        weight: 2
        description: Visión utópica post-escasez donde la automatización total libera a la humanidad del
          trabajo bajo un sistema colectivista.
        longDescription: 'El Comunismo de Lujo Totalmente Automatizado (FALC, por sus siglas en inglés:
          Fully Automated Luxury Communism) es una corriente teórica contemporánea que postula que la
          automatización tecnológica avanzada —robots, inteligencia artificial, impresión 3D— puede eliminar
          el trabajo humano necesario para la producción material, permitiendo una sociedad de abundancia
          igualitaria para todos.


          Su tesis central, desarrollada principalmente por Aaron Bastani en el libro ''Fully Automated
          Luxury Communism'' (2019), sostiene que el capitalismo ya no puede absorber productivamente
          las ganancias de productividad de la automatización. La solución no es frenar la tecnología
          ni repartir escasez, sino colectivizar la infraestructura automatizada para que la abundancia
          generada pertenezca a todos.


          El FALC hereda del marxismo la crítica al capitalismo y la meta del comunismo, pero actualiza
          el diagnóstico: la crisis actual no es de superproducción clásica sino de captura privada de
          la productividad tecnológica. La energía solar, la biotecnología, la IA y la robótica son los
          vectores de transformación. El Estado —o la colectividad— debe controlar estos sectores estratégicos.


          El FALC tiene una dimensión utópica deliberada: propone una visión positiva del futuro para
          la izquierda, en contraste con el énfasis en la crisis y la resistencia que domina gran parte
          de la teoría crítica contemporánea. En el compás se ubica en el cuadrante autoritario-izquierda
          por su defensa de la propiedad colectiva y la planificación, aunque sus versiones más descentralizadas
          se aproximan al libertario-izquierda.'
        historicalContext: El FALC emerge en el contexto del debate sobre automatización y futuro del
          trabajo de los años 2010. Bastani publicó su libro en 2019. La corriente recoge antecedentes
          en el autonomismo italiano (Negri), el operaísmo y el aceleracionismo de izquierda. El debate
          global sobre desempleo tecnológico y renta básica universal es su contexto inmediato.
        contemporaryRelevance: El FALC ha influido en corrientes del Partido Laborista británico y en
          debates del movimiento Corbynista. La renta básica universal, la semana laboral de cuatro días
          y la propiedad pública de la IA son políticas asociadas a esta agenda. El debate es activo en
          medios como Jacobin, Novara Media y en la academia anglófona.
        commonCriticisms: Los marxistas ortodoxos señalan que el FALC sobreestima el potencial de la tecnología
          y subestima las relaciones de producción capitalistas, que se adaptarán para capturar los beneficios
          de la automatización. Los ecosocialistas argumentan que la promesa de 'lujo' para todos es incompatible
          con los límites planetarios. Los críticos pragmáticos señalan que es una visión utópica sin
          hoja de ruta política clara.
        keyThinkers:
        - Aaron Bastani
        - Nick Srnicek
        - Alex Williams
        - Paul Mason
        historicalExamples:
        - Debate Corbynista en el Partido Laborista británico (2015-2019)
        - Movimiento por la renta básica universal en Europa y América Latina (2010s-2020s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Comunismo_de_lujo_totalmente_automatizado
    - name: socialismo-estado
      weight: 3
      children:
      - id: state-capitalism
        name: Capitalismo de Estado
        nameEn: State Capitalism
        weight: 2
        description: Sistema donde el Estado posee o controla los medios de producción pero opera bajo
          lógica de acumulación de capital.
        longDescription: 'El capitalismo de Estado describe un sistema económico en el que el Estado posee
          o controla los principales medios de producción y acumula capital de manera análoga a como lo
          haría una corporación privada, pero sin eliminar las categorías capitalistas —trabajo asalariado,
          plusvalía, mercado— ni la competencia internacional. La tesis central es que la propiedad estatal
          por sí sola no basta para definir un sistema como socialista: si el Estado actúa como capitalista
          colectivo, el modo de producción sigue siendo capitalista.


          El término fue acuñado críticamente por varios pensadores marxistas para caracterizar a la URSS
          (desde Tony Cliff en los años cuarenta), a China post-Mao (muchos economistas heterodoxos),
          y a economías mixtas con grandes sectores estatales como Venezuela chavista o los países nórdicos
          en su período de mayor intervención. Las empresas estatales operan en el mercado, financian
          el Estado con sus ganancias y compiten globalmente.


          El capitalismo de Estado difiere del socialismo en que no elimina el trabajo asalariado como
          categoría: los trabajadores siguen vendiendo su fuerza de trabajo al Estado como empleador.
          Difiere del capitalismo privado puro en que la acumulación no beneficia a accionistas individuales
          sino al aparato estatal y sus burócratas.


          En el compás se ubica en el cuadrante autoritario-izquierda porque combina control estatal intenso
          con conservación de las categorías económicas capitalistas: mercado, trabajo asalariado, acumulación.
          Sus defensores dentro de la izquierda lo consideran una etapa transitoria hacia el socialismo;
          sus críticos marxistas, una forma de capitalismo disfrazado.'
        historicalContext: Lenin empleó el término 'capitalismo de Estado' para describir la NEP (1921-1928)
          como fase de transición. Tony Cliff aplicó el concepto a la URSS bajo Stalin en 1948. La China
          de Deng Xiaoping es el ejemplo más citado desde los años ochenta. Los debates sobre la naturaleza
          del capitalismo de Estado en China y Vietnam estructuran la economía política comparada contemporánea.
        contemporaryRelevance: China, Vietnam, Bielorrusia y algunas economías del Golfo Pérsico son frecuentemente
          caracterizadas como capitalismos de Estado. El debate es relevante en la izquierda para determinar
          si apoyar o criticar a estos regímenes como aliados del socialismo o como formas alternativas
          de capitalismo. En América Latina, las empresas estatales energéticas (Pemex, PDVSA, Petrobras)
          son objetos centrales de este debate.
        commonCriticisms: 'Los defensores del socialismo soviético rechazan el concepto: sostienen que
          la propiedad estatal es cualitativamente diferente de la propiedad privada. Los liberales arguyen
          que el capitalismo de Estado es más ineficiente y corrupto que el capitalismo privado. Los anarquistas
          señalan que el Estado como empleador no resuelve la explotación. Los trotskistas debaten si
          la categoría se aplica a la URSS o si esta fue un ''Estado obrero degenerado''.'
        keyThinkers:
        - Tony Cliff
        - Raya Dunayevskaya
        - C.L.R. James
        - Rudolf Hilferding
        historicalExamples:
        - URSS según la teoría de Tony Cliff (1917-1991)
        - China bajo Deng Xiaoping (1978-presente)
        - Venezuela chavista (1999-presente)
        - Empresas estatales del Golfo Pérsico
        wikipediaUrl: https://es.wikipedia.org/wiki/Capitalismo_de_Estado
      - id: baathism
        name: Ba'athismo
        nameEn: Ba'athism
        weight: 2
        description: Ideología panárabe socialista fundada por Michel Aflaq. Combina nacionalismo secular,
          socialismo de Estado y autoritarismo. Régimen en Siria e Irak.
        keyThinkers:
        - Michel Aflaq
        - Salah al-Din al-Bitar
        - Saddam Hussein
        - Hafez al-Assad
        longDescription: 'El baazismo (del árabe Ba''th, ''resurrección'' o ''renacimiento'') es la ideología
          del Partido Árabe Socialista del Renacimiento, fundado en Damasco en 1947 por Michel Aflaq y
          Salah al-Din al-Bitar. Su tesis central es la unidad árabe: la nación árabe, dividida artificialmente
          por el colonialismo europeo, debe reunificarse en un solo Estado socialista y laico que libere
          a los árabes tanto del imperialismo occidental como del feudalismo y el capitalismo interno.


          El baazismo combina tres principios: unidad (árabe), libertad (frente al colonialismo) y socialismo
          (transformación de la economía, no necesariamente marxista). El socialismo baazista no es marxista:
          no recurre a la lucha de clases ni al materialismo histórico, sino a la solidaridad nacional
          árabe como motor de la transformación social. En economía propuso la nacionalización de las
          industrias estratégicas y la reforma agraria.


          El Partido Baaz llegó al poder en Siria e Irak mediante golpes de Estado en 1963. En Irak, Saddam
          Hussein consolidó el partido como instrumento de control totalitario del Estado desde 1968.
          En Siria, Hafez al-Assad hizo lo propio desde 1970, fundando una dinastía que su hijo Bashar
          al-Assad continuó. Ambos regímenes usaron el discurso panarabista y socialista para justificar
          dictaduras que combinaban represión brutal con redistribución parcial de la renta petrolera.


          En el compás se ubica en el cuadrante autoritario-izquierda por su socialismo estatista y su
          autoritarismo, aunque con elementos nacionalistas que lo aproximan al autoritario-derecha.'
        historicalContext: El Partido Baaz fue fundado en 1947 en el contexto del fin del mandato francés
          en Siria y el inicio del conflicto árabe-israelí. Llegó al poder en Siria e Irak en 1963. En
          Irak, Saddam Hussein fue presidente de 1979 a 2003, cuando fue derrocado por la invasión estadounidense.
          En Siria, la guerra civil iniciada en 2011 debilitó pero no eliminó el régimen de Bashar al-Assad.
        contemporaryRelevance: El régimen baazista de Assad sigue gobernando en Siria, aunque con control
          territorial reducido tras la guerra civil que comenzó en 2011 y un proceso de transición en
          marcha desde diciembre de 2024. En Irak, el Partido Baaz fue disuelto tras 2003. El debate sobre
          el papel del panarabismo en la política regional árabe contemporánea sigue activo.
        commonCriticisms: 'Los marxistas señalan que el socialismo baazista sirvió de cobertura ideológica
          para dictaduras que reprimieron brutalmente al movimiento obrero y a los partidos comunistas.
          Los liberales documentan la represión sistemática de la oposición, el uso de armas químicas
          contra civiles (Siria 2013) y el genocidio del pueblo kurdo en Irak. Los panarabistas señalan
          que el baazismo fracasó en su objetivo central: la unidad árabe.'
        historicalExamples:
        - Irak bajo el Partido Baaz (1968-2003)
        - Siria bajo Hafez al-Assad (1970-2000)
        - Siria bajo Bashar al-Assad (2000-presente)
        - Invasión de Kuwait por Irak (1990)
        wikipediaUrl: https://es.wikipedia.org/wiki/Baazismo
      - id: mugabeism
        name: Mugabeismo
        nameEn: Mugabeism
        weight: 1
        description: 'Régimen de Robert Mugabe en Zimbabue: nacionalismo africano, redistribución forzosa
          de tierras y autoritarismo de partido único.'
        keyThinkers:
        - Robert Mugabe
        - Simon Muzenda
        - Emmerson Mnangagwa
        longDescription: 'El mugabeísmo designa la ideología y práctica política asociada a Robert Mugabe,
          quien gobernó Zimbabue desde la independencia en 1980 hasta su destitución en 2017. Su tesis
          central combina un marxismo-leninismo declarado con el nacionalismo africano poscolonial y el
          panafricanismo, bajo la premisa de que la tierra y los recursos naturales arrebatados por el
          colonialismo blanco deben redistribuirse entre la población negra zimbabuense.


          Mugabe llegó al poder tras liderar la guerra de liberación del ZANU contra el régimen de Ian
          Smith en Rodesia. En sus primeros años gobernó de manera relativamente moderada, manteniendo
          a los colonos blancos en sus granjas y aplicando políticas de reconciliación. Desde los años
          noventa, frente a la presión popular por una reforma agraria real, radicalizó su discurso: las
          expropiaciones violentas de granjas blancas (2000-2008) colapsaron la producción agrícola y
          produjeron la hiperinflación más grave de la historia económica moderna.


          El mugabeísmo combina retórica antiimperialista —Mugabe fue una figura respetada en el Movimiento
          de Países No Alineados— con autoritarismo, corrupción sistémica, represión de la oposición (especialmente
          el MDC) y clientelismo político. Su apelación al panafricanismo le permitió mantener respaldo
          de sectores del continente incluso cuando la situación humanitaria en Zimbabue se deterioraba
          gravemente.


          En el compás se ubica en el cuadrante autoritario-izquierda por su retórica marxista, las redistribuciones
          de tierra y el antiimperialismo, aunque la kleptocratización del régimen lo acerca al autoritarismo
          sin ideología.'
        historicalContext: Zimbabue se independizó en 1980 tras quince años de régimen de minoría blanca.
          Mugabe gobernó como primer ministro (1980-1987) y luego como presidente (1987-2017). Las masacres
          de Gukurahundi (1983-1987) mataron a entre 10.000 y 20.000 civiles ndebele. La reforma agraria
          violenta (2000-2008) produjo una hiperinflación récord (89,7 sextillones por ciento en noviembre
          de 2008). Mugabe fue destituido por un golpe de su propio partido en noviembre de 2017 y murió
          en 2019.
        contemporaryRelevance: El Zimbabwe actual bajo Emmerson Mnangagwa (sucesor de Mugabe) sigue dominado
          por el ZANU-PF y mantiene elementos del mugabeísmo sin la retórica marxista. El debate sobre
          redistribución agraria y descolonización en el sur de África sigue siendo activo, con Mugabe
          como referente controvertido. En África, su imagen de antiimperialista persiste junto a la de
          gobernante que arruinó su país.
        commonCriticisms: Los economistas señalan que las expropiaciones sin compensación destruyeron
          el sector agrícola y causaron hambruna. Los activistas de derechos humanos documentan la Gukurahundi
          como crimen de lesa humanidad y la represión sistemática de la oposición. Los marxistas críticos
          señalan que el mugabeísmo usó la retórica socialista para cubrir una kleptocratización del Estado.
          Los liberales lo caracterizan como un caso clásico de nationalismo populista derivado en dictadura.
        historicalExamples:
        - Zimbabue bajo Mugabe (1980-2017)
        - Reforma agraria violenta (2000-2008)
        - Hiperinflación zimbabuense (2007-2009)
        wikipediaUrl: https://es.wikipedia.org/wiki/Robert_Mugabe
      - id: conservative-socialism
        name: Socialismo conservador
        nameEn: Conservative Socialism
        weight: 2
        description: Síntesis que combina redistribución económica con preservación de valores culturales
          tradicionales.
        longDescription: 'El socialismo conservador es una corriente minoritaria que busca conciliar la
          tradición, la autoridad y los valores comunitarios del conservadurismo con la crítica socialista
          al capitalismo y la defensa de la solidaridad económica. Su tesis central sostiene que el socialismo
          no debe fundarse en el materialismo histórico o el progresismo cultural, sino en valores orgánicos
          de comunidad, familia, nación o fe religiosa que el capitalismo destruye junto con las relaciones
          precapitalistas.


          En el siglo XIX, el socialismo tory británico (Richard Oastler, Michael Sadler) defendió regulación
          del trabajo infantil y leyes fabriles desde una perspectiva paternalista y aristocrática, no
          desde la emancipación obrera. En Alemania, Adolf Stöcker articuló un socialismo cristiano conservador
          con tintes antisemitas. En el siglo XX, Chesterton y el distributismo rozaron esta tradición,
          aunque con una dimensión más liberal.


          El socialismo conservador difiere del socialismo cristiano en que enfatiza la jerarquía, la
          tradición y el orden, no la igualdad fraternal. Difiere del conservadurismo ordinario en que
          critica al capitalismo como destructor de las comunidades orgánicas. Difiere del fascismo en
          que no abraza la violencia ni el ultranacionalismo racista.


          Es una corriente analíticamente interesante pero históricamente débil: carece de movimientos
          de masas sostenidos. En el compás se ubica en el cuadrante autoritario-izquierda por su economía
          colectivista, aunque se aproxima al cuadrante autoritario-derecha en sus valores sociales.'
        historicalContext: El socialismo tory emergió en Inglaterra en los años 1830-1840 como reacción
          a los efectos del capitalismo industrial sobre las comunidades rurales y artesanas. En la segunda
          mitad del siglo XIX se solapó con el socialismo cristiano. En el siglo XX fue marginalizado
          por el auge del laborismo y la socialdemocracia. En el siglo XXI reaparece marginalmente en
          debates sobre tradición y comunitarismo de izquierda.
        contemporaryRelevance: La categoría reaparece en debates sobre comunitarismo de derecha y en pensadores
          como Patrick Deneen o Alasdair MacIntyre, aunque estos no se autoidentifican como socialistas.
          En el Reino Unido, el 'Blue Labour' (Partido Laborista azul) de Maurice Glasman propone recuperar
          valores comunitarios y religiosos dentro de la izquierda.
        commonCriticisms: Los socialistas progresistas señalan que el socialismo conservador tiende a
          reproducir jerarquías de género, raza y clase bajo la retórica de la comunidad. Los liberales
          argumentan que la nostalgia por comunidades orgánicas es incompatible con el pluralismo moderno.
          Los marxistas señalan que la crítica al capitalismo desde la tradición no cuestiona las relaciones
          de propiedad sino sus efectos culturales.
        keyThinkers:
        - Richard Oastler
        - Michael Sadler
        - Maurice Glasman (Blue Labour)
        - G.K. Chesterton (parcialmente)
        historicalExamples:
        - Socialismo tory en el Reino Unido (1830-1850)
        - Blue Labour en el Partido Laborista británico (2009-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Socialismo_conservador
      - id: social-gospel
        name: Social Gospel
        weight: 1
        description: Movimiento cristiano protestante que aplica principios éticos del Evangelio a problemas
          sociales como pobreza y desigualdad.
        longDescription: 'El evangelio social (Social Gospel) es un movimiento teológico y político surgido
          en los Estados Unidos entre 1880 y 1920 que aplica principios del Nuevo Testamento —especialmente
          el Sermón de la Montaña y la ética del amor al prójimo— a problemas sociales del capitalismo
          industrial: pobreza, trabajo infantil, condiciones obreras, desigualdad. Su tesis central sostiene
          que la salvación cristiana no es solo individual sino también social: la construcción del Reino
          de Dios en la Tierra exige transformar las estructuras económicas injustas.


          Walter Rauschenbusch sistematizó la doctrina en ''Christianity and the Social Crisis'' (1907)
          y ''A Theology for the Social Gospel'' (1917). Washington Gladden y Charles Sheldon (autor de
          ''¿Qué haría Jesús?'', 1896) fueron otras figuras fundacionales. El movimiento influyó en la
          reforma progresista estadounidense, en la fundación de sindicatos y en legislación laboral y
          social.


          El evangelio social difiere de la teología de la liberación en que emergió en el contexto protestante
          anglosajón y no adoptó el análisis marxista de clases. Es más reformista que revolucionario:
          busca humanizar el capitalismo, no superarlo. Martin Luther King Jr. es la figura más influyente
          de su herencia en el siglo XX.


          En el compás se ubica en el cuadrante autoritario-izquierda por su defensa de la intervención
          del Estado y la comunidad en la economía, aunque su base religiosa y su gradualismo reformista
          lo aproximan al centro del eje.'
        historicalContext: El evangelio social emergió durante la Gilded Age estadounidense (1870-1900),
          en respuesta a las condiciones de trabajo en las fábricas del norte industrial y los barrios
          de inmigrantes. Influyó en el movimiento progresista (1900-1920). Declinó con la Primera Guerra
          Mundial, que fracturó el optimismo sobre el progreso moral. Resurgió en el movimiento por los
          derechos civiles (1950-1960) con Martin Luther King.
        contemporaryRelevance: La herencia del evangelio social persiste en el ala progresista de las
          iglesias protestantes estadounidenses y en organizaciones como la National Council of Churches.
          En América Latina, influyó en el desarrollo de la teología de la liberación. En política, Bernie
          Sanders y otros políticos progresistas han invocado su vocabulario ético.
        commonCriticisms: Los marxistas señalan que el evangelio social no cuestiona las relaciones de
          propiedad capitalistas y se limita a pedir generosidad a los ricos. Los conservadores religiosos
          lo critican por 'politizar' el Evangelio y reducirlo a agenda social. Los teólogos de la liberación
          señalan que carece del análisis estructural necesario para una transformación real.
        keyThinkers:
        - Walter Rauschenbusch
        - Washington Gladden
        - Charles Sheldon
        - Martin Luther King Jr.
        historicalExamples:
        - Movimiento progresista en EE.UU. (1900-1920)
        - Movimiento por los derechos civiles (1955-1968)
        - National Council of Churches en EE.UU. (1950-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Evangelio_social
      - id: futurism
        name: Futurismo
        nameEn: Futurism
        weight: 1
        description: Movimiento italiano de principios del siglo XX que glorificaba la velocidad, la tecnología
          y la violencia revolucionaria, precursor del fascismo.
        keyThinkers:
        - Filippo Tommaso Marinetti
        - Umberto Boccioni
        - Vladímir Mayakovski (futurismo ruso)
        - Kazimir Malevich
        longDescription: 'El futurismo fue un movimiento artístico y político fundado por el poeta italiano
          Filippo Tommaso Marinetti con el Manifiesto Futurista publicado en el diario Le Figaro el 20
          de febrero de 1909. Su tesis central glorifica la velocidad, la máquina, la guerra, la violencia
          y la ruptura radical con el pasado. Rechaza las instituciones tradicionales —museos, academias,
          la familia burguesa— en nombre de una modernidad radical.


          En política, el futurismo adoptó posiciones ambiguas que combinaron elementos de izquierda revolucionaria
          —rechazo del orden burgués establecido, antimilitarismo en su primera fase— con elementos fascistas:
          glorificación de la violencia, ultranacionalismo y misoginia explícita. Varios futuristas, incluyendo
          Marinetti, apoyaron el fascismo de Mussolini. Esta ambigüedad ha llevado a los analistas a situarlo
          en diferentes cuadrantes.


          En Rusia, el futurismo tuvo una rama de izquierda (Mayakovski, Malevich) que abrazó la Revolución
          de 1917 y produjo arte al servicio del Estado soviético. El constructivismo y el suprematismo
          fueron sus derivaciones artísticas. Esta bifurcación ilustra cómo el futurismo era una estética
          antes que una doctrina política coherente.


          En el compás político se ubica provisionalmente en el cuadrante autoritario-izquierda por su
          ruptura con el orden burgués establecido y su radicalismo antitradición, aunque sus variantes
          más nacionalistas cruzan hacia el autoritario-derecha. Es más pertinente como movimiento artístico
          que como corriente política formal.'
        historicalContext: Marinetti publicó el Manifiesto Futurista en 1909. El movimiento influyó en
          la vanguardia artística europea y en los movimientos revolucionarios de los años 1910-1920.
          En Italia, los futuristas apoyaron la entrada en la Primera Guerra Mundial (1915) y luego el
          fascismo de Mussolini. En Rusia, el futurismo se alineó con la revolución bolchevique (1917-1922)
          y luego fue absorbido por el realismo socialista. El movimiento artístico perdió coherencia
          en los años treinta.
        contemporaryRelevance: El futurismo como corriente artística sigue estudiándose en historia del
          arte. Su influencia en el aceleracionismo (tanto de izquierda como de derecha) y en movimientos
          que glorifican la tecnología y la disrupción es reconocida. En política contemporánea, la glorificación
          de la disrupción tecnológica en Silicon Valley tiene raíces futuristas, aunque sin la dimensión
          violenta.
        commonCriticisms: Los feministas señalan que el manifiesto futurista es abiertamente misógino
          ('queremos glorificar la guerra, única higiene del mundo, el militarismo, el patriotismo').
          Los marxistas humanistas señalan que la glorificación de la violencia y la máquina sirvió finalmente
          al fascismo. Los historiadores señalan que el futurismo italiano fue cooptado por el régimen
          de Mussolini.
        historicalExamples:
        - Vanguardia futurista italiana (1909-1944)
        - Futurismo ruso y constructivismo soviético (1917-1932)
        - Influencia en el fascismo italiano
        wikipediaUrl: https://es.wikipedia.org/wiki/Futurismo
      - id: liberation-theology
        name: Teología de la Liberación
        nameEn: Liberation Theology
        weight: 3
        description: Corriente teológica cristiana latinoamericana que interpreta la fe desde la realidad
          de los pobres y oprimidos, promoviendo una transformación social con énfasis en justicia estructural.
          En Colombia tuvo expresiones en Camilo Torres (sacerdote y líder ELN fundador), el Grupo Golconda,
          las Comunidades Eclesiales de Base y el obispo Pedro Casaldáliga en contexto fronterizo. Combina
          compromiso religioso con transformación económica de izquierda.
        keyThinkers:
        - Gustavo Gutiérrez
        - Camilo Torres Restrepo
        - Leonardo Boff
        - Ignacio Ellacuría
        - Óscar Romero
        - Jon Sobrino
        historicalExamples:
        - Conferencia Episcopal de Medellín (1968)
        - Comunidades Eclesiales de Base en Brasil y Colombia (1970s-presente)
        - Camilo Torres y el ELN en Colombia (1965-1966)
        - Teólogos de la liberación en El Salvador (1970s-1980s)
        longDescription: 'La teología de la liberación es una corriente teológica cristiana surgida en
          América Latina en los años sesenta que interpreta el Evangelio desde la perspectiva de los pobres
          y oprimidos, y sostiene que la fe cristiana exige un compromiso activo con la justicia social
          y la transformación de las estructuras económicas y políticas que producen la pobreza.


          Su tesis central fue formulada por el peruano Gustavo Gutiérrez en ''Teología de la liberación''
          (1971): la salvación cristiana tiene una dimensión histórica e intramundana; la pobreza no es
          una desgracia natural sino el resultado de estructuras de pecado que deben ser transformadas.
          Esto implica una ''opción preferencial por los pobres'' que no es solo asistencia caritativa
          sino compromiso político.


          La teología de la liberación adoptó el análisis de clases marxista como herramienta —no como
          ideología total— para entender las causas estructurales de la pobreza. Las Comunidades Eclesiales
          de Base (CEBs), grupos pequeños de reflexión bíblica y acción social en barrios populares, fueron
          su expresión organizativa más extendida.


          En Colombia, Camilo Torres Restrepo, sacerdote y sociólogo formado en Lovaina, fue la figura
          más icónica: renunció al sacerdocio, se unió al Ejército de Liberación Nacional (ELN) y murió
          en combate en 1966. La teología de la liberación influyó en organizaciones campesinas, sindicatos
          y movimientos sociales latinoamericanos durante décadas.


          En el compás se ubica en el cuadrante autoritario-izquierda por su crítica estructural al capitalismo
          y su defensa de la organización colectiva de los pobres, aunque sus variantes más participativas
          y no-violentas se aproximan al cuadrante libertario-izquierda.'
        historicalContext: La Conferencia Episcopal de Medellín (1968) fue el hito institucional que legitimó
          el compromiso social de la Iglesia. Gustavo Gutiérrez publicó 'Teología de la liberación' en
          1971. Leonardo Boff, Ignacio Ellacuría, Jon Sobrino y Jon Sobrino son otras figuras clave. La
          Conferencia de Puebla (1979) generó tensiones con el Vaticano. Juan Pablo II y Joseph Ratzinger
          (luego Benedicto XVI) emitieron instrucciones críticas en 1984 y 1986. Camilo Torres murió en
          1966. El asesinato de monseñor Óscar Romero en El Salvador (1980) la convirtió en símbolo mundial.
          La represión de los años ochenta diezmó a muchos de sus exponentes.
        contemporaryRelevance: La teología de la liberación mantiene presencia en Comunidades Eclesiales
          de Base en Brasil, Colombia, México y Centroamérica. El papa Francisco, jesuita argentino, ha
          rehabilitado parcialmente sus figuras. En Colombia, la relación entre la teología de la liberación
          y organizaciones sociales sigue siendo relevante. La canonización en proceso de Óscar Romero
          (beatificado en 2015, canonizado en 2018) señala un reconocimiento vaticano.
        commonCriticisms: El Vaticano bajo Juan Pablo II y Benedicto XVI señaló que la adopción del análisis
          marxista introduce una visión de conflicto de clases incompatible con el mensaje cristiano de
          reconciliación. Los conservadores religiosos la caracterizan como marxismo disfrazado de fe.
          Los marxistas ortodoxos señalan que la dimensión religiosa limita el alcance revolucionario
          de la doctrina. Algunos analistas señalan tensiones entre la vertiente pacifista y la que, como
          Camilo Torres, optó por la lucha armada.
        wikipediaUrl: https://es.wikipedia.org/wiki/Teolog%C3%ADa_de_la_liberaci%C3%B3n
    - name: populismo-colectivismo
      weight: 3
      children:
      - id: collectivism
        name: Colectivismo
        nameEn: Collectivism
        weight: 2
        description: Doctrina que prioriza los intereses del grupo sobre los del individuo como principio
          organizador de la sociedad.
        longDescription: 'El colectivismo es una categoría filosófico-política amplia que designa las
          doctrinas que priorizan el grupo —la clase, la nación, la comunidad, la especie— sobre el individuo
          como unidad básica del análisis moral y político. Su tesis central sostiene que los derechos,
          el bienestar y los fines del colectivo tienen precedencia sobre los del individuo, y que las
          instituciones sociales deben organizarse para maximizar el bien común, no las preferencias individuales.


          El colectivismo no es una ideología específica sino un espectro que abarca desde el comunitarismo
          moderado hasta el totalitarismo extremo. En su extremo moderado, sostiene que los seres humanos
          son fundamentalmente seres sociales y que la identidad individual se construye en comunidad
          (Hegel, Durkheim, Marx). En su extremo radical, la identidad individual se disuelve completamente
          en la colectividad (mente colmena, estalinismo en su práctica).


          El colectivismo económico propone la propiedad colectiva —estatal, cooperativa o comunitaria—
          de los medios de producción, en oposición al individualismo de la propiedad privada. El colectivismo
          político propone que las decisiones se tomen en nombre del grupo, no mediante la adición de
          preferencias individuales.


          Como categoría analítica en el compás político, el colectivismo describe el eje vertical que
          va del individualismo al autoritarismo: cuanto más se desplaza un sistema hacia la parte superior
          del eje, más pesa el colectivo sobre el individuo. En el cuadrante autoritario-izquierda, el
          colectivismo económico se combina con la subordinación política del individuo al Estado o al
          partido.'
        historicalContext: El pensamiento colectivista tiene raíces en Platón (la ciudad-estado como fin
          en sí) y Aristóteles (el hombre como animal político). En la modernidad, Rousseau teorizó la
          'voluntad general' como superación de las voluntades particulares. Hegel desarrolló el concepto
          del Estado como realización del espíritu objetivo. Marx situó las clases sociales como sujetos
          históricos colectivos. El siglo XX vio las versiones más extremas del colectivismo en regímenes
          totalitarios.
        contemporaryRelevance: 'El debate colectivismo-individualismo estructura gran parte de la filosofía
          política contemporánea: desde la polémica liberalismo-comunitarismo (Rawls vs. MacIntyre, Walzer,
          Taylor) hasta los debates sobre derechos colectivos de pueblos indígenas, cambio climático y
          bienes comunes globales. El colectivismo moderado es posición mainstream en la mayoría de los
          sistemas democráticos.'
        commonCriticisms: Los liberales —desde Locke hasta Nozick— sostienen que los derechos individuales
          son anteriores a los del grupo y no pueden ser sacrificados en su nombre. Los anarquistas individualistas
          como Max Stirner critican que todo colectivismo reproduce la opresión bajo nuevas formas. Los
          conservadores señalan que el colectivismo abstracto —el Estado, la clase, la humanidad— borra
          la pluralidad real de comunidades concretas.
        keyThinkers:
        - Georg Wilhelm Friedrich Hegel
        - Karl Marx
        - Émile Durkheim
        - Charles Taylor
        - Alasdair MacIntyre
        historicalExamples:
        - Kibutz en Israel (1910-presente)
        - Cooperativas en Mondragón, España (1956-presente)
        - Regímenes socialistas del siglo XX
        wikipediaUrl: https://es.wikipedia.org/wiki/Colectivismo
      - id: left-populism
        name: Populismo de izquierda
        nameEn: Left Populism
        weight: 2
        description: Movimientos que enfrentan una "élite económica" contra "el pueblo" desde una agenda
          redistributiva y nacionalista.
        longDescription: 'El populismo de izquierda es una corriente política que moviliza a ''el pueblo''
          —entendido como conjunto de los sectores populares excluidos— contra ''la élite'' —oligarquía
          económica, poderes fácticos, establishment— articulando demandas heterogéneas en torno a un
          proyecto de cambio social. Su tesis central, desarrollada teóricamente por Ernesto Laclau y
          Chantal Mouffe en ''Hegemonía y estrategia socialista'' (1985) y ''La razón populista'' (2005),
          sostiene que la construcción de una identidad popular antagónica a las élites es la forma de
          política democrática que puede articular un proyecto transformador en las sociedades posmodernas.


          El populismo de izquierda difiere del socialismo clásico en que no estructura la política en
          torno a la clase obrera como sujeto privilegiado, sino en torno a ''el pueblo'' como construcción
          discursiva que puede incluir a trabajadores, sectores medios, movimientos feministas, ecologistas
          e indígenas. La frontera política no es la lucha de clases sino la dicotomía pueblo/élite.


          En América Latina, el populismo de izquierda tiene referentes históricos (Perón, Vargas) y contemporáneos:
          el chavismo en Venezuela, el correa en Ecuador, el kirchnerismo en Argentina y el petrismo en
          Colombia son sus expresiones más citadas. Jean-Luc Mélenchon en Francia y Podemos en España
          son sus contrapartes europeas.


          Gustavo Petro es la figura más relevante para Colombia: exguerrillero del M-19, exalcalde de
          Bogotá y primer presidente de izquierda en la historia colombiana (2022). Su gobierno combina
          demandas redistributivas, transición energética y negociación con grupos armados bajo el paraguas
          discursivo del populismo de izquierda. En el compás se ubica en el cuadrante autoritario-izquierda,
          aunque sus variantes más participativas rozan el libertario-izquierda.'
        historicalContext: El populismo latinoamericano clásico emergió en los años treinta y cuarenta
          (Vargas en Brasil, Perón en Argentina). La reformulación teórica de Laclau y Mouffe en los años
          ochenta y noventa dotó al concepto de nuevo marco académico. El 'giro a la izquierda' latinoamericano
          de los años 2000 (Chávez, Morales, Correa, Kirchner, Lula) fue su momento de máxima expansión.
          La segunda ola incluye a Petro en Colombia (2022), Boric en Chile (2022) y Lula en Brasil (2022).
        contemporaryRelevance: El populismo de izquierda sigue siendo la corriente dominante de la izquierda
          electoral latinoamericana. En Europa, Podemos, La France Insoumise y Syriza son sus expresiones
          más conocidas. El debate sobre si el populismo de izquierda puede construir democracias estables
          o tiende al autoritarismo —el caso venezolano es la referencia negativa— estructura la discusión
          política regional.
        commonCriticisms: Los marxistas ortodoxos señalan que la disolución de la clase obrera en 'el
          pueblo' produce alianzas socialmente incoherentes que no pueden sostener un programa de transformación
          estructural. Los liberales señalan que la lógica antagonista pueblo/élite erosiona las instituciones
          de control y tiende al autoritarismo. Los socialdemócratas señalan que el populismo privilegia
          el carisma del líder sobre la construcción institucional de largo plazo.
        keyThinkers:
        - Ernesto Laclau
        - Chantal Mouffe
        - Hugo Chávez
        - Jean-Luc Mélenchon
        - Gustavo Petro
        historicalExamples:
        - Chavismo en Venezuela (1999-presente)
        - Kirchnerismo en Argentina (2003-presente)
        - Podemos en España (2014-presente)
        - Gobierno Petro en Colombia (2022-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Populismo_de_izquierda
      - id: distributism
        name: Distributismo
        nameEn: Distributism
        weight: 2
        description: Tercera vía católica entre capitalismo y socialismo que propone distribuir ampliamente
          la propiedad productiva.
        keyThinkers:
        - G.K. Chesterton
        - Hilaire Belloc
        - José María Arizmendiarrieta
        - E.F. Schumacher
        longDescription: 'El distributismo es una doctrina socioeconómica de inspiración católica que
          propone la dispersión amplia de la propiedad productiva —tierra, herramientas, pequeños negocios—
          entre el mayor número posible de familias, cooperativas y comunidades. Rechaza tanto la concentración
          capitalista de la propiedad en pocas manos como el control estatal socialista, afirmando que
          ambos sistemas separan al trabajador de los medios de producción y destruyen la autonomía familiar
          y comunitaria.


          Sus fundadores intelectuales son G.K. Chesterton y Hilaire Belloc, que elaboraron la doctrina
          en los primeros decenios del siglo XX, bebiendo de la Encíclica Rerum Novarum (1891) de León
          XIII y de la tradición del pensamiento social católico. Belloc sistematizó la crítica al capitalismo
          en ''The Servile State'' (1912), argumentando que el capitalismo moderno reproduce una forma
          de servidumbre al separar al trabajador de la propiedad. Chesterton popularizó las ideas en
          numerosos ensayos y en su Distributist League (fundada en 1926).


          En economía concreta, el distributismo propone: reforma agraria para distribuir tierra, fomento
          de cooperativas de trabajadores, leyes antimonopolio rigurosas, impuestos que desincentiven
          la concentración de propiedad y tarifas proteccionistas para la pequeña industria local. No
          propone la abolición de la propiedad privada sino su generalización máxima.


          El distributismo influyó en el movimiento cooperativista de Mondragón (País Vasco) y en el pensamiento
          social cristiano latinoamericano. En el compás político se ubica en una posición ambigua: su
          crítica al capitalismo y su énfasis en la comunidad y la igualdad económica lo acercan al cuadrante
          autoritario-izquierda, pero su defensa de la propiedad privada dispersa y la subsidiariedad
          lo aproximan al centro.'
        historicalContext: Las encíclicas Rerum Novarum (1891) y Quadragesimo Anno (1931) proporcionaron
          el marco doctrinal. Chesterton y Belloc fundaron la Distributist League en el Reino Unido en
          1926. En los años treinta y cuarenta influyó en el movimiento agrario católico en Estados Unidos
          y Canadá. El cooperativismo de Mondragón (fundado por el padre José María Arizmendiarrieta en
          1956) se considera la aplicación más exitosa de principios distributistas. En el siglo XXI ha
          tenido un modesto revival en la derecha posneoliberal estadounidense.
        contemporaryRelevance: El distributismo resurge en debates sobre desigualdad económica, economía
          comunitaria y alternativas al capitalismo corporativo. Pensadores como Patrick Deneen y Rod
          Dreher en Estados Unidos incorporan elementos distributistas en su crítica al liberalismo. El
          movimiento cooperativista global y las propuestas de propiedad de los trabajadores tienen afinidad
          con sus principios. En América Latina, la economía solidaria y el cooperativismo urbano recuperan
          ideas afines.
        commonCriticisms: Los marxistas señalan que el distributismo no cuestiona el modo de producción
          capitalista sino solo su distribución, por lo que no puede superar sus contradicciones estructurales.
          Los liberales argumentan que sus propuestas de reforma agraria y control de la propiedad requieren
          intervención estatal masiva incompatible con la libertad de mercado. Los economistas señalan
          que su modelo de pequeña propiedad generalizada es difícilmente aplicable a economías de escala
          industrial.
        historicalExamples:
        - Distributist League en el Reino Unido (1926-1940)
        - Cooperativas de Mondragón en el País Vasco (1956-presente)
        - Movimiento agrario católico en América del Norte (1930s-1950s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Distributismo
      - id: labourism
        name: Laborismo
        nameEn: Labourism
        weight: 2
        description: Corriente política originada en el Reino Unido basada en el movimiento sindical obrero
          y el Estado de bienestar.
        longDescription: 'El laborismo es la corriente política que surgió del movimiento obrero organizado
          —sindicatos, mutuales, cooperativas— y que busca defender los intereses de los trabajadores
          asalariados mediante la representación política directa, la legislación laboral y el Estado
          de bienestar. Su tesis central es que la clase trabajadora necesita su propio instrumento político
          para contrarrestar el poder del capital en el parlamento y el Estado.


          El laborismo difiere del socialismo revolucionario en que acepta el sistema parlamentario y
          el capitalismo como marco, buscando reformas dentro de él. Difiere del socialismo democrático
          en que no necesariamente propone la transformación del modo de producción: se conforma con regular
          el mercado de trabajo, fortalecer los sindicatos y construir servicios públicos universales.


          El Partido Laborista británico, fundado en 1900, es el modelo paradigmático: nació de la Trades
          Union Congress como brazo político del movimiento sindical, no de una organización revolucionaria.
          El ''laborismo australiano'' y el ''laborismo neozelandés'' siguen el mismo patrón. En países
          sin tradición anglosajona, corrientes análogas se articularon en torno a partidos socialdemócratas
          vinculados a centrales sindicales.


          En América Latina, el laborismo como tradición específica tiene presencia más limitada; sus
          funciones equivalentes las desempeñan el sindicalismo peronista en Argentina o el PT brasileño,
          aunque estos tienen ideologías más complejas. En el compás se ubica en la parte baja del cuadrante
          autoritario-izquierda o en el límite con el centro-izquierda, según el programa concreto.'
        historicalContext: El Partido Laborista británico fue fundado en 1900 por la TUC y organizaciones
          socialistas. Llegó al gobierno por primera vez en 1924 con Ramsay MacDonald. El gobierno Attlee
          (1945-1951) creó el Servicio Nacional de Salud y nacionalizó industrias clave. El Partido Laborista
          australiano es el más antiguo del mundo todavía en actividad (fundado en 1891). La era Blair-Clinton
          de los años noventa representó la adaptación laborista al neoliberalismo ('tercera vía').
        contemporaryRelevance: El Partido Laborista británico bajo Keir Starmer ganó las elecciones de
          2024. El laborismo sigue siendo la principal fuerza de izquierda en el Reino Unido, Australia
          y Nueva Zelanda. El debate sobre si el laborismo puede responder a los desafíos del trabajo
          precario y la economía de plataformas sin una renovación ideológica más profunda es central
          en la izquierda anglosajona.
        commonCriticisms: 'Los socialistas revolucionarios señalan que el laborismo acepta los límites
          del capitalismo y se convierte en gestor responsable del sistema en lugar de transformarlo.
          Los marxistas argumentan que la vinculación con los sindicatos lleva al economicismo: mejoras
          para los trabajadores organizados sin cuestionar las relaciones de producción. Los liberales
          señalan que el laborismo en el poder tiende al corporativismo y a la protección de intereses
          creados sobre la competencia y la innovación.'
        keyThinkers:
        - Keir Hardie
        - Clement Attlee
        - Aneurin Bevan
        - Anthony Crosland
        - Tony Blair
        historicalExamples:
        - Gobierno Attlee en el Reino Unido (1945-1951)
        - Partido Laborista australiano en el poder (1983-1996)
        - Partido dos Trabalhadores en Brasil (2003-2016)
        wikipediaUrl: https://es.wikipedia.org/wiki/Laborismo
      - id: kleptocracy-left
        name: Cleptocracia (izq)
        nameEn: Kleptocracy
        weight: 1
        description: Régimen donde gobernantes usan el poder estatal para enriquecerse personalmente,
          presentado con retórica socialista.
        longDescription: 'La kleptocratización de izquierda (kleptocracy-left) es una categoría analítica
          —no una ideología con texto fundacional— que designa regímenes que inicialmente adoptaron retórica
          socialista, redistribución y nacionalizaciones, pero que en la práctica desarrollaron un sistema
          de captura del Estado por élites políticas que acumulan riqueza mediante corrupción, nepotismo
          y control de los recursos públicos.


          La categoría describe el proceso por el cual un proyecto político de izquierda, que parte de
          una crítica genuina al capitalismo y promesas de redistribución, deriva en un sistema donde
          la clase gobernante usa el Estado como instrumento de enriquecimiento personal. Los mecanismos
          son: control de empresas estatales para extracción de renta, clientelismo político financiado
          con recursos públicos, persecución judicial de la oposición y control de los medios.


          No todos los regímenes de izquierda derivan en kleptocracias, y la kleptocratización tampoco
          es exclusiva de la izquierda (existe en regímenes de derecha y en democracias liberales). La
          especificidad de la categoría ''kleptocracy-left'' es que el discurso igualitario y antiimperialista
          funciona como legitimación de la captura del Estado, dificultando la crítica interna y la accountability.


          Venezuela bajo Maduro, Zimbabwe bajo Mugabe en su fase tardía, Angola bajo el MPLA y algunos
          regímenes africanos de primera generación post-independencia son frecuentemente citados como
          casos. En el compás se ubica en el cuadrante autoritario-izquierda por su retórica y origen,
          aunque en la práctica combina autoritarismo con economía capitalista informal y patrimonialista.'
        historicalContext: El concepto de 'kleptocracy' fue acuñado por el sociólogo Stanislav Andreski
          en 1968. Su aplicación a regímenes de izquierda se desarrolló en la literatura de ciencia política
          comparada de los años ochenta y noventa, al analizar el deterioro de varios regímenes africanos
          socialistas y de Venezuela. El 'caso venezolano' bajo Maduro (desde 2013) es el referente más
          debatido en América Latina.
        contemporaryRelevance: El debate sobre si Venezuela, Nicaragua y Cuba son ejemplos de socialismo
          fracasado o de kleptocratización de proyectos de izquierda es central en la política latinoamericana.
          El concepto es usado tanto por críticos de derecha como por izquierdistas que distinguen entre
          socialismo genuino y corrupción con retórica de izquierda. En Colombia, el debate sobre si el
          petrismo puede evitar esa deriva es políticamente relevante.
        commonCriticisms: Defensores de los regímenes afectados sostienen que la etiqueta es usada instrumentalmente
          por el imperialismo para deslegitimar cualquier proyecto de izquierda. Académicos señalan que
          la categoría es demasiado amplia y mezcla fenómenos diferentes. Marxistas críticos señalan que
          la kleptocratización no es un accidente sino el resultado predecible de la concentración del
          poder sin contrapesos democráticos.
        keyThinkers:
        - Stanislav Andreski (acuñó 'kleptocracy')
        - Moisés Naím
        - Edgardo Lander (análisis de Venezuela)
        historicalExamples:
        - Venezuela bajo Nicolás Maduro (2013-presente)
        - Zimbabwe bajo Mugabe fase tardía (1990-2017)
        - Angola bajo el MPLA (1975-presente)
        - Nicaragua bajo el FSLN segunda etapa (2007-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Cleptocracia
  auth_right:
    color: '#2563eb'
    families:
    - name: extreme-auth-right
      weight: 3
      children:
      - id: kraterocracy
        name: Kratero-cracia
        nameEn: Kratero-cracy
        weight: 2
        description: '"Gobierno del más fuerte". Sistema donde el poder lo ejerce quien demuestra superioridad
          por la fuerza bruta.'
        longDescription: 'La cratecracia, del griego kratos (fuerza, poder) y kratos (gobernar), designa
          el principio por el cual el poder político pertenece exclusivamente a quien es capaz de tomarlo
          y mantenerlo por la fuerza. No es propiamente una doctrina elaborada sino una posición de referencia
          teórica que representa el límite extremo del cuadrante autoritario-derecho: la autoridad sin
          legitimación ideológica, religiosa ni dinástica, reducida a la capacidad coercitiva bruta.


          Como ancla conceptual del espectro político, la cratecracia articula lo que los teóricos del
          Estado han llamado el «monopolio de la violencia» en su forma más desnuda, despojada de cualquier
          envoltura normativa. Thomas Hobbes rozó este principio al describir el estado de naturaleza
          en el Leviathan (1651), aunque en su sistema la fuerza es luego delegada en un soberano por
          contrato. La cratecracia pura rechaza incluso ese contrato: el poder no necesita justificarse
          ante nadie.


          En la práctica histórica, ningún régimen se ha declarado craterocrático de forma explícita,
          porque los gobernantes siempre buscan alguna legitimidad ante sus súbditos. Sin embargo, el
          concepto sirve para describir períodos de interregno armado, señoríos de facto, milicias que
          controlan territorios tras el colapso del Estado, o la primera fase de los imperios de conquista
          antes de que se articule una ideología de dominación.


          La cratecracia se distingue de la tiranía clásica (que implica un orden legal preexistente violado)
          y de la autocracia (que supone al menos la ficción de un mandato popular o dinástico). Su posición
          en el extremo superior-derecho del compás refleja la combinación máxima de jerarquía autoritaria
          con ausencia de redistribución o proyecto social.


          En la teoría política contemporánea, el concepto reaparece en debates sobre Estados fallidos,
          señores de la guerra y zonas sin ley, donde la soberanía efectiva es ejercida por el actor con
          mayor capacidad de violencia, al margen de cualquier estructura jurídica.'
        historicalContext: El término no tiene un fundador canónico, pero el fenómeno es tan antiguo como
          la política misma. Las ciudades-estado mesopotámicas, las invasiones mongolas del siglo XIII
          y los períodos de interregno en el Imperio Romano ejemplifican situaciones en que el poder era
          ejercido sin más legitimación que la militar. El concepto fue formalizado en el léxico político
          moderno por académicos que estudian el colapso del Estado y la soberanía de facto, especialmente
          tras el fin de la Guerra Fría, cuando múltiples Estados africanos y asiáticos experimentaron
          la fragmentación del monopolio de la violencia.
        contemporaryRelevance: 'La cratecracia no tiene defensores doctrinarios en la política contemporánea,
          pero el concepto sigue siendo analíticamente útil para describir situaciones reales: el control
          territorial del Estado Islámico entre 2013 y 2019, las zonas dominadas por carteles en México
          y Centroamérica, o los señores de la guerra en Libia y Somalia. En esos contextos, la autoridad
          emana exclusivamente de la capacidad de imponer violencia, sin ideología articulada ni promesa
          de bienestar colectivo.'
        commonCriticisms: Los críticos liberales sostienen que cualquier sistema basado en la fuerza pura
          es intrínsecamente inestable, porque ningún actor puede mantener indefinidamente la superioridad
          coercitiva frente a coaliciones de desafiantes. Desde la teoría democrática se argumenta que
          la legitimidad —incluso la más mínima— es un requisito funcional de la gobernanza sostenida,
          y que los regímenes puramente cratocráticos tienden a colapsar o a transformarse en otras formas
          de autoridad. Pensadores republicanos señalan que la ausencia de derecho hace imposible la planificación
          económica a largo plazo, lo que condena a la cratecracia a ser un fenómeno pasajero.
        keyThinkers:
        - Thomas Hobbes
        - Max Weber
        - Carl Schmitt
        - Charles Tilly
        historicalExamples:
        - Período de los Reinos Combatientes, China (475–221 a.C.)
        - Señoríos de la guerra en China (1916–1928)
        - Estado Islámico (ISIS), Iraq y Siria (2013–2019)
        - Señores de la guerra en Somalia tras el colapso del Estado (1991–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Cractocrac%C3%ADa
      - id: ghengis-khanism
        name: Ghengis Khanismo
        nameEn: Ghengis Khanism
        weight: 2
        description: 'Imperialismo militarista extremo inspirado en las conquistas mongolas del siglo
          XIII: expansión territorial por dominación total.'
        longDescription: 'El gengiskhanismo designa el modelo de organización política y militar asociado
          al Imperio Mongol bajo Gengis Kan (c. 1162–1227) y sus sucesores inmediatos: un sistema en el
          que el poder supremo emana de la conquista militar, la capacidad organizativa del caudillo y
          la lealtad personal de las huestes, sin referencia a tradición religiosa ni a linaje previo
          como fundamento exclusivo de autoridad.


          El término funciona en el espectro político como posición de referencia teórica extrema: ilustra
          un modelo de dominación que combina autoridad personalista absoluta, expansionismo territorial
          ilimitado, meritocracia militar interna y pluralismo pragmático en materia religiosa y administrativa
          sobre los territorios conquistados. En ese sentido se diferencia de la cratecracia pura, porque
          el Imperio Mongol sí desarrolló estructuras institucionales —el Yasa, código jurídico de Gengis
          Kan— y una ideología de mandato celestial (tengri) que legitimaba la expansión universal.


          El modelo mongol incorporó la cooptación de élites locales, la integración de tecnólogos y artesanos
          de los pueblos conquistados, y el comercio transcontinental (Pax Mongolica) como instrumentos
          de consolidación imperial. Esto lo distingue de la simple destrucción y lo acerca a una forma
          primitiva de administración imperial, aunque basada en la sumisión absoluta a la voluntad del
          Gran Kan.


          Como concepto en la ciencia política, el gengiskhanismo se utiliza para analizar regímenes de
          conquista caracterizados por expansionismo sin límite ideológico fijo, lealtad al liderazgo
          personal más que a instituciones, y un uso instrumentalmente racional de la violencia masiva
          como herramienta de sometimiento rápido de poblaciones. Algunos académicos lo aplican analógicamente
          a formas contemporáneas de expansionismo militarista sin proyecto civilizatorio elaborado.


          Su posición en el cuadrante autoritario-derecho refleja la combinación de jerarquía extrema,
          ausencia de participación popular, economía basada en el saqueo y la extracción, y negación
          de autonomía a los pueblos sometidos.'
        historicalContext: 'Gengis Kan unificó las tribus mongolas hacia 1206 y lanzó el mayor proyecto
          de expansión territorial registrado en la historia, que llegó a abarcar unos 24 millones de
          km² bajo sus sucesores. La conquista mongola transformó Eurasia entre los siglos XIII y XIV:
          destruyó el califato abasí de Bagdad (1258), subyugó la China Song, invadió Polonia y Hungría,
          y estableció la Pax Mongolica que conectó el comercio euroasiático. El sistema político se disgregó
          en kanatos rivales a partir del siglo XIV y fue absorbido o desplazado por imperios sucesores.'
        contemporaryRelevance: El gengiskhanismo como modelo vivo no tiene defensores doctrinarios en
          la política contemporánea. Sin embargo, el término aparece en debates académicos sobre expansionismo
          autoritario, liderazgo carismático de conquista y Estados cuya cohesión interna depende de la
          amenaza o el éxito militar externo. Algunos analistas lo invocan como analogía histórica al
          estudiar regímenes que combinan expansionismo territorial con personalismo absoluto y pluralismo
          instrumental hacia las minorías sometidas.
        commonCriticisms: Los críticos desde la teoría liberal sostienen que el modelo mongol carecía
          de cualquier mecanismo de consentimiento o representación, reduciendo la política a pura relación
          de fuerza. Historiadores señalan que la violencia masiva de las conquistas —con estimaciones
          de decenas de millones de muertos— convierte al modelo en un caso extremo de lo que hoy se tipificaría
          como crímenes de lesa humanidad. Desde la teoría del Estado moderno se argumenta que la dependencia
          del liderazgo personal hace estructuralmente frágil al sistema, como demostró la rápida fragmentación
          del Imperio tras la muerte de Gengis Kan.
        keyThinkers:
        - Gengis Kan
        - Jack Weatherford
        - Timothy May
        - David Morgan
        historicalExamples:
        - Imperio Mongol bajo Gengis Kan (1206–1227)
        - Khanato de la Horda Dorada, Rusia (1242–1502)
        - Ilkanato, Persia e Iraq (1256–1335)
        - Imperio Timúrida, Asia Central (1370–1507)
        wikipediaUrl: https://es.wikipedia.org/wiki/Imperio_mongol
      - id: corporate-autocracy
        name: Autocracia corporativa
        nameEn: Corporate Autocracy
        weight: 2
        description: Sistema donde las corporaciones ejercen poder político autoritario sin rendición
          de cuentas democrática. Ficción distópica cyberpunk.
        longDescription: 'La autocracia corporativa describe un sistema de gobierno en el que el poder
          político es ejercido o controlado de facto por una o varias corporaciones privadas, cuyos directivos
          actúan como autoridad efectiva sobre territorios, poblaciones o Estados, sin rendición de cuentas
          democrática. El término combina la lógica de eficiencia y jerarquía gerencial propia del mundo
          empresarial con la capacidad coercitiva normalmente reservada al Estado.


          Históricamente, las compañías de las Indias Orientales —la británica (1600–1874) y la holandesa
          (VOC, 1602–1799)— constituyen los ejemplos más elaborados: entidades privadas que ejercían soberanía
          territorial, mantenían ejércitos propios, administraban justicia y recaudaban impuestos en vastos
          territorios de Asia y América. Su poder no derivaba de elecciones sino de cartas reales y de
          la fuerza militar propia.


          En la teoría política contemporánea, el concepto se aplica a situaciones en que corporaciones
          multinacionales ejercen influencia determinante sobre gobiernos débiles —especialmente en sectores
          extractivos (minería, petróleo)— hasta el punto de que las decisiones públicas quedan subordinadas
          a los intereses de la empresa. Se distingue de la simple corrupción corporativa porque implica
          una estructura estable de dependencia, no episodios puntuales de captura regulatoria.


          En su variante más extrema, la autocracia corporativa converge con el capitalismo autoritario:
          el Estado existe como instrumento de protección de intereses privados concentrados, sin pretensión
          de bienestar general. Las garantías de derechos individuales se suspenden o vacían cuando interfieren
          con la rentabilidad.


          Su posición en el cuadrante autoritario-derecho refleja la combinación de jerarquía extrema
          (sin participación popular), desigualdad económica severa y ausencia de redistribución, con
          un aparato de control que sirve a intereses privados en lugar de a proyectos nacionales o religiosos.'
        historicalContext: Las compañías de las Indias Orientales del siglo XVII inauguraron la autocracia
          corporativa moderna. La VOC holandesa llegó a tener 150 buques mercantes, 40 barcos de guerra
          y 10.000 soldados propios. En el siglo XIX, la Standard Oil de Rockefeller y los monopolios
          ferroviarios estadounidenses ejercieron poder cuasi-gubernamental hasta que las leyes antimonopolio
          (Sherman Act, 1890) comenzaron a limitarlos. En el siglo XX, la United Fruit Company en Centroamérica,
          con su capacidad de presionar a gobiernos y participar en golpes de Estado (Guatemala, 1954),
          representa otro caso documentado. Desde los años 1990, el debate se renueva con las empresas
          militares privadas y los grandes tecnológicos.
        contemporaryRelevance: El debate sobre la autocracia corporativa se intensificó con el crecimiento
          de plataformas tecnológicas con más usuarios que la mayoría de los Estados y capacidad de tomar
          decisiones con consecuencias políticas globales (moderación de contenidos, criptografía, vigilancia).
          También resurge en países dependientes de extractivismo donde una o dos corporaciones controlan
          ingresos fiscales, infraestructura y empleo, generando lo que algunos analistas llaman «Estados
          empresa». Las empresas militares privadas (Wagner, MPRI) añaden otra dimensión al debate.
        commonCriticisms: Los críticos liberales sostienen que la autocracia corporativa elimina la separación
          entre poder económico y político, condición necesaria para el mercado competitivo y para las
          libertades civiles. Desde la izquierda se argumenta que es la forma más pura de dominación de
          clase, donde el capital accede directamente a los instrumentos de coerción estatal. Los conservadores
          estatistas señalan que la soberanía nacional queda vaciada cuando corporaciones extranjeras
          dictan políticas internas. Los teóricos republicanos subrayan que la rendición de cuentas —eje
          de cualquier gobierno legítimo— desaparece cuando el poder es privado y no electivo.
        keyThinkers:
        - Jan Pieterszoon Coen
        - Joel Bakan
        - Nick Srnicek
        - Naomi Klein
        historicalExamples:
        - Compañía Neerlandesa de las Indias Orientales (VOC), Asia (1602–1799)
        - Compañía Británica de las Indias Orientales, India (1757–1858)
        - United Fruit Company, Centroamérica (1899–1970)
        - Empresas mineras en el Congo durante el Estado Libre del Congo (1885–1908)
        wikipediaUrl: https://es.wikipedia.org/wiki/Corporatocracia
      - id: absolute-monarchism
        name: Monarquía absoluta
        nameEn: Absolute Monarchism
        weight: 2
        description: Monarca con poder ilimitado sin separación de poderes ni constitución. Forma histórica
          dominante en Europa pre-1789.
        longDescription: 'La monarquía absoluta es la forma de gobierno en que el monarca ejerce el poder
          político sin restricción legal o constitucional formal, concentrando en su persona las funciones
          ejecutiva, legislativa y judicial. Su legitimidad se funda generalmente en el principio dinástico
          —la herencia de sangre— combinado con la doctrina del derecho divino de los reyes, que hace
          del soberano un representante o delegado de Dios en la tierra.


          Como doctrina elaborada, la monarquía absoluta alcanzó su formulación más sistemática en la
          Europa occidental entre los siglos XVI y XVIII. Jean Bodin, en Los seis libros de la república
          (1576), acuñó el concepto moderno de soberanía absoluta e indivisible como atributo del príncipe.
          Jacques-Bénigne Bossuet, en Política derivada de las Sagradas Escrituras (1709), ofreció la
          justificación teológica más influyente: el rey responde solo ante Dios, no ante los súbditos.


          En la práctica, los regímenes absolutos variaron considerablemente. Luis XIV de Francia («El
          Estado soy yo») representa el modelo clásico de absolutismo centralizado. Los Habsburgo mantuvieron
          una versión más negociada con élites locales y la Iglesia. Pedro el Grande de Rusia combinó
          absolutismo con modernización forzada, anticipando formas de autoritarismo modernizador.


          La monarquía absoluta se distingue de la autocrática personal (donde el poder no es hereditario)
          y de la monarquía constitucional (donde el soberano está limitado por carta magna o parlamento).
          Su posición en el cuadrante autoritario-derecho refleja la combinación de jerarquía máxima —sin
          participación popular— con un orden económico que protege la propiedad aristocrática y la Iglesia,
          sin redistribución hacia estratos inferiores.


          Desde el siglo XIX, el absolutismo ha coexistido con variantes constitucionales en la mayoría
          de las monarquías europeas. Hoy, Arabia Saudita, Brunéi y el Vaticano mantienen formas próximas
          al absolutismo.'
        historicalContext: El absolutismo monárquico se consolidó en Europa occidental entre los siglos
          XVI y XVIII como respuesta a la fragmentación feudal y las guerras religiosas. La Paz de Westfalia
          (1648) reforzó la soberanía estatal que los monarcas identificaban con su persona. El modelo
          entró en crisis con la Revolución Gloriosa inglesa (1688), la Revolución Americana (1776) y
          la Revolución Francesa (1789), que sustituyeron la soberanía del rey por la soberanía de la
          nación o del pueblo. En el siglo XX sobrevivió principalmente en la Península Arábiga.
        contemporaryRelevance: Arabia Saudita bajo la Casa de Saud y Brunéi bajo el Sultán Hassanal Bolkiah
          son los ejemplos más próximos al absolutismo monárquico clásico en el siglo XXI. Eswatini (ex
          Suazilandia) mantiene una monarquía absoluta en África subsahariana. El debate sobre estas monarquías
          se intensifica en el contexto de los derechos humanos internacionales, especialmente en materias
          de libertad de expresión, derechos de la mujer y pluralismo político.
        commonCriticisms: Los críticos liberales sostienen que la concentración de poder sin límites legales
          hace imposible la protección de derechos individuales, pues el soberano puede revocarlos arbitrariamente.
          Desde el republicanismo se argumenta que el principio dinástico —el accidente de nacimiento
          como criterio de autoridad— carece de cualquier justificación racional para el ejercicio del
          poder. Pensadores socialistas señalan que el absolutismo históricamente protegió la propiedad
          aristocrática y eclesiástica en detrimento de las mayorías campesinas. Los constitucionalistas
          modernos subrayan que sin separación de poderes no existe garantía efectiva de ningún derecho.
        keyThinkers:
        - Jean Bodin
        - Jacques-Bénigne Bossuet
        - Thomas Hobbes
        - Luis XIV de Francia
        - Robert Filmer
        historicalExamples:
        - Francia bajo Luis XIV (1643–1715)
        - Rusia bajo Pedro el Grande (1682–1725)
        - Imperio Otomano en su apogeo (siglos XV–XVII)
        - Arabia Saudita bajo la Casa de Saud (1932–presente)
        - Brunéi bajo el Sultán Hassanal Bolkiah (1967–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Monarqu%C3%ADa_absoluta
    - name: fascismo
      weight: 5
      children:
      - id: fascism
        name: Fascismo
        nameEn: Fascism
        weight: 3
        description: Ideología totalitaria que exalta la nación sobre el individuo, rechaza la democracia
          liberal y suprime la oposición mediante violencia.
        keyThinkers:
        - Benito Mussolini
        - Giovanni Gentile
        - Georges Sorel
        - Robert O. Paxton
        - Emilio Gentile
        longDescription: 'El fascismo es un movimiento político y régimen de gobierno que surgió en Europa
          occidental en la primera posguerra (1919–1922), caracterizado por el rechazo simultáneo del
          liberalismo parlamentario y del marxismo, la exaltación del Estado-nación como entidad orgánica
          superior al individuo, la glorificación de la acción violenta y la guerra como formas de regeneración
          nacional, y la organización política bajo un partido único liderado por un caudillo carismático.


          Benito Mussolini fundó el Partito Nazionale Fascista en Italia y llegó al poder en 1922. Fue
          quien acuñó el término, tomado del fascio littorio romano —el haz de varas simbolizando unidad
          y fuerza colectiva. La doctrina fascista, formulada por el propio Mussolini y el filósofo Giovanni
          Gentile en La doctrina del fascismo (1932), sostiene que el Estado es la forma suprema de la
          conciencia ética colectiva y que el individuo solo tiene valor en cuanto miembro de la nación.


          En materia económica, el fascismo propone una tercera vía entre el capitalismo liberal y el
          socialismo: la economía corporativa, en la que el Estado arbitra entre capital y trabajo a través
          de corporaciones sectoriales, manteniendo la propiedad privada pero subordinándola al interés
          nacional. En la práctica, esta economía corporativa benefició preferentemente a los grandes
          industriales a cambio de lealtad política.


          El fascismo se distingue del nazismo en que no articuló una doctrina racial biológica central
          (aunque el régimen italiano adoptó leyes raciales en 1938, bajo presión alemana). Se distingue
          también del autoritarismo conservador en que no pretende restaurar un orden tradicional sino
          crear un hombre nuevo y una civilización nueva, a través de la movilización de masas.


          Su posición en el cuadrante autoritario-derecho refleja la combinación de jerarquía máxima,
          nacionalismo exacerbado, rechazo de la igualdad democrática y economía de mercado controlada
          desde el Estado.'
        historicalContext: 'El fascismo emergió de la crisis del liberalismo tras la Primera Guerra Mundial:
          inflación, desempleo, miedo al bolchevismo y resentimiento de veteranos en Italia y Alemania.
          El régimen de Mussolini (1922–1943) fue el prototipo; el de Hitler (1933–1945) adoptó elementos
          fascistas combinados con racismo biológico. Regímenes con rasgos fascistas se extendieron por
          Europa en los años 1930 (España de Franco, Portugal de Salazar, Hungría de Horthy, Rumania con
          la Guardia de Hierro). La derrota de las potencias del Eje en 1945 deslegitimó el fascismo como
          opción de gobierno en Occidente.'
        contemporaryRelevance: Académicos debaten si partidos de derecha radical europeos del siglo XXI
          (Fratelli d'Italia, Fidesz, Partido Nacional Racionalista en América Latina) constituyen neofascismo
          o populismo autoritario diferenciado. El término es también objeto de disputa política en el
          discurso público, donde con frecuencia se aplica de forma laxa. La investigación académica distingue
          entre fascismo histórico, neofascismo y populismo de derecha radical, señalando convergencias
          y diferencias doctrinales.
        commonCriticisms: Los críticos liberales sostienen que el fascismo destruye sistemáticamente las
          instituciones de control del poder —prensa libre, parlamento, sindicatos independientes, poder
          judicial— sin las cuales ningún derecho individual puede garantizarse. Desde la izquierda marxista
          se argumenta que el fascismo fue funcional al capital monopolista al destruir el movimiento
          obrero organizado. Conservadores clásicos señalaron que la movilización de masas fascista era
          esencialmente revolucionaria y plebeya, incompatible con el orden tradicional. Teóricos del
          totalitarismo (Arendt, Popper) analizaron cómo el fascismo disuelve la sociedad civil en el
          partido-Estado.
        historicalExamples:
        - Italia fascista bajo Mussolini (1922–1943)
        - España franquista (fase fascista) (1936–1945)
        - Guardia de Hierro, Rumania (1923–1941)
        - Movimiento de las Cruces Flechadas, Hungría (1935–1945)
        wikipediaUrl: https://es.wikipedia.org/wiki/Fascismo
      - id: nazism
        name: Nazismo
        nameEn: Nazism
        weight: 3
        description: Fascismo alemán con antisemitismo genocida, supremacismo racial y culto al Führer.
        keyThinkers:
        - Adolf Hitler
        - Alfred Rosenberg
        - Heinrich Himmler
        - Joseph Goebbels
        - Hannah Arendt
        longDescription: 'El nacionalsocialismo, conocido como nazismo, fue la ideología y el régimen
          político del Partido Nacionalsocialista Obrero Alemán (NSDAP) que gobernó Alemania entre 1933
          y 1945. Combina el ultranacionalismo alemán, el antisemitismo biológico sistemático, el racismo
          jerárquico, el principio del liderazgo (Führerprinzip), el expansionismo territorial (Lebensraum)
          y el anticomunismo en una doctrina integral que busca la regeneración racial de la nación germánica.


          Adolf Hitler articuló las bases doctrinales del nazismo en Mein Kampf (1925), donde presentó
          la historia como lucha permanente entre razas, con la raza aria en la cima de una jerarquía
          natural. El antisemitismo no era para el nazismo una posición contingente sino el eje estructural
          de su visión del mundo: los judíos eran caracterizados como el enemigo racial de la humanidad,
          responsable de todos los males —el capitalismo financiero, el marxismo y la democracia liberal.


          En materia económica, el nazismo rechazó tanto el marxismo como el capitalismo liberal, proponiendo
          un modelo de economía nacional dirigida por el Estado que en la práctica preservó la propiedad
          privada y los grandes consorcios industriales a cambio de su subordinación a los objetivos del
          régimen. La reactivación económica y el rearme masivo de los años 1930 eliminaron el desempleo
          y generaron apoyo popular.


          El principio de Führerprinzip establecía que la voluntad del Führer era ley suprema, sin restricciones
          institucionales. El aparato del terror —SS, Gestapo, campos de concentración— garantizó la adhesión
          y eliminó la disidencia. La política racial culminó en el genocidio sistemático de seis millones
          de judíos y millones de otras víctimas (gitanos, discapacitados, homosexuales, prisioneros de
          guerra soviéticos) conocido como el Holocausto.


          Su posición en el extremo del cuadrante autoritario-derecho refleja la combinación de autoridad
          absoluta, racismo biológico de Estado, expansionismo y rechazo total de la igualdad política
          o económica.'
        historicalContext: 'El nazismo emergió de la crisis de la República de Weimar: la derrota de 1918,
          el Tratado de Versalles (1919), la hiperinflación de 1923 y la Gran Depresión de 1929 crearon
          las condiciones para el ascenso del NSDAP. Hitler llegó al poder legalmente en enero de 1933
          y estableció la dictadura mediante la Ley Habilitante en marzo. El régimen duró doce años, desencadenó
          la Segunda Guerra Mundial (1939–1945) y produjo el mayor genocidio del siglo XX. La derrota
          militar de 1945 puso fin al régimen y el nazismo fue declarado ilegal en Alemania.'
        contemporaryRelevance: El nazismo como régimen fue destruido en 1945, pero su estudio sigue siendo
          central en la historiografía, la filosofía política y el derecho internacional. El Holocausto
          es el punto de referencia ético en los debates sobre genocidio, crímenes de lesa humanidad y
          responsabilidad estatal. En Alemania, la negación del Holocausto y los símbolos nazis están
          penalizados. Grupos neonazis marginales existen en varios países, pero el nazismo histórico
          no tiene continuidad política organizada de relevancia.
        commonCriticisms: Los críticos liberales sostienen que el nazismo representa la negación más extrema
          del principio de igualdad humana sobre el que se funda todo sistema de derechos. Desde la izquierda
          se argumenta que el nazismo fue funcional a los intereses del gran capital alemán al destruir
          los sindicatos y el movimiento comunista. Conservadores clásicos como Friedrich Hayek señalaron
          que el nazismo era el resultado lógico de toda planificación estatal total. Hannah Arendt, en
          Los orígenes del totalitarismo (1951), lo analizó como producto de la burocracia de masas, la
          propaganda y el colapso de la sociedad civil.
        historicalExamples:
        - Alemania nazi bajo Hitler (1933–1945)
        - Austria tras el Anschluss (1938–1945)
        - Regímenes colaboracionistas (Croacia Ustacha, Eslovaquia de Tiso) (1941–1945)
        wikipediaUrl: https://es.wikipedia.org/wiki/Nazismo
      - id: neo-nazism
        name: Neo-nazismo
        nameEn: Neo-Nazism
        weight: 2
        description: Movimientos posguerra que retoman la ideología nazi incluyendo sus elementos raciales,
          antisemitas y totalitarios.
        longDescription: 'El neonazismo designa el conjunto de movimientos y corrientes políticas surgidas
          después de 1945 que retoman, reinterpretan o actualizan los postulados centrales del nacionalsocialismo
          histórico: el racismo biológico, el antisemitismo, el ultranacionalismo, el culto al liderazgo
          carismático y la glorificación de la violencia como instrumento político.


          A diferencia del nazismo histórico, que fue un régimen de Estado, el neonazismo opera principalmente
          en el margen del sistema político formal, como movimiento subterráneo, grupos paramilitares,
          publicaciones underground y, desde los años 1990, en redes de internet y plataformas digitales.
          En muchos países europeos y en Alemania, la exhibición de símbolos nazis y la negación del Holocausto
          son delitos penales, lo que ha empujado a estos grupos a adoptar códigos, eufemismos y simbologías
          alternativas.


          Existen múltiples corrientes internas. Algunas son nostálgicas del Tercer Reich y buscan su
          restauración literal; otras —más influyentes— reformulan la ideología en términos de «identitarismo»,
          «etnonacionalismo» o «Gran Reemplazo», evitando la terminología nazi explícita para acceder
          al discurso público convencional. El «neonazismo esotérico» o «misticismo negro» (véase fascismo
          esotérico) añade elementos ocultistas a la ideología racial.


          Académicos como Roger Griffin distinguen entre el neonazismo clásico —que reproduce miméticamente
          la simbología del Tercer Reich— y el fascismo de tercera posición o postnazismo, que actualiza
          los contenidos manteniendo la estructura ideológica. En Estados Unidos, el movimiento «Alt-Right»
          de los años 2010 representó una variante que combinó estética de internet con contenidos neonazis
          suavizados en su formulación pública.


          Su posición en el extremo del cuadrante autoritario-derecho es compartida con el nazismo histórico,
          aunque el neonazismo raramente ha ejercido poder de gobierno en su forma contemporánea.'
        historicalContext: Los primeros grupos neonazis surgieron en Alemania occidental y Estados Unidos
          en los años 1950, encabezados por veteranos del Tercer Reich o por simpatizantes que nunca aceptaron
          la derrota de 1945. El movimiento creció en Europa en los años 1970–1980, coincidiendo con crisis
          económicas y tensiones migratorias. Tras la caída del Muro de Berlín (1989), resurgió con fuerza
          en Alemania oriental y en Europa del Este. Desde los años 2010, internet y las redes sociales
          han permitido la coordinación transnacional de grupos neonazis dispersos.
        contemporaryRelevance: 'El neonazismo tiene presencia organizada en Europa (Alemania, Suecia,
          Grecia con Amanecer Dorado hasta su ilegalización en 2020), Rusia y Estados Unidos (grupos como
          Atomwaffen Division). Aunque marginales en los sistemas electorales democráticos, su relevancia
          está en el terrorismo de inspiración racial: los atentados de Utøya (2011), Christchurch (2019)
          y Halle (2019) fueron perpetrados por individuos con ideología neonazi o etnonacionalista. Los
          servicios de inteligencia occidentales lo clasifican como la principal amenaza terrorista doméstica
          en varios países.'
        commonCriticisms: Los críticos desde todos los espectros del compás —liberal, socialdemócrata,
          conservador constitucional— rechazan el neonazismo por su fundamentación en la desigualdad racial
          biológica, incompatible con los principios de dignidad humana universal reconocidos en el derecho
          internacional desde 1945. Desde la izquierda se argumenta que es un instrumento de movilización
          de sectores desplazados económicamente, que canaliza su resentimiento contra minorías en lugar
          de contra las causas estructurales de su situación. Los conservadores señalan que su rechazo
          al orden constitucional lo hace incompatible con cualquier sistema político estable.
        keyThinkers:
        - George Lincoln Rockwell
        - William Luther Pierce
        - David Duke
        - Richard Spencer
        historicalExamples:
        - American Nazi Party, Estados Unidos (1959–presente)
        - Amanecer Dorado, Grecia (1985–2020)
        - Movimiento Neonazi en Alemania Oriental (1990s–2000s)
        - Partido Nacional Democrático (NPD), Alemania (1964–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Neonazismo
      - id: esoteric-fascism
        name: Fascismo esotérico
        nameEn: Esoteric Fascism
        weight: 2
        description: Variantes del fascismo con base en ocultismo, mitología aria y espiritualidad tradicionalista.
        keyThinkers:
        - Julius Evola
        - Miguel Serrano
        - Rudolf von Sebottendorff
        - Heinrich Himmler
        - Savitri Devi
        longDescription: 'El fascismo esotérico, también denominado «misticismo negro» o «nazismo ocultista»,
          es una corriente que combina los postulados centrales del fascismo y el nazismo —ultranacionalismo,
          racismo, culto al liderazgo heroico— con elementos de esoterismo occidental, ocultismo, mitología
          nórdica, neopaganismo y, en algunas variantes, tradición hermética. Su característica definitoria
          es la interpretación mística o espiritual de la lucha racial, que eleva el conflicto político
          al plano cósmico o metafísico.


          Las raíces del fascismo esotérico se encuentran en la Alemania de principios del siglo XX: la
          Sociedad Thule (1918), de la que surgió el NSDAP, integraba ideas pangermanistas con mitología
          aria y elementos de la Teosofía de Helena Blavatsky. Heinrich Himmler impulsó dentro de las
          SS un proyecto de neopaganismo germánico articulado en el Ahnenerbe (fundado en 1935), institución
          dedicada a investigar los supuestos orígenes arios de la civilización.


          El autor más influyente de esta corriente en el siglo XX fue el italiano Julius Evola, cuyo
          Rivolta contro il mondo moderno (1934) propone una metafísica de las castas donde la modernidad
          democrática e igualitaria representa la caída espiritual de Occidente. Evola rechazaba incluso
          al fascismo de Mussolini por insuficientemente espiritual, y buscaba un «fascismo trascendente»
          anclado en una aristocracia de sangre y espíritu.


          Miguel Serrano, diplomático chileno, desarrolló una variante del fascismo esotérico llamada
          «esoteric hitlerism», según la cual Hitler era una encarnación divina en lucha cósmica contra
          fuerzas demoníacas. Esta vertiente tiene seguidores marginales en América Latina y Europa del
          Este.


          Su posición en el cuadrante autoritario-derecho se justifica por la combinación de jerarquía
          absoluta, racismo biológico-espiritual y rechazo total de la modernidad igualitaria, añadiendo
          una dimensión metafísica que lo sitúa en el extremo más alejado de cualquier racionalismo político.'
        historicalContext: El fascismo esotérico tiene raíces en el romanticismo alemán del siglo XIX
          y en el movimiento völkisch, que combinó nacionalismo pangermanista con mitos de pureza racial
          y evocaciones neopaganas. La Sociedad Thule (1918) y la Hermandad Arya-Germánica (Ariosophie)
          fueron sus expresiones organizadas más tempranas. Dentro del Tercer Reich, el Ahnenerbe de las
          SS financió expediciones pseudocientíficas en busca de evidencia de orígenes arios. Tras 1945,
          autores como Evola, Serrano y el austriaco Rudolf von Sebottendorff mantuvieron la tradición
          en círculos esotérico-fascistas marginales.
        contemporaryRelevance: El fascismo esotérico no tiene representación política formal, pero sus
          textos —especialmente los de Evola— circulan en la derecha radical contemporánea. Algunos analistas
          señalaron que figuras cercanas al entorno de Steve Bannon mostraban interés en Evola. En Rusia,
          Aleksandr Duguin integró elementos evolianos en su «eurasianismo». Grupos neonazis de corte
          terrorista como Atomwaffen Division y similares han adoptado elementos del ocultismo racial.
          Su influencia es más cultural e ideológica que electoral.
        commonCriticisms: Los críticos liberales y racionalistas señalan que el fascismo esotérico construye
          un sistema cerrado de creencias pseudocientíficas que hace imposible el debate basado en evidencia.
          Desde el conservadurismo tradicional religioso se objeta que su neopaganismo y ocultismo son
          incompatibles con las tradiciones espirituales occidentales. Académicos del fascismo como Roger
          Griffin y Umberto Eco lo analizan como el extremo más irracional del pensamiento fascista, donde
          la política se convierte en ritual y la ideología en fe. Pensadores de izquierda subrayan que
          la mística racial sirve para naturalizar la desigualdad social.
        historicalExamples:
        - Sociedad Thule, Alemania (1918–1937)
        - Ahnenerbe de las SS, Alemania nazi (1935–1945)
        - Movimiento de Miguel Serrano, Chile (1970s–2009)
        - Atomwaffen Division y grupos similares, internacional (2015–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ocultismo_nazi
      - id: vichyism
        name: Vichismo
        nameEn: Vichy French Nationalism
        weight: 2
        description: Régimen colaboracionista francés bajo Philippe Pétain (1940-1944), con fascismo pro-nazi
          y reacción católica tradicionalista.
        historicalExamples:
        - Estado Francés de Vichy (1940–1944)
        - Redada del Velódromo de Invierno (Vel d'Hiv), París (1942)
        - Milicia Francesa (colaboracionismo activo) (1943–1944)
        longDescription: 'El vichysmo designa la ideología y el sistema de gobierno del Estado Francés
          (État français) instaurado bajo el mariscal Philippe Pétain en la zona no ocupada de Francia
          entre 1940 y 1944, tras la derrota frente a Alemania nazi. Es una forma de colaboracionismo
          fascista que combina autoritarismo conservador, antisemitismo de Estado, corporativismo y un
          proyecto de «revolución nacional» destinado a reemplazar los valores de la República —«Libertad,
          Igualdad, Fraternidad»— por la tríada «Trabajo, Familia, Patria».


          El régimen de Vichy no fue simplemente una administración de ocupación forzada: desarrolló una
          doctrina propia que identificaba a la República parlamentaria, al marxismo, al judaísmo y a
          la masonería como causas de la derrota y la decadencia francesa. Las Leyes de Estatuto sobre
          los Judíos (octubre de 1940) fueron promulgadas por iniciativa francesa, sin esperar instrucciones
          alemanas, y privaron a los ciudadanos judíos de derechos civiles y empleos públicos. La colaboración
          en la deportación de judíos a campos de exterminio —incluyendo la redada del Velódromo de Invierno
          (julio de 1942)— fue ejecutada por la policía francesa.


          En su dimensión ideológica, el vichysmo retomó corrientes del pensamiento reaccionario francés:
          el maurrasismo de Charles Maurras (Action Française), el catolicismo social conservador, el
          antiparlamentarismo de la derecha clásica y el antidreyfusismo de fin del siglo XIX. Pétain
          encarnaba la figura del «salvador providencial» que rechazaba la política de partidos y prometía
          regenerar a Francia mediante la disciplina, la familia y la jerarquía.


          El vichysmo se distingue del fascismo italiano y del nazismo alemán porque no surgió de un movimiento
          de masas ni aspiró a la movilización permanente: fue un autoritarismo conservador de ocupación
          que adoptó elementos fascistas por conveniencia política y por convicción ideológica de sus
          líderes.


          Su posición en el cuadrante autoritario-derecho refleja el conservadurismo autoritario, el corporativismo
          económico y el racismo de Estado, combinados con la subordinación a una potencia ocupante.'
        historicalContext: El Estado Francés de Vichy existió entre junio de 1940 —tras el armisticio
          con Alemania— y agosto de 1944, cuando el avance aliado y la liberación de París pusieron fin
          al régimen. Pétain fue condenado en 1945 por colaboración con el enemigo; su pena de muerte
          fue conmutada a cadena perpetua. El debate sobre la responsabilidad de Vichy en las deportaciones
          de judíos siguió siendo un punto sensible en la política francesa hasta que el presidente Jacques
          Chirac reconoció oficialmente en 1995 la responsabilidad del Estado francés.
        contemporaryRelevance: 'El vichysmo no tiene herederos políticos directos en la Francia contemporánea.
          Su relevancia persiste como referencia historiográfica y debate de memoria política: la Ley
          Gayssot (1990) penalizó en Francia la negación del Holocausto. Académicos debaten si el «síndrome
          de Vichy» —la amnesia y el mito resistencialista— influyó en la política francesa de posguerra.
          El vichysmo es también objeto de estudio comparado en investigaciones sobre colaboracionismo
          europeo durante la ocupación nazi.'
        commonCriticisms: Los críticos liberales y republicanos sostienen que Vichy representó la traición
          voluntaria a los valores fundacionales de la República Francesa y que la colaboración activa
          en el genocidio de sus propios ciudadanos la convierte en complicidad criminal de Estado. Desde
          la izquierda se argumenta que el régimen de Vichy sirvió para destruir el movimiento sindical
          y las conquistas del Frente Popular de 1936. Historiadores como Robert Paxton (Vichy France,
          1972) demostraron que Vichy no fue solo una víctima de la ocupación sino un régimen con iniciativa
          propia en la persecución antisemita.
        keyThinkers:
        - Philippe Pétain
        - Charles Maurras
        - Pierre Laval
        - Robert Paxton
        wikipediaUrl: https://es.wikipedia.org/wiki/R%C3%A9gimen_de_Vichy
      - id: neo-fascism
        name: Neo-fascismo
        nameEn: Neo-Fascism
        weight: 2
        description: 'Movimientos contemporáneos que retoman elementos fascistas adaptados al contexto
          postguerra fría: nacionalismo identitario, euroescepticismo.'
        longDescription: 'El neofascismo designa los movimientos y partidos políticos surgidos después
          de 1945 que retoman elementos centrales del fascismo histórico —el ultranacionalismo, el autoritarismo,
          el corporativismo, el culto al liderazgo y el rechazo del parlamentarismo— adaptándolos al contexto
          de la posguerra para hacer posible su presencia en sistemas democráticos formales.


          A diferencia del neonazismo, el neofascismo no necesariamente incorpora el racismo biológico
          como eje central, aunque muchas de sus variantes sí incluyen xenofobia, etnonacionalismo y rechazo
          a la inmigración. El neofascismo se caracteriza por la búsqueda de legitimidad electoral —operar
          dentro del sistema para transformarlo desde adentro— combinada con retórica antisistema y apelación
          a la «tercera posición» entre capitalismo y socialismo.


          El Movimiento Sociale Italiano (MSI, 1946–1995), fundado por exfuncionarios del régimen de Mussolini,
          es el modelo histórico del neofascismo electoral: participó en las elecciones italianas durante
          décadas, reivindicando el legado fascista con matices. Su sucesor, Alianza Nacional (1994–2009),
          moderó el discurso y se integró en coaliciones de gobierno. Fratelli d''Italia (heredero de
          Alianza Nacional) llegó al gobierno en 2022 con Giorgia Meloni, desencadenando el debate académico
          sobre si constituye neofascismo o conservadurismo poscomunista.


          Otras variantes neofascistas incluyen el Frente Nacional francés de Jean-Marie Le Pen, el Partido
          Nacional Democrático alemán (NPD) y diversas organizaciones latinoamericanas de los años 1960–1980
          que combinaron corporativismo, anticomunismo y autoritarismo.


          Su posición en el cuadrante autoritario-derecho refleja el ultranacionalismo, la jerarquía política,
          el rechazo del pluralismo liberal y un modelo económico corporativista, aunque con menor intensidad
          coercitiva que el fascismo histórico en sus fases electorales.'
        historicalContext: El neofascismo emergió en Italia inmediatamente después de la derrota de 1945,
          con la fundación del MSI por Giorgio Almirante. En los años 1960–1970 se extendió por Europa
          occidental en el contexto de la Guerra Fría, combinándose con el anticomunismo. En América Latina,
          movimientos inspirados en el fascismo europeo (Patria y Libertad en Chile, el integralismo brasileño
          de Salgado) adoptaron formas neofascistas. Desde los años 1990, el neofascismo se reinventó
          adoptando retórica populista y discurso antiinmigración que le permitió capturar electorados
          más amplios.
        contemporaryRelevance: El debate académico sobre si el populismo de derecha radical europeo del
          siglo XXI constituye neofascismo, fascismo suavizado o una categoría diferente sigue abierto.
          Roger Eatwell, Cas Mudde y Roger Griffin ofrecen taxonomías divergentes. Lo que es claro es
          que partidos con raíces o elementos neofascistas participan hoy en gobiernos de varios países
          europeos y tienen representación parlamentaria en Italia, Hungría, Francia, Suecia y España
          (Vox). Su impacto en las políticas de inmigración, derechos de las minorías y Estado de derecho
          es objeto de análisis continuo.
        commonCriticisms: 'Los críticos liberales sostienen que el neofascismo erosiona sistemáticamente
          las instituciones que hacen posible el pluralismo: medios de comunicación independientes, judicatura
          autónoma, sociedad civil organizada. Desde la izquierda se argumenta que el neofascismo sirve
          a los intereses del gran capital al dividir a las clases trabajadoras mediante el nacionalismo
          y la xenofobia. Pensadores conservadores constitucionales señalan que el culto al liderazgo
          y la retórica antisistema son incompatibles con el Estado de derecho. Académicos señalan que
          la apariencia electoral del neofascismo no cambia su disposición a abandonar las reglas del
          juego cuando obtiene poder suficiente.'
        keyThinkers:
        - Giorgio Almirante
        - Jean-Marie Le Pen
        - Julius Evola
        - Roger Griffin
        - Cas Mudde
        historicalExamples:
        - Movimiento Sociale Italiano (MSI), Italia (1946–1995)
        - Frente Nacional, Francia (1972–2018)
        - Patria y Libertad, Chile (1971–1973)
        - Alianza Nacional, Italia (bajo Fini) (1994–2009)
        wikipediaUrl: https://es.wikipedia.org/wiki/Neofascismo
    - name: teocracia
      weight: 3
      children:
      - id: islamic-theocracy
        name: Teocracia islámica
        nameEn: Islamic Theocracy
        weight: 2
        description: Régimen donde la sharia es fuente principal del derecho estatal y el clero tiene
          poder político formal.
        historicalExamples:
        - Califato Abasí, Baghdad (750–1258)
        - República Islámica de Irán (1979–presente)
        - Afganistán bajo el régimen talibán (1996–2001 y 2021–presente)
        - Estado Islámico (ISIS), Iraq y Siria (2014–2019)
        - Arabia Saudita bajo el wahhabismo (1932–presente)
        longDescription: 'La teocracia islámica es la forma de gobierno en que el poder político se organiza
          y legitima según los principios del Islam, entendiendo que la soberanía pertenece a Dios (Allah)
          y que los gobernantes ejercen su autoridad como ejecutores de la ley divina revelada —la sharia—
          y de las disposiciones del Corán y la Sunna. En la tradición islámica, la distinción entre el
          ámbito religioso y el político es objeto de debate interno: el Islam clásico concibió la umma
          (comunidad de creyentes) como unidad política y espiritual simultáneamente.


          Existen diversas interpretaciones sobre cómo debe organizarse el gobierno islámico. La tradición
          suní clásica postuló el califato —el sucesor del Profeta como líder de la comunidad— como forma
          legítima de gobierno. La tradición chií iraní desarrolló el concepto de velayat-e faqih (tutela
          del jurista), formulado por el ayatolá Jomeini, según el cual, en ausencia del Imán oculto,
          la autoridad política suprema recae en el jurista islámico más calificado.


          En términos de organización del poder, la teocracia islámica en su forma moderna combina instituciones
          de gobierno formal —presidencia, parlamento, ministerios— con órganos religiosos superiores
          que pueden anular decisiones políticas. En Irán, el Consejo de Guardianes supervisa la constitucionalidad
          islámica de la legislación y filtra las candidaturas electorales.


          Las variantes históricas y contemporáneas son diversas: el califato otomano (hasta 1924), el
          Estado Islámico proclamado en 2014 (versión radical y violenta), Arabia Saudita bajo la interpretación
          wahhabita, Irán bajo el velayat-e faqih, y los emiratos del Afganistán talibán. Cada una refleja
          interpretaciones distintas sobre quién detenta la autoridad religiosa y cómo se aplica la ley
          islámica.


          Su posición en el cuadrante autoritario-derecho refleja la combinación de jerarquía política-religiosa
          no electiva en última instancia, la restricción de la pluralidad política secular y una economía
          que puede variar desde formas de capitalismo religiosamente regulado hasta sistemas redistributivos
          de carácter islámico.'
        historicalContext: El primer Estado islámico fue la comunidad de Medina bajo el Profeta Mahoma
          (622–632 d.C.). Tras su muerte, el califato abasí, omeya y otomano fueron las formas principales
          de gobierno de inspiración islámica hasta el siglo XX. La abolición del califato otomano por
          Mustafa Kemal Atatürk en 1924 marcó el fin del último califato formal. La Revolución Iraní de
          1979 inauguró la primera república islámica moderna. El auge del islamismo político en los siglos
          XX y XXI renovó el debate sobre las formas contemporáneas de gobierno islámico.
        contemporaryRelevance: Irán es la teocracia islámica más institucionalizada del mundo contemporáneo.
          Arabia Saudita combina monarquía absoluta con islamismo wahhabita estatal. El Afganistán talibán,
          desde 2021, aplica una interpretación ultraconservadora de la sharia. Debates sobre la relación
          entre Islam y democracia son centrales en la política de países de mayoría musulmana, con posiciones
          que van desde el laicismo hasta el islamismo político moderado (Túnez) o radical. El concepto
          de «democracia islámica» y sus límites es objeto de debate académico y político amplio.
        commonCriticisms: Los críticos liberales sostienen que la teocracia islámica subordina los derechos
          individuales —especialmente los de las mujeres y las minorías religiosas— a interpretaciones
          de la ley divina que no admiten revisión democrática. Desde el feminismo islámico se argumenta
          que las interpretaciones patriarcales de la sharia no son las únicas posibles y que el Islam
          clásico reconoció derechos a las mujeres que fueron restringidos por interpretaciones tardías.
          Pensadores ilustrados musulmanes como Abdolkarim Soroush en Irán defienden la separabilidad
          entre fe religiosa y ordenamiento político. Los críticos republicanos señalan que la soberanía
          divina no puede ser verificada racionalmente, lo que impide la rendición de cuentas.
        keyThinkers:
        - Ruhollah Jomeini
        - Sayyid Qutb
        - Mawdudi (Abu Ala Maududi)
        - Tariq Ramadan
        - Abdolkarim Soroush
        wikipediaUrl: https://es.wikipedia.org/wiki/Teocracia_isl%C3%A1mica
      - id: christian-theocracy
        name: Teocracia cristiana
        nameEn: Christian Theocracy
        weight: 2
        description: Visión política que busca que la moral cristiana determine la legislación civil y
          la estructura del Estado.
        longDescription: 'La teocracia cristiana es la forma de gobierno en que la autoridad política
          se funda en principios del cristianismo, entendiendo que Dios es el soberano supremo y que el
          Estado debe organizarse y legislar de acuerdo con la ley divina tal como la revelan las Sagradas
          Escrituras y, en algunas tradiciones, la doctrina de la Iglesia. A diferencia de la teocracia
          islámica, la teocracia cristiana ha tomado formas institucionales muy diversas según las tradiciones
          confesionales: católica, calvinista, luterana y evangélica, entre otras.


          El concepto de teocracia fue formulado por el historiador judío Flavio Josefo para describir
          el gobierno de Dios a través de sus sacerdotes. En el contexto cristiano, la Iglesia medieval
          europea elaboró la doctrina del poder papal temporal (cesaropapismo e hierocracia): el papa
          Gregorio VII (1073–1085) y Bonifacio VIII (bula Unam Sanctam, 1302) reclamaron supremacía temporal
          del papado sobre los reyes. El Imperio Sacro Romano articuló una versión distinta: el emperador
          como brazo secular de la Iglesia.


          La Reforma Protestante generó variantes teocráticas propias. Juan Calvino estableció en Ginebra
          (1541–1564) una ciudad-Estado gobernada por principios bíblicos, con la Compañía de Pastores
          supervisando la moral pública. La teocracia calvinista de Nueva Inglaterra —los puritanos del
          siglo XVII— es otro ejemplo: Massachusetts Bay Colony organizó su gobierno en torno a la interpretación
          bíblica y la membresía eclesiástica como requisito de ciudadanía.


          En el siglo XX y XXI, el dominionismo o reconstruccionismo cristiano, formulado por Rousas Rushdoony,
          propone sustituir las constituciones seculares por el código bíblico completo, incluyendo el
          Antiguo Testamento. Esta corriente tiene influencia en sectores del evangelicalismo político
          estadounidense.


          Su posición en el cuadrante autoritario-derecho refleja la jerarquía religiosa-política, la
          restricción del pluralismo secular y moral, y la subordinación del individuo a la comunidad
          de fe.'
        historicalContext: La teocracia cristiana tuvo su forma más elaborada en la Europa medieval, donde
          el papado reclamó y ejerció en distintos momentos autoridad sobre los monarcas. La Reforma Protestante
          del siglo XVI creó nuevas teocracias confesionales (Ginebra calvinista, estados luteranos alemanes).
          Los puritanos de Nueva Inglaterra (siglo XVII) intentaron fundar una «ciudad en la colina» bíblica.
          El Estado Vaticano es el único Estado teocrático cristiano formal vigente, aunque sus pretensiones
          de gobierno temporal son limitadas al enclave del Vaticano desde los Pactos de Letrán (1929).
        contemporaryRelevance: El Vaticano es la única teocracia cristiana formal en el mundo contemporáneo.
          Sin embargo, movimientos como el dominionismo evangélico en Estados Unidos influyen en el Partido
          Republicano y en debates sobre educación, aborto y matrimonio. En América Latina, partidos de
          inspiración cristiana conservadora han gobernado países como Brasil (Bolsonaro con apoyo evangélico
          masivo) y Guatemala. El concepto de «nación cristiana» aparece en discursos de partidos conservadores
          en Europa Central (Polonia, Hungría) como fundamento del orden político.
        commonCriticisms: Los críticos laicistas sostienen que la teocracia cristiana viola el principio
          de separación Iglesia-Estado, necesario para garantizar la igualdad de ciudadanos de distintas
          confesiones o sin confesión. Desde el liberalismo político se argumenta que las leyes fundamentadas
          exclusivamente en textos sagrados no pueden ser debatidas ni modificadas por el procedimiento
          democrático. Teólogos progresistas señalan que el Nuevo Testamento no contiene un programa político
          definido y que las teocracias históricas han seleccionado selectivamente textos bíblicos para
          justificar poderes existentes. Los críticos de derechos humanos señalan el historial de persecución
          de minorías en regímenes teocráticos.
        keyThinkers:
        - Juan Calvino
        - Papa Gregorio VII
        - Rousas John Rushdoony
        - Agustín de Hipona
        - Cotton Mather
        historicalExamples:
        - Ginebra calvinista bajo Juan Calvino (1541–1564)
        - Massachusetts Bay Colony, Nueva Inglaterra (1630–1684)
        - Estados Pontificios, Italia central (756–1870)
        - Estado Vaticano (1929–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Teocracia_cristiana
      - id: hindu-theocracy
        name: Teocracia hindú
        nameEn: Hindu Theocracy
        weight: 2
        description: Corriente nacionalista india (Hindutva) que busca redefinir la identidad nacional
          sobre bases religiosas hindúes.
        longDescription: 'La teocracia hindú es la forma de gobierno en que la organización política se
          fundamenta en los principios del hinduismo, entendiendo que el dharma —el orden cósmico, moral
          y social prescrito por los textos sagrados— debe guiar la legislación, las instituciones y la
          vida pública. A diferencia de las teocracias basadas en revelaciones escriturales únicas, el
          hinduismo es una tradición plural sin un texto canónico único ni una jerarquía eclesiástica
          centralizada equivalente al papado o al califato, lo que hace de la teocracia hindú un concepto
          con múltiples interpretaciones posibles.


          En la tradición hinduista clásica, el rey (raja) debía gobernar según el rajadharma —los deberes
          del rey— codificados en textos como el Arthashastra de Kautilya y el Manusmriti. El brahmanato
          cumplía funciones de legitimación religiosa: los brahmanes consagraban al rey y definían el
          orden de las castas (varna) que estructuraba la sociedad. Este modelo no era una teocracia en
          sentido estricto —los sacerdotes no gobernaban directamente— sino una monarquía dharmica bajo
          supervisión ritual brahmanical.


          En la India contemporánea, el nacionalismo hindú (hindutva), formulado por Vinayak Damodar Savarkar
          en Hindutva: Who is a Hindu? (1923), propone que India es esencialmente una nación hindú y que
          la identidad política debe organizarse en torno a la civilización hindú. El Rashtriya Swayamsevak
          Sangh (RSS, fundado en 1925) y el Bharatiya Janata Party (BJP) son sus expresiones organizativas
          más influyentes. El hindutva no es formalmente teocrático —acepta la constitución secular de
          India— pero busca un Estado en que los valores hindúes sean hegemónicos en el espacio público.


          Una teocracia hindú en sentido pleno implicaría el gobierno directo por sacerdotes o por un
          Estado que imponga el dharma brahmanical como ley, lo que no tiene precedente histórico nítido
          ni defensores doctrinarios mayoritarios en la política contemporánea india.


          Su posición en el cuadrante autoritario-derecho refleja la jerarquía de casta como orden social
          legítimo, el nacionalismo cultural excluyente y la subordinación del pluralismo religioso al
          imaginario civilizatorio hindú.'
        historicalContext: Los reinos hinduistas de la antigüedad y el medioevo (Gupta, Chola, Vijayanagara)
          gobernaban con legitimación brahmanical pero sin integración institucional entre sacerdocio
          y gobierno equivalente a la teocracia islámica o católica medieval. El nacionalismo hindú moderno
          emergió como reacción al colonialismo británico en el siglo XIX y principios del XX. La independencia
          de India (1947) adoptó una constitución secular, lo que situó al hindutva en tensión permanente
          con el marco constitucional. Desde 2014, el BJP de Narendra Modi ha gobernado India con un programa
          de afirmación de la identidad hindú que incluye la revisión del estatuto de Cachemira y la Ley
          de Ciudadanía Enmendada.
        contemporaryRelevance: El BJP bajo Modi representa la versión más influyente del nacionalismo
          hindú en el poder. Nepal fue la única monarquía hindú constitucional del mundo hasta 2008, cuando
          se declaró república secular. En India, debates sobre la protección de vacas, la construcción
          del templo Ram en Ayodhya (inaugurado en 2024) y las restricciones a la conversión religiosa
          ilustran la presión del hindutva sobre el Estado secular. Organizaciones como el RSS tienen
          millones de miembros y operan como sociedad civil ideológica paralela al Estado.
        commonCriticisms: Los críticos liberales y constitucionalistas indios sostienen que el hindutva
          erosiona el carácter secular de la constitución de 1950 y pone en riesgo los derechos de los
          200 millones de musulmanes y otras minorías religiosas. Desde el dalitismo (movimiento de las
          castas oprimidas) se argumenta que la restauración del dharma brahmanical perpetúa el sistema
          de castas, históricamente legitimador de la discriminación. Pensadores laicos como Amartya Sen
          señalan que la imagen de India como nación hindú homogénea ignora milenios de pluralismo cultural
          y religioso. Los críticos de derechos humanos documentan violencia contra minorías en el contexto
          del auge hindutva.
        keyThinkers:
        - Vinayak Damodar Savarkar
        - M.S. Golwalkar
        - Kautilya (Chanakya)
        - Bal Gangadhar Tilak
        - Narendra Modi
        historicalExamples:
        - Imperio Vijayanagara, India del Sur (1336–1646)
        - Nepal como reino hindú (1768–2008)
        - BJP bajo Modi, India (2014–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Hindutva
      - id: buddhist-theocracy
        name: Teocracia budista
        nameEn: Buddhist Theocracy
        weight: 2
        description: Régimen donde el clero budista ejerce poder político, como en el Tíbet pre-1959 bajo
          los Dalai Lamas.
        longDescription: 'La teocracia budista designa la forma de organización política en que el gobierno
          se legitima y organiza según los principios del budismo, con la sangha —la comunidad de monjes—
          ejerciendo autoridad espiritual y, en algunos casos, temporal directa sobre el Estado. El budismo,
          como el hinduismo, es una tradición plural sin una jerarquía eclesiástica única universal, lo
          que produce formas teocráticas muy diferentes entre sí según la tradición budista dominante
          (theravada, mahayana o vajrayana) y el contexto cultural.


          El caso más elaborado de teocracia budista es el Tíbet bajo el sistema del Dalái Lama, en la
          tradición vajrayana. Desde el siglo XVII, el Dalái Lama ejerció simultáneamente la autoridad
          espiritual y temporal sobre el territorio tibetano, con el Gobierno de Ganden Phodrang como
          expresión institucional de este sistema. La reencarnación como mecanismo de sucesión —el Dalái
          Lama se identifica como la reencarnación de su predecesor— es el elemento más distintivo de
          esta teocracia: la autoridad no se hereda por sangre sino por identificación espiritual.


          En el budismo theravada del Sudeste Asiático, la relación entre el rey y la sangha fue de apoyo
          mutuo: el rey protegía y financiaba a los monjes; los monjes legitimaban al rey como guardián
          del dharma y como bodhisatta (ser destinado a la iluminación). Tailandia mantuvo esta relación
          hasta el siglo XX: el budismo es religión de Estado y el rey debe ser budista, aunque el sistema
          de gobierno es constitucional.


          En Myanmar (Birmania), el movimiento Mahā Bodhi y, más recientemente, el movimiento monje Ma
          Ba Tha han mezclado budismo de Estado con nacionalismo étnico birmano, en un contexto en que
          la comunidad rohingya —de mayoría musulmana— fue objeto de persecución con aval o silencio de
          sectores monásticos.


          Su posición en el cuadrante autoritario-derecho refleja la jerarquía religiosa como fuente de
          autoridad política, la limitación del pluralismo doctrinal y, en algunos casos, el exclusivismo
          nacional-religioso.'
        historicalContext: El primer Estado budista conocido fue el Imperio Maurya bajo Ashoka (siglo
          III a.C.), quien adoptó el budismo tras la sangrienta conquista de Kalinga y promovió sus principios
          como política imperial. El reino de Pagan en Birmania (siglo IX–XIII) y los reinos thai de Sukhothai
          y Ayutthaya desarrollaron modelos de monarquía budista theravada. El sistema de gobierno del
          Dalái Lama en el Tíbet se consolidó con el Quinto Dalái Lama (1617–1682). La invasión china
          del Tíbet (1950) puso fin a la teocracia tibetana en el territorio; el gobierno en el exilio
          subsiste en Dharamsala, India.
        contemporaryRelevance: El gobierno tibetano en el exilio del XIV Dalái Lama, con sede en Dharamsala,
          es la única teocracia budista reconocida (parcialmente) en el mundo contemporáneo, aunque desde
          2011 el Dalái Lama transfirió sus funciones políticas a un liderazgo electo secular. Tailandia
          mantiene el budismo como religión de Estado con influencia sobre la educación y la política.
          En Sri Lanka y Myanmar, el nacionalismo budista ejerce presión sobre las minorías religiosas
          con episodios documentados de violencia. El budismo político del movimiento Saffron Revolution
          en Myanmar (2007) ilustra la politización contemporánea de la sangha.
        commonCriticisms: Los críticos liberales sostienen que la teocracia budista, como cualquier otra,
          subordina la ciudadanía al criterio religioso, excluyendo a quienes no comparten la fe. Desde
          el activismo de derechos humanos se señala que el budismo de Estado ha servido de legitimación
          a persecuciones de minorías en Myanmar y Sri Lanka. Pensadores budistas progresistas argumentan
          que el dhamma original no prescribía ningún sistema político concreto y que la politización
          del budismo distorsiona su mensaje de compasión universal. Los críticos secularistas subrayan
          la contradicción entre el principio budista de no-violencia y el uso del discurso budista para
          justificar violencia étnica.
        keyThinkers:
        - Ashoka Maurya
        - XIV Dalái Lama (Tenzin Gyatso)
        - Bhikkhu Buddhadasa
        - Ashin Wirathu
        - Sulak Sivaraksa
        historicalExamples:
        - Imperio Maurya bajo Ashoka, India (268–232 a.C.)
        - Tíbet bajo el Dalái Lama (1642–1950)
        - Reino de Pagan, Birmania (849–1297)
        - Gobierno tibetano en el exilio, Dharamsala (1959–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Budismo_y_pol%C3%ADtica
    - name: imperialismo-colonialismo
      weight: 3
      children:
      - id: clientelism-cacicazgo
        name: Clientelismo / Cacicazgo
        nameEn: Clientelist Politics
        weight: 2
        description: Política basada en redes locales de poder personalista, intercambio de favores estatales
          por lealtad política y liderazgos regionales hereditarios. En Colombia tiene expresión histórica
          en el gamonalismo (caciques rurales del siglo XX), las maquinarias regionales de Casa Char en
          el Caribe, los clanes Gnecco-Lozada-Aguilar y otras casas políticas costeñas o santandereanas.
          Se diferencia del conservadurismo tradicionalista por su pragmatismo no-ideológico.
        historicalExamples:
        - Gamonalismo en Colombia durante el bipartidismo (1850–1958)
        - Caciquismo español de la Restauración (1874–1923)
        - Parapolítica colombiana (alianzas AUC-congresistas) (1990s–2006)
        - Casa Char, Atlántico y Barranquilla, Colombia (1990s–presente)
        longDescription: 'El clientelismo-cacicazgo designa el sistema de dominación política basado en
          el intercambio asimétrico de favores, recursos y protección entre un patrón (el cacique o jefe
          regional) y sus clientes, a cambio de lealtad política, apoyo electoral y subordinación. En
          este sistema, el acceso a bienes públicos —contratos, empleos, subsidios, infraestructura— está
          mediado por la relación personal con el patrón, no por la ciudadanía universal.


          El cacicazgo es una categoría históricamente arraigada en América Latina, derivada de la voz
          taína cacique (jefe). En Colombia, el término gamonalismo denomina la variante regional propia:
          el gamonal es el terrateniente o notable local que ejerce control sobre la política municipal
          o departamental, distribuyendo favores a cambio de votos y suprimiendo la competencia política
          real. Las «casas políticas» regionales —como la Casa Char en la Costa Atlántica, la de los Gnecco
          en La Guajira o la maquinaria de Luis Carlos Galán en Santander antes de ser asesinado— son
          expresiones contemporáneas de este fenómeno.


          El clientelismo-cacicazgo opera en la intersección del autoritarismo y la desigualdad: concentra
          el poder en pocas familias o redes, reproduce la pobreza como instrumento de control (quien
          depende económicamente del patrón no puede votar libremente), y corrompe las instituciones formales
          del Estado utilizándolas como botín de las maquinarias.


          En términos comparados, el cacicazgo latinoamericano tiene paralelos con el bossismo estadounidense
          del siglo XIX, el clientelismo del Sur de Italia (sistema de los notables) y el caciquismo español
          de la Restauración (1874–1923). En todos los casos, la forma republicana coexiste con una práctica
          de poder personalista y excluyente.


          Su posición en el cuadrante autoritario-derecho refleja la jerarquía de poder personal no institucional,
          la protección de privilegios de élite, la exclusión de la competencia política real y la instrumentalización
          del Estado para beneficio de redes privadas.'
        historicalContext: El gamonalismo colombiano tiene raíces en la estructura agraria colonial y
          en los años de dominio bipartidista (siglos XIX–XX). Durante el Frente Nacional (1958–1974),
          el reparto pactado del poder entre liberales y conservadores consolidó las maquinarias regionales
          como instrumentos de control político. En los años 1980 y 1990, la penetración del narcotráfico
          y los grupos paramilitares en las redes clientelares transformó el cacicazgo clásico en formas
          más violentas de control territorial. La parapolítica (2006–2010) documentó la alianza sistemática
          entre políticos regionales y grupos paramilitares.
        contemporaryRelevance: En Colombia, el cacicazgo regional sigue siendo una fuerza estructurante
          de la política electoral. La Casa Char (Barranquilla y Atlántico), la familia Gnecco (La Guajira),
          la red de Álex Char como alcalde de Barranquilla y las alianzas entre empresarios regionales,
          partidos y figuras como Germán Vargas Lleras ilustran la persistencia del fenómeno. Los debates
          sobre reforma política, listas cerradas, umbral electoral y transparencia en financiación de
          campañas son intentos de limitar el poder de las maquinarias clientelares. La JEP y la Fiscalía
          han investigado vínculos entre políticos regionales y actores armados.
        commonCriticisms: 'Los críticos republicanos y liberales sostienen que el clientelismo destruye
          la autonomía del voto al convertirlo en mercancía, vaciando de contenido la democracia representativa.
          Desde la teoría del Estado se argumenta que el cacicazgo fragmenta la soberanía estatal: el
          Estado formal existe pero el poder real está en las redes privadas de los patrones. Economistas
          señalan que el clientelismo asigna recursos públicos según criterios de lealtad política en
          lugar de eficiencia o necesidad, agravando la desigualdad. Politólogos colombianos como Francisco
          Gutiérrez Sanín y Laura Wills han documentado cómo las maquinarias clientelares coexisten con
          —e instrumentalizan— la violencia armada.'
        keyThinkers:
        - James Scott
        - Luis Eduardo Nieto Arteta
        - Francisco Gutiérrez Sanín
        - John Duncan Powell
        wikipediaUrl: https://es.wikipedia.org/wiki/Gamonalismo
      - id: developmentalism
        name: Desarrollismo
        nameEn: Developmentalism
        weight: 2
        description: Programa de transformación económica con un Estado activo en infraestructura, planificación
          industrial y mercado regulado. Inspirado en la CEPAL y la experiencia desarrollista latinoamericana,
          combina pragmatismo pro-mercado con intervención estatal selectiva. En Colombia se expresa en
          proyectos como el de Germán Vargas Lleras (Cambio Radical, infraestructura como motor) y en
          sectores del santismo orientados a APP y modernización.
        keyThinkers:
        - Raúl Prebisch
        - Celso Furtado
        - Luiz Carlos Bresser-Pereira
        - Germán Vargas Lleras
        - Albert Hirschman
        historicalExamples:
        - Brasil bajo Juscelino Kubitschek (1956–1961)
        - México durante el «milagro mexicano» (1940–1970)
        - Corea del Sur bajo Park Chung-hee (1961–1979)
        - Colombia — gobiernos del Frente Nacional con CEPAL (1958–1974)
        longDescription: 'El desarrollismo designa la doctrina político-económica que asigna al Estado
          un papel rector en la industrialización y la modernización económica acelerada, mediante la
          planificación, la inversión pública en infraestructura y la protección de sectores estratégicos,
          con el objetivo de superar el subdesarrollo y alcanzar los niveles de industrialización de los
          países avanzados. Se distingue del socialismo en que mantiene la propiedad privada como base
          del sistema productivo, y del liberalismo clásico en que no confía en el mercado sin intervención
          estatal para producir el desarrollo.


          El desarrollismo latinoamericano surgió de la teoría de la CEPAL (Comisión Económica para América
          Latina de la ONU), especialmente de los trabajos de Raúl Prebisch en los años 1940–1950. Prebisch
          formuló la tesis centro-periferia: los países periféricos exportadores de materias primas sufren
          un deterioro sistemático de sus términos de intercambio frente a los países industrializados,
          lo que hace necesaria la industrialización por sustitución de importaciones (ISI) como estrategia
          de desarrollo autónomo.


          En Colombia, el desarrollismo autoritario tiene un referente específico en Germán Vargas Lleras,
          exvicepresidente y figura política que combinó el discurso de la eficiencia tecnocrática, la
          inversión masiva en infraestructura vial y la construcción de vivienda social con prácticas
          de maquinaria política y centralización del poder decisorio. Su partido Cambio Radical representó
          una versión del desarrollismo pragmático: Estado fuerte para las obras, mercado para la economía,
          maquinaria para la política.


          El desarrollismo puede coexistir con regímenes democráticos (Brasil de Kubitschek, Colombia
          de Santos con el plan de infraestructura 4G) o con regímenes autoritarios (Brasil de Vargas
          y el Estado Novo, Corea del Sur de Park Chung-hee). En su variante autoritaria, prioriza la
          eficiencia y el crecimiento sobre la participación política y los derechos sociales, justificando
          restricciones a la democracia en nombre del progreso material.


          Su posición en el cuadrante autoritario-derecho refleja el papel rector del Estado sobre la
          economía, la jerarquía tecnocrática en la toma de decisiones, la subordinación del pluralismo
          político a la eficiencia y el mantenimiento de la propiedad privada y la desigualdad como condiciones
          del modelo.'
        historicalContext: El desarrollismo latinoamericano alcanzó su apogeo entre los años 1950 y 1970.
          Brasil bajo Juscelino Kubitschek (1956–1961) con el programa «Cincuenta años en cinco» y la
          construcción de Brasilia es su expresión más emblemática. México con el «milagro mexicano» (1940–1970)
          y Argentina con el peronismo industrial también aplicaron variantes desarrollistas. En Colombia,
          los gobiernos del Frente Nacional impulsaron el desarrollismo tecnocrático con apoyo de la CEPAL.
          La crisis de la deuda de los años 1980 y el Consenso de Washington desplazaron el desarrollismo
          hacia posiciones más liberalizadoras, aunque el término reaparece en debates contemporáneos
          sobre reindustrialización.
        contemporaryRelevance: El desarrollismo no ha desaparecido del debate político latinoamericano.
          El neodesarrollismo de Bresser-Pereira en Brasil, el kirchnerismo en Argentina y algunas propuestas
          del Plan Nacional de Desarrollo de Colombia bajo distintos gobiernos retoman elementos del desarrollismo
          clásico. En Colombia, la figura de Vargas Lleras y su Partido Cambio Radical continúan articulando
          un discurso desarrollista pragmático centrado en infraestructura. A escala global, el debate
          sobre política industrial activa ha vuelto al centro tras el fracaso del Consenso de Washington.
        commonCriticisms: Los críticos neoliberales sostienen que el desarrollismo genera ineficiencia,
          corrupción y deuda pública al asignar al Estado tareas que el mercado podría cumplir mejor.
          Desde la izquierda se argumenta que el desarrollismo reproduce la desigualdad al priorizar el
          crecimiento sobre la redistribución y al mantener intactas las estructuras de poder oligárquico.
          Ambientalistas señalan que el modelo de industrialización acelerada basado en obras de infraestructura
          es incompatible con la sostenibilidad ambiental. Politólogos colombianos señalan que el desarrollismo
          autoritario de Vargas Lleras combinó eficiencia técnica con maquinaria clientelar, reproduciendo
          las patologías del sistema político que afirmaba superar.
        wikipediaUrl: https://es.wikipedia.org/wiki/Desarrollismo
      - id: securitarian-right
        name: Derecha Securitaria
        nameEn: Securitarian Right
        weight: 2
        description: Posición de derecha cuyo eje articulador es el orden público y la seguridad como
          prioridad central, sin necesariamente adherir a un programa económico extremo o a valores tradicionalistas
          estrictos. En Colombia tiene expresión en figuras tecnócratas con énfasis en seguridad como
          Juan Carlos Pinzón, sectores moderados del uribismo post-conflicto y candidaturas que privilegian
          "mano dura institucional" sobre el revanchismo paleo-conservador.
        historicalExamples:
        - Política de Seguridad Democrática, Colombia (Uribe) (2002–2010)
        - Estatuto de Seguridad, Colombia (Turbay) (1978–1982)
        - Nayib Bukele y el estado de excepción, El Salvador (2022–presente)
        - Bolsonaro y la militarización del orden público, Brasil (2019–2022)
        longDescription: 'La derecha securitaria designa la corriente política que hace de la seguridad
          —el orden público, el control del crimen organizado, la derrota de la insurgencia armada y,
          en algunos contextos, la seguridad fronteriza— el eje articulador de su proyecto político y
          de sus propuestas de gobierno. Para esta corriente, la garantía del orden es la condición previa
          de cualquier otro derecho o libertad, y el Estado tiene el deber y la prerrogativa de usar la
          fuerza con amplitud suficiente para suprimirlo.


          En Colombia, la derecha securitaria tiene un referente histórico preciso en la política de Seguridad
          Democrática del presidente Álvaro Uribe Vélez (2002–2010). Esta política combinó el incremento
          masivo del pie de fuerza militar y policial, la creación de redes de informantes civiles, las
          operaciones de inteligencia y los incentivos económicos por capturas y «desmovilizaciones» con
          resultados militares que redujeron la presencia de las FARC en zonas rurales. Juan Carlos Pinzón,
          ministro de Defensa durante el segundo mandato de Uribe, fue el ejecutor técnico de esta estrategia.


          La derecha securitaria se distingue del autoritarismo en que generalmente acepta el marco democrático
          formal —elecciones, partidos, separación de poderes— pero está dispuesta a expandir los poderes
          de policía y militares, restringir garantías procesales en contextos de «emergencia» y tolerar
          o minimizar denuncias de violaciones de derechos humanos si se producen en el contexto de operaciones
          contra grupos armados ilegales.


          En Colombia, los «falsos positivos» —el asesinato de civiles presentados como guerrilleros muertos
          en combate para inflar estadísticas— son el caso más documentado de las consecuencias de la
          lógica securitaria llevada al extremo: la presión por resultados operacionales creó incentivos
          institucionales para el crimen de Estado. La JEP ha reconocido más de 6.400 víctimas de este
          patrón.


          Su posición en el cuadrante autoritario-derecho refleja la prioridad del orden sobre la libertad,
          la confianza en el aparato coercitivo del Estado, la jerarquía militar-policial y la desconfianza
          hacia las garantías procesales como obstáculos a la eficacia.'
        historicalContext: La derecha securitaria colombiana tiene raíces en el contexto de la violencia
          bipartidista (La Violencia, 1948–1958), la emergencia de las guerrillas en los años 1960 y el
          Estatuto de Seguridad del presidente Turbay Ayala (1978–1982), que militarizó la respuesta al
          crimen político. La política de Seguridad Democrática de Uribe (2002–2010) representó la formulación
          más elaborada y electoralmente exitosa de la derecha securitaria colombiana. El proceso de paz
          de Santos (2012–2016) generó una reacción securitaria que fue determinante en el triunfo del
          No en el plebiscito de 2016.
        contemporaryRelevance: En Colombia, el Centro Democrático —partido fundado por Álvaro Uribe— es
          la expresión más organizada de la derecha securitaria. Ivan Duque (2018–2022) gobernó con un
          programa que combinó elementos securitarios con algunos del proceso de paz. En el debate político
          actual, la derecha securitaria critica el gobierno de Gustavo Petro por reducir operaciones
          militares contra grupos armados y por negociaciones de paz con el ELN y disidencias de las FARC.
          A escala regional, Brasil bajo Bolsonaro, El Salvador bajo Bukele y Honduras bajo Hernández
          representaron variantes de la derecha securitaria latinoamericana.
        commonCriticisms: Los críticos de derechos humanos sostienen que la derecha securitaria crea incentivos
          institucionales para abusos —como los falsos positivos en Colombia— al priorizar resultados
          militares sobre garantías procesales. Desde el garantismo penal se argumenta que la restricción
          de derechos en nombre de la seguridad tiende a expandirse más allá de la emergencia original,
          erosionando permanentemente libertades civiles. Pensadores liberales señalan que las políticas
          de «mano dura» producen espirales de violencia cuando no abordan las causas estructurales del
          conflicto. Sociólogos colombianos como Mauricio García Villegas documentan cómo el discurso
          securitario desplaza el debate sobre pobreza, desigualdad y exclusión.
        keyThinkers:
        - Álvaro Uribe Vélez
        - Juan Carlos Pinzón
        - Samuel Huntington
        - James Q. Wilson y George Kelling
        wikipediaUrl: https://es.wikipedia.org/wiki/Seguridad_democr%C3%A1tica
      - id: authoritarian-capitalism
        name: Capitalismo autoritario
        nameEn: Authoritarian Capitalism
        weight: 1
        description: Sistema que combina economía de mercado con fuerte control político autoritario sin
          democracia liberal ni garantías civiles robustas. Modelo asociado al desarrollo de Asia oriental
          (Singapur, China contemporánea, Corea del Sur bajo Park Chung-hee). En Colombia es referencia
          teórica más que aplicada — pocos actores políticos defienden explícitamente este modelo.
        historicalExamples:
        - Singapur bajo el Partido de Acción Popular (1965–presente)
        - Chile bajo Pinochet (1973–1990)
        - China bajo el Partido Comunista (era reformas) (1978–presente)
        - Rusia bajo Vladimir Putin (2000–presente)
        - Corea del Sur bajo Park Chung-hee (1961–1979)
        longDescription: 'El capitalismo autoritario designa el modelo político-económico en que una economía
          de mercado —con propiedad privada, inversión extranjera y participación en el comercio global—
          coexiste con un régimen político que restringe o elimina las libertades civiles y políticas:
          multipartidismo, prensa libre, independencia judicial y derechos de asociación. En este modelo,
          la eficiencia económica y el crecimiento material se presentan como sustitutos funcionales de
          la legitimidad democrática.


          El capitalismo autoritario desafía la tesis de la modernización liberal —formulada por Seymour
          Martin Lipset— según la cual el desarrollo económico genera inevitablemente demandas de democratización.
          Los casos de Singapur, Corea del Sur en su fase desarrollista, Chile bajo Pinochet y, sobre
          todo, China desde las reformas de Deng Xiaoping (1978) muestran que el crecimiento económico
          acelerado puede producirse y sostenerse bajo regímenes no democráticos durante décadas.


          El modelo chino es el caso contemporáneo más influyente: el Partido Comunista Chino mantiene
          el monopolio político mientras gestiona la segunda economía del mundo, integrada en las cadenas
          de valor globales. Las reformas de mercado coexisten con la censura sistemática de internet,
          la persecución de la disidencia y el control del aparato judicial. Xi Jinping ha concentrado
          el poder personal más allá de lo previsto por las reformas institucionales de Deng, reforzando
          la dimensión autoritaria del modelo.


          Otras variantes incluyen los «países del Golfo» (Emiratos Árabes Unidos, Qatar, Arabia Saudita)
          que combinan economías abiertas al capital global con monarquías absolutas; Rusia bajo Putin,
          donde el capitalismo oligárquico convive con el autoritarismo competitivo; y los «tigres asiáticos»
          en sus fases desarrollistas autoritarias.


          Su posición en el cuadrante autoritario-derecho refleja precisamente esta combinación: economía
          de mercado —que lo separa del socialismo de Estado— y restricción de la participación política
          —que lo separa de la democracia liberal.'
        historicalContext: 'La categoría analítica de «capitalismo autoritario» fue popularizada tras
          el fin de la Guerra Fría, cuando se esperaba que la transición económica produjera automáticamente
          transición política. Rusia y China demostraron que eso no era inevitable. El modelo chino posterior
          a 1978 es el experimento más longevo y exitoso en términos de crecimiento: China pasó de la
          pobreza masiva a ser la segunda economía del mundo en menos de cuatro décadas bajo el partido
          único. Singapore bajo Lee Kuan Yew (1959–1990) fue un modelo anterior citado por líderes autoritarios
          de todo el mundo como alternativa al liberalismo.'
        contemporaryRelevance: El capitalismo autoritario es hoy el modelo político-económico de la segunda
          potencia mundial (China), varios miembros del G20 (Rusia, Arabia Saudita, Turquía bajo Erdoğan)
          y numerosos Estados en desarrollo. Su éxito relativo ha generado el debate sobre si el liberalismo
          democrático mantiene su atractivo como modelo universal. El Instituto Levitsky-Way y Freedom
          House documentan el retroceso democrático global desde 2006, en parte asociado a la influencia
          del modelo autoritario-capitalista. En América Latina, el debate se renueva con El Salvador
          de Bukele y variantes del populismo de derecha.
        commonCriticisms: 'Los críticos liberales sostienen que el capitalismo autoritario es estructuralmente
          inestable: sin Estado de derecho independiente, los derechos de propiedad son contingentes a
          la lealtad política, lo que genera incertidumbre para la inversión a largo plazo. Desde la socialdemocracia
          se argumenta que el modelo produce crecimiento sin distribución, agravando la desigualdad. Teóricos
          de la democracia señalan que la supresión de la libertad de expresión impide la corrección de
          errores de política: los regímenes autoritarios carecen de mecanismos de retroalimentación que
          las democracias tienen en las elecciones y la prensa libre. Activistas de derechos humanos documentan
          que el bienestar material producido por el capitalismo autoritario no compensa la pérdida de
          libertades fundamentales.'
        keyThinkers:
        - Lee Kuan Yew
        - Deng Xiaoping
        - Augusto Pinochet
        - Azar Gat
        - Stefan Halper
        wikipediaUrl: https://es.wikipedia.org/wiki/Capitalismo_autoritario
      - id: imperialism
        name: Imperialismo
        nameEn: Imperialism
        weight: 2
        description: Doctrina de expansión territorial y dominación política sobre otras naciones mediante
          fuerza militar o presión económica.
        longDescription: 'El imperialismo designa la práctica y la doctrina por las cuales un Estado extiende
          su poder, control y autoridad sobre otros territorios, pueblos o Estados, ya sea mediante la
          dominación política directa (colonialismo formal), el control económico (neocolonialismo), la
          influencia militar o la dependencia diplomática. En su sentido más preciso, el imperialismo
          implica una relación asimétrica y coercitiva en la que los intereses de la potencia dominante
          se imponen sobre los de los territorios o poblaciones sujetos.


          El imperialismo es un fenómeno tan antiguo como las primeras civilizaciones —los imperios persa,
          macedonio, romano y chino son ejemplos preclásicos— pero su formulación doctrinaria moderna
          se produce en el contexto del imperialismo europeo del siglo XIX, cuando las potencias europeas
          se repartieron África (Conferencia de Berlín, 1884–1885) y Asia bajo ideologías que combinaban
          la superioridad racial, la «misión civilizadora», los intereses económicos y el equilibrio geopolítico.


          Desde la teoría política, el imperialismo fue objeto de múltiples interpretaciones. J.A. Hobson
          (Imperialism, 1902) argumentó que el imperialismo respondía a la necesidad del capital de encontrar
          mercados y campos de inversión en el exterior, tesis que Lenin desarrolló en El imperialismo,
          fase superior del capitalismo (1917). Desde el liberalismo, autores como John Stuart Mill intentaron
          justificar el imperialismo como «tutelaje» temporal de pueblos «inmaduros» para el autogobierno,
          lo que sirvió de legitimación intelectual al colonialismo.


          El imperialismo moderno se articuló bajo distintas banderas ideológicas: el imperialismo liberal
          europeo del siglo XIX (Imperio Británico), el imperialismo fascista (Italia en Etiopía, Japón
          en Asia), el imperialismo soviético en Europa del Este y el imperialismo estadounidense en América
          Latina y el Pacífico. Cada variante combinó elementos distintos de fuerza militar, economía
          y construcción ideológica de legitimidad.


          Su posición en el cuadrante autoritario-derecho refleja la jerarquía entre naciones —con la
          potencia imperialista en el vértice—, la negación de la autonomía de los pueblos sometidos y
          la primacía de los intereses de las élites dominantes de la metrópoli sobre cualquier principio
          igualitario.'
        historicalContext: El imperialismo europeo moderno alcanzó su apogeo entre 1870 y 1914, cuando
          las potencias europeas controlaban el 85% de la superficie terrestre. El Imperio Británico,
          el mayor en la historia, abarcó unos 36 millones de km² en su momento de máxima extensión. La
          Primera Guerra Mundial fue interpretada por Lenin y otros como resultado de la competencia interimperialista
          por mercados y colonias. La descolonización entre 1945 y 1975 disolvió los imperios formales,
          aunque el debate sobre el neocolonialismo económico y el imperialismo cultural sigue siendo
          central en los estudios poscoloniales.
        contemporaryRelevance: El término imperialismo sigue siendo central en el análisis de las relaciones
          internacionales contemporáneas. El debate se aplica a la presencia militar estadounidense en
          Oriente Medio y el Pacífico, a la expansión de la influencia china mediante la Iniciativa de
          la Franja y la Ruta (Belt and Road Initiative), a la presencia rusa en países de la antigua
          URSS y a las relaciones económicas entre países del norte global y el sur global. Los estudios
          poscoloniales (Said, Spivak, Bhabha) han renovado el análisis del imperialismo al incorporar
          las dimensiones culturales, epistémicas y de representación.
        commonCriticisms: 'Los críticos desde el liberalismo cosmopolita sostienen que el imperialismo
          viola el principio de autodeterminación de los pueblos, reconocido como derecho en la Carta
          de la ONU (1945). Desde el marxismo se argumenta que el imperialismo es la forma de expansión
          necesaria del capitalismo cuando el mercado interior se satura, y que beneficia al capital de
          la metrópoli a costa de la clase trabajadora de los territorios colonizados. Los pensadores
          poscoloniales señalan que el imperialismo no solo fue económico sino epistémico: impuso categorías
          de conocimiento, historia y cultura que subalternizaron las tradiciones de los pueblos colonizados.
          Conservadores soberanistas tanto de los países dominantes como de los dominados critican el
          imperialismo por disolver identidades nacionales en estructuras supranacionales de poder.'
        keyThinkers:
        - J.A. Hobson
        - Vladimir Lenin
        - Edward Said
        - Hannah Arendt
        - Kwame Nkrumah
        - John Stuart Mill
        historicalExamples:
        - Imperio Británico en su apogeo (1815–1947)
        - Imperialismo belga en el Congo (1885–1960)
        - Imperialismo japonés en Asia-Pacífico (1895–1945)
        - Expansión soviética en Europa del Este (1944–1989)
        - Iniciativa de la Franja y la Ruta, China (2013–presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Imperialismo
      - id: colonialism
        name: Colonialismo
        nameEn: Colonialism
        weight: 2
        description: Sistema de explotación económica y cultural de territorios ocupados por una potencia
          extranjera.
        longDescription: 'El colonialismo es una doctrina política y económica que justifica la dominación,
          ocupación y explotación de territorios y pueblos por parte de una potencia externa, generalmente
          en nombre de la civilización, el progreso o la misión religiosa. En su versión más articulada
          como ideología, sostiene que ciertas naciones o razas están llamadas a gobernar a otras, ya
          sea por superioridad cultural, capacidad civilizatoria o mandato divino.


          Su origen como sistema político organizado se sitúa en el siglo XV, con las expansiones ibéricas
          hacia América, África y Asia. Sin embargo, como doctrina explícita alcanzó su máxima elaboración
          teórica durante el siglo XIX, cuando potencias europeas —especialmente Gran Bretaña, Francia,
          Bélgica, Alemania y los Países Bajos— repartieron el mundo en colonias en la Conferencia de
          Berlín (1884-1885).


          Los pensadores que legitimaron el colonialismo recurrieron a diversas fuentes: el darwinismo
          social de Herbert Spencer, la teoría de la ''misión civilizatoria'' de Jules Ferry en Francia,
          y la doctrina del ''destino manifiesto'' en Estados Unidos. John Stuart Mill, pese a su liberalismo,
          defendió el colonialismo como tutela temporal para pueblos ''inmaduros''. Rudyard Kipling lo
          poetizó como ''la carga del hombre blanco''.


          En el plano económico, el colonialismo organizó los territorios conquistados como economías
          extractivas orientadas al beneficio de la metrópoli: plantaciones, minas, monocultivos. Las
          poblaciones locales fueron sometidas a trabajo forzado, desplazadas o eliminadas.


          Variantes internas incluyen el colonialismo de asentamiento (settler colonialism), donde el
          colonizador reemplaza a la población nativa, como en Norteamérica o Australia; y el colonialismo
          de explotación, donde la metrópoli administra desde fuera, como en la mayor parte de África
          subsahariana.


          Se ubica en el cuadrante autoritario-derecha por su centralización de poder en la potencia dominante,
          su jerarquía étnica o cultural explícita, y su defensa de la propiedad y el libre mercado solo
          para los colonizadores.'
        historicalContext: 'El colonialismo moderno se inicia con los viajes ibéricos de finales del siglo
          XV. España y Portugal establecieron los primeros imperios ultramarinos. En los siglos XVII y
          XVIII, Francia, Inglaterra y los Países Bajos construyeron sus propios imperios. El siglo XIX
          representó el apogeo: el Imperio Británico llegó a cubrir un cuarto de la superficie terrestre.
          El proceso de descolonización comenzó con las independencias latinoamericanas (1810-1825), se
          aceleró tras la Segunda Guerra Mundial y culminó formalmente en la década de 1970, aunque las
          estructuras económicas heredadas continúan siendo objeto de debate.'
        contemporaryRelevance: El colonialismo como doctrina política explícita carece hoy de defensores
          institucionales. Sin embargo, el debate sobre sus legados —deuda histórica, reparaciones, neocolonialismo
          económico, extractivismo— está plenamente vigente en foros internacionales, movimientos sociales
          y debates académicos. El término 'colonialismo de asentamiento' se aplica también a conflictos
          contemporáneos como el de Israel y Palestina, con fuerte disputa sobre su pertinencia analítica.
        commonCriticisms: Desde el pensamiento anticolonial (Frantz Fanon, Aimé Césaire) se argumenta
          que el colonialismo destruyó estructuras sociales, lenguas y economías locales, dejando secuelas
          que persisten generaciones después. Los críticos liberales señalan la contradicción de potencias
          que proclamaban la libertad individual mientras negaban toda autonomía a pueblos colonizados.
          Economistas como Walter Rodney sostienen que el colonialismo subdesarrolló activamente a África
          en beneficio de Europa.
        keyThinkers:
        - Jules Ferry
        - Rudyard Kipling
        - John Stuart Mill
        - Cecil Rhodes
        - Albert Sarraut
        historicalExamples:
        - Imperio Británico en la India (India / Reino Unido, 1858-1947)
        - Congo Belga bajo Leopoldo II (Congo / Bélgica, 1885-1960)
        - Indochina francesa (Vietnam / Francia, 1887-1954)
        - Imperio español en América (América Latina / España, 1492-1825)
        wikipediaUrl: https://es.wikipedia.org/wiki/Colonialismo
      - id: aristocracy
        name: Aristocracia
        nameEn: Aristocracy
        weight: 2
        description: Gobierno hereditario de una clase noble minoritaria que monopoliza poder político
          y propiedad.
        longDescription: 'La aristocracia, como ideología política, defiende el gobierno de los mejores
          —entendiendo ''mejor'' en términos de linaje, virtud, educación o mérito hereditario— frente
          al gobierno de la mayoría o de un monarca absoluto sin contrapesos. En su formulación clásica
          aristotélica, la aristocracia es el régimen donde gobiernan los virtuosos en beneficio del bien
          común, distinta de la oligarquía, que es su degeneración cuando los notables gobiernan en interés
          propio.


          Como doctrina política moderna, el aristocratismo sostiene que la sociedad requiere una clase
          dirigente con formación, tradición y continuidad: un estrato que preserve el conocimiento del
          arte de gobernar frente a las volubilidades de la opinión popular. Edmund Burke formuló la versión
          moderna más influyente: la nobleza como depósito intergeneracional de prudencia política.


          El pensamiento aristocrático diferencia entre nobleza de sangre y nobleza de virtud. Los defensores
          más sofisticados, como Alexis de Tocqueville, reconocieron la inevitabilidad histórica de la
          igualdad pero lamentaron la pérdida de excelencia que la democracia de masas podría traer. T.S.
          Eliot y José Ortega y Gasset elaboraron versiones culturales del aristocratismo, preocupadas
          por la preservación de la alta cultura frente a la mediocridad masificada.


          La aristocracia histórica funcionó como sistema legal en el Antiguo Régimen europeo: la nobleza
          poseía títulos, tierras y privilegios jurídicos distintos del resto de la población. La Revolución
          Francesa (1789) y las revoluciones de 1848 erosionaron legalmente estas estructuras en Europa,
          aunque sobrevivieron en formas atenuadas hasta el siglo XX.


          Variantes contemporáneas incluyen el meritocrátismo elitista, que sustituye el linaje por el
          credencial educativo como criterio de legitimidad gobernante, y el tecnocratismo, que reserva
          las decisiones complejas a expertos.'
        historicalContext: 'La aristocracia como régimen político fue la norma en la mayoría de civilizaciones
          antiguas: Esparta, Roma republicana, Venecia (siglos VII-XVIII) y la monarquía parlamentaria
          inglesa con su Cámara de los Lores son ejemplos de sistemas donde una élite hereditaria codificaba
          el poder. En Europa occidental, la nobleza perdió privilegios legales formales entre la Revolución
          Francesa y las reformas del siglo XIX. El Japón Meiji (1868-1912) modernizó el Estado mientras
          mantuvo una aristocracia funcional. La Cámara de los Lores británica, reformada pero no abolida,
          es el vestigio institucional más activo.'
        contemporaryRelevance: Como doctrina explícita de gobierno hereditario, la aristocracia carece
          de partidos que la defiendan abiertamente en democracias contemporáneas. Sin embargo, el debate
          sobre si ciertas decisiones deben tomarse por expertos o por mayorías (tecnocracia vs. democracia)
          reaviva argumentos aristocráticos. En el campo cultural, pensadores como Christopher Lasch o
          Patrick Deneen han diagnosticado que las élites meritocráticas actuales reproducen dinámicas
          aristocráticas sin los deberes que la nobleza tradicional reconocía.
        commonCriticisms: Los críticos democráticos señalan que el gobierno aristocrático, cualquiera
          que sea su fundamento, tiende a defender los intereses de la clase gobernante disfrazándolos
          de bien común. Los igualitaristas argumentan que la virtud o el mérito no son transmisibles
          por herencia ni garantizados por credenciales. Desde el republicanismo, se objeta que cualquier
          poder no sometido a rendición de cuentas periódica degenera inevitablemente en tiranía de clase.
        keyThinkers:
        - Aristóteles
        - Edmund Burke
        - Alexis de Tocqueville
        - José Ortega y Gasset
        - T.S. Eliot
        historicalExamples:
        - República de Venecia (Italia, 697-1797)
        - Cámara de los Lores como cuerpo legislativo pleno (Reino Unido, 1215-1911)
        - Senado romano republicano (Roma, 509-27 a.C.)
        - Aristocracia prusiana (Junkers) (Alemania, 1640-1918)
        wikipediaUrl: https://es.wikipedia.org/wiki/Aristocracia
      - id: fordism
        name: Fordismo
        nameEn: Fordism
        weight: 2
        description: Sistema de producción industrial en masa con jerarquía corporativa rígida y consumo
          estandarizado.
        keyThinkers:
        - Henry Ford
        - Frederick Winslow Taylor
        - Antonio Gramsci
        - Michel Aglietta
        - Robert Boyer
        longDescription: 'El fordismo designa tanto un modelo de organización industrial como una doctrina
          sociopolítica que sostiene que la producción en masa, el alto salario obrero y el consumo masivo
          son la base de un orden social estable, próspero y jerárquico. Toma su nombre de Henry Ford,
          quien en 1913 introdujo la cadena de montaje en la planta de Highland Park (Michigan), reduciendo
          el tiempo de ensamblaje de un automóvil de más de doce horas a menos de dos.


          Como sistema productivo, el fordismo combina tres elementos: estandarización del producto, organización
          científica del trabajo (taylorismo) y salarios suficientes para que los propios obreros puedan
          adquirir lo que producen. Ford duplicó los salarios de sus trabajadores a cinco dólares diarios
          en 1914, convirtiendo a la clase obrera en consumidora de bienes duraderos.


          Dimensión política: el fordismo implica una visión jerárquica de la sociedad industrial en la
          que el empresario dirige, el técnico diseña y el obrero ejecuta. No hay lugar para sindicatos
          independientes ni para la negociación colectiva en el sentido socialdemócrata: Ford combatió
          activamente la sindicalización de sus plantas. El control social se ejerce a través del salario
          alto y la disciplina de la cadena de montaje, no mediante la represión directa.


          El fordismo fue adaptado por el Estado de bienestar keynesiano de posguerra (1945-1973), en
          lo que los regulacionistas franceses —Robert Boyer, Michel Aglietta— denominaron el ''régimen
          de acumulación fordista'': un pacto tácito entre gran capital, sindicatos y Estado que garantizaba
          crecimiento, empleo y consumo. Esta versión es más moderada que el fordismo original de Ford.


          Se ubica en el cuadrante autoritario-derecha por su defensa de la jerarquía industrial vertical,
          la autoridad del capital sobre el proceso productivo y su resistencia a formas de control obrero
          o democracia industrial.'
        historicalContext: La cadena de montaje de Ford en Highland Park (1913) y la planta de River Rouge
          (1927) establecieron el modelo productivo del siglo XX. Durante el período de entreguerras,
          el fordismo fue admirado tanto por fascistas europeos (que buscaban combinar producción de masas
          con disciplina nacional) como por los soviéticos, que importaron técnicos fordistas para sus
          fábricas. El New Deal estadounidense y la reconstrucción europea de posguerra institucionalizaron
          el fordismo como modelo macroeconómico hasta la crisis del petróleo de 1973, cuando el toyotismo
          y la producción flexible comenzaron a desplazarlo.
        contemporaryRelevance: El fordismo como modelo productivo fue erosionado por la globalización,
          la automatización y el toyotismo a partir de los años 1980. Sin embargo, su lógica de producción
          estandarizada y salarios de subsistencia para mantener la demanda interna reaparece en debates
          sobre el salario mínimo, la automatización y el papel del consumo doméstico en la macroeconomía.
          Algunos economistas heterodoxos proponen un 'neo-fordismo verde' que combine producción masiva
          de bienes sostenibles con altos salarios.
        commonCriticisms: 'Críticos marxistas como Antonio Gramsci (en sus ''Cuadernos de la cárcel'')
          argumentaron que el fordismo era una nueva forma de hegemonía capitalista que colonizaba no
          solo el tiempo de trabajo sino la vida privada del obrero. Los humanistas denunciaron la deshumanización
          del trabajo en cadena, reducido a movimientos repetitivos cronometrados. Los sindicatos señalaron
          que el alto salario fordista era un instrumento de control, no de empoderamiento: Ford combatió
          ferozmente cualquier organización autónoma de los trabajadores.'
        historicalExamples:
        - Planta de Highland Park de Ford (Estados Unidos, 1913-1930)
        - Industrialización soviética con técnicas fordistas (URSS, 1928-1940)
        - Régimen de acumulación fordista de posguerra (Europa Occidental / Estados Unidos, 1945-1973)
        - Plan SEAT y Seat 600 como fordismo tardío español (España, 1950-1975)
        wikipediaUrl: https://es.wikipedia.org/wiki/Fordismo
      - id: feudalism
        name: Feudalismo
        nameEn: Feudalism
        weight: 2
        description: Sistema medieval de relaciones jerárquicas entre señores y vasallos basado en tierras,
          fidelidad y servicio militar.
        longDescription: 'El feudalismo es un sistema político, económico y social basado en relaciones
          personales de lealtad y dependencia entre señores y vasallos, articuladas en torno a la posesión
          y usufructo de la tierra. Como ideología, el feudalismo legitima la jerarquía hereditaria, la
          descentralización del poder en manos de una nobleza guerrera y la servidumbre de la tierra como
          fundamento del orden social.


          En su estructura clásica europea, el rey concedía tierras (feudos) a sus nobles a cambio de
          servicio militar y lealtad; los nobles subdividían esos feudos entre caballeros y señores menores
          en una pirámide escalonada. Los campesinos, siervos en la base de la pirámide, trabajaban la
          tierra a cambio de protección. La Iglesia ocupaba un lugar especial: poseía extensas tierras
          y legitimaba el orden establecido como voluntad divina.


          Como sistema político, el feudalismo implica la fragmentación de la soberanía: el rey es el
          señor supremo, pero su poder real depende de la lealtad de los nobles, que poseen jurisdicción,
          ejército y tribunal propio. No existe burocracia centralizada ni ejército nacional: el Estado,
          en el sentido moderno, es inexistente.


          Variantes históricas incluyen el feudalismo japonés (bakufu), donde los shogunes controlaban
          el poder efectivo mientras el Emperador mantenía la legitimidad simbólica; y el señorío colonial
          latinoamericano, que trasplantó relaciones feudales a la encomienda y la hacienda.


          Pensadores reaccionarios del siglo XIX, como Louis de Bonald y Joseph de Maistre, idealizaron
          el feudalismo medieval como un orden orgánico destruido por la Revolución. Edmund Burke también
          reivindicó sus virtudes de continuidad y contrapeso al poder arbitrario. Se ubica en el cuadrante
          autoritario-derecha por su jerarquía rígida, su desigualdad jurídica formal y su concentración
          hereditaria del poder y la propiedad.'
        historicalContext: El feudalismo europeo surgió de la fragmentación del Imperio Carolingio en
          el siglo IX ante las invasiones vikinga, sarracena y magiar. Alcanzó su madurez entre los siglos
          X y XIII. La Peste Negra (1347-1353), que mató entre un tercio y la mitad de la población europea,
          debilitó el orden feudal al escasear la mano de obra campesina y fortalecer el poder de negociación
          de los siervos. Los siglos XIV y XV vieron el auge de las monarquías centralizadas que absorbieron
          la fragmentación feudal. En Japón, el período Edo (1603-1868) fue el apogeo de un orden feudal
          estabilizado.
        contemporaryRelevance: 'El feudalismo como sistema político formal no tiene defensores actuales.
          Sin embargo, el concepto se usa como categoría analítica para describir relaciones de dependencia
          económica en contextos contemporáneos: ''feudalismo digital'' (plataformas que controlan datos
          de usuarios), ''neofeudalism'' para describir la concentración extrema de riqueza. En algunos
          contextos rurales del sur global persisten relaciones de tenencia de la tierra que los sociólogos
          describen como ''feudales residuales''.'
        commonCriticisms: Los críticos iluministas y liberales denunciaron el feudalismo como un sistema
          de privilegio arbitrario que no recompensaba el mérito sino el nacimiento. Los socialistas señalaron
          su explotación sistemática del campesinado, sin contrato ni libertad de movimiento. Los historiadores
          contemporáneos discuten si 'feudalismo' es una categoría analítica válida o una proyección anacrónica
          de los juristas del siglo XVI sobre el medioevo.
        keyThinkers:
        - Louis de Bonald
        - Joseph de Maistre
        - Marc Bloch
        - Georges Duby
        - Perry Anderson
        historicalExamples:
        - Feudalismo carolingio y sus sucesores (Francia / Europa Occidental, 850-1300)
        - Sistema de shoguns y samurái (Japón, 1185-1868)
        - Señoríos y encomiendas coloniales (América Latina, 1492-1810)
        - Feudalismo ruso (servidumbre) (Rusia, siglo XVI-1861)
        wikipediaUrl: https://es.wikipedia.org/wiki/Feudalismo
    - name: monarquismo-conservador
      weight: 3
      children:
      - id: elective-monarchism
        name: Monarquía electiva
        nameEn: Elective Monarchism
        weight: 2
        description: Sistema donde el monarca es elegido por un cuerpo electoral restringido en lugar
          de heredar el título.
        longDescription: 'La monarquía electiva es una forma de gobierno en la que el titular del trono
          no accede a él por herencia automática sino mediante un proceso de elección entre un grupo restringido
          de electores —ya sean nobles, clérigos, estados o asambleas representativas—. Como doctrina,
          el monarquismo electivo sostiene que la legitimidad del monarca debe derivar no solo del linaje
          sino de alguna forma de consentimiento o deliberación entre las élites gobernantes.


          A diferencia de la monarquía hereditaria pura, la electiva introduce un elemento de deliberación
          aristocrática: el monarca debe sus poderes a quienes lo eligieron, lo que implica cierta obligación
          de gobierno moderado. Al mismo tiempo, mantiene la concentración del poder ejecutivo en una
          sola figura y suele excluir al pueblo llano del proceso de selección.


          Históricamente, los sistemas electivos dieron lugar a fenómenos políticos característicos: la
          corrupción electoral, las guerras de sucesión, las negociaciones entre candidatos y electores
          que podían limitar el poder real. El caso más estudiado es el Sacro Imperio Romano Germánico,
          donde siete príncipes electores elegían al Emperador. Polonia-Lituania (siglos XV-XVIII) ofreció
          el ejemplo más extremo: una república nobiliaria con un rey electivo sometido a una constitución
          escrita (Pacta conventa) que el Sejm podía anular.


          Variantes del monarquismo electivo incluyen sistemas donde el monarca es elegido de por vida,
          y sistemas donde la elección recae siempre dentro de la misma familia pero entre varios candidatos
          (como en algunas monarquías del Golfo Pérsico actuales).


          Se ubica en el cuadrante autoritario-derecha por mantener la concentración del poder ejecutivo
          y los límites para la participación popular, pese a introducir el principio electivo.'
        historicalContext: El Sacro Imperio Romano Germánico formalizó la elección imperial con la Bula
          de Oro de 1356, fijando siete electores. La monarquía polaca fue electiva entre 1572 y 1795,
          cuando los vecinos de Polonia la desintegraron en parte por la parálisis política del sistema.
          Las monarquías nórdicas medievales (Dinamarca, Noruega, Suecia) también fueron electivas en
          sus orígenes. La Unión Europea, en su estructura de Consejo Europeo, y la actual monarquía malaya
          (donde los nueve sultanes eligen al Yang di-Pertuan Agong cada cinco años) son los ejemplos
          contemporáneos más claros.
        contemporaryRelevance: 'La monarquía electiva pura es hoy marginal: solo Malasia y los Emiratos
          Árabes Unidos (donde el Consejo Federal elige al presidente) mantienen mecanismos formalmente
          electivos para sus jefes de Estado monárquicos. Sin embargo, el debate sobre si las monarquías
          hereditarias deben introducir mecanismos de ratificación periódica o referéndum ha crecido en
          países como España, Bélgica y Países Bajos.'
        commonCriticisms: 'Los demócratas señalan que la monarquía electiva sigue siendo un sistema oligárquico:
          el cuerpo electoral es minúsculo y excluyente. Los defensores de la monarquía hereditaria argumentan
          que la elección introduce competencia, corrupción e inestabilidad que erosionan la continuidad
          institucional. Los republicanos objetan que cualquier monarquía, electiva o no, carece de legitimidad
          democrática plena.'
        keyThinkers:
        - Jean Bodin
        - Stanisław Konarski
        - Hugo Grocio
        - Montesquieu
        historicalExamples:
        - Sacro Imperio Romano Germánico (Alemania / Europa Central, 962-1806)
        - Monarquía electiva polaca (Polonia-Lituania, 1572-1795)
        - Monarquía constitucional malaya (Yang di-Pertuan Agong) (Malasia, 1957-presente)
        - Papado como monarquía electiva (Santa Sede, siglos IX-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Monarqu%C3%ADa_electiva
      - id: constitutional-monarchism
        name: Monarquía constitucional
        nameEn: Constitutional Monarchism
        weight: 2
        description: Sistema donde el monarca comparte poder con un parlamento bajo un marco constitucional
          que limita su autoridad.
        longDescription: 'El monarquismo constitucional es la doctrina que defiende la monarquía como
          forma de gobierno siempre que el poder del monarca esté limitado y regulado por una constitución,
          una ley fundamental o un sistema de derechos y parlamentos. No defiende el poder absoluto del
          rey, sino un equilibrio entre la tradición monárquica y el Estado de derecho.


          Su tesis central es que la monarquía constitucional ofrece ventajas que las repúblicas no garantizan:
          continuidad institucional más allá de ciclos electorales, un jefe de Estado que representa a
          la nación sin ser producto de la lucha partidaria, y una fuente de legitimidad simbólica que
          trasciende la aritmética de los votos. El monarca reina pero no gobierna: el gobierno efectivo
          recae en el Parlamento y el gabinete.


          Edmund Burke sentó las bases del monarquismo constitucional moderno al defender la monarquía
          británica como evolución orgánica de siglos, superior a la construcción racionalista de constituciones
          desde cero. Walter Bagehot sistematizó la doctrina en ''La Constitución inglesa'' (1867), distinguiendo
          entre las partes ''dignas'' (Corona, Ceremonial) y las partes ''eficientes'' (Gabinete, Parlamento)
          del gobierno.


          Variantes incluyen la monarquía parlamentaria (donde el monarca es figura ceremonial), la monarquía
          constitucional ejecutiva (donde el monarca conserva poderes reales de gobierno, como en España
          hasta 1978 o Marruecos hoy) y la monarquía dualista (donde rey y parlamento comparten el poder
          ejecutivo).


          Se ubica en el cuadrante autoritario-derecha por su defensa de una institución hereditaria no
          elegida con prerrogativas formales, aunque en sus versiones parlamentarias más avanzadas se
          acerca al centro del espectro.'
        historicalContext: 'La Carta Magna inglesa (1215) y los Bills of Rights posteriores (1689) establecieron
          los fundamentos del monarquismo constitucional. La Glorious Revolution de 1688 es el hito fundacional:
          el Parlamento invitó a un nuevo monarca bajo condiciones pactadas. En el siglo XIX, la mayor
          parte de Europa adoptó monarquías constitucionales como compromiso entre el absolutismo del
          Ancien Régime y el republicanismo revolucionario. Tras 1945, las monarquías que sobrevivieron
          la guerra (Reino Unido, Países Bajos, Bélgica, Suecia, Noruega, Dinamarca, España, Japón) adoptaron
          formas plenamente parlamentarias.'
        contemporaryRelevance: 'Las monarquías constitucionales representan hoy algunos de los sistemas
          políticos más estables y con mayor bienestar del mundo: los países escandinavos, los Países
          Bajos, Bélgica, Japón y España. El debate sobre la monarquía vs. república sigue activo en Australia,
          Nueva Zelanda y en la propia España tras el reinado de Juan Carlos I. El monarquismo constitucional
          tiene defensores activos en partidos conservadores europeos.'
        commonCriticisms: Los republicanos argumentan que ningún cargo de Estado debería ser hereditario
          en una democracia plena, independientemente de los poderes formales del monarca. Los igualitaristas
          señalan que la monarquía mantiene una nobleza y una familia real con privilegios fiscales y
          de protocolo injustificables. Desde la izquierda, se critica que la Corona funciona como garante
          ideológico del orden establecido, neutralizando simbólicamente tensiones sociales.
        keyThinkers:
        - Edmund Burke
        - Walter Bagehot
        - Benjamin Disraeli
        - Juan de Borbón
        - Vernon Bogdanor
        historicalExamples:
        - Monarquía parlamentaria británica (Reino Unido, 1689-presente)
        - Restauración borbónica española (España, 1975-presente)
        - Monarquías escandinavas (Suecia / Noruega / Dinamarca, siglo XIX-presente)
        - Monarquía constitucional de Japón (Japón, 1947-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Monarqu%C3%ADa_constitucional
      - id: senatorialism
        name: Senatorialismo
        nameEn: Senatorialism
        weight: 1
        description: Gobernanza oligárquica donde un senado aristocrático retiene el poder político principal.
        longDescription: 'El senatorialism, o gobierno senatorial, es la doctrina que defiende que el
          poder político debe residir o equilibrarse mediante una cámara alta de representación cualificada
          —el Senado— compuesta por ciudadanos de especial experiencia, edad, propiedad o mérito, que
          actúe como contrapeso a la democracia directa o a las cámaras bajas de representación popular.


          Su raíz conceptual está en la república romana, donde el Senado concentraba la dirección de
          la política exterior, la administración del erario y la supervisión de los magistrados. El Senado
          romano no era elegido por el pueblo sino designado por los censores entre los ciudadanos que
          hubieran ejercido magistraturas: era una élite de exmiembros del gobierno.


          Los padres fundadores de Estados Unidos adaptaron la idea al crear el Senado federal: originalmente,
          los senadores no eran elegidos por voto popular sino por las legislaturas estatales (hasta la
          17.ª Enmienda de 1913), lo que lo hacía más deliberativo y menos sensible a la presión popular.
          Alexander Hamilton, James Madison y John Jay defendieron en El Federalista (1788) la función
          de enfriamiento y deliberación del Senado frente a los impulsos de la Cámara.


          El senatorialism como doctrina sostenida defiende que no todas las decisiones deben tomarse
          por mayoría simple: ciertas leyes fundamentales, reformas constitucionales o decisiones de largo
          plazo deben requerir el concurso de una cámara menos susceptible a las pasiones del momento.
          Esto lo hace compatible con la democracia representativa pero introduce un elemento aristocrático-deliberativo.


          Variantes incluyen el Senado vitalicio (Italia hasta 1948, Chile hasta 2005 con senadores designados)
          y el Senado corporativo, donde los escaños representan gremios, regiones o estamentos.'
        historicalContext: El Senado romano (siglos VI a.C. - V d.C.) es el arquetipo histórico. El modelo
          fue recuperado en la Venecia republicana (Gran Consejo y Senado), en la Constitución inglesa
          (Cámara de los Lores) y en las repúblicas modernas. La Constitución de los Estados Unidos (1787)
          creó el Senado federal con poderes distintos a los de la Cámara. En América Latina, los senados
          del siglo XIX solían tener requisitos censitarios (propiedad, renta) que los hacían cámaras
          de notables. Chile mantuvo senadores designados (no electos) hasta 2005.
        contemporaryRelevance: 'La mayoría de democracias bicamerales mantienen un Senado, aunque sus
          funciones varían enormemente: desde el Senado estadounidense (enorme poder) hasta el Senado
          español (funciones limitadas). El debate sobre abolir o reformar senados que se perciben como
          redundantes o elitistas está activo en España, Chile, Argentina y varios países africanos. El
          modelo del Senado como cámara de reflexión y representación territorial sigue siendo relevante
          en estados federales.'
        commonCriticisms: Los críticos democráticos señalan que los senados tienden a sobrerepresentar
          zonas rurales o regiones conservadoras, desequilibrando el principio de igualdad del voto. Los
          progresistas argumentan que la función de 'enfriamiento' del Senado bloquea reformas necesarias
          y beneficia al status quo. Los populistas de ambos extremos denuncian a los senados como reductos
          de élites desconectadas de la voluntad popular.
        keyThinkers:
        - Cicerón
        - Alexander Hamilton
        - James Madison
        - Montesquieu
        - Hannah Arendt
        historicalExamples:
        - Senado de la República Romana (Roma, 509-27 a.C.)
        - Senado federal de Estados Unidos (Estados Unidos, 1789-presente)
        - Senado con designados de Chile (Chile, 1990-2005)
        - Cámara de los Lores como senado hereditario (Reino Unido, 1215-1999)
        wikipediaUrl: https://es.wikipedia.org/wiki/Senado
      - id: paleo-conservatism
        name: Paleoconservadurismo
        nameEn: Paleo-Conservatism
        weight: 2
        description: Corriente conservadora tradicionalista estadounidense que defiende aislacionismo,
          herencia cultural occidental y federalismo.
        longDescription: 'El paleoconservadurismo es una corriente del conservadurismo estadounidense
          que defiende el retorno a los principios fundacionales de la república: gobierno limitado, no
          intervencionismo en política exterior, identidad cultural cristiana y occidental, restricción
          de la inmigración y primacía de las comunidades locales sobre el Estado federal. Se presenta
          como el conservadurismo ''auténtico'', anterior a la influencia del neoconservadurismo y el
          liberalismo globalista.


          Su tesis central es que el conservadurismo americano fue secuestrado en la segunda mitad del
          siglo XX por intelectuales neoconservadores (muchos de origen trotskista) que lo redirigieron
          hacia el intervencionismo militar y el libre comercio globalizador, traicionando las tradiciones
          de aislacionismo y arraigo comunitario que definían al conservadurismo original.


          Los pilares del paleoconservadurismo son: antiintervencionismo militar (herencia de los ''Old
          Right'' de los años 1930-1940), proteccionismo económico, restricción severa de la inmigración
          y rechazo al multiculturalismo como política de Estado. A diferencia del neoconservadurismo,
          no defiende la expansión democrática mediante la fuerza ni el libre mercado como fin en sí mismo.


          Pensadores clave: Russell Kirk formuló los cánones del conservadurismo clásico americano. Patrick
          Buchanan lo tradujo a política electoral con sus campañas presidenciales de 1992 y 1996. Samuel
          Francis desarrolló la crítica al ''Establecimiento conservador''. Paul Gottfried acuñó el término
          ''paleoconservadurismo'' para distinguirlo de las corrientes dominantes.


          Diferencia con otras corrientes conservadoras: frente al neoconservadurismo (universalismo,
          intervencionismo), el paleoconservadurismo es particularista y aislacionista. Frente al conservadurismo
          liberal, rechaza el cosmopolitismo y defiende fronteras culturales más firmes.'
        historicalContext: 'Las raíces del paleoconservadurismo están en la Old Right americana (H.L.
          Mencken, Albert Jay Nock, Robert Taft) y en la resistencia al internacionalismo del New Deal.
          La publicación de ''Chronicles: A Magazine of American Culture'' (fundada en 1977) fue el principal
          vehículo intelectual. Las campañas de Pat Buchanan (1992, 1996, Reform Party 2000) le dieron
          visibilidad electoral. Tras el 11 de septiembre, el paleoconservadurismo quedó marginado por
          el consenso neoconservador pro-guerra, para resurgir con la candidatura de Trump en 2016.'
        contemporaryRelevance: El paleoconservadurismo influye directamente en la corriente 'America First'
          de Trump y en el movimiento MAGA. Figuras como Tucker Carlson, Steve Bannon y el expresidente
          Trump comparten diagnósticos paleoconservadores sobre la inmigración, el comercio y las guerras
          de elección. La revista 'The American Conservative' (fundada por Buchanan en 2002) es el principal
          foro intelectual activo.
        commonCriticisms: Críticos desde el liberalismo señalan que el paleoconservadurismo degenera en
          nativismo xenófobo al hacer de la identidad étnica o cultural un criterio de pertenencia nacional.
          Los neoconservadores acusan a los paleoconservadores de aislacionismo irresponsable que abandona
          a los aliados y fortalece a los adversarios de Occidente. Académicos como David Neiwert documentan
          la cercanía intelectual entre algunos sectores paleoconservadores y la alt-right.
        keyThinkers:
        - Russell Kirk
        - Patrick Buchanan
        - Samuel Francis
        - Paul Gottfried
        - Thomas Fleming
        historicalExamples:
        - Old Right y la oposición al New Deal y la WWII (Estados Unidos, 1933-1945)
        - Campañas presidenciales de Pat Buchanan (Estados Unidos, 1992-2000)
        - Movimiento America First de Trump (Estados Unidos, 2016-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Paleoconservadurismo
      - id: pinochetism
        name: Pinochetismo
        nameEn: Pinochetism
        weight: 2
        description: Dictadura militar chilena (1973-1990) que combinó represión autoritaria con liberalización
          económica radical (Chicago Boys).
        historicalExamples:
        - Golpe de Estado y junta militar (Chile, 1973-1974)
        - Programa económico de los Chicago Boys (Chile, 1975-1989)
        - Constitución de 1980 y transición pactada (Chile, 1980-1990)
        - Detención en Londres y procesos judiciales (Chile / Reino Unido, 1998-2006)
        longDescription: 'El pinochetismo designa el conjunto de políticas, prácticas de gobierno y justificaciones
          ideológicas del régimen militar encabezado por el general Augusto Pinochet en Chile entre 1973
          y 1990. Combina un autoritarismo político severo con una transformación económica radical de
          corte neoliberal, un nacionalismo de orden y una anticomunismo militante.


          En el plano político, el régimen disolvió el Congreso, ilegalizó los partidos de izquierda y
          suspendió los de centro, estableció el estado de sitio y creó la DINA (Dirección de Inteligencia
          Nacional) como órgano de represión. Según el Informe Valech (2004), más de 38.000 personas fueron
          detenidas y torturadas; la Comisión Rettig (1991) documentó 2.279 muertos y desaparecidos a
          manos del Estado.


          En el plano económico, el régimen implementó desde 1975 el programa de los ''Chicago Boys''
          —economistas formados en la Universidad de Chicago bajo Milton Friedman— que privatizó empresas
          estatales, liberalizó el comercio exterior, creó el sistema de pensiones de capitalización individual
          y redujo drásticamente el gasto público. Este modelo fue presentado como un ''milagro económico''
          por sus defensores y como un laboratorio de shock neoliberal sobre una población sin capacidad
          de resistencia por sus críticos.


          La transición a la democracia fue pactada: la Constitución de 1980 (aprobada en plebiscito sin
          garantías democráticas) estableció un sistema electoral binominal, senadores designados y un
          Consejo de Seguridad Nacional que preservaron influencia militar y pinochetista durante los
          gobiernos de la Concertación. Pinochet fue detenido en Londres en 1998 a petición del juez Baltasar
          Garzón, iniciando un proceso que reveló cuentas secretas en el extranjero y reactivó causas
          judiciales en Chile.


          El pinochetismo no es una doctrina filosófica sistematizada sino una práctica de gobierno: su
          coherencia ideológica combina elementos del franquismo, el anticomunismo de la Guerra Fría y
          el liberalismo económico radical.'
        historicalContext: El golpe del 11 de septiembre de 1973 derrocó al gobierno de Salvador Allende.
          El régimen militar gobernó Chile hasta el plebiscito del 5 de octubre de 1988, donde el 'No'
          a Pinochet venció con el 55,99% de los votos. Pinochet entregó el gobierno en 1990 pero permaneció
          como Comandante en Jefe del Ejército hasta 1998, año en que fue detenido en Londres. Falleció
          en 2006, mientras enfrentaba más de 300 causas penales y civiles en Chile. La Constitución heredada
          de 1980, pese a los procesos constituyentes de 2020-2023, sigue vigente en Chile con reformas.
        contemporaryRelevance: El legado del pinochetismo divide profundamente a la sociedad chilena.
          Sectores de la derecha chilena (Unión Demócrata Independiente, parte de Renovación Nacional)
          defienden la gestión económica del período. Los movimientos sociales y la izquierda lo asocian
          con crímenes de lesa humanidad imprescriptibles. El proceso constituyente iniciado en 2020 fue
          interpretado en parte como el intento de superar la institucionalidad heredada del pinochetismo.
          En América Latina, el término se usa como categoría para referirse a autoritarismos de derecha
          con política económica neoliberal.
        commonCriticisms: 'Las organizaciones de derechos humanos y los organismos internacionales señalan
          que el régimen cometió crímenes de lesa humanidad sistematizados: torturas, desapariciones forzadas
          y ejecuciones extrajudiciales documentadas por la propia Comisión de Verdad chilena. Economistas
          críticos, como Patricio Meller y Orlando Letelier, argumentan que el ''milagro'' económico benefició
          a los sectores más ricos y que las desigualdades estructurales del modelo neoliberal persisten
          décadas después. Los defensores de la democracia señalan que la Constitución de 1980 fue diseñada
          para bloquear cambios futuros.'
        keyThinkers:
        - Augusto Pinochet
        - Milton Friedman
        - Jaime Guzmán
        - Hernán Büchi
        - José Piñera
        wikipediaUrl: https://es.wikipedia.org/wiki/Pinochetismo
      - id: progressive-conservatism
        name: Conservadurismo progresista
        nameEn: Progressive Conservatism
        weight: 2
        description: Síntesis que acepta reformas sociales graduales dentro de un marco tradicionalista
          y jerárquico.
        longDescription: 'El conservadurismo progresista es una corriente que busca reconciliar el apego
          conservador a las instituciones, la tradición y el orden social con la aceptación de ciertos
          cambios graduales en dirección a mayor inclusión, bienestar social o derechos. No rechaza el
          cambio como tal, sino el cambio abrupto y abstracto: acepta reformas cuando están ancladas en
          la práctica histórica y no amenazan la continuidad institucional.


          Su tesis central, heredada de Edmund Burke, es que toda reforma legítima debe construirse sobre
          lo que ya existe, no sobre planes racionalistas que ignoran la sabiduría acumulada. Reformar
          sí, pero con prudencia y sin destruir lo que funciona. El conservadurismo progresista reconoce
          que el statu quo puede ser injusto en ciertos aspectos, y que preservar el orden a largo plazo
          requiere corregirlos antes de que provoquen rupturas.


          El Toryismo de Disraeli (''una nación'') en la Inglaterra victoriana es un ejemplo clásico:
          el Partido Conservador promovió leyes de protección laboral, reforma sanitaria y extensión del
          sufragio para asimilar a la clase obrera al orden existente en lugar de arriesgarse a una ruptura
          revolucionaria. David Cameron en el Reino Unido (2010-2016) reformuló el conservadurismo hacia
          el ''Big Society'' y la aceptación del matrimonio igualitario como posición conservadora.


          Diferencias internas: el conservadurismo progresista difiere del conservadurismo liberal en
          que no hace del mercado su principio rector. Difiere del neoconservadurismo en que no busca
          exportar valores por la fuerza. Difiere del conservadurismo tradicional en que acepta como irreversibles
          ciertos cambios sociales (derechos de la mujer, voto universal).


          En América Latina, la Democracia Cristiana chilena y colombiana ha operado frecuentemente en
          esta franja: conservadurismo de valores con apertura a la reforma social.'
        historicalContext: 'El conservadurismo progresista como etiqueta explícita emerge en el debate
          político anglosajón del siglo XX, aunque su genealogía intelectual arranca con Burke. Disraeli
          codificó el ''Tory social'' en la segunda mitad del siglo XIX. La democracia cristiana europea
          de posguerra representó una versión continental: conservadurismo de valores con aceptación del
          Estado de bienestar. En el siglo XXI, la etiqueta resurge con Boris Johnson, quien se presentó
          como conservador ''levelling up'' orientado a reducir desigualdades regionales.'
        contemporaryRelevance: El conservadurismo progresista es relevante en partidos conservadores que
          buscan ampliar su base electoral sin abandonar sus principios. En el Reino Unido (Tories), Canadá
          (Conservadores), y algunos partidos de la democracia cristiana latinoamericana. El debate sobre
          si el conservadurismo puede ser compatible con la agenda de igualdad de género, derechos LGBTQ+
          o acción climática sin perder su identidad es el epicentro de la tensión interna de esta corriente.
        commonCriticisms: Críticos de la derecha tradicional acusan al conservadurismo progresista de
          ser una capitulación al marco ideológico de la izquierda, incapaz de defender principios más
          allá del ritmo que marque la opinión pública. Desde la izquierda, se argumenta que el conservadurismo
          progresista copta demandas sociales para neutralizarlas y preservar la estructura de desigualdad
          fundamental. Los libertarios critican que acepta la expansión del Estado como herramienta de
          inclusión.
        keyThinkers:
        - Edmund Burke
        - Benjamin Disraeli
        - Harold Macmillan
        - David Cameron
        - Michael Gove
        historicalExamples:
        - Toryismo social de Disraeli ('Una nación') (Reino Unido, 1868-1880)
        - Gobierno de Harold Macmillan y el Estado de bienestar tory (Reino Unido, 1957-1963)
        - Democracia Cristiana en el gobierno (Chile, 1964-1970)
        - Gobierno de David Cameron (Reino Unido, 2010-2016)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_progresista
      - id: nationalist-conservatism
        name: Conservadurismo nacionalista
        nameEn: Nationalist Conservatism
        weight: 2
        description: Conservadurismo con énfasis en soberanía nacional, identidad cultural y proteccionismo
          económico moderado.
        longDescription: 'El conservadurismo nacionalista combina el apego conservador a las instituciones,
          la familia y el orden moral con un énfasis particular en la nación como unidad política y cultural
          primordial. Defiende que el Estado debe orientarse hacia el interés nacional antes que hacia
          compromisos internacionales, organismos supranacionales o valores cosmopolitas.


          Su tesis central es que la patria —con su historia, lengua, cultura y pueblo específicos— no
          es un accidente superable sino el horizonte natural de la acción política. El Estado es legítimo
          en tanto sirva a su pueblo concreto, no a abstracciones universales. Esto lleva al escepticismo
          ante la integración europea, el libre comercio sin restricciones y la inmigración masiva.


          A diferencia del paleoconservadurismo americano, el conservadurismo nacionalista europeo tiene
          raíces más profundas en la tradición romantizante del siglo XIX (Fichte, Herder) y en la democracia
          cristiana que fue derivando hacia posiciones más soberanistas. Difiere del neoconservadurismo
          en que no defiende una misión universalista para su nación, sino la primacía de los intereses
          nacionales concretos.


          En Europa, el Partido Ley y Justicia polaco (PiS), el Fidesz húngaro de Viktor Orbán y los partidos
          de la corriente ''conservadurismo nacional'' (National Conservatism, NatCon) representan esta
          tendencia. En España, el VOX de su etapa más institucional se encuadra en esta corriente. En
          Brasil, sectores del bolsonarismo tienen rasgos de conservadurismo nacionalista.


          Diferencias internas: hay una variante más culturalista (énfasis en idioma, religión y costumbres)
          y una variante más economicista (proteccionismo, industrialismo nacional). Algunos autores distinguen
          el ''conservadurismo nacional'' del ''nacionalismo conservador'' según la jerarquía entre ambos
          términos.'
        historicalContext: 'El conservadurismo nacionalista europeo tiene raíces en el romanticismo político
          del siglo XIX (Mazzini en Italia, los movimientos pangermanistas). En el siglo XX, fue una de
          las corrientes que alimentó el fascismo, aunque hay importantes diferencias: el conservadurismo
          nacionalista no requiere el partido-Estado ni el racismo biológico. En las décadas de 1990 y
          2000, resurgió como reacción a la integración europea y la globalización, con figuras como Jean-Marie
          Le Pen en Francia y Jörg Haider en Austria. El período 2010-2020 vio su consolidación electoral
          en Europa Central y Occidental.'
        contemporaryRelevance: El conservadurismo nacionalista es una de las fuerzas políticas de mayor
          crecimiento en Europa y América en la segunda y tercera décadas del siglo XXI. Los partidos
          Fidesz (Hungría), PiS (Polonia), Fratelli d'Italia, Rassemblement National (Francia), VOX (España)
          y AfD (Alemania) comparten elementos de esta corriente. La conferencia NatCon ('National Conservatism')
          es el principal foro intelectual internacional.
        commonCriticisms: Los liberales señalan que el conservadurismo nacionalista, al priorizar la homogeneidad
          cultural, tiende hacia la exclusión de minorías étnicas, religiosas y lingüísticas. Los europeos
          federalistas argumentan que el soberanismo nacionalista debilita la capacidad de respuesta colectiva
          ante amenazas comunes (clima, defensa, pandemias). Los académicos advierten que la frontera
          entre conservadurismo nacionalista y etnonacionalismo puede ser frágil.
        keyThinkers:
        - Roger Scruton
        - Yoram Hazony
        - Viktor Orbán
        - Patrick Deneen
        - Douglas Murray
        historicalExamples:
        - Gobierno de Fidesz bajo Orbán (Hungría, 2010-presente)
        - Gobierno de Ley y Justicia (PiS) (Polonia, 2015-2023)
        - Gobierno de Fratelli d'Italia y coalición (Italia, 2022-presente)
        - Rassemblement National y el soberanismo francés (Francia, 1972-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_nacional
      - id: traditionalist-conservatism
        name: Conservadurismo tradicionalista
        nameEn: Traditionalist Conservatism
        weight: 2
        description: Énfasis en la preservación de instituciones, costumbres y jerarquías heredadas como
          base del orden social.
        keyThinkers:
        - Edmund Burke
        - Joseph de Maistre
        - Russell Kirk
        - Richard Weaver
        - Roger Scruton
        - T.S. Eliot
        longDescription: 'El conservadurismo tradicionalista es la corriente que pone en el centro la
          preservación de las instituciones históricas, la moral religiosa y el orden social heredado
          como condiciones de una vida política y comunitaria buena. A diferencia de otras variantes conservadoras,
          el tradicionalismo desconfía no solo del cambio radical sino también del liberalismo en sus
          formas modernas, que percibe como disolvente del tejido social.


          Su tesis central es que las tradiciones, las costumbres y las instituciones que han sobrevivido
          siglos contienen una sabiduría práctica que no puede ser reemplazada por la razón abstracta
          ni por los planes de ingeniería social. La familia, la Iglesia, la comunidad local y la herencia
          cultural son las instituciones fundamentales; el Estado debe protegerlas, no reemplazarlas.


          Russell Kirk, en ''The Conservative Mind'' (1953), estableció los seis cánones del conservadurismo:
          creencia en un orden moral trascendente, apreciación de la variedad de la civilización, convicción
          de que la sociedad y la civilización son frágiles, conexión entre propiedad y libertad, fe en
          la prescripción (el derecho basado en la costumbre) y reconocimiento de que el cambio y la reforma
          no son idénticos. Kirk bebía de Burke, de Chesterton y de T.S. Eliot.


          Diferencias con otras corrientes: el conservadurismo tradicionalista rechaza el economicismo
          del conservadurismo liberal (''el mercado lo soluciona todo''), el universalismo del neoconservadurismo,
          y el populismo del conservadurismo de derechas. Es más filosófico y menos electoral que otras
          variantes; prefiere la permanencia a la eficiencia.


          En el mundo hispánico, el carlismo español, el integrismo católico latinoamericano y la corriente
          de pensadores como Julio Meinvielle o Plinio Corrêa de Oliveira representan versiones del conservadurismo
          tradicionalista.'
        historicalContext: El conservadurismo tradicionalista como doctrina articulada surge como reacción
          a la Ilustración y la Revolución Francesa. Burke, De Maistre y De Bonald son sus fundadores.
          En el siglo XIX, el carlismo español y los movimientos ultramontanos católicos lo representaron
          políticamente. En el siglo XX, Russell Kirk y Richard Weaver (en 'Ideas Have Consequences',
          1948) lo reformularon para el contexto anglosajón. En Europa continental, la Acción Francesa
          de Charles Maurras fue su expresión más radical. La tradición vive hoy en institutos de pensamiento
          como el Intercollegiate Studies Institute (ISI) y revistas como 'Modern Age'.
        contemporaryRelevance: El conservadurismo tradicionalista tiene presencia en el debate intelectual
          aunque su traducción electoral directa es limitada. Integrismo católico, tradicionismo anglicano
          y corrientes similares en el judaísmo ortodoxo y el islam conservador comparten su lógica de
          defensa de la herencia frente a la modernidad. En política práctica, influye en la agenda cultural
          de partidos conservadores respecto a la familia, la educación religiosa y la objeción de conciencia.
        commonCriticisms: Los liberales argumentan que el conservadurismo tradicionalista, al invocar
          la tradición como norma, puede servir para preservar injusticias históricas como la desigualdad
          de género o la discriminación religiosa. Los progresistas señalan que idealiza un pasado que
          nunca existió de la forma idílica que describe. Los libertarios critican que su defensa del
          Estado como protector de la moral social legitima intervenciones paternalistas en la vida privada.
        historicalExamples:
        - Carlismo español (España, 1833-siglo XX)
        - Acción Francesa de Maurras (Francia, 1899-1944)
        - Movimiento tradicionalista del Intercollegiate Studies Institute (Estados Unidos, 1953-presente)
        - Integrismo católico latinoamericano (TFP) (Brasil / América Latina, 1960-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_tradicionalista
      - id: neo-conservatism
        name: Neoconservadurismo
        nameEn: Neo-Conservatism
        weight: 2
        description: Corriente estadounidense con política exterior intervencionista, valores tradicionales,
          libre mercado y defensa armada de la democracia liberal.
        longDescription: 'El neoconservadurismo es una corriente política que emergió en Estados Unidos
          en las décadas de 1960-1970, caracterizada por la defensa de la primacía norteamericana en el
          mundo, el intervencionismo militar para promover la democracia liberal, el apoyo al libre mercado
          y el rechazo al pacifismo y el relativismo cultural de la izquierda.


          Su tesis central es que Estados Unidos tiene no solo el interés sino la obligación de ejercer
          liderazgo global activo: apoyar regímenes democráticos, contener o derrocar regímenes hostiles
          y mantener una superioridad militar indiscutible. El mundo es más seguro cuando Estados Unidos
          es más poderoso y activo.


          Muchos de sus fundadores provenían de la izquierda anticomunista o el troskismo: Irving Kristol
          (considerado el ''padre del neoconservadurismo''), Norman Podhoretz, Jeane Kirkpatrick. Esta
          procedencia explica su distancia del conservadurismo aislacionista y su aceptación del Estado
          de bienestar básico, a diferencia del conservadurismo libertario. Irving Kristol definió al
          neoconservador como ''un liberal que ha sido asaltado por la realidad''.


          El neoconservadurismo alcanzó su máxima influencia en la administración de George W. Bush (2001-2009):
          Paul Wolfowitz, Richard Perle, Douglas Feith y Dick Cheney diseñaron la doctrina de la guerra
          preventiva (''Doctrina Bush'') que llevó a las invasiones de Afganistán (2001) e Irak (2003).
          El Proyecto para el Nuevo Siglo Americano (PNAC) fue su think tank más influyente.


          Difiere del conservadurismo paleo en que abraza el internacionalismo. Difiere del conservadurismo
          tradicional en que no pone la familia y la comunidad local en el centro. Difiere del liberalismo
          clásico en que acepta un Estado activo en política exterior y acepta con pragmatismo el Estado
          de bienestar.'
        historicalContext: Los primeros neoconservadores fueron intelectuales neoyorquinos de izquierda
          anticomunista de los años 1960 (Commentary, The Public Interest). En los años 1970, apoyaron
          a Reagan y la dureza ante la URSS. En los años 1990, impulsaron la intervención en Bosnia y
          Kosovo y criticaron la 'moderación' de Bush padre en la Guerra del Golfo. Tras el 11-S, dominaron
          la política exterior de Bush hijo. Las guerras de Afganistán e Irak y sus consecuencias erosionaron
          profundamente su credibilidad, y Trump los marginó de la coalición conservadora al adoptar el
          paleoconservadurismo 'America First'.
        contemporaryRelevance: El neoconservadurismo ha perdido la influencia que tuvo en la era Bush,
          pero continúa presente en think tanks como el American Enterprise Institute, el Hudson Institute
          y el Council on Foreign Relations. Figuras como Bill Kristol, Max Boot o Jennifer Rubin se opusieron
          a Trump y apoyaron a candidatos demócratas, mostrando la fractura del conservadurismo americano.
          El apoyo bipartidista a Ucrania (2022) revivió argumentos neoconservadores sobre responsabilidad
          intervencionista.
        commonCriticisms: Los paleoconservadores y libertarios argumentan que el intervencionismo neoconservador
          ha generado guerras interminables, gasto desorbitado y antiamericanismo global sin resultados
          de democratización estables. Los realistas de política exterior (Mearsheimer, Walt) critican
          que el neoconservadurismo ignora los intereses nacionales concretos en favor de abstracciones
          ideológicas. La izquierda señala el doble rasero entre los regímenes apoyados y los combatidos,
          independientemente de su naturaleza democrática real.
        keyThinkers:
        - Irving Kristol
        - Norman Podhoretz
        - Jeane Kirkpatrick
        - Paul Wolfowitz
        - William Kristol
        - Robert Kagan
        historicalExamples:
        - Política exterior de Reagan (anticomunismo activo) (Estados Unidos, 1981-1989)
        - Intervención en Bosnia y Kosovo (Balcanes / Estados Unidos, 1995-1999)
        - Invasión de Irak y doctrina Bush (Irak / Estados Unidos, 2003-2011)
        - Proyecto para el Nuevo Siglo Americano (PNAC) (Estados Unidos, 1997-2006)
        wikipediaUrl: https://es.wikipedia.org/wiki/Neoconservadurismo
      - id: eco-conservatism
        name: Eco-conservación
        nameEn: Eco-Conservatism
        weight: 1
        description: Conservadurismo que integra preocupación ambiental desde una perspectiva tradicionalista
          y local.
        longDescription: 'El ecoconservadurismo es la corriente que busca integrar la preocupación por
          el medio ambiente y la naturaleza dentro del marco del conservadurismo político, rechazando
          tanto el ambientalismo de izquierda (que lo articula con la crítica al capitalismo) como la
          negación conservadora del deterioro ambiental. Sostiene que conservar la naturaleza es una obligación
          conservadora natural: lo que se conserva también incluye el paisaje, el suelo y el aire que
          las generaciones futuras heredarán.


          Su tesis central es que existe una afinidad profunda entre el apego conservador a la herencia,
          la tradición y la continuidad intergeneracional, y el cuidado del entorno natural. El conservadurismo
          siempre ha valorado el campo, el paisaje y los modos de vida rurales; extender ese apego a la
          ecología es una consecuencia lógica. Quienes destruyen el medio ambiente en nombre del crecimiento
          inmediato actúan de manera profundamente anticonservadora.


          Roger Scruton fue el pensador más influyente en articular el ecoconservadurismo moderno, especialmente
          en ''Green Philosophy'' (2012). Argumentó que la solución a los problemas ambientales no es
          el Estado regulador global sino el amor local (oikophilia) y la responsabilidad comunitaria:
          las personas cuidan lo que conocen y aman, no las abstracciones de los tratados internacionales.
          Edmund Burke ya valoraba la responsabilidad hacia los que aún no han nacido.


          Variantes incluyen el ambientalismo conservador pragmático (que acepta regulaciones de mercado
          como impuestos al carbono) y el conservacionismo de corte romántico (defensa de paisajes y biodiversidad
          sin agenda redistributiva). El Partido Republicano tuvo una tradición conservacionista (Nixon
          creó la EPA en 1970) antes de la polarización del cambio climático.


          Difiere del ecologismo de izquierda en que no cuestiona la propiedad privada ni el mercado como
          tales, sino que busca corregirlos con mecanismos de responsabilidad e incentivos.'
        historicalContext: 'La tradición conservacionista en el mundo anglosajón es anterior al ambientalismo
          moderno: el movimiento de parques nacionales de Estados Unidos fue promovido por el presidente
          republicano Theodore Roosevelt. En Europa, la defensa del paisaje rural fue una causa conservadora
          y nacionalista del siglo XIX. El Partido Verde alemán surgió de la izquierda, pero los ''greens''
          rurales ingleses y los movimientos campesinos europeos tienen raíces conservadoras. Roger Scruton
          fundó CPRE (Campaign to Protect Rural England) y escribió sus obras ecoconservadoras en los
          años 2000-2012.'
        contemporaryRelevance: 'El ecoconservadurismo gana relevancia ante la crisis climática: partidos
          conservadores europeos (CDU alemana, Tories británicos, PP español) han adoptado retórica climática
          aunque difieren en intensidad. En Estados Unidos, figuras como Bob Inglis promueven un conservadurismo
          climáticamente comprometido. La tensión entre el ala ecoconservadora y el ala negacionista es
          uno de los debates internos más intensos de la derecha occidental contemporánea.'
        commonCriticisms: El ambientalismo de izquierda critica que el ecoconservadurismo, al rechazar
          el intervencionismo estatal, no puede producir los cambios sistémicos necesarios para frenar
          el cambio climático a la escala y velocidad requerida. Los conservadores más tradicionales o
          libertarios lo perciben como una infiltración del agendismo climático en el movimiento. Los
          ecologistas radicales señalan que el ecoconservadurismo preserva el modo de producción que genera
          el problema.
        keyThinkers:
        - Roger Scruton
        - Theodore Roosevelt
        - Russell Kirk
        - Bob Inglis
        - Peter Kareiva
        historicalExamples:
        - Creación del Sistema de Parques Nacionales (Estados Unidos, 1906-1916)
        - Creación de la EPA bajo Nixon (Estados Unidos, 1970)
        - Conservacionismo rural inglés (CPRE) (Reino Unido, 1926-presente)
        - Políticas climáticas de la CDU / Angela Merkel (Alemania, 2005-2021)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_verde
      - id: liberal-conservatism
        name: Conservadurismo liberal
        nameEn: Liberal Conservatism
        weight: 2
        description: Síntesis entre liberalismo económico y conservadurismo social moderado. Mercados
          libres dentro de un marco institucional tradicional.
        longDescription: 'El conservadurismo liberal es la corriente que combina el apego conservador
          a las instituciones, el orden y la gradualidad del cambio con los principios fundamentales del
          liberalismo clásico: libertad individual, economía de mercado, Estado de derecho y derechos
          civiles. No es conservadurismo que tolera el liberalismo como concesión, sino una síntesis donde
          ambas tradiciones se refuerzan mutuamente.


          Su tesis central es que la libertad individual y el mercado no son abstracciones revolucionarias,
          sino instituciones históricamente desarrolladas que merecen ser conservadas y protegidas contra
          las amenazas tanto del autoritarismo estatal como de los populismos de cualquier signo. El Estado
          de derecho, la propiedad privada y las libertades civiles son logros históricos del civilización
          occidental que el conservadurismo tiene la misión de preservar.


          La figura más influyente es Friedrich Hayek, quien en ''Los fundamentos de la libertad'' (1960)
          se definía como ''Whig'' —liberal clásico— y no como conservador, pero cuyo pensamiento alimentó
          a generaciones de conservadores liberales. Margaret Thatcher en el Reino Unido y Ronald Reagan
          en Estados Unidos son las figuras políticas más identificadas con esta corriente: desregulan
          el mercado, reducen el Estado de bienestar pero mantienen el orden institucional y la estructura
          de derechos civiles.


          Difiere del conservadurismo tradicional en que el mercado ocupa un lugar central, no la tradición
          orgánica. Difiere del paleoconservadurismo en que es internacionalista y pro-libre comercio.
          Difiere del neoconservadurismo en que es más reticente al intervencionismo militar y más coherente
          con el Estado pequeño. Difiere del libertarismo en que acepta instituciones como el ejército,
          la policía y cierto Estado de bienestar mínimo.


          En América Latina, el Partido Renovación Nacional chileno (en sus gobiernos de Piñera), la derecha
          colombiana tecnocrática y sectores del PAN mexicano se encuadran en esta tradición.'
        historicalContext: El conservadurismo liberal tiene raíces en el liberalismo whig inglés del siglo
          XIX (Gladstone, Macaulay) que evolucionó hacia el Partido Conservador. En el siglo XX, la Mont
          Pèlerin Society (1947, fundada por Hayek) fue el laboratorio intelectual. Thatcher (1979-1990)
          y Reagan (1981-1989) lo pusieron en práctica con resultados muy debatidos. En España, el Partido
          Popular de Aznar (1996-2004) representó esta variante. En América Latina, los gobiernos de Sebastián
          Piñera en Chile (2010-2014, 2018-2022) son su expresión más clara.
        contemporaryRelevance: El conservadurismo liberal sigue siendo la corriente dominante en muchos
          partidos conservadores europeos (CDU alemana, PP español, Les Républicains franceses) y latinoamericanos,
          aunque enfrenta presión interna del populismo de derechas y externa del avance del conservadurismo
          nacionalista. El debate sobre si el liberalismo económico puede mantenerse sin cosmopolitismo
          cultural es la tensión central del conservadurismo liberal contemporáneo.
        commonCriticisms: Desde la izquierda, se critica que el conservadurismo liberal privilegia la
          libertad económica sobre la igualdad y los derechos sociales, produciendo desigualdad creciente.
          Los paleoconservadores y los conservadores nacionales critican que el libre comercio y la globalización
          neoliberal destruyen comunidades y empleos tradicionales. Los libertarios puros señalan que
          el conservadurismo liberal no va lo suficientemente lejos en la reducción del Estado.
        keyThinkers:
        - Friedrich Hayek
        - Milton Friedman
        - Margaret Thatcher
        - Ronald Reagan
        - Karl Popper
        historicalExamples:
        - Gobierno de Thatcher y el thatcherismo (Reino Unido, 1979-1990)
        - Gobierno de Reagan y el reaganomics (Estados Unidos, 1981-1989)
        - Gobierno del PP de Aznar (España, 1996-2004)
        - Gobiernos de Piñera (Chile, 2010-2014 / 2018-2022)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_liberal
      - id: zionism
        name: Sionismo
        nameEn: Zionism
        weight: 2
        description: Movimiento nacionalista judío que defiende la existencia del Estado de Israel como
          patria del pueblo judío.
        longDescription: 'El sionismo es el movimiento político de autodeterminación del pueblo judío
          que defiende el establecimiento y la continuidad de un Estado judío soberano en la tierra histórica
          de Israel. Surgido en el siglo XIX como respuesta al antisemitismo europeo y a la persecución
          secular de las comunidades judías de la diáspora, el sionismo argumenta que los judíos, como
          pueblo, tienen el mismo derecho a la soberanía nacional que cualquier otra nación.


          Théodore Herzl, periodista austrohúngaro, sistematizó la doctrina en ''Der Judenstaat'' (El
          Estado judío, 1896) y convocó el Primer Congreso Sionista en Basilea (1897). Herzl era laico
          y concibió el sionismo como solución política moderna al problema del antisemitismo; sostenía
          que los judíos nunca serían plenamente aceptados en las naciones europeas y que solo la soberanía
          les garantizaría seguridad.


          Variantes internas: el sionismo laborista (David Ben-Gurion, el kibutz como modelo social, el
          sionismo de izquierda que fundó el Estado en 1948 y gobernó Israel hasta 1977) enfatizaba la
          construcción colectiva y socialista. El sionismo revisionista (Ze''ev Jabotinsky) defendía el
          derecho a todo el territorio histórico y el uso de la fuerza si era necesario; de él derivaron
          el Partido Herut, el Likud y la derecha israelí moderna. El sionismo religioso (mizrahi, Kuk)
          concibe el retorno a Sión como cumplimiento profético; sus herederos son el movimiento de colonos
          actuales. El sionismo cultural (Ahad Ha''am) proponía Israel como centro espiritual del pueblo
          judío, no necesariamente como solución política universal.


          El sionismo llevó a la Declaración Balfour (1917), el mandato británico sobre Palestina y la
          proclamación del Estado de Israel el 14 de mayo de 1948. La guerra árabe-israelí de 1948 y el
          desplazamiento de la población árabe palestina (la Nakba) son los eventos fundacionales más
          disputados historiográficamente.'
        historicalContext: El Primer Congreso Sionista (Basilea, 1897) marcó el inicio del sionismo como
          movimiento organizado. La Declaración Balfour (1917) comprometió al gobierno británico con un
          'hogar nacional judío' en Palestina. La inmigración judía creció durante el período de entreguerras,
          acelerada por el nazismo. La Shoá (1939-1945) dio urgencia política al proyecto estatal. El
          14 de mayo de 1948 se proclamó el Estado de Israel; al día siguiente estalló la primera guerra
          árabe-israelí. Desde 1948, Israel ha mantenido conflictos con sus vecinos y disputas no resueltas
          sobre los territorios ocupados tras 1967.
        contemporaryRelevance: El sionismo es una de las ideologías más debatidas de la política internacional.
          El conflicto israelí-palestino, especialmente tras la ofensiva de Hamas del 7 de octubre de
          2023 y la respuesta militar israelí en Gaza, ha intensificado el debate global sobre el sionismo,
          el derecho de Israel a la autodefensa, los derechos del pueblo palestino y la ocupación de Cisjordania.
          Dentro de Israel, la tensión entre el sionismo secular, el nacional-religioso y el ultraortodoxo
          es el principal eje de conflicto político interno.
        commonCriticisms: Los críticos palestinos y árabes sostienen que el sionismo implicó la expulsión
          y desposesión de la población árabe que habitaba Palestina, la Nakba de 1948. Académicos como
          Ilan Pappé argumentan que el sionismo ejecutó una limpieza étnica sistemática. Desde el campo
          de los derechos humanos, organizaciones como Amnesty International y Human Rights Watch han
          calificado las políticas israelíes en los territorios ocupados de apartheid. El sionismo religioso
          y la política de asentamientos en Cisjordania son criticados incluso por sectores del propio
          movimiento sionista secular. La Resolución 3379 de la ONU (1975, luego revocada) equiparó el
          sionismo con el racismo, resolución que Israel y sus aliados rechazaron categóricamente.
        keyThinkers:
        - Theodor Herzl
        - Ze'ev Jabotinsky
        - David Ben-Gurion
        - Ahad Ha'am
        - Chaim Weizmann
        - Golda Meir
        historicalExamples:
        - Primer Congreso Sionista en Basilea (Suiza, 1897)
        - Declaración Balfour y mandato británico (Reino Unido / Palestina, 1917-1948)
        - Proclamación del Estado de Israel (Israel, 1948)
        - Guerra de los Seis Días y ocupación de Cisjordania y Gaza (Israel, 1967)
        wikipediaUrl: https://es.wikipedia.org/wiki/Sionismo
      - id: kuomintangism
        name: Kuomintangismo
        nameEn: Kuomintangism
        weight: 1
        description: 'Ideología del Partido Nacionalista Chino (KMT) de Sun Yat-sen: nacionalismo, democracia
          y bienestar del pueblo.'
        keyThinkers:
        - Sun Yat-sen
        - Chiang Kai-shek
        - Chiang Ching-kuo
        - Hu Han-min
        - Wang Jingwei
        longDescription: 'El kuomintangismo designa la ideología del Partido Nacionalista Chino (Guomindang
          o KMT), fundada sobre los Tres Principios del Pueblo formulados por Sun Yat-sen: nacionalismo
          (minzu), democracia (minquan) y bienestar del pueblo (minsheng). Es una síntesis original que
          combina el nacionalismo antiimperialista, el republicanismo y el desarrollismo económico con
          raíces en la tradición confuciana.


          Sun Yat-sen (1866-1925) diseñó los Tres Principios como respuesta a la crisis del Imperio Qing
          y a la penetración imperialista occidental y japonesa en China. El nacionalismo significaba
          la recuperación de la soberanía china y la unificación del país. La democracia se concebía como
          un proceso gradual de tutela política —el Estado guiaría al pueblo hacia la democracia plena
          en tres etapas— y no como sufragio universal inmediato. El bienestar del pueblo implicaba una
          economía mixta que evitara tanto el capitalismo concentrado como el socialismo estatal.


          Bajo Chiang Kai-shek (1925-1975), el KMT derivó hacia un autoritarismo anticomunista más acentuado.
          Tras la derrota en la guerra civil china (1949) y el repliegue a Taiwán, el gobierno del KMT
          gobernó la isla bajo ley marcial hasta 1987. Durante ese período, impulsó una reforma agraria
          exitosa, una industrialización acelerada y el ''milagro económico taiwanés'', pasando de un
          régimen autoritario desarrollista a una democracia plena a partir de 1996.


          El kuomintangismo combina elementos de la derecha (anticomunismo, mercado, jerarquía confuciana)
          con elementos del desarrollismo estatal y el nacionalismo cultural chino. Su posición en el
          espectro político ha evolucionado: hoy el KMT en Taiwán es considerado un partido conservador
          de centro-derecha que aboga por el acercamiento pragmático con la China continental.'
        historicalContext: El KMT fue fundado en 1912, tras la Revolución de Xinhai que derrocó a la dinastía
          Qing. Sun Yat-sen lideró la reorganización del partido con apoyo soviético en 1923. Tras la
          muerte de Sun (1925), Chiang Kai-shek tomó el control y rompió con los comunistas en 1927 (Masacre
          de Shangái). La guerra civil (1927-1949) enfrentó al KMT con el Partido Comunista de Mao Zedong.
          Derrotado, el KMT se retiró a Taiwán. La ley marcial rigió Taiwán de 1949 a 1987. La transición
          democrática produjo las primeras elecciones presidenciales directas en 1996. El KMT perdió el
          poder ante el Partido Democrático Progresista de Chen Shui-bian.
        contemporaryRelevance: 'El KMT sigue siendo uno de los dos grandes partidos de Taiwán y continúa
          en actividad. Defiende una posición más pragmática hacia la República Popular China (acuerdos
          económicos, diálogo) frente al Partido Democrático Progresista (identidad taiwanesa diferenciada,
          mayor distancia de Pekín). La tensión entre el KMT y el PDP estructura el principal eje de debate
          político taiwanés: identidad nacional, relación con China continental y política de seguridad.'
        commonCriticisms: Los historiadores señalan que el régimen del KMT en Taiwán fue responsable del
          Incidente del 28 de febrero de 1947, en el que tropas del KMT masacraron entre 18.000 y 30.000
          civiles taiwaneses nativos. Los críticos progresistas señalan que la ley marcial (1949-1987)
          suprimió la oposición política, la libertad de prensa y las libertades civiles durante casi
          cuatro décadas. Desde la perspectiva taiwanesa independentista, el KMT representa una imposición
          de la identidad china continental sobre una identidad taiwanesa diferenciada.
        historicalExamples:
        - República de China y primer gobierno del KMT (China, 1912-1949)
        - Gobierno del KMT en Taiwán bajo ley marcial (Taiwán, 1949-1987)
        - Milagro económico taiwanés (Taiwán, 1960-1990)
        - Transición democrática y elecciones presidenciales directas (Taiwán, 1987-1996)
        wikipediaUrl: https://es.wikipedia.org/wiki/Partido_Nacionalista_Chino
    - name: democracia-cristiana-y-populismo
      weight: 3
      children:
      - id: christian-democracy
        name: Democracia Cristiana
        nameEn: Christian Democracy
        weight: 3
        description: Corriente política inspirada en la doctrina social de la Iglesia Católica y el cristianismo
          social. Combina valores tradicionales con programa social moderado y economía de mercado regulada.
          En Colombia tiene expresión en el Movimiento Independiente de Renovación Absoluta (MIRA), sectores
          evangélicos como Colombia Justa Libres, y raíces históricas en el Partido Social Conservador.
          Ideología clave del espectro auth_right moderado.
        keyThinkers:
        - Luigi Sturzo
        - Jacques Maritain
        - Konrad Adenauer
        - Alcide De Gasperi
        - Eduardo Frei Montalva
        - Roberto Papini
        longDescription: 'La democracia cristiana es una corriente política que busca traducir los principios
          de la doctrina social de la Iglesia católica —y en menor medida de otras tradiciones cristianas—
          al ámbito de la política democrática moderna. Sus pilares son la dignidad humana, la subsidiaridad
          (las decisiones deben tomarse al nivel más bajo posible de la organización social), la solidaridad
          y el bien común como criterio de la política pública.


          Su tesis central es que ni el capitalismo liberal puro ni el socialismo colectivista garantizan
          una sociedad justa: se necesita una ''tercera vía'' que regule el mercado en favor del bien
          común, proteja la familia como institución fundamental, garantice derechos sociales y preserve
          la autonomía de los cuerpos intermedios (familia, Iglesia, sindicatos, comunidades locales)
          frente al Estado omnipotente.


          La doctrina social de la Iglesia, desde la Rerum Novarum de León XIII (1891) hasta el Compendio
          de la Doctrina Social (2004), es el fundamento intelectual. Luigi Sturzo fundó el Partido Popular
          Italiano en 1919. Tras 1945, los partidos democristianos dominaron Italia (DC), Alemania (CDU/CSU),
          Bélgica (CVP), Austria (ÖVP) y los Países Bajos (KVP), siendo la principal fuerza política de
          la reconstrucción europea occidental.


          En América Latina, la democracia cristiana tuvo notable presencia: en Chile, el PDC de Eduardo
          Frei Montalva (presidente 1964-1970) impulsó la ''revolución en libertad''. En Venezuela, COPEI
          fue uno de los dos partidos del bipartidismo (1958-1998). En Colombia, el Movimiento MIRA y
          Colombia Justa Libres se identifican con principios democristianos. En El Salvador y Guatemala
          tuvieron presencia significativa.


          Variantes internas: la democracia cristiana progresista (más cercana a la socialdemocracia,
          como el PDC chileno bajo Frei) y la democracia cristiana conservadora (más próxima al conservadurismo
          liberal, como la CDU alemana bajo Adenauer o Merkel). Muchos partidos democristianos europeos
          han derivado hacia el conservadurismo liberal, perdiendo su especificidad doctrinal original.'
        historicalContext: El Partido Popular Italiano de Sturzo (1919) y los movimientos democristianos
          de entreguerras fueron suprimidos por el fascismo. La reconstrucción de posguerra les dio protagonismo
          central en Italia, Alemania, Francia (MRP), Bélgica y los Países Bajos. Konrad Adenauer (Alemania,
          1949-1963) y Alcide De Gasperi (Italia, 1945-1953) son sus figuras más influyentes. La Internacional
          Demócrata de Centro (IDC) agrupa a los partidos democristianos. En los años 1990-2000, los grandes
          partidos democristianos europeos perdieron su especificidad al secularizarse sus electorados.
        contemporaryRelevance: La CDU/CSU alemana sigue siendo uno de los partidos más poderosos de Europa.
          El Partido Popular Europeo (PPE) agrupa a la mayoría de partidos democristianos y conservadores
          europeos. En América Latina, la democracia cristiana mantiene presencia institucional en Chile,
          Colombia (MIRA, Colombia Justa Libres) y Centro América. El debate sobre la posición de los
          partidos democristianos ante el matrimonio igualitario, la bioética y la secularización marca
          la evolución contemporánea de la corriente.
        commonCriticisms: Los laicos y los liberales critican que la democracia cristiana privilegia la
          moral religiosa en el espacio público, vulnerando la separación entre Iglesia y Estado en cuestiones
          de bioética, educación sexual y derechos LGBTQ+. Los socialistas señalan que, pese a su retórica
          de tercera vía, los partidos democristianos en el gobierno han favorecido los intereses del
          capital frente al trabajo. Los sectores más conservadores de la Iglesia acusan a algunos partidos
          democristianos de haber cedido demasiado terreno al relativismo moral.
        historicalExamples:
        - Partido Popular Italiano de Sturzo (Italia, 1919-1926)
        - CDU/CSU en la reconstrucción alemana (Adenauer) (Alemania, 1949-1963)
        - PDC y la Revolución en Libertad (Frei Montalva) (Chile, 1964-1970)
        - COPEI y el bipartidismo venezolano (Venezuela, 1946-1998)
        - MIRA y Colombia Justa Libres (Colombia, 2000-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Democracia_cristiana
      - id: right-populism
        name: Populismo de Derecha
        nameEn: Right-wing Populism
        weight: 3
        description: Movilización política que combina nacionalismo, oposición a la "élite establecida"
          y apelación directa al pueblo, con programa económico liberal o mixto y autoritarismo social.
          En Colombia tiene expresión en la Liga de Gobernantes Anticorrupción (Rodolfo Hernández) y en
          sectores del uribismo de base. Diferente del nationalist-conservatism por su anti-establecimiento
          personalista.
        keyThinkers:
        - Cas Mudde
        - Jan-Werner Müller
        - Pippa Norris
        - Donald Trump
        - Viktor Orbán
        - Javier Milei
        historicalExamples:
        - Presidencia de Donald Trump (Estados Unidos, 2017-2021 / 2025-presente)
        - Presidencia de Jair Bolsonaro (Brasil, 2019-2022)
        - Gobierno de Javier Milei (Argentina, 2023-presente)
        - Rassemblement National y el soberanismo francés (Francia, 1972-presente)
        - Presidencia de Nayib Bukele (El Salvador, 2019-presente)
        longDescription: 'El populismo de derecha es una corriente política que combina la apelación al
          ''pueblo'' o la ''gente común'' frente a una ''élite corrupta'' con posiciones conservadoras
          en materia de inmigración, identidad nacional, orden público y valores culturales. A diferencia
          del populismo de izquierda, que identifica al enemigo en la élite económica o el capital, el
          populismo de derecha suele señalar a las élites culturales, los medios de comunicación, la burocracia
          supranacional y la inmigración como las amenazas al pueblo.


          Su tesis central es que el pueblo —definido en términos étnicos, culturales o nacionales— ha
          sido traicionado por élites cosmopolitas desconectadas de sus valores e intereses: jueces activistas,
          académicos globalizados, organismos internacionales, medios de comunicación de izquierda y partidos
          establecidos que han abierto las fronteras y cedido soberanía a instancias sin legitimidad democrática.
          El líder populista de derecha se presenta como la voz auténtica del pueblo frente a este sistema.


          Los rasgos comunes identificados por académicos como Cas Mudde, Jan-Werner Müller y Pippa Norris
          son: construcción de un pueblo homogéneo (excluyendo a grupos que no pertenecerían a él), antielitismo,
          antiinstitucionalismo, liderazgo carismático personal, retórica de crisis y amenaza, y hostilidad
          a la prensa independiente. No es una ideología coherente, sino una lógica política (''thin ideology'')
          que se combina con contenidos ideológicos variables.


          Figuras contemporáneas: Donald Trump (Estados Unidos, 2016-2020, 2024), Jair Bolsonaro (Brasil,
          2019-2022), Nayib Bukele (El Salvador, 2019-presente), Javier Milei (Argentina, 2023-presente),
          Marine Le Pen y el Rassemblement National (Francia), Viktor Orbán (Hungría), Giorgia Meloni
          (Italia), Santiago Abascal/VOX (España). Sus estilos y posiciones económicas varían: Milei es
          libertario, Orbán es estatista, Trump es proteccionista, Bolsonaro era más liberal económicamente.


          Se ubica en el cuadrante autoritario-derecha por la centralización del poder en el líder, el
          debilitamiento de instituciones de control (jueces, prensa, parlamento) y los contenidos conservadores
          en materia cultural y de inmigración.'
        historicalContext: El populismo de derecha tiene antecedentes en el poujadismo francés (1950s),
          el peronismo de derecha y el boulangismo del siglo XIX. En el siglo XX, el macartismo en Estados
          Unidos y los neofascismos de posguerra tuvieron rasgos populistas. La ola contemporánea comenzó
          en Europa con el Front National de Jean-Marie Le Pen (fundado 1972) y el Partido de la Libertad
          de Haider en Austria (1986). Se intensificó globalmente con la crisis financiera de 2008, la
          crisis migratoria europea de 2015 y el Brexit (2016). La elección de Trump en 2016 marcó el
          punto de inflexión global.
        contemporaryRelevance: El populismo de derecha es la fuerza política de mayor crecimiento en las
          democracias occidentales de la segunda y tercera décadas del siglo XXI. Gobierna o colidera
          gobiernos en Estados Unidos, Italia, Hungría, Argentina y El Salvador. En América Latina, se
          expresa en el bolsonarismo, el mileísmo y el bukelerismo. Los debates sobre su compatibilidad
          con la democracia liberal son el epicentro de la ciencia política contemporánea.
        commonCriticisms: 'Los académicos de la democracia liberal (Jan-Werner Müller, Steven Levitsky,
          Daniel Ziblatt) argumentan que el populismo de derecha en el poder erosiona sistemáticamente
          los contrapesos institucionales: prensa libre, poder judicial independiente, organismos electorales.
          Desde la izquierda, se critica que el populismo de derecha desvía la atención de las causas
          estructurales de la desigualdad (el capital) hacia chivos expiatorios culturales (inmigrantes,
          minorías). Los conservadores institucionalistas temen que el estilo antiinstitucional populista
          destruya el conservadurismo como tradición de respeto a las normas.'
        wikipediaUrl: https://es.wikipedia.org/wiki/Populismo_de_derecha
  lib_left:
    color: '#16a34a'
    families:
    - name: socialismo-democratico
      weight: 4
      children:
      - id: democratic-socialism
        name: Socialismo democrático
        nameEn: Democratic Socialism
        weight: 3
        description: Combinación de democracia liberal con propiedad social de los medios estratégicos
          y fuerte redistribución.
        keyThinkers:
        - Eduard Bernstein
        - R. H. Tawney
        - G. D. H. Cole
        - Michael Harrington
        - Salvador Allende
        - Bernie Sanders
        longDescription: 'El socialismo democrático propone transformar la estructura de propiedad de
          la economía mediante procesos electorales y parlamentarios, sin recurrir a la revolución violenta.
          A diferencia de la socialdemocracia, no acepta el capitalismo como marco permanente: su horizonte
          es la socialización progresiva de los medios de producción, ya sea mediante empresas públicas,
          cooperativas o formas mixtas de propiedad colectiva.


          Surgió como corriente diferenciada a fines del siglo XIX, cuando la Segunda Internacional debatía
          si el marxismo era compatible con la participación electoral. Eduard Bernstein formuló la revisión
          reformista del marxismo, argumentando que el socialismo podía alcanzarse por etapas sin ruptura
          revolucionaria. Mientras tanto, en Gran Bretaña, la Sociedad Fabiana impulsó una vía gradual
          y tecnocrática hacia el mismo fin.


          Pensadores como R. H. Tawney, G. D. H. Cole y más tarde Michael Harrington desarrollaron marcos
          teóricos que combinaban la crítica marxista a la explotación capitalista con el compromiso democrático
          liberal. En América Latina, figuras como Salvador Allende encarnaron esta síntesis al impulsar
          nacionalizaciones y reformas estructurales dentro del Estado constitucional chileno.


          El socialismo democrático se distingue de la socialdemocracia en que rechaza la idea de que
          el Estado de bienestar sea el techo de las reformas posibles. Mientras los socialdemócratas
          modernos aceptan la economía de mercado y solo proponen regularla, los socialistas democráticos
          insisten en que la propiedad privada de los grandes medios de producción es la fuente del problema,
          no solo un factor a moderar.


          En el siglo XXI, la corriente ha ganado visibilidad con figuras como Bernie Sanders en Estados
          Unidos y el ala izquierda del Partido Laborista británico bajo Jeremy Corbyn. Su agenda incluye
          empresas públicas en sectores estratégicos, financiación estatal de servicios universales y
          democratización del lugar de trabajo.'
        historicalContext: La corriente tomó forma en el debate revisionista de la Segunda Internacional
          (1889-1914). El Partido Laborista británico y los partidos socialistas escandinavos la practicaron
          en el período de entreguerras. Salvador Allende (Chile, 1970-1973) fue su expresión latinoamericana
          más emblemática antes del golpe de 1973. Durante la Guerra Fría fue marginada entre el reformismo
          socialdemócrata occidental y el leninismo soviético, pero resurgió con fuerza desde los años
          2010 en Europa y América del Norte.
        contemporaryRelevance: El socialismo democrático ganó proyección global con Bernie Sanders, Alexandria
          Ocasio-Cortez y el auge de Democratic Socialists of America (DSA) desde 2016. En el Reino Unido,
          el corbynismo revivió el debate sobre nacionalizaciones. En América Latina influye en movimientos
          como el Frente Amplio uruguayo. El debate sobre la propiedad de plataformas digitales y la transición
          energética verde ha renovado su agenda.
        commonCriticisms: Los críticos liberales sostienen que la socialización de medios de producción
          reduce los incentivos para la innovación y la eficiencia. Desde la izquierda revolucionaria
          se argumenta que intentar transformar el capitalismo desde el Estado burgués está condenado
          al fracaso, como demostraría el caso Allende. Los socialdemócratas señalan que el énfasis en
          la propiedad diluye la agenda redistributiva concreta en favor de debates ideológicos abstractos.
        historicalExamples:
        - Gobierno de la Unidad Popular (Chile, 1970-1973)
        - Partido Laborista bajo Jeremy Corbyn (Reino Unido, 2015-2019)
        - Sociedad Fabiana y laborismo temprano (Reino Unido, 1884-1945)
        - Democratic Socialists of America — resurgimiento (EE.UU., 2016-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Socialismo_democr%C3%A1tico
      - id: social-democracy
        name: Socialdemocracia
        nameEn: Social Democracy
        weight: 3
        description: Capitalismo regulado con fuerte Estado de bienestar, derechos laborales robustos
          y universalización de servicios públicos.
        historicalExamples:
        - Estado de bienestar sueco — modelo SAP (Suecia, 1932-1990s)
        - SPD y economía social de mercado (Alemania, 1969-1982)
        - Partido Laborista y NHS (Reino Unido, 1945-1951)
        - Frente Amplio — coalición socialdemócrata (Uruguay, 2005-2020)
        longDescription: 'La socialdemocracia es una corriente política que acepta la economía de mercado
          capitalista como marco general, pero propone regularla fuertemente y redistribuir sus frutos
          mediante un Estado de bienestar robusto. A diferencia del socialismo democrático, no tiene como
          objetivo la transformación de la propiedad: su meta es humanizar el capitalismo, no superarlo.


          Surgió de la escisión entre el ala reformista y el ala revolucionaria de los partidos socialistas
          europeos a principios del siglo XX. Tras la Segunda Guerra Mundial, los partidos socialdemócratas
          del norte y centro de Europa (SPD alemán, SAP sueca, Partido Laborista británico) construyeron
          el Estado de bienestar moderno: salud universal, pensiones públicas, educación gratuita, sindicatos
          fuertes y pleno empleo como objetivo macroeconómico.


          El modelo socialdemócrata clásico alcanzó su cenit en las décadas de 1950-1970. Gosta Esping-Andersen
          lo sistematizó en su tipología de regímenes de bienestar, distinguiendo el modelo escandinavo
          (universalista) del continental y el liberal anglosajón. El consenso de posguerra combinó keynesianismo,
          negociación corporativa y expansión del gasto social.


          La crisis del petróleo de 1973 y el ascenso del neoliberalismo erosionaron ese consenso. En
          los años 1990, muchos partidos socialdemócratas adoptaron la ''Tercera Vía'' (Blair, Schröder),
          aceptando la desregulación financiera y la disciplina fiscal restrictiva. Este giro generó críticas
          internas por considerar que se abandonaban los principios fundacionales.


          Hoy la socialdemocracia enfrenta el reto de articular respuestas al cambio climático, la digitalización
          y el auge del populismo sin perder su base electoral tradicional de trabajadores industriales
          y clases medias profesionales.'
        historicalContext: La socialdemocracia tomó forma como corriente específica con la revisión bernsteiniana
          del marxismo y el programa de Gotha (1875) del SPD alemán. Su era dorada fue el período 1945-1973,
          cuando los partidos socialdemócratas nórdicos y centroeuropeos construyeron los estados de bienestar
          más avanzados del mundo. La crisis del petróleo y el thatcherismo-reaganismo forzaron una reconversión
          neoliberal parcial en los años 1980-1990. Desde los años 2010 experimenta presiones electorales
          desde la derecha populista y la izquierda.
        contemporaryRelevance: Los partidos socialdemócratas gobiernan o coparticipan en gobiernos de
          Suecia, Alemania, España y Portugal. El debate sobre el Green New Deal y la 'economía del cuidado'
          ha renovado la agenda. En América Latina, el Partido de los Trabajadores de Brasil y el Frente
          Amplio uruguayo comparten rasgos socialdemócratas. La pandemia de COVID-19 rehabilitó la intervención
          estatal como herramienta legítima.
        commonCriticisms: Los críticos de izquierda, desde el marxismo hasta el ecosocialismo, sostienen
          que la socialdemocracia administra el capitalismo sin cuestionarlo, legitimando un sistema inherentemente
          explotador. Los liberales y conservadores argumentan que el gasto social genera déficit, desincentiva
          el trabajo y reduce la competitividad. Desde el socialismo democrático se señala que la 'Tercera
          Vía' representó una capitulación ante el neoliberalismo que privó a los trabajadores de una
          alternativa real.
        keyThinkers:
        - Eduard Bernstein
        - Karl Kautsky
        - Olof Palme
        - Anthony Giddens
        - Gosta Esping-Andersen
        - Willy Brandt
        wikipediaUrl: https://es.wikipedia.org/wiki/Socialdemocracia
      - id: progressivism
        name: Progresismo
        nameEn: Progressivism
        weight: 3
        description: Movimiento de reformas sociales y políticas graduales para corregir desigualdades
          y ampliar derechos civiles.
        longDescription: 'El progresismo es una orientación política que agrupa a quienes creen que las
          instituciones sociales, económicas y políticas pueden y deben mejorarse activamente mediante
          la acción colectiva y la intervención estatal. No es una doctrina unificada sino una constelación
          de posiciones que comparten la confianza en el progreso deliberado, la defensa de derechos expandidos
          y la crítica a las jerarquías establecidas.


          Surgió como movimiento diferenciado en los Estados Unidos de finales del siglo XIX como reacción
          a los excesos del capitalismo industrial: corrupción, monopolios, explotación laboral y desigualdad
          extrema. Figuras como Theodore Roosevelt y Woodrow Wilson impulsaron regulaciones antimonopolio,
          seguridad laboral y sufragio femenino. En ese período el progresismo era transversal a los dos
          partidos principales.


          En el siglo XX el progresismo se asoció crecientemente con el Partido Demócrata en EE.UU. y
          con partidos de centroizquierda en otras democracias occidentales. El New Deal rooseveltiano
          y la Gran Sociedad de Johnson expandieron el Estado de bienestar americano bajo este marco.
          Paralelamente, el movimiento de derechos civiles amplió la agenda progresista hacia la igualdad
          racial, de género y sexual.


          El progresismo contemporáneo es plural: incluye desde defensores del capitalismo regulado con
          impuestos progresivos hasta quienes cuestionan estructuras sistémicas de raza, género y colonialismo.
          Su énfasis en la interseccionalidad y los derechos identitarios ha generado tensiones internas
          con sectores más centrados en la economía política clásica.


          En América Latina el término ''progresismo'' se usa para designar a los gobiernos de la marea
          rosa (Chávez, Lula, Kirchner, Correa, Morales), aunque con contenidos más estatistas y nacionalistas
          que el progresismo anglosajón.'
        historicalContext: El movimiento progresista estadounidense surgió entre 1890 y 1920 como respuesta
          a la Gilded Age. En Europa, las corrientes socialcristianas y socialdemócratas compartieron
          elementos progresistas en la construcción del Estado de bienestar de posguerra. En América Latina,
          la 'marea rosa' de los 2000s (Lula, Chávez, Kirchner, Evo Morales) fue catalogada como progresismo
          aunque con fuertes componentes populistas y nacional-desarrollistas.
        contemporaryRelevance: En EE.UU., el ala progresista del Partido Demócrata (AOC, Bernie Sanders,
          The Squad) impulsa propuestas como Medicare for All, Green New Deal y cancelación de deuda estudiantil.
          En Europa, partidos como Podemos, La France Insoumise y Die Linke representan el polo progresista.
          En América Latina, el progresismo enfrenta la tensión entre agenda ambiental y extractivismo.
        commonCriticisms: Los conservadores argumentan que el progresismo destruye tradiciones y valores
          que cohesionan las sociedades. Los libertarios señalan que la intervención estatal progresista
          limita la libertad individual y genera burocracia ineficiente. Desde la izquierda marxista se
          critica que el progresismo cultural distrae de la lucha de clases y puede ser cooptado por el
          capitalismo corporativo.
        keyThinkers:
        - John Dewey
        - Herbert Croly
        - Franklin D. Roosevelt
        - Cornel West
        - Naomi Klein
        historicalExamples:
        - Era Progresista — reformas antimonopolio (EE.UU., 1900-1920)
        - New Deal rooseveltiano (EE.UU., 1933-1938)
        - Marea rosa latinoamericana (América Latina, 2000-2015)
        - Gran Sociedad de Lyndon B. Johnson (EE.UU., 1964-1969)
        wikipediaUrl: https://es.wikipedia.org/wiki/Progresismo
      - id: welfarism
        name: Welfarismo
        nameEn: Welfarism
        weight: 2
        description: Corriente que prioriza la expansión del Estado de bienestar sin cuestionar la economía
          de mercado.
        longDescription: 'El welfarismo o Estado de bienestarismo es la doctrina que sitúa la provisión
          pública de servicios sociales universales —salud, educación, vivienda, pensiones, desempleo—
          como el objetivo central de la política económica y el criterio de legitimidad del Estado. No
          cuestiona la propiedad privada ni el mercado, pero insiste en que sus resultados deben corregirse
          sistemáticamente para garantizar estándares mínimos de vida a toda la población.


          Se desarrolló intelectualmente en Gran Bretaña a partir del Informe Beveridge (1942), que diseñó
          el sistema de seguridad social integral como respuesta a los ''cinco gigantes'' de la miseria:
          carencia, enfermedad, ignorancia, squalor y ociosidad. El keynesianismo proporcionó el andamiaje
          macroeconómico: el Estado como empleador de último recurso y como estabilizador automático del
          ciclo económico.


          El welfarismo es menos una ideología política coherente que un programa de políticas. Sus defensores
          abarcan desde socialdemócratas hasta liberales igualitarios como John Rawls, cuya teoría de
          la justicia legitimó la redistribución como exigencia de equidad. Amartya Sen y Martha Nussbaum
          ampliaron el marco hacia el enfoque de capacidades: no basta con transferencias monetarias,
          el Estado debe garantizar las condiciones para una vida verdaderamente digna.


          La crítica neoliberal de los años 1970-1980 (Friedman, Hayek) argumentó que los Estados de bienestar
          generaban dependencia, inflación y déficit insostenibles. Esto desencadenó décadas de recortes
          y privatizaciones. El debate contemporáneo sobre renta básica universal puede entenderse como
          una reinvención welfarista adaptada a la economía digital y a los empleos precarios del siglo
          XXI.'
        historicalContext: El welfarismo moderno hunde sus raíces en las reformas sociales liberales británicas
          de 1906-1914 (Lloyd George) y alcanza su plenitud con el Informe Beveridge (1942) y la construcción
          del NHS. Los sistemas escandinavos de Suecia, Noruega y Dinamarca desarrollaron la versión más
          comprensiva. La crisis fiscal del Estado de bienestar en los 1970s y el neoliberalismo de los
          1980s forzaron reformas restrictivas. Hoy persiste como modelo aunque con coberturas reducidas.
        contemporaryRelevance: El welfarismo resurgió en el debate público durante la pandemia de COVID-19,
          que evidenció la fragilidad de los sistemas de salud privatizados. Propuestas como la renta
          básica universal (Finlandia, Kenia, varios pilotos globales) y la ampliación del gasto en cuidados
          forman parte de la agenda welfarista contemporánea. Los países nórdicos mantienen el modelo
          más robusto.
        commonCriticisms: Los economistas de orientación liberal sostienen que el welfarismo genera desincentivos
          al trabajo y emprendimiento, inflando el déficit público. Los marxistas critican que gestiona
          la miseria sin eliminar sus causas estructurales, actuando como válvula de escape del capitalismo.
          Los comunitaristas señalan que los servicios estatales impersonales erosionan el capital social
          y la solidaridad comunitaria.
        keyThinkers:
        - William Beveridge
        - John Maynard Keynes
        - John Rawls
        - Amartya Sen
        - T. H. Marshall
        historicalExamples:
        - NHS y Estado de bienestar beveridgeano (Reino Unido, 1945-)
        - Modelo de bienestar nórdico (Suecia/Noruega/Dinamarca, 1960s-)
        - New Deal y seguridad social (EE.UU., 1935-)
        - Seguro de desempleo y pensiones bismarckianas (Alemania, 1883-1889)
        wikipediaUrl: https://es.wikipedia.org/wiki/Estado_de_bienestar
      - id: labour-social-democracy
        name: Socialismo laborista
        nameEn: Labour Socialism
        weight: 2
        description: Síntesis británica entre socialismo democrático y movimiento sindical, base histórica
          del Partido Laborista.
        longDescription: 'La socialdemocracia laborista es la corriente específica que emergió del movimiento
          sindical y obrero organizado, distinguiéndose de la socialdemocracia de inspiración intelectual
          o liberal igualitaria por su anclaje directo en los sindicatos y en la experiencia colectiva
          del trabajo asalariado. Su lógica parte de la negociación colectiva y la representación institucional
          de los trabajadores como mecanismo central de redistribución.


          Su expresión canónica es el Partido Laborista británico, fundado en 1900 como brazo político
          del Trade Union Congress. A diferencia de los partidos socialistas continentales, el laborismo
          británico nació sin un programa marxista explícito: su socialismo era pragmático, basado en
          la solidaridad sindical y el gradualismo parlamentario. La cláusula IV de su estatuto, que proclamaba
          la socialización de los medios de producción, fue eliminada simbólicamente por Tony Blair en
          1995.


          En Australia, el Partido Laborista Australiano siguió un trayecto similar: fundado por los sindicatos
          en 1901, oscila entre el reformismo moderado y el keynesianismo social. En Nueva Zelanda, el
          laborismo implementó entre 1935 y 1949 uno de los estados de bienestar más tempranos del mundo.


          La tensión interna de esta corriente es permanente: los sindicatos priorizan los intereses de
          sus afiliados (trabajadores con empleo estable, frecuentemente varones industriales), mientras
          la sociedad cambia hacia economías de servicios, trabajo precario, migrantes y economía informal.
          La base sindical ha encogido en casi todos los países desarrollados desde los años 1980, debilitando
          el sustento organizativo de esta corriente.'
        historicalContext: 'El laborismo político nació con la fundación del Partido Laborista Independiente
          en Gran Bretaña (1893) y el TUC-Labour Party (1900). En Australia y Nueva Zelanda surgieron
          partidos laboristas casi simultáneamente. El apogeo laborista fue la posguerra: el gobierno
          Attlee (1945-1951) construyó el NHS y nacionalizó industrias clave. El thatcherismo y la globalización
          erosionaron la base industrial sindical desde 1979. La ''Tercera Vía'' de Blair significó una
          reconversión hacia el centro.'
        contemporaryRelevance: La socialdemocracia laborista enfrenta la crisis de representación sindical
          en economías de servicios y plataformas digitales. En el Reino Unido, Keir Starmer lidera un
          laborismo centrista post-corbynismo. En Australia, el Partido Laborista de Anthony Albanese
          ganó en 2022 con una agenda climática y laboral moderada. Los debates sobre organización de
          trabajadores de plataformas (Uber, Deliveroo) renuevan la agenda laborista.
        commonCriticisms: Los críticos de izquierda señalan que el laborismo privilegia a los trabajadores
          sindicalizados (cada vez menos) sobre los precarizados y migrantes. Los economistas neoclásicos
          argumentan que los sindicatos generan rigideces del mercado laboral que aumentan el desempleo.
          Desde el feminismo se ha cuestionado que el laborismo clásico construyó su agenda en torno al
          trabajador masculino industrial, invisibilizando el trabajo de cuidados.
        keyThinkers:
        - Keir Hardie
        - Clement Attlee
        - Harold Wilson
        - Bob Hawke
        - Anthony Crosland
        historicalExamples:
        - Gobierno Attlee — Estado de bienestar y NHS (Reino Unido, 1945-1951)
        - Partido Laborista Australiano — fundación y primeros gobiernos (Australia, 1901-1910)
        - Primer gobierno laborista neozelandés — Estado de bienestar temprano (Nueva Zelanda, 1935-1949)
        - Gobierno laborista de Harold Wilson (Reino Unido, 1964-1970)
        wikipediaUrl: https://es.wikipedia.org/wiki/Laborismo
      - id: luxemburgism
        name: Luxemburguismo
        nameEn: Luxemburgism
        weight: 2
        description: Corriente marxista antiautoritaria de Rosa Luxemburgo que defiende la democracia
          revolucionaria obrera.
        keyThinkers:
        - Rosa Luxemburgo
        - Paul Levi
        - Clara Zetkin
        - Franz Mehring
        longDescription: 'El luxemburgismo es la tradición teórica y política derivada de la obra de Rosa
          Luxemburgo (1871-1919), que combina el análisis marxista con un énfasis singular en la autoorganización
          espontánea de la clase obrera, la crítica tanto al reformismo socialdemócrata como al centralismo
          bolchevique, y la internacionalización de la lucha anticapitalista.


          Rosa Luxemburgo desarrolló su pensamiento en polémica simultánea con dos adversarios: Eduard
          Bernstein (el revisionismo que abandonaba la revolución) y Vladimir Lenin (el partido de vanguardia
          centralizado que sustituía a las masas). Frente a ambos, Luxemburgo defendió que la revolución
          solo podría ser auténtica si surgía de la iniciativa creativa de las masas, no de un plan dirigido
          desde arriba ni de una acumulación gradual de reformas.


          Su obra ''La acumulación del capital'' (1913) ofreció una explicación del imperialismo como
          necesidad estructural del capitalismo para encontrar mercados externos. Su panfleto ''Reforma
          o revolución'' (1900) sistematizó la crítica al gradualismo. Tras la Revolución de Noviembre
          alemana de 1918, co-fundó el Partido Comunista Alemán (KPD) y fue asesinada por paramilitares
          derechistas en enero de 1919, tras el fracaso de la insurrección espartaquista.


          El luxemburgismo influyó en corrientes del comunismo de izquierda, en el consejismo y en el
          socialismo humanista del siglo XX. Su defensa de la libertad de crítica dentro de los movimientos
          socialistas y su advertencia sobre los peligros del centralismo burocrático mantienen vigencia
          en debates sobre democracia interna y movimientos sociales.'
        historicalContext: Rosa Luxemburgo militó en la socialdemocracia polaca y alemana desde los años
          1890. Escribió sus obras principales entre 1899 y 1916. Fue encarcelada durante la Primera Guerra
          Mundial por su pacifismo. Cofundó la Liga Espartaquista (1916) y el KPD (1918). Fue asesinada
          en enero de 1919 durante la represión de la insurrección espartaquista. Su legado fue reivindicado
          por la nueva izquierda de los 1960s, grupos ecosocialistas y feministas socialistas.
        contemporaryRelevance: El luxemburgismo es referencia para movimientos que buscan combinar anticapitalismo
          con democracia radical y autonomía de base. Su crítica al partido-vanguardia es citada en debates
          sobre formas organizativas horizontales. Grupos marxistas heterodoxos en Europa y América Latina
          la reivindican. Su análisis del imperialismo y del militarismo inspira el pensamiento antiimperialista
          contemporáneo.
        commonCriticisms: Los leninistas argumentan que la confianza de Luxemburgo en la espontaneidad
          de masas sin dirección política organizada llevó al fracaso de la insurrección de 1919. Los
          socialdemócratas señalan que su rechazo al reformismo la aisló de mayorías obreras que preferían
          mejoras concretas. Los anarquistas valoran su crítica al centralismo pero cuestionan que mantuviera
          el marco de partido y Estado.
        historicalExamples:
        - Liga Espartaquista y Revolución de Noviembre (Alemania, 1918-1919)
        - KPD en la República de Weimar (Alemania, 1919-1933)
        - Influencia en la nueva izquierda europea (Europa, 1960s-1970s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Rosa_Luxemburgo
    - name: comunismo-libertario
      weight: 4
      children:
      - id: left-communism
        name: Comunismo de izquierda
        nameEn: Left Communism
        weight: 2
        description: Corriente marxista crítica tanto del leninismo como de la socialdemocracia, defendiendo
          la autonomía de los consejos obreros.
        longDescription: 'El comunismo de izquierda agrupa a las corrientes marxistas que criticaron desde
          la izquierda al bolchevismo y a la Internacional Comunista, rechazando su táctica de participación
          electoral, de trabajo en los sindicatos reformistas y de alianzas con partidos burgueses. Su
          argumento central es que estas tácticas comprometían la independencia política del proletariado
          y frenaban el desarrollo de la consciencia revolucionaria de clase.


          Lenin atacó explícitamente estas posiciones en ''¿La enfermedad infantil del izquierdismo en
          el comunismo?'' (1920), acusando a estas corrientes de ''infantilismo'' al negarse a utilizar
          el parlamento y los sindicatos como escenarios de agitación. Sin embargo, el comunismo de izquierda
          respondió que la participación en instituciones burguesas inevitablemente corrompía a los partidos
          revolucionarios.


          Existieron varias ramas del comunismo de izquierda. La italiana, liderada por Amadeo Bordiga,
          enfatizaba la invarianza del programa marxista y rechazaba todo frente popular. La germano-holandesa
          (Gorter, Pannekoek, Roland-Holst) se orientó hacia el consejismo, es decir, la organización
          de los trabajadores en consejos de fábrica como alternativa al partido político. La britanica
          y la belga tenían rasgos propios pero compartían el rechazo al parlamentarismo.


          El comunismo de izquierda nunca alcanzó hegemonía en ningún movimiento obrero nacional, pero
          sus ideas sobre la burocracia sindical y estatal, la corrupción reformista y la necesidad de
          formas de organización radicalmente nuevas mantienen influencia en círculos comunistas anti-estalinistas.'
        historicalContext: El comunismo de izquierda emergió en el período 1918-1921, cuando varios partidos
          y corrientes dentro de la Internacional Comunista se negaron a aceptar las '21 condiciones'
          de Moscú o criticaron la Nueva Política Económica de Lenin. Amadeo Bordiga lideró la corriente
          italiana hasta su expulsión del PCI en 1930. La tradición germano-holandesa confluyó con el
          consejismo. Sobrevivió como corriente minoritaria durante el siglo XX.
        contemporaryRelevance: El comunismo de izquierda tiene presencia marginal pero activa en grupos
          teóricos europeos y latinoamericanos. La Corriente Comunista Internacional (CCI) es su organización
          más reconocida. Sus análisis de la izquierda del capital y de la incapacidad del sindicalismo
          reformista para superar el capitalismo son citados en debates anticapitalistas contemporáneos.
        commonCriticisms: Los leninistas critican que el rechazo al parlamentarismo y los sindicatos reformistas
          aisla a los revolucionarios de las masas. Los anarquistas señalan cierta incoherencia en mantener
          el concepto de partido mientras se rechaza el Estado. Los socialdemócratas lo consideran un
          purismo doctrinario sin viabilidad práctica.
        keyThinkers:
        - Amadeo Bordiga
        - Anton Pannekoek
        - Herman Gorter
        - Henriette Roland-Holst
        - Sylvia Pankhurst
        historicalExamples:
        - Corriente de Bordiga en el PCI italiano (Italia, 1921-1926)
        - KAPD — Partido Obrero Comunista de Alemania (Alemania, 1920-1923)
        - Corriente Comunista Internacional — organización contemporánea (1975-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Comunismo_de_izquierda
      - id: council-communism
        name: Comunismo de consejos
        nameEn: Council Communism
        weight: 2
        description: Propuesta de gobierno directo mediante consejos obreros elegidos desde la base, sin
          partido de vanguardia.
        keyThinkers:
        - Anton Pannekoek
        - Herman Gorter
        - Otto Rühle
        - Paul Mattick
        - Henriette Roland-Holst
        longDescription: 'El comunismo de consejos o consejismo es la corriente que sostiene que el poder
          obrero debe ejercerse mediante consejos de trabajadores (Räte en alemán, soviets en ruso) elegidos
          directamente en los lugares de trabajo y con mandato revocable, sin mediación de partidos políticos
          ni sindicatos permanentes. Es la forma organizativa que, según sus teóricos, permite la autogestión
          real del proceso productivo por parte de quienes trabajan.


          Su fundamento teórico fue elaborado principalmente por Anton Pannekoek, filósofo y astrónomo
          holandés, y Herman Gorter, poeta y teórico político también neerlandés. Ambos criticaron no
          solo al socialismo parlamentario sino también al modelo leninista: el partido de vanguardia
          reproduciría, en su opinión, la estructura jerárquica y burocrática del capitalismo al que pretendía
          combatir.


          El referente histórico inmediato fueron los consejos obreros que surgieron espontáneamente en
          la Revolución Rusa (1917), en Alemania (1918-1919) y en Hungría (1919). Para los consejistas,
          estos fueron los embriones de una nueva organización social que fue suprimida tanto por los
          bolcheviques como por la socialdemocracia.


          El consejismo influyó en el situacionismo francés de los años 1960 (Guy Debord leyó a Pannekoek),
          en los movimientos de autogestión de los años 1970 y en corrientes libertarias contemporáneas
          que buscan formas de democracia directa en el lugar de trabajo. Su énfasis en la autoorganización
          sin liderazgos permanentes lo sitúa en una zona de contacto con el anarco-sindicalismo y con
          el autonomismo italiano.'
        historicalContext: El consejismo tomó forma teórica entre 1918 y 1930 con las obras de Pannekoek
          y Gorter. Los consejos obreros de Baviera (1919) y Hungría (1919) fueron sus breves realizaciones
          históricas. El KAPD (Partido Obrero Comunista alemán, 1920-1923) fue su expresión organizativa
          más clara. Durante la Guerra Fría el consejismo sobrevivió en círculos intelectuales. El situacionismo
          francés y los movimientos del 68 lo reactivaron.
        contemporaryRelevance: El consejismo inspira debates actuales sobre democracia directa, autogestión
          empresarial y formas asamblearias. Grupos como el Grupo Comunista Internacionalista en Países
          Bajos mantienen la tradición. La experiencia de los Sóviets de trabajadores en Argentina (2001-2002)
          y la autogestión en algunas empresas recuperadas son referentes contemporáneos citados en esta
          tradición.
        commonCriticisms: Los leninistas argumentan que los consejos sin partido revolucionario son vulnerables
          a la cooptación o la derrota frente a fuerzas organizadas. Los socialdemócratas señalan la impracticabilidad
          de una economía compleja gestionada exclusivamente por consejos locales. Los anarquistas valoran
          el consejismo pero critican que algunos teóricos mantienen la figura del Estado de consejos
          como forma de transición.
        historicalExamples:
        - República Soviética Bávara (Alemania, 1919)
        - República Soviética Húngara (Hungría, 1919)
        - KAPD y AAUD — organización consejista (Alemania, 1920-1923)
        - Influencia en el situacionismo y Mayo del 68 (Francia, 1968)
        wikipediaUrl: https://es.wikipedia.org/wiki/Comunismo_de_consejos
      - id: classical-marxism
        name: Marxismo clásico
        nameEn: Classical Marxism
        weight: 2
        description: Interpretación pre-leninista del pensamiento de Marx y Engels, sin las adaptaciones
          del siglo XX.
        keyThinkers:
        - Karl Marx
        - Friedrich Engels
        - Karl Kautsky
        - Georg Lukács
        - Antonio Gramsci
        - Louis Althusser
        longDescription: 'El marxismo clásico designa el cuerpo teórico elaborado por Karl Marx (1818-1883)
          y Friedrich Engels (1820-1895), que constituye la fuente de la que derivan directa o críticamente
          casi todas las corrientes de la izquierda socialista. Sus ejes son el materialismo histórico,
          la crítica de la economía política capitalista y la teoría de la lucha de clases como motor
          de la historia.


          El materialismo histórico sostiene que las sociedades se organizan en torno a sus modos de producción:
          las relaciones de producción (quién es propietario, quién trabaja) conforman la base económica
          sobre la que se erigen las superestructuras jurídica, política y cultural. El capitalismo es
          el modo de producción dominante en la modernidad, basado en la expropiación de la plusvalía
          generada por el trabajo asalariado.


          ''El Capital'' (1867) es la obra central del marxismo económico: analiza la mercancía, el dinero,
          el capital, el proceso de trabajo y la acumulación de capital. Los ''Manuscritos económico-filosóficos''
          (1844), publicados póstumamente, abordan la alienación del trabajo. El ''Manifiesto Comunista''
          (1848), escrito con Engels, sintetizó el programa político.


          El marxismo clásico previó que el capitalismo, al desarrollar las fuerzas productivas y concentrar
          al proletariado en grandes centros industriales, generaría las condiciones objetivas para su
          propia superación mediante la revolución socialista. El Estado de transición (''dictadura del
          proletariado'') sería una fase hacia la sociedad comunista sin clases ni Estado.


          Las interpretaciones del marxismo clásico proliferaron tras la muerte de Marx: el marxismo ortodoxo
          de Kautsky, el leninismo, el luxemburgismo, el marxismo occidental (Lukács, Gramsci), el estructuralismo
          althusseriano y el marxismo analítico son sus principales ramificaciones.'
        historicalContext: Marx y Engels desarrollaron su obra entre 1844 y 1895, en el contexto de la
          industrialización europea y la emergencia del movimiento obrero moderno. La Primera Internacional
          (1864-1876) fue el primer intento de organización política marxista. La Segunda Internacional
          (1889-1914) difundió el marxismo como doctrina oficial de los partidos socialistas europeos.
          La Revolución Rusa de 1917 fue la primera aplicación práctica a gran escala, aunque en una sociedad
          mayoritariamente agraria, no industrial.
        contemporaryRelevance: El marxismo clásico sigue siendo marco teórico de referencia en ciencias
          sociales, filosofía y movimientos anticapitalistas globales. La crisis financiera de 2008 generó
          un renovado interés en El Capital como herramienta de análisis. El marxismo ecológico (Bellamy
          Foster) aplica las categorías marxistas al análisis de la crisis ambiental. En América Latina
          es componente central de múltiples tradiciones políticas.
        commonCriticisms: Los liberales argumentan que el marxismo subestima la capacidad del capitalismo
          de generar bienestar y reformarse. Los postestructuralistas critican el economicismo y el sujeto
          homogéneo 'proletariado'. Los libertarios señalan que la 'dictadura del proletariado' abre la
          puerta al totalitarismo. Los revisionistas internos cuestionan la aplicabilidad de las predicciones
          de Marx al capitalismo del siglo XXI.
        historicalExamples:
        - Primera Internacional — AIT (1864-1876)
        - Revolución de 1848 en Europa
        - Partido Socialdemócrata Alemán (SPD) bajo el marxismo ortodoxo (1869-1914)
        - Revolución Rusa — primera aplicación a gran escala (Rusia, 1917)
        wikipediaUrl: https://es.wikipedia.org/wiki/Marxismo
      - id: democratic-confederalism
        name: Confederalismo democrático
        nameEn: Democratic Confederalism
        weight: 2
        description: Modelo de Abdullah Öcalan basado en asambleas locales, autonomía de las mujeres y
          ecología. Implementado en Rojava.
        keyThinkers:
        - Abdullah Öcalan
        - Murray Bookchin
        - Cemil Bayik
        - Janet Biehl
        longDescription: 'El confederalismo democrático es la ideología política desarrollada por Abdullah
          Öcalan desde prisión a partir de los años 2000, inspirada en el comunalismo de Murray Bookchin,
          como alternativa al Estado-nación kurdoseparatista que había sido el programa del PKK. Propone
          la organización de la sociedad en comunas autónomas de base, articuladas en confederaciones
          sin Estado central, con énfasis en la liberación de la mujer (jineología), la ecología y la
          democracia directa.


          Öcalan transformó el programa del PKK (Partido de los Trabajadores del Kurdistán) tras leer
          a Bookchin en prisión. En lugar de un Estado kurdo independiente, propone construir autonomía
          democrática dentro de los estados existentes: no se trata de conquista del poder estatal sino
          de construcción de poder social desde abajo. La organización en comunas, cooperativas y academias
          constituye la nueva sociedad en el interior de la vieja.


          Su implementación más avanzada es la Administración Autónoma del Norte y Este de Siria (AANES),
          conocida como Rojava, donde desde 2012 se construye un sistema de co-presidencias obligatoriamente
          mixtas en género, milicias femeninas (YPJ), academias de jineología y economía cooperativa.
          El experimento atrajo atención internacional por su resistencia al Estado Islámico y por su
          innovación institucional.


          El confederalismo democrático se diferencia del anarquismo clásico en que no rechaza toda forma
          de institución colectiva duradera, y del leninismo en que no busca la conquista del Estado sino
          su vaciamiento desde la base. Combina elementos del feminismo radical, el ecologismo social
          y la tradición comunal kurda.'
        historicalContext: Abdullah Öcalan desarrolló el confederalismo democrático en sus escritos desde
          la prisión de İmralı a partir de 2003, tras su captura en 1999. El PKK adoptó formalmente la
          nueva ideología en 2005. La Revolución de Rojava en el norte de Siria (2012) fue su primera
          aplicación territorial a gran escala. La lucha contra el Estado Islámico (2014-2017) proyectó
          internacionalmente el experimento kurdo.
        contemporaryRelevance: Rojava sigue siendo el laboratorio vivo del confederalismo democrático,
          aunque bajo presión militar de Turquía. El modelo inspira movimientos anticapitalistas y feministas
          globales. Grupos en América Latina, Europa y Oriente Medio estudian su estructura institucional.
          La jineología (ciencia de las mujeres) como corpus teórico tiene difusión creciente en el feminismo
          internacional.
        commonCriticisms: Los estados vecinos (Turquía, Siria, Irak) lo consideran una fachada del terrorismo
          del PKK. Los anarquistas puros cuestionan que la estructura del PKK siga siendo jerárquica a
          pesar del discurso confederal. Los marxistas ortodoxos señalan que sin transformación del Estado
          y del capital, la autonomía comunal es vulnerable. Los liberales dudan de su viabilidad sin
          marcos legales estables.
        historicalExamples:
        - Administración Autónoma del Norte y Este de Siria — Rojava (Siria, 2012-)
        - PKK — transformación ideológica bajo el confederalismo democrático (Kurdistán, 2005-)
        - Resistencia de Kobanî contra el Estado Islámico (Siria, 2014-2015)
        wikipediaUrl: https://es.wikipedia.org/wiki/Confederalismo_democr%C3%A1tico
      - id: bookchin-communalism
        name: Comunalismo (Bookchin)
        nameEn: Bookchin Communalism
        weight: 2
        description: Propuesta de Murray Bookchin de confederaciones de asambleas municipales directas,
          ecología social y democracia radical.
        keyThinkers:
        - Murray Bookchin
        - Janet Biehl
        - Abdullah Öcalan
        - Dan Chodorkoff
        longDescription: 'El comunalismo de Bookchin es la síntesis teórica elaborada por el filósofo
          estadounidense Murray Bookchin (1921-2006) que integra ecologismo social, anarquismo y municipalismo
          libertario en una propuesta política coherente. Su tesis central es que la crisis ecológica
          y la dominación social tienen la misma raíz: las jerarquías y la lógica del crecimiento ilimitado.
          La solución no puede ser parcial: requiere una transformación simultánea de la relación entre
          humanos y naturaleza y de las relaciones entre humanos.


          Bookchin desarrolló su pensamiento en varias obras fundamentales: ''Our Synthetic Environment''
          (1962), ''Post-Scarcity Anarchism'' (1971), ''The Ecology of Freedom'' (1982) y ''The Rise of
          Urbanization and the Decline of Citizenship'' (1987), donde formuló el municipalismo libertario.
          Su propuesta política concreta es la democracia confederal de municipios: asambleas ciudadanas
          locales que confederan sus poderes en estructuras regionales y nacionales, vaciando progresivamente
          el poder del Estado-nación.


          Bookchin distinguía entre ''ecología social'' (transformación de las relaciones sociales como
          condición para la reconciliación con la naturaleza) y el ambientalismo superficial que solo
          propone ajustes técnicos sin cuestionar la lógica de la dominación. También polemizó con el
          ecocentrismo y la deep ecology, que en su opinión caían en misantropía.


          Su influencia en el movimiento kurdo fue directa: Öcalan leyó a Bookchin en prisión y le escribió
          para agradecerle, generando una conexión improbable entre un teórico anarquista de Vermont y
          el movimiento de liberación kurdo. El comunalismo de Bookchin se convirtió así en la base filosófica
          del confederalismo democrático de Rojava.'
        historicalContext: Bookchin fue un militante de izquierda desde los años 1930 que pasó por el
          comunismo, el trotskismo y el anarquismo antes de elaborar su síntesis original. Fundó el Instituto
          para la Ecología Social en Vermont (1974). Sus obras principales se publicaron entre 1962 y
          2006. En los últimos años de su vida estableció correspondencia con Öcalan, cuya influencia
          en Rojava proyectó el comunalismo bookchiniano a escala global.
        contemporaryRelevance: El comunalismo de Bookchin inspira directamente el experimento de Rojava.
          También influye en movimientos municipalistas europeos como Barcelona en Comú y otras 'ciudades
          del cambio' que buscan democratizar el gobierno local. El Instituto para la Ecología Social
          sigue formando activistas. En América Latina, el pensamiento de Bookchin dialoga con tradiciones
          indígenas de buen vivir.
        commonCriticisms: Los anarquistas clásicos señalan que el municipalismo libertario, al participar
          en elecciones locales, compromete el principio antiestatal. Los marxistas critican que el énfasis
          en lo local y lo municipal no aborda la escala del capital transnacional. Los ecologistas profundos
          cuestionan el antropocentrismo del ecologismo social bookchiniano. Los comunitaristas conservadores
          valoran el municipalismo pero rechazan su contenido anticapitalista.
        historicalExamples:
        - Instituto para la Ecología Social (Vermont, EE.UU., 1974-)
        - Confederalismo democrático en Rojava — aplicación del comunalismo (Siria, 2012-)
        - Barcelona en Comú — municipalismo libertario europeo (España, 2015-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Murray_Bookchin
      - id: syndicalism
        name: Sindicalismo
        nameEn: Syndicalism
        weight: 2
        description: Estrategia obrera de lucha directa mediante sindicatos como núcleo de una futura
          sociedad autogestionada.
        longDescription: 'El sindicalismo revolucionario o sindicalismo es la corriente que propone al
          sindicato —no al partido político ni al Estado— como el agente central de la transformación
          social. En su versión más radical (anarcosindicalismo), los sindicatos son tanto la herramienta
          de lucha presente como el embrión de la futura organización de la sociedad sin Estado. La huelga
          general es el instrumento político por excelencia.


          Surgió en Francia a finales del siglo XIX como reacción al fracaso de la política parlamentaria
          socialista y a la moderación de la socialdemocracia. La Charte d''Amiens (1906) de la CGT francesa
          es su documento fundacional: declara la independencia del sindicato respecto de los partidos
          políticos, incluyendo los socialistas. El teórico Georges Sorel aportó la fundamentación filosófica:
          el mito de la huelga general como energía movilizadora más allá del cálculo racional.


          El anarcosindicalismo, su rama más conocida, añade el rechazo explícito al Estado y la propuesta
          de una sociedad autogestionada por sindicatos federados. La CNT española, fundada en 1910, es
          su expresión más emblemática: llegó a tener más de un millón de afiliados en los años 1930 y
          fue protagonista de la Revolución Social de 1936 en Cataluña y Aragón durante la Guerra Civil.


          El IWW (Industrial Workers of the World, ''Wobblies''), fundado en Chicago en 1905, fue la expresión
          norteamericana del sindicalismo revolucionario, con énfasis en la organización de trabajadores
          migrantes, racializados y no calificados excluidos de los sindicatos corporativos.


          El sindicalismo revolucionario declinó tras el fracaso de la Revolución española (1936-1939)
          y la represión franquista, aunque la CNT sobrevivió en el exilio y se reconstituye en democracia
          desde 1977.'
        historicalContext: El sindicalismo revolucionario tomó forma en Francia entre 1895 y 1906. La
          Charte d'Amiens (1906) estableció su programa. La CNT española (fundada 1910) fue su expresión
          más poderosa. El IWW estadounidense (1905) representó la variante norteamericana. La Revolución
          Social española de 1936 en Cataluña fue su mayor experiencia histórica, aplastada por franquistas,
          estalinistas y republicanos moderados. Sobrevivió en el exilio y se reconstituyó tras el franquismo.
        contemporaryRelevance: La CNT y la CGT española siguen activas. La IWW ha crecido en EE.UU. organizando
          trabajadores de servicios y plataformas. El sindicalismo de base ('rank-and-file unionism')
          influye en nuevas organizaciones laborales. La experiencia de las empresas recuperadas en Argentina
          (2001-2002) tiene puntos de contacto con la tradición sindicalista de autogestión.
        commonCriticisms: Los marxistas leninistas argumentan que sin partido político de vanguardia el
          sindicalismo no puede dirigir la toma del poder político. Los socialdemócratas señalan que la
          negativa a participar en política electoral margina al movimiento obrero. Los anarquistas comunistas
          (no sindicalistas) critican que los sindicatos, incluso revolucionarios, tienden a burocratizarse
          y a defender intereses sectoriales.
        keyThinkers:
        - Georges Sorel
        - Fernand Pelloutier
        - Émile Pouget
        - Rudolf Rocker
        - Big Bill Haywood
        historicalExamples:
        - CGT francesa y Charte d'Amiens (Francia, 1895-1906)
        - CNT española — Revolución Social en Cataluña (España, 1910-1939)
        - IWW — Industrial Workers of the World (EE.UU., 1905-)
        - FAI y movimiento libertario en la Guerra Civil española (España, 1936-1939)
        wikipediaUrl: https://es.wikipedia.org/wiki/Sindicalismo_revolucionario
      - id: market-socialism
        name: Socialismo de mercado
        nameEn: Market Socialism
        weight: 2
        description: Sistema donde los medios son de propiedad social pero operan en mercados competitivos
          mediante cooperativas autogestionadas.
        keyThinkers:
        - Oskar Lange
        - Abba Lerner
        - Edvard Kardelj
        - John Roemer
        - David Schweickart
        longDescription: 'El socialismo de mercado es la corriente que propone combinar la propiedad social
          (estatal o cooperativa) de los medios de producción con el mecanismo de mercado para la asignación
          de recursos. A diferencia del socialismo de planificación central, acepta que los precios, la
          competencia y el incentivo de beneficio pueden ser herramientas válidas dentro de un marco de
          propiedad colectiva. A diferencia del capitalismo, rechaza que la propiedad privada del capital
          sea necesaria para que funcione el mercado.


          Oskar Lange formuló el argumento teórico central en el ''debate del cálculo socialista'' de
          los años 1930: respondiendo a Hayek y Mises, propuso un modelo donde empresas públicas con gestión
          descentralizada reciben precios de equilibrio mediante un proceso de prueba y error dirigido
          por una autoridad central. Este ''socialismo de mercado langiano'' demostró formalmente que
          el socialismo no era incompatible con el cálculo económico racional.


          Yugoslavia fue el experimento histórico más ambicioso: desde 1950, bajo el modelo de Edvard
          Kardelj y Boris Kidrič, las empresas estatales fueron transferidas a consejos de trabajadores
          con autonomía de gestión y competencia en el mercado. El resultado fue un crecimiento sostenido
          durante décadas, aunque con inflación, desigualdad regional y endeudamiento externo crecientes.


          Variantes contemporáneas incluyen el ''socialismo de mercado participativo'' de John Roemer
          (distribución de fondos de capital entre ciudadanos mediante cupones), el modelo de cooperativas
          competidoras de David Schweickart y la propuesta de empresas gestionadas por trabajadores con
          competencia en el mercado de James Yunker.


          China postsocialista es citada tanto como ejemplo como contraejemplo: su mezcla de empresas
          estatales, sector privado y planificación indicativa es difícil de clasificar en los términos
          clásicos.'
        historicalContext: El debate del cálculo socialista (Mises 1920, Hayek 1935, Lange 1936) situó
          al socialismo de mercado en el centro de la economía política del siglo XX. Yugoslavia implementó
          el modelo de autogestión socialista desde 1950 hasta la disolución del país en 1991. Las reformas
          Kosygin en la URSS (1965) introdujeron elementos de mercado en el socialismo soviético sin romper
          con la planificación central. La transición china desde 1978 combinó mercado y control del Partido.
        contemporaryRelevance: El socialismo de mercado es referencia en debates sobre alternativas al
          capitalismo que no impliquen planificación central autoritaria. La economía cooperativa (Mondragón
          en España, cooperativas de trabajadores en Europa) es su referente empírico más citado. Economistas
          como Dani Rodrik y Joseph Stiglitz, sin ser socialistas de mercado estrictos, convergen en defender
          un capitalismo con más propiedad difusa y regulación activa.
        commonCriticisms: Los marxistas ortodoxos argumentan que el mercado, incluso con propiedad social,
          reproduce lógicas de acumulación, competencia y explotación que eventualmente reconstituyen
          el capitalismo. Los hayekianos señalan que la propiedad sin mercados de capital genuinos no
          genera las señales de precios necesarias para la asignación eficiente. Los planificadores socialistas
          critican que el mercado socialista tiende a fragmentar los intereses de clase y a generar desigualdad
          entre cooperativas exitosas y fracasadas.
        historicalExamples:
        - Autogestión socialista yugoslava (Yugoslavia, 1950-1991)
        - Cooperativa Mondragón (País Vasco, España, 1956-)
        - Reformas Kosygin — elementos de mercado en la URSS (URSS, 1965-1968)
        - Modelo chino de economía mixta socialista (China, 1978-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Socialismo_de_mercado
      - id: indigenous-communalism
        name: Comunalismo Indígena
        nameEn: Indigenous Communalism
        weight: 3
        description: Sistema de organización política y económica basado en la autonomía territorial,
          la propiedad colectiva (resguardos), el gobierno propio mediante cabildos y asambleas, y la
          reciprocidad como principio económico. En Colombia se encarna en organizaciones como el CRIC
          (Consejo Regional Indígena del Cauca), la ONIC (Organización Nacional Indígena de Colombia),
          la AICO y la Minga como forma de acción política. Combina economía comunitaria con democracia
          deliberativa radical.
        keyThinkers:
        - Manuel Quintín Lame
        - Álvaro García Linera
        - Berta Cáceres
        - Subcomandante Marcos
        - Davi Kopenawa
        historicalExamples:
        - CRIC — Consejo Regional Indígena del Cauca (Colombia, 1971-)
        - EZLN y Juntas de Buen Gobierno zapatistas (México, 1994-)
        - ONIC — Organización Nacional Indígena de Colombia (Colombia, 1982-)
        - Incorporación del Buen Vivir en constituciones de Bolivia y Ecuador (2008-2009)
        longDescription: 'El comunalismo indígena es la tradición política y filosófica que parte de las
          formas de organización comunitaria de los pueblos originarios —propiedad colectiva de la tierra,
          gobierno asambleario, economías de reciprocidad y cosmovisiones relacionales con la naturaleza—
          para plantear alternativas al capitalismo y al Estado-nación moderno. No es una ideología de
          biblioteca sino una práctica viva con raíces en siglos de resistencia colonial.


          Sus fundamentos materiales son el resguardo o territorio comunal, la minga (trabajo colectivo
          voluntario), el trueque y la economía de subsistencia. Su fundamento cosmológico es la relacionalidad:
          los seres humanos no son propietarios de la naturaleza sino parte de una comunidad ampliada
          que incluye animales, plantas, ancestros y fuerzas cósmicas. El Buen Vivir (Sumak Kawsay en
          quechua, Suma Qamaña en aymara) es su expresión política más sistematizada.


          En Colombia, el Consejo Regional Indígena del Cauca (CRIC, fundado 1971) y la Organización Nacional
          Indígena de Colombia (ONIC, 1982) han articulado el comunalismo indígena como programa político
          concreto: defensa territorial, autonomía jurisdiccional, educación propia y economía comunitaria.
          La guardia indígena, cuerpo de protección no armado, es una institución original del movimiento
          indígena caucano.


          Los Zapatistas del EZLN en Chiapas (México) y el movimiento Mapuche en Chile y Argentina son
          expresiones latinoamericanas igualmente relevantes. En Bolivia y Ecuador, el Buen Vivir fue
          incorporado a las constituciones de 2008-2009, aunque con tensiones internas entre la retórica
          oficial y las políticas extractivistas.


          El comunalismo indígena no es monolítico: existen diferencias significativas entre comunidades,
          regiones y tradiciones. Tampoco es necesariamente anti-moderno: muchas organizaciones indígenas
          combinan defensa de la cosmovisión propia con demandas de derechos constitucionales, tecnología
          y educación superior.'
        historicalContext: El comunalismo indígena precede a la colonización europea y existió bajo diversas
          formas en todas las Américas. Fue atacado sistemáticamente por las reformas liberales del siglo
          XIX (desamortización de tierras comunales). En el siglo XX, el indigenismo estatal latinoamericano
          buscó integrar a los pueblos indígenas en el Estado-nación. El CRIC (Colombia, 1971) inauguró
          la etapa de autonomía política activa. La Declaración de la ONU sobre Derechos de los Pueblos
          Indígenas (2007) internacionalizó sus reivindicaciones.
        contemporaryRelevance: El comunalismo indígena tiene presencia política activa en Colombia (CRIC,
          ONIC, Lista de la Decencia), Bolivia, Ecuador, México (zapatistas) y Chile (mapuches). La defensa
          territorial frente a minería, agroindustria y proyectos hidroeléctricos es su eje de conflicto
          central hoy. El Buen Vivir es referencia en debates sobre desarrollo post-capitalista y justicia
          ambiental. Petro fue elegido presidente de Colombia en 2022 con apoyo de movimientos indígenas.
        commonCriticisms: Los desarrollistas, de izquierda y derecha, argumentan que la economía comunitaria
          no puede sostener las necesidades de poblaciones en crecimiento ni competir con el mercado global.
          Los liberales señalan que la propiedad comunal puede suprimir derechos individuales y reproducir
          jerarquías internas. Algunos marxistas critican la idealización de formas premodernas sin análisis
          de las relaciones de poder al interior de las comunidades.
        wikipediaUrl: https://es.wikipedia.org/wiki/Buen_vivir
    - name: ecologismo-social
      weight: 3
      children:
      - id: environmentalism
        name: Ambientalismo
        nameEn: Environmentalism
        weight: 2
        description: Corriente política que prioriza la sostenibilidad ecológica, la protección de ecosistemas
          y la reducción de impacto humano.
        longDescription: 'El ambientalismo o ecologismo es el movimiento político y social que propone
          proteger el medio ambiente natural frente a la degradación causada por la actividad humana,
          especialmente la industrial. En su versión más amplia, articula una crítica a los modelos de
          desarrollo que priorizan el crecimiento económico sobre la sostenibilidad ecológica. A diferencia
          del ecosocialismo, el ambientalismo mainstream no necesariamente vincula la crisis ambiental
          con el capitalismo como sistema: puede convivir con el mercado si este incorpora costos ecológicos.


          Sus raíces intelectuales son diversas: el romanticismo del siglo XIX (Thoreau, Muir), la ecología
          científica del siglo XX (Aldo Leopold y su ''ética de la tierra''), el pensamiento de las poblaciones
          indígenas sobre la relacionalidad con la naturaleza y, más recientemente, la ciencia climática.
          ''La primavera silenciosa'' de Rachel Carson (1962) es considerada el texto fundacional del
          ambientalismo moderno: demostró los efectos del DDT en cadenas alimentarias y movilizó la opinión
          pública.


          El ambientalismo político se diversificó en varias corrientes: el conservacionismo (proteger
          áreas naturales sin cuestionar el modo de producción), el ambientalismo de mercado (instrumentos
          económicos como los bonos de carbono), la justicia ambiental (que denuncia que la contaminación
          afecta desproporcionalmente a comunidades racializadas y pobres) y el ecologismo profundo (deep
          ecology, que propone un cambio de valores hacia el biocentrismo).


          Los partidos Verdes surgieron en Europa en los años 1980 como expresión política del ambientalismo.
          El alemán Die Grünen fue el primero en obtener representación parlamentaria significativa (1983).
          Hoy los Verdes forman coaliciones de gobierno en varios países europeos.


          El cambio climático ha sido el catalizador del ambientalismo del siglo XXI: el Acuerdo de París
          (2015), el movimiento Fridays for Future liderado por Greta Thunberg desde 2018 y la proliferación
          de litigios climáticos son expresiones de esta nueva fase.'
        historicalContext: El ambientalismo moderno emergió con 'La primavera silenciosa' de Rachel Carson
          (1962) y el Día de la Tierra (1970). El Informe Meadows 'Los límites del crecimiento' (1972)
          introdujo el debate sobre la finitud planetaria. La Conferencia de Estocolmo (1972) internacionalizó
          la agenda. Los partidos Verdes surgieron en los 1980s. El Panel Intergubernamental sobre Cambio
          Climático (IPCC, 1988) y el Acuerdo de París (2015) son hitos institucionales clave.
        contemporaryRelevance: El ambientalismo es hoy corriente política central en Europa, con los Verdes
          en coaliciones de gobierno en Alemania, Finlandia y otros países. Fridays for Future y Extinction
          Rebellion movilizan a jóvenes globalmente. La justicia ambiental conecta el ecologismo con luchas
          de comunidades racializadas y pobres. Los litigios climáticos contra estados y corporaciones
          se multiplican. En Colombia, el Acuerdo de Paz incluyó una agenda ambiental.
        commonCriticisms: Los ecosocialistas critican que el ambientalismo sin crítica al capitalismo
          produce 'capitalismo verde' que perpetúa la explotación bajo etiqueta ecológica. Los desarrollistas
          del Sur Global señalan que el ambientalismo del Norte exige sacrificios a países que históricamente
          han contaminado menos. Los libertarios argumentan que la regulación ambiental estatal limita
          la libertad económica y puede ser ineficiente frente a soluciones de mercado. Los ecologistas
          profundos critican que el ambientalismo mainstream sigue siendo antropocéntrico.
        keyThinkers:
        - Rachel Carson
        - Aldo Leopold
        - Arne Næss
        - Murray Bookchin
        - Greta Thunberg
        - Vandana Shiva
        historicalExamples:
        - Movimiento ambientalista y primer Día de la Tierra (EE.UU., 1970)
        - Partidos Verdes europeos — Die Grünen al Bundestag (Alemania, 1983)
        - Acuerdo de París sobre cambio climático (Global, 2015)
        - Movimiento Fridays for Future (Global, 2018-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ecologismo
      - id: eco-socialism
        name: Ecosocialismo
        nameEn: Eco-Socialism
        weight: 2
        description: Síntesis entre socialismo y ecologismo que identifica al capitalismo como causa estructural
          de la crisis ambiental.
        longDescription: 'El ecosocialismo es la corriente que articula la crítica marxista al capitalismo
          con el ecologismo, argumentando que la crisis ambiental no es un fallo técnico corregible dentro
          del capitalismo sino una consecuencia estructural de la lógica de acumulación ilimitada. El
          capitalismo, en su necesidad de crecer indefinidamente, destruye los ''dos fuentes de toda riqueza'':
          el trabajo humano y la naturaleza (Marx, ''El Capital'', libro III).


          Sus fundamentos teóricos combinan el marxismo ecológico (Bellamy Foster, Paul Burkett) con el
          ecologismo radical. Foster recuperó el concepto marxista de ''metabolismo social'' —el intercambio
          material entre la sociedad y la naturaleza— para argumentar que el capitalismo genera una ''fisura
          metabólica'': separa a los trabajadores urbanos de la tierra, convierte los nutrientes en basura
          y degrada la capacidad regenerativa de los ecosistemas.


          André Gorz fue uno de los primeros en sistematizar la síntesis ecosocialista: en ''Ecología
          y política'' (1975) argumentó que el ecologismo era inevitablemente anticapitalista porque cuestionaba
          el imperativo del crecimiento, el corazón del sistema. Más tarde, Michael Löwy y Joel Kovel
          elaboraron el ''Manifiesto Ecosocialista'' (2001), que propone una transformación radical del
          modo de producción hacia uno orientado al valor de uso y no al valor de cambio, en armonía con
          los límites biofísicos del planeta.


          El ecosocialismo se diferencia del ecologismo mainstream en su énfasis en que la transición
          ecológica no puede lograrse sin transformar las relaciones de propiedad y de poder. También
          se diferencia del marxismo ortodoxo en que rechaza el ''productivismo'' y el culto al desarrollo
          de las fuerzas productivas como camino al comunismo, reconociendo que el industrialismo socialista
          soviético también dañó gravemente el medio ambiente.


          Propuestas concretas del ecosocialismo incluyen la desmercantilización de la energía, el transporte
          y la alimentación, la reducción del tiempo de trabajo, la economía de cuidados, la agroecología
          y la planificación democrática de la transición energética.'
        historicalContext: Los antecedentes del ecosocialismo están en el Marx tardío (años 1860-1870s),
          cuando desarrolló el concepto de metabolismo social. André Gorz formuló la síntesis ecosocialista
          en los 1970s. El accidente de Chernóbil (1986) visibilizó el productivismo socialista soviético
          como problema ecológico. El Manifiesto Ecosocialista de Löwy y Kovel (2001) sistematizó la corriente.
          La crisis climática del siglo XXI ha ampliado su influencia.
        contemporaryRelevance: El ecosocialismo es referencia para el ala izquierda del ecologismo político
          y para partidos como Die Linke, La France Insoumise y Podemos. El Green New Deal socialista,
          propuesto por sectores de la izquierda estadounidense, tiene elementos ecosocialistas. En América
          Latina, movimientos indígenas y campesinos combinan defensa territorial con crítica anticapitalista.
          El debate sobre decrecimiento y planificación democrática de la energía está marcado por el
          ecosocialismo.
        commonCriticisms: Los ambientalistas de mercado argumentan que vincular la acción climática a
          la transformación anticapitalista hace políticamente imposible obtener las mayorías necesarias.
          Los marxistas ortodoxos señalan que el ecosocialismo abandona el desarrollo de las fuerzas productivas
          como motor del socialismo. Los conservadores argumentan que el ecosocialismo es un pretexto
          para la planificación central bajo disfraz verde. Los posdesarrollistas cuestionan que el ecosocialismo
          sigue centrado en la producción y el trabajo.
        keyThinkers:
        - André Gorz
        - Joel Kovel
        - Michael Löwy
        - John Bellamy Foster
        - Paul Burkett
        - Naomi Klein
        historicalExamples:
        - Ecología política de André Gorz — formulación temprana (Francia, 1975)
        - Manifiesto Ecosocialista de Löwy-Kovel (Internacional, 2001)
        - Ecosocialismo en partidos de izquierda europea — Die Linke, La France Insoumise (Europa, 2000s-)
        - Movimientos de defensa territorial con agenda ecosocialista en América Latina (2000s-)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ecosocialismo
      - id: green-politics
        name: Política verde
        nameEn: Green Politics
        weight: 2
        description: Movimiento que combina sostenibilidad ambiental con justicia social, descentralización
          y no-violencia.
        longDescription: 'La política verde es una corriente ideológica que coloca la sostenibilidad ecológica
          en el centro de toda organización política y económica. Sostiene que los límites biofísicos
          del planeta deben condicionar las decisiones de producción, distribución y consumo, y que la
          crisis ambiental no es un problema técnico sino una consecuencia estructural del modelo industrial-capitalista
          dominante.


          Surgió a finales de la década de 1970 en Europa occidental, impulsada por el movimiento antinuclear,
          el feminismo de segunda ola y las comunidades alternativas. El partido Die Grünen, fundado en
          Alemania Occidental en 1980, fue el primer partido verde en alcanzar representación parlamentar
          nacional y sirvió de modelo para decenas de organizaciones similares en todo el mundo.


          Sus cuatro pilares clásicos —ecología, justicia social, democracia de base y no-violencia— distinguen
          la política verde de los partidos conservacionistas puramente técnicos. Los pensadores más influyentes
          incluyen a Rudolf Bahro, Petra Kelly y, desde la teoría, a Murray Bookchin con su ecología social.


          En América Latina, la Alianza Verde de Colombia ha participado activamente en elecciones desde
          los años noventa, alcanzando visibilidad con la candidatura presidencial de Sergio Fajardo.
          En contextos de conflicto armado y extractivismo, los partidos verdes latinoamericanos articulan
          la defensa territorial con la paz.


          Internamente existen tensiones entre el ala ecosocialista, que integra crítica anticapitalista,
          y el ala liberal-verde, que confía en instrumentos de mercado como los bonos de carbono. También
          hay debate sobre la coherencia entre sus valores y la participación en coaliciones de gobierno
          con partidos de centroderecha.'
        historicalContext: La política verde como movimiento organizado emerge en Europa occidental entre
          1972 y 1983, catalizada por el informe Los límites del crecimiento (Club de Roma, 1972) y el
          movimiento antinuclear. Die Grünen (Alemania, 1980) y la Green Party (Reino Unido, 1985) institucionalizaron
          la corriente. A partir de los años noventa la Federación de los Verdes Europeos articuló partidos
          de toda la Unión. Hoy los partidos verdes gobiernan o coparticipan en múltiples gobiernos europeos.
        contemporaryRelevance: La emergencia climática ha convertido la política verde en una referencia
          ineludible del debate parlamentario. Partidos verdes participan en gobiernos de Alemania, Finlandia
          y Austria. En Colombia, la Alianza Verde mantiene bancadas en el Congreso y gobiernos locales.
          El Green New Deal, impulsado en EE. UU. y la UE, refleja la influencia de sus propuestas en
          agendas más amplias.
        commonCriticisms: Los críticos socialistas sostienen que la política verde institucionalizada
          tiende a acomodarse al capitalismo verde sin cuestionar la propiedad de los medios de producción.
          Los liberales clásicos argumentan que sus regulaciones ambientales imponen costos desproporcionados
          a países en desarrollo. Desde la izquierda radical se señala que la participación gubernamental
          ha suavizado las posiciones originales de transformación sistémica.
        keyThinkers:
        - Petra Kelly
        - Rudolf Bahro
        - Murray Bookchin
        - Fritjof Capra
        - Vandana Shiva
        historicalExamples:
        - Die Grünen — Bundestag alemán (Alemania Occidental, 1983)
        - Alianza Verde — participación electoral continua (Colombia, 1990-presente)
        - Verdes en gobierno de coalición (Alemania, 1998-2005 y 2021-presente)
        - Green Party en parlamento neozelandés (Nueva Zelanda, 1999-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Pol%C3%ADtica_verde
      - id: technological-primitivism
        name: Primitivismo tecnológico
        nameEn: Technological Primitivism
        weight: 1
        description: Crítica radical de la civilización industrial que propone retornar a formas pre-tecnológicas
          de organización social.
        longDescription: 'El primitivismo tecnológico —también llamado anarco-primitivismo— sostiene que
          la civilización industrial, y en particular la tecnología compleja, es la causa estructural
          de la dominación, la alienación y la destrucción ecológica. Propone el retorno a formas de vida
          cazadoras-recolectoras o de pequeña escala como condición para la libertad humana auténtica.


          A diferencia del ludismo histórico, que rechazaba ciertas máquinas por razones laborales, el
          primitivismo tecnológico critica la tecnología como sistema de organización social: cada dispositivo
          implica una cadena de extracción, producción y jerarquía que reproduce la dominación. La distinción
          entre herramientas y tecnología —popularizada por John Zerzan— intenta separar el utensilio
          manual del aparato industrial.


          Sus raíces teóricas se encuentran en la crítica a la civilización de Jacques Ellul, en la filosofía
          de la técnica de Lewis Mumford y en el situacionismo de Guy Debord. Zerzan radicaliza estas
          tradiciones al ubicar el origen de la alienación no en el capitalismo sino en el surgimiento
          del lenguaje simbólico, la numeración y la agricultura hace diez mil años.


          Fringe Elites como Derrick Jensen amplían la crítica hacia el colapso civilizatorio como única
          salida viable, mientras que otros autores como David Watson mantienen una posición más matizada
          sobre la tecnología de subsistencia.


          En la práctica, ningún proyecto político de escala ha implementado estos postulados, por lo
          que permanece como corriente crítico-filosófica y como referente teórico de algunas comunidades
          eco-intencionales. Tiene influencia en el movimiento de rewilding y en sectores del ecofeminismo
          radical.'
        historicalContext: El primitivismo tecnológico como corriente explícita se consolida en los años
          ochenta y noventa en torno a la revista Fifth Estate (Detroit) y a la obra de John Zerzan. Recibe
          impulso del debate sobre el Manifiesto Unabomber (Ted Kaczynski, 1995), aunque la mayoría de
          sus exponentes rechaza la violencia. Se conecta con la tradición crítica de la civilización
          iniciada por Rousseau y con la antropología de Marshall Sahlins sobre sociedades de abundancia
          primitiva.
        contemporaryRelevance: Aunque sin presencia electoral, el primitivismo tecnológico influye en
          debates sobre desconexión digital, collapsología y movimientos de rewilding. Sus análisis sobre
          la dependencia tecnológica y el extractivismo digital resonan en círculos ecologistas radicales
          y en comunidades de vida simple. La pandemia de 2020 avivó conversaciones sobre los límites
          de la mediación tecnológica que esta corriente lleva décadas planteando.
        commonCriticisms: Los socialistas y socialdemócratas sostienen que el primitivismo idealiza formas
          de vida pasadas ignorando los altos índices de mortalidad y la falta de derechos en sociedades
          preindustriales. Los anarcocomunistas argumentan que rechaza la tecnología en abstracto en lugar
          de cuestionar su control de clase. Pensadores feministas señalan que la división sexual del
          trabajo en sociedades cazadoras-recolectoras rara vez era igualitaria.
        keyThinkers:
        - John Zerzan
        - Derrick Jensen
        - David Watson
        - Jacques Ellul
        - Lewis Mumford
        historicalExamples:
        - Revista Fifth Estate como plataforma intelectual (EE. UU., 1965-presente)
        - Comunidades intencionales de vida primitiva (Europa y Norteamérica, 1980-presente)
        - Debate en torno al Manifiesto Unabomber (EE. UU., 1995)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcoprimitivismo
      - id: gandhism
        name: Gandhismo
        nameEn: Gandhism
        weight: 2
        description: Filosofía política de Mahatma Gandhi basada en no-violencia (ahimsa), resistencia
          civil y autosuficiencia económica local.
        keyThinkers:
        - Mohandas K. Gandhi
        - Vinoba Bhave
        - B. R. Ambedkar
        - Martin Luther King Jr.
        - Gene Sharp
        longDescription: 'El gandhismo es un sistema ético y político fundado en la no-violencia (ahimsa),
          la verdad activa (satyagraha) y la autosuficiencia comunitaria (swaraj). Mohandas Gandhi desarrolló
          estas ideas como estrategia de liberación colonial y como visión de una sociedad postcapitalista
          descentralizada basada en aldeas autosuficientes.


          Ahimsa —no causar daño a ningún ser vivo— no es para Gandhi simple pacifismo pasivo sino fuerza
          activa capaz de transformar al opresor. Satyagraha, literalmente «fuerza de la verdad», implica
          la resistencia civil organizada mediante huelgas, boicots y desobediencia abierta y no violenta
          a las leyes injustas. Swaraj designa tanto la independencia nacional como el autodominio individual.


          La economía gandhiana rechaza la industrialización masiva y propone la revitalización de los
          oficios artesanales —simbolizados en el charkha, la rueca de hilar— como modo de devolver dignidad
          económica a las comunidades campesinas. Esta visión lo distancia del socialismo centralizador
          de Nehru y lo acerca a corrientes anarquistas descentralizadas.


          Influyó directamente en el movimiento por los derechos civiles de Martin Luther King, en la
          teología de la liberación latinoamericana, en el movimiento Chipko de las mujeres indias contra
          la deforestación y en las estrategias de resistencia no violenta de Mandela antes del giro guerrillero
          del CNA.


          La vertiente filosófica del gandhismo incluye debates sobre la coherencia entre ahimsa y la
          defensa en caso de agresión extrema —debate que el propio Gandhi abordó contradictoriamente
          a lo largo de su vida— y sobre si el modelo de aldea es aplicable a sociedades industriales
          contemporáneas.'
        historicalContext: Gandhi sistematizó su filosofía entre 1893 y 1948, desde sus primeras campañas
          en Sudáfrica hasta el asesinato en Nueva Delhi. El movimiento de No Cooperación (1920-22), la
          Marcha de la Sal (1930) y la campaña Quit India (1942) son sus aplicaciones más conocidas. Tras
          la independencia de India (1947), el gandhismo influyó en la redacción de la Constitución y
          en el movimiento Sarvodaya de Vinoba Bhave.
        contemporaryRelevance: La resistencia civil no violenta sigue siendo el marco analítico de referencia
          en estudios de conflicto (Chenoweth y Stephan, 2011). Movimientos como el de las Madres de Plaza
          de Mayo, Black Lives Matter y las revoluciones de color en Europa del Este invocan explícita
          o implícitamente principios gandhianos. En India, el movimiento anticorrupción de Anna Hazare
          (2011) actualizó la desobediencia civil satyagraha.
        commonCriticisms: Los marxistas sostienen que el gandhismo desvía la atención de las contradicciones
          de clase y preserva estructuras de casta al enfocarse en la reconciliación moral. Las feministas
          señalan la ambivalencia de Gandhi sobre el rol de las mujeres y su idealización de la pureza
          sexual. Pensadores de la descolonización como Frantz Fanon argumentaron que la no-violencia
          puede ser inviable cuando el colonialismo responde con violencia sistemática.
        historicalExamples:
        - Marcha de la Sal (India, 1930)
        - Movimiento por los derechos civiles afroamericanos (EE. UU., 1955-1968)
        - Movimiento Chipko de protección forestal (India, 1973)
        - Movimiento anticorrupción de Anna Hazare (India, 2011)
        wikipediaUrl: https://es.wikipedia.org/wiki/Gandhismo
      - id: mandelism
        name: Mandelismo
        nameEn: Mandelism
        weight: 1
        description: 'Legado político de Nelson Mandela: reconciliación nacional, democracia multirracial
          y justicia social gradual.'
        keyThinkers:
        - Nelson Mandela
        - Desmond Tutu
        - Walter Sisulu
        - Oliver Tambo
        - Pumla Gobodo-Madikizela
        longDescription: 'El mandelismo no es una ideología codificada sino una tradición política centrada
          en los principios de reconciliación, dignidad humana y transición negociada hacia la justicia
          que encarnó Nelson Mandela durante y después del apartheid sudafricano. Se articula en torno
          al concepto ubuntu —«soy porque somos»— y a la convicción de que la libertad política exige
          renunciar al odio sin renunciar a la justicia.


          Mandela combinó el nacionalismo africano del Congreso Nacional Africano (CNA) con influencias
          socialistas, gandhianas y humanistas. Su decisión de negociar con el régimen del apartheid —en
          lugar de buscar la victoria militar— y su presidencia de la Comisión de la Verdad y Reconciliación
          (en colaboración con Desmond Tutu) convirtieron a Sudáfrica en referente mundial de la justicia
          transicional.


          El núcleo del mandelismo como tradición es la idea de que los oprimidos no deben reproducir
          la lógica del opresor. Esto implica acuerdos de compromiso que protejan derechos fundamentales
          mientras se evita la violencia de venganza. Es, en este sentido, una filosofía de transición
          más que un modelo de sociedad acabada.


          Sus limitaciones estructurales son parte del debate: la transición sudafricana preservó las
          desigualdades económicas del apartheid, y el propio Mandela reconoció que la libertad política
          sin redistribución económica era insuficiente. Esto ha generado una lectura crítica del mandato
          (1994-1999) desde el movimiento de lucha por la tierra y las organizaciones comunitarias.


          Como referente simbólico global, el mandelismo influye en procesos de paz, en la pedagogía de
          la reconciliación y en movimientos que buscan articular justicia con cohesión social.'
        historicalContext: Nelson Mandela fue encarcelado en 1964 y liberado en 1990, tras 27 años en
          la prisión de Robben Island. Las negociaciones con el gobierno de F. W. de Klerk (1990-1994)
          y las primeras elecciones multirraciales de Sudáfrica (1994) constituyeron el momento fundacional
          de esta tradición. La Comisión de la Verdad y Reconciliación (1996-1998), presidida por Desmond
          Tutu, institucionalizó el modelo de justicia restaurativa que hoy se estudia en todo el mundo.
        contemporaryRelevance: El modelo de reconciliación sudafricano sigue siendo referencia en procesos
          de paz en Colombia, Ruanda y Zimbabue. La figura de Mandela es invocada en debates sobre justicia
          transicional, penas alternativas y tratamiento de crímenes de lesa humanidad. Sin embargo, organizaciones
          como el Movimiento de los Sin Tierra en Sudáfrica critican que la herencia mandélica no fue
          suficiente para transformar la estructura económica heredada.
        commonCriticisms: Los críticos de izquierda —como el movimiento Economic Freedom Fighters de Julius
          Malema— sostienen que Mandela cedió demasiado en lo económico al aceptar las condiciones del
          Banco Mundial y del capital blanco. Los analistas de justicia transicional señalan que la amnistía
          condicionada de la CVR dejó sin reparación suficiente a muchas víctimas. Pensadores africanos
          radicales argumentan que el ubuntu fue romantizado para suavizar exigencias de redistribución
          real.
        historicalExamples:
        - Liberación de Mandela y fin del apartheid (Sudáfrica, 1990-1994)
        - Comisión de la Verdad y Reconciliación (Sudáfrica, 1996-1998)
        - Proceso de paz colombiano inspirado en el modelo sudafricano (Colombia, 2012-2016)
        wikipediaUrl: https://es.wikipedia.org/wiki/Nelson_Mandela
    - name: anarquismo-social
      weight: 4
      children:
      - id: libertarian-socialism
        name: Socialismo libertario
        nameEn: Libertarian Socialism
        weight: 2
        description: Corriente que rechaza tanto el capitalismo como el Estado autoritario, defendiendo
          autogestión y federaciones voluntarias.
        keyThinkers:
        - Mijaíl Bakunin
        - Piotr Kropotkin
        - Noam Chomsky
        - Murray Bookchin
        - David Graeber
        longDescription: 'El socialismo libertario es una familia ideológica que combina la abolición
          del Estado como aparato de dominación con la transformación colectiva de las relaciones de propiedad.
          Rechaza tanto el socialismo autoritario de Estado —que concentra poder en una vanguardia o burocracia—
          como el capitalismo —que concentra riqueza en el capital privado—, proponiendo en su lugar formas
          de autogestión, federalismo y propiedad comunitaria.


          La corriente es heterogénea: incluye anarquistas, comunistas de consejo, socialistas de gremio,
          autonomistas y sindicalistas revolucionarios. Lo que las une es la convicción de que el socialismo
          no puede lograrse mediante la conquista del Estado sino a través de su desmantelamiento y sustitución
          por estructuras horizontales de gestión colectiva.


          Entre sus fuentes teóricas se encuentran los escritos de Bakunin contra el marxismo de Estado
          en la Primera Internacional (1868-1872), la corriente del consejismo (Anton Pannekoek, Paul
          Mattick), el federalismo de Proudhon y la experiencia de los soviets de base antes de su cooptación
          bolchevique. En el siglo XX, Noam Chomsky ha sido su principal divulgador anglosajón.


          A diferencia del anarcocomunismo, que enfatiza la abolición inmediata de toda forma de Estado,
          el socialismo libertario admite períodos de transición y estructuras de coordinación descentralizada.
          A diferencia del socialismo de Estado, rechaza cualquier forma de vanguardismo.


          Sus aplicaciones históricas incluyen la autogestión yugoslava (aunque con componentes estatales),
          la experiencia de los consejos de trabajadores en Hungría (1956) y los municipios autónomos
          del zapatismo en Chiapas.'
        historicalContext: La expresión «socialismo libertario» se consolida en la segunda mitad del siglo
          XIX como contraposición al marxismo parlamentario y al socialismo de Estado. Los debates en
          la Primera Internacional entre Marx y Bakunin (1868-1872) fijaron las líneas de fractura. Durante
          el siglo XX la corriente se expresó en el anarcosindicalismo español (CNT, 1910), los consejos
          de trabajadores alemanes (1918-19) y el zapatismo mexicano (1994-presente).
        contemporaryRelevance: El socialismo libertario resurge en el siglo XXI en movimientos como Occupy
          (2011), los municipios de Rojava (Kurdistán sirio, 2012-presente) y el autonomismo latinoamericano.
          La obra de David Graeber popularizó sus ideas en el movimiento alterglobalizador y en debates
          sobre deuda y democracia directa. Representa una alternativa teórica a la socialdemocracia y
          al marxismo-leninismo.
        commonCriticisms: Los marxistas ortodoxos sostienen que el socialismo libertario carece de una
          teoría coherente de transición y de un agente histórico organizado capaz de desafiar al Estado
          capitalista. Los socialdemócratas argumentan que sus propuestas son inviables a escala industrial.
          Los liberales clásicos señalan que la propiedad colectiva elimina los incentivos para la innovación
          y la coordinación eficiente.
        historicalExamples:
        - Primera Internacional — fractura Bakunin-Marx (Internacional, 1868-1872)
        - Consejos de trabajadores en Alemania y Hungría (Europa, 1918-1919 y 1956)
        - Municipalismo democrático de Rojava (Kurdistán sirio, 2012-presente)
        - Movimiento zapatista — municipios autónomos (México, 1994-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Socialismo_libertario
      - id: anarcho-communism
        name: Anarco-comunismo
        nameEn: Anarcho-Communism
        weight: 2
        description: Síntesis anarquismo + comunismo que propone abolir Estado, dinero y propiedad privada,
          sustituidos por comunas federadas.
        keyThinkers:
        - Piotr Kropotkin
        - Errico Malatesta
        - Emma Goldman
        - Néstor Maknó
        - Élisée Reclus
        longDescription: 'El anarcocomunismo propone la abolición simultánea del Estado y del capitalismo
          para instaurar una sociedad de comunas libres basada en la propiedad común de los medios de
          producción y la distribución según las necesidades. A diferencia del marxismo-leninismo, rechaza
          cualquier Estado de transición o dictadura del proletariado: la revolución debe instaurar directamente
          la autogestión horizontal.


          Piotr Kropotkin es su pensador más sistemático. En La conquista del pan (1892) y El apoyo mutuo
          (1902), Kropotkin argumentó que la cooperación —no la competencia— es el motor principal de
          la evolución biológica y social, y que la humanidad posee capacidad natural para organizarse
          sin coerción jerárquica. Errico Malatesta complementó esta visión con énfasis en la acción directa
          y la organización federativa.


          El modelo económico anarcocomunista se basa en almacenes comunes, distribución gratuita y gestión
          descentralizada mediante asambleas de barrio y delegados revocables. Rechaza el salario como
          forma de dominación y propone abolirlo junto con el dinero en el proceso revolucionario.


          La experiencia más cercana a sus postulados fue la Cataluña anarquista durante la Guerra Civil
          española (1936-1939), donde la CNT-FAI colectivizó fábricas, granjas y servicios urbanos en
          Barcelona y Aragón. Esta experiencia fue destruida tanto por las tropas franquistas como por
          la represión estalinista en el interior republicano.


          Internamente existe tensión entre el comunismo anarquista platformista —que acepta organización
          política más estructurada, siguiendo el Manifiesto de Archinov (1926)— y el antiorganizacionalismo
          de Errico Malatesta y los sintetistas.'
        historicalContext: El anarcocomunismo se consolida como corriente en los años 1880-1890, diferenciándose
          del anarco-colectivismo de Bakunin en que rechaza el salario incluso en el período posrevolucionario.
          Kropotkin lo sistematizó en La conquista del pan (1892). La Revolución Rusa (1917-21) y la represión
          de los anarquistas ucranianos por el ejército rojo (Maknó, 1921) marcaron su derrota. La Guerra
          Civil española (1936-39) fue su mayor experimento histórico.
        contemporaryRelevance: El anarcocomunismo mantiene presencia en redes organizativas como la Federación
          Anarquista Internacional (IFA) y en partidos como la Workers Solidarity Movement (Irlanda) o
          la Federación Anarquista de Gran Bretaña. Influye en el movimiento de commonistas, en la economía
          de bienes comunes y en los debates sobre la automatización y el trabajo sin salario.
        commonCriticisms: Los marxistas sostienen que sin Estado transitorio es imposible coordinar una
          economía industrial compleja. Los socialdemócratas argumentan que la abolición del salario elimina
          señales de escasez necesarias para la asignación eficiente. Los liberales señalan que la propiedad
          común requiere mecanismos coercitivos de facto para resolver conflictos de uso.
        historicalExamples:
        - Colectividades anarquistas en Cataluña y Aragón (España, 1936-1939)
        - Ejercito Insurreccional Ucraniano de Maknó (Ucrania, 1918-1921)
        - Comunas anarquistas en Ciudad de México (México, 1910-1915)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcocomunismo
      - id: anarcho-syndicalism
        name: Anarco-sindicalismo
        nameEn: Anarcho-Syndicalism
        weight: 2
        description: Estrategia anarquista centrada en los sindicatos como medio de lucha y órgano de
          la sociedad post-capitalista.
        historicalExamples:
        - CGT francesa — Carta de Amiens (Francia, 1906)
        - CNT española durante la Guerra Civil (España, 1936-1939)
        - IWW — huelgas en industria minera y textil (EE. UU., 1905-1920)
        - Huelga general de Buenos Aires (Argentina, 1909)
        longDescription: 'El anarcosindicalismo propone que los sindicatos obreros revolucionarios sean
          el instrumento central tanto de la lucha cotidiana contra el capital como de la organización
          de la futura sociedad sin Estado. A diferencia del sindicalismo reformista, los sindicatos anarquistas
          no buscan negociar mejores condiciones dentro del sistema sino construir, desde la fábrica y
          el taller, las estructuras del nuevo orden social.


          Su táctica principal es la acción directa: huelgas, boicots, sabotaje y, en el horizonte estratégico,
          la huelga general revolucionaria. Rechaza la participación en partidos políticos y en procesos
          electorales, considerándolos vías de cooptación e ilusión reformista. La organización se estructura
          en federaciones descentralizadas donde cada sindicato conserva autonomía plena.


          La Confédération Générale du Travail (CGT) francesa fue el primer sindicato en sistematizar
          estos principios en la Carta de Amiens (1906). La Confederación Nacional del Trabajo (CNT) española
          —fundada en 1910 y activa durante la Guerra Civil— es la referencia histórica más desarrollada.
          En América, la Industrial Workers of the World (IWW, fundada en 1905) representó la versión
          norteamericana de esta corriente.


          Teóricamente, el anarcosindicalismo se distingue del anarcocomunismo en que privilegia la organización
          del trabajo como espacio de lucha y prefigura la sociedad futura en las estructuras sindicales,
          antes que en las comunas vecinales. Rudolf Rocker sistematizó esta distinción en su obra Anarcosindicalismo
          (1938).


          Hoy sobrevive en organizaciones como la IWW, la CNT española y la AIT (Asociación Internacional
          de los Trabajadores), con presencia en debates sobre derechos laborales, plataformas digitales
          y trabajo precario.'
        historicalContext: El anarcosindicalismo como corriente organizada surge entre 1890 y 1910 en
          Francia, España y Estados Unidos. La Carta de Amiens (CGT, 1906) lo codificó doctrinalmente.
          La CNT española (fundada 1910) alcanzó 1,5 millones de afiliados en 1936. Durante la Guerra
          Civil española participó en el gobierno regional catalán, lo que generó debates sobre la coherencia
          antiestatalista. Fue reprimido por el franquismo y el estalinismo.
        contemporaryRelevance: La IWW organiza trabajadores de plataformas digitales, repartidores y sector
          servicios en EE. UU. y Europa. La CNT española y la CGT francesa mantienen presencia en sectores
          industriales y de servicios. El debate sobre la sindicalización de trabajadores de Uber, Amazon
          y Deliveroo revitaliza discusiones sobre acción directa y organización horizontal propias del
          anarcosindicalismo.
        commonCriticisms: Los marxistas-leninistas sostienen que sin partido de vanguardia el movimiento
          obrero no puede superar el reformismo economicista. Los socialdemócratas argumentan que rechazar
          la negociación institucional priva a los trabajadores de conquistas graduales reales. Los críticos
          liberales señalan que las huelgas generales afectan principalmente a los trabajadores más vulnerables.
        keyThinkers:
        - Rudolf Rocker
        - Fernand Pelloutier
        - Georges Sorel
        - Emma Goldman
        - Sam Dolgoff
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcosindicalismo
      - id: anarcho-collectivism
        name: Anarco-colectivismo
        nameEn: Anarcho-Collectivism
        weight: 2
        description: Variante anarquista que defiende la propiedad colectiva de los medios de producción
          con retribución según trabajo realizado.
        keyThinkers:
        - Mijaíl Bakunin
        - James Guillaume
        - Carlo Cafiero
        - Élisée Reclus
        - Errico Malatesta
        longDescription: 'El anarco-colectivismo es la corriente anarquista sistematizada por Mijaíl Bakunin
          en la Primera Internacional (1868-1872) que propone la abolición del Estado y la propiedad privada,
          pero —a diferencia del anarcocomunismo kropotkiniano— mantiene el principio de remuneración
          según la contribución del trabajo en lugar de distribuir según las necesidades. Los medios de
          producción son propiedad colectiva de los trabajadores, pero el salario persiste como reconocimiento
          del esfuerzo individual.


          Bakunin argumentó que la propiedad colectiva —gestionada por federaciones de sindicatos libres—
          elimina la explotación capitalista sin requerir la uniformidad distributiva absoluta que el
          comunismo anarquista presupone. Esta distinción lo enfrentó tanto con Marx (por rechazar el
          Estado transitorio) como con Kropotkin (por preservar el salario).


          La Primera Internacional fue el escenario central del debate: Bakunin y sus aliados de la Alianza
          Internacional de la Democracia Socialista confrontaron a Marx hasta la escisión formal en el
          Congreso de La Haya (1872). El internacionalismo bakuninista —fuerte en España, Italia, Suiza
          y Rusia— sentó las bases del movimiento libertario mediterráneo.


          Junto a Bakunin, James Guillaume y Carlo Cafiero desarrollaron los principios organizativos
          del colectivismo: federalismo estricto, mandato imperativo, delegados revocables. La Federación
          del Jura (Suiza) fue su primera aplicación concreta.


          Esta corriente es más histórica que contemporánea: la mayoría de los anarquistas posteriores
          a 1900 asumieron posiciones comunistas o sindicalistas. Sin embargo, su énfasis en el federalismo
          y la autonomía colectiva sigue siendo referencia en teorías de la organización descentralizada.'
        historicalContext: El anarco-colectivismo se desarrolla entre 1868 y 1880 en el marco de la Primera
          Internacional, con Bakunin como figura central. Su influencia fue especialmente fuerte en la
          Alianza Internacional de la Democracia Socialista y en la Federación del Jura. La expulsión
          de Bakunin en el Congreso de La Haya (1872) consolidó la escisión con el marxismo. A partir
          de los años 1880 fue gradualmente desplazado por el anarcocomunismo.
        contemporaryRelevance: El anarco-colectivismo como corriente diferenciada tiene escasa presencia
          contemporánea. Sus principios de federalismo y mandato imperativo son retomados por movimientos
          de democracia directa y por teorías del confederalismo democrático. Como referente histórico,
          influye en los debates sobre autogestión y formas de organización sin Estado en el movimiento
          anarquista global.
        commonCriticisms: Los anarcocomunistas sostienen que mantener el salario perpetúa la lógica mercantil
          y la medición cuantitativa del trabajo humano. Los marxistas señalan que sin Estado transitorio
          la colectivización es vulnerable a la reacción capitalista y militar. Los teóricos liberales
          argumentan que la propiedad colectiva sin mercado introduce ineficiencias en la asignación de
          recursos.
        historicalExamples:
        - Federación del Jura — primera aplicación del colectivismo federalista (Suiza, 1872-1880)
        - Primera Internacional — fracción antiautoritaria bakuninista (Internacional, 1868-1872)
        - Internacionalismo bakuninista en España e Italia (España/Italia, 1870-1880)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcocomunismo#Colectivismo_anarquista
      - id: anarcho-feminism
        name: Anarco-feminismo
        nameEn: Anarcha-Feminism
        weight: 2
        description: Síntesis de anarquismo y feminismo que identifica al patriarcado y al Estado como
          formas interconectadas de dominación.
        longDescription: 'El anarco-feminismo articula la crítica anarquista al Estado y al capitalismo
          con la crítica feminista al patriarcado, sosteniendo que las tres formas de dominación son inseparables
          y deben abolirse simultáneamente. No se puede alcanzar la libertad política destruyendo el Estado
          si persiste la dominación de género en el hogar, la sexualidad y la reproducción.


          Emma Goldman es la figura fundacional de esta corriente. En sus ensayos de finales del siglo
          XIX y principios del XX —recogidos en Anarchism and Other Essays (1910) y La mujer emancipada
          (1910)— combinó la defensa de la emancipación sexual, el control de la natalidad, el amor libre
          y la autonomía corporal con la crítica al capitalismo y al Estado. Su posición le valió la expulsión
          de varios grupos anarquistas masculinos que consideraban la «cuestión de la mujer» un asunto
          secundario.


          Teóricamente, el anarco-feminismo sostiene que el patriarcado es la forma originaria y más persistente
          de dominación jerárquica, anterior incluso al Estado. Por eso no puede subordinarse a la lucha
          de clases sino que debe combatirse como eje autónomo de liberación. En esto se distancia del
          marxismo feminista, que tiende a derivar la opresión de género de las relaciones de producción.


          La segunda ola del feminismo (años 1960-1980) renovó el anarco-feminismo con aportes de Carol
          Ehrlich, Peggy Kornegger y, más tarde, Cindy Milstein. El movimiento de mujeres en Rojava y
          el feminismo kurdo de Jineolojî representan su versión más influyente del siglo XXI, integrando
          la crítica al Estado-nación con el feminismo comunitario.


          En América Latina, el movimiento feminista chileno, argentino y colombiano ha producido vertientes
          anarco-feministas activas en debates sobre violencia de género, economía del cuidado y soberanía
          reproductiva.'
        historicalContext: Emma Goldman sistematizó el anarco-feminismo entre 1890 y 1920. La primera
          ola fue inseparable de las luchas por el sufragio, aunque Goldman rechazó el sufragismo institucional
          por considerarlo reformismo sin transformación real. La segunda ola de los años sesenta-setenta
          lo relanzó ligado a la liberación sexual y al rechazo de la familia nuclear. El movimiento de
          mujeres en Kurdistán (Jineolojî, desde 2000) representa su articulación más contemporánea.
        contemporaryRelevance: El anarco-feminismo tiene presencia activa en movimientos como el Ni Una
          Menos latinoamericano, en la organización Mujeres Libres (España, refundada) y en colectivos
          autónomos de todo el mundo. La filosofía de Jineolojî en Rojava combina feminismo comunitario
          con municipalismo libertario. Debates sobre trabajo de cuidados, aborto y violencia de género
          mantienen vivo su marco analítico.
        commonCriticisms: El feminismo liberal sostiene que el rechazo del Estado y las instituciones
          priva a las mujeres de mecanismos legales de protección contra la violencia. El marxismo feminista
          critica la omisión de un análisis sistemático de clase en favor de la autonomía individual.
          Algunos grupos anarquistas más tradicionales han criticado la introducción de identidades de
          género como eje de organización por considerarla divisiva.
        keyThinkers:
        - Emma Goldman
        - Voltairine de Cleyre
        - Lucy Parsons
        - Peggy Kornegger
        - Cindy Milstein
        historicalExamples:
        - Mujeres Libres — organización anarco-feminista durante la Guerra Civil (España, 1936-1939)
        - Emma Goldman — agitación y deportación (EE. UU., 1900-1919)
        - Movimiento de mujeres kurdas Jineolojî en Rojava (Kurdistán sirio, 2012-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarquismo_feminista
      - id: queer-anarchism
        name: Anarquismo queer
        nameEn: Queer Anarchism
        weight: 2
        description: Corriente que aplica crítica anarquista a las normas de género y sexualidad desde
          una perspectiva queer.
        longDescription: 'El anarquismo queer emerge en los años noventa como intersección entre la teoría
          queer —que desnaturaliza la heterosexualidad normativa y las identidades de género binarias—
          y la política anarquista —que rechaza toda forma de dominación jerárquica, incluida la que organiza
          el deseo y el cuerpo. Su premisa central es que la heteronorma es una institución de control
          social inseparable del Estado, la familia nuclear y el capital.


          A diferencia del movimiento LGBTQ+ liberal, el anarquismo queer rechaza la asimilación como
          estrategia política: la igualdad matrimonial, el acceso al ejército o la representación corporativa
          no cuestionan las estructuras de poder que producen la heteronorma. La liberación queer requiere
          desmantelar esas estructuras, no integrarse en ellas.


          Tomás Ibáñez, queer anarquistas como Fiona Nicoll y la influencia de Michel Foucault —especialmente
          su Historia de la sexualidad— son referencias teóricas centrales. El activismo directo de ACT
          UP (1987) contra la respuesta estatal al SIDA y la filosofía de Judith Butler sobre performatividad
          de género alimentaron este encuentro.


          Prácticamente, el anarquismo queer se organiza en colectivos autónomos, centros sociales okupados
          y redes de cuidados mutuo que intentan prefigurar relaciones no normativas fuera de las instituciones.
          Critica tanto el Estado como los procesos de normalización dentro del propio movimiento LGBTQ+.


          En el contexto latinoamericano, colectivos en Argentina, Brasil y México han articulado el anarquismo
          queer con la crítica al colonialismo, la iglesia y las instituciones familiares que criminalizan
          las sexualidades no normativas.'
        historicalContext: El anarquismo queer emerge como corriente explícita a principios de los años
          noventa, influido por el activismo de ACT UP (fundada 1987), la teoría queer de Judith Butler
          y Eve Kosofsky Sedgwick, y las publicaciones del movimiento anarquista norteamericano y europeo.
          La revista Queer Anarchism (EE. UU.) y colectivos europeos como el Queer Anarchist Network (Londres)
          lo institucionalizaron como tendencia reconocible en el movimiento libertario.
        contemporaryRelevance: Colectivos queer anarquistas operan en toda América Latina, Europa y Norteamérica,
          articulando luchas contra la violencia transfóbica y homofóbica con crítica a la homonormatividad
          institucional. En debates sobre derechos reproductivos, trabajo sexual y despenalización de
          drogas, ofrecen marcos que vinculan autonomía corporal con anticapitalismo. La influencia de
          J. Halberstam y Paul Preciado alimenta su producción teórica contemporánea.
        commonCriticisms: El feminismo liberal critica que el rechazo de la representación institucional
          deja a personas LGBTQ+ sin protección legal ante la violencia. Los anarquistas más tradicionales
          señalan que la proliferación de identidades como eje organizativo fragmenta la solidaridad de
          clase. Desde el feminismo materialista se critica que la teoría queer disuelve el sujeto colectivo
          necesario para la transformación social.
        keyThinkers:
        - Judith Butler
        - Paul Preciado
        - J. Halberstam
        - Michel Foucault
        - Fiona Nicoll
        historicalExamples:
        - ACT UP — acción directa contra la política del SIDA (EE. UU., 1987-presente)
        - Queer Nation — activismo de visibilidad y confrontación (EE. UU., 1990)
        - Colectivos queer anarquistas en Buenos Aires y Ciudad de México (América Latina, 2000-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarquismo_queer
      - id: eco-anarchism
        name: Eco-anarquismo
        nameEn: Eco-Anarchism
        weight: 2
        description: Síntesis de anarquismo y ecología profunda que rechaza tanto al Estado como a la
          industrialización como formas de dominación.
        longDescription: 'El eco-anarquismo —o anarquismo ecológico— sostiene que la dominación de la
          naturaleza y la dominación de los seres humanos son fenómenos inseparables: toda jerarquía social
          se proyecta sobre los ecosistemas y viceversa. Su premisa es que la crisis ecológica no puede
          resolverse dentro de estructuras estatales o capitalistas sino que exige una reorganización
          radical de la vida social en comunidades descentralizadas integradas a sus entornos biofísicos.


          Murray Bookchin es su pensador más sistemático. En La ecología de la libertad (1982) y en su
          proyecto de «ecología social», Bookchin argumentó que el problema ecológico es fundamentalmente
          social: surge de la dominación humana sobre los humanos, que luego se extiende a la dominación
          sobre la naturaleza. La solución no es el retorno a la naturaleza primitiva —como propone el
          anarco-primitivismo— sino la construcción de municipalidades confederadas donde la tecnología
          esté al servicio de la sostenibilidad ecosistémica.


          A diferencia del ecologismo verde institucional, el eco-anarquismo rechaza soluciones de mercado
          como el mercado de carbono y las alianzas con gobiernos y corporaciones. A diferencia del primitivismo,
          no rechaza toda tecnología sino solo la tecnología jerárquica al servicio del capital.


          La ecología social de Bookchin influyó directamente en el municipalismo democrático kurdo y
          en movimientos de permacultura, transición energética comunitaria y guerrilla de jardinería
          urbana. Organizaciones como Earth First! (EE. UU.) y el movimiento de defensa de bosques en
          India articulan acción directa con principios eco-anarquistas.


          Internamente existe la tensión entre la ecología social humanista de Bookchin y el biocentrismo
          de la ecología profunda (deep ecology), que concede derechos intrínsecos a las especies no humanas
          independientemente de su utilidad para los humanos.'
        historicalContext: El eco-anarquismo se consolida como corriente en los años setenta y ochenta,
          con el movimiento antinuclear y la fundación de Earth First! (1980) como catalizadores. La ecología
          social de Bookchin (La ecología de la libertad, 1982) y la ecología profunda de Arne Naess ofrecieron
          marcos teóricos complementarios y en tensión. En los años noventa la corriente se amplió con
          el movimiento anticumbre y el ecofeminismo.
        contemporaryRelevance: El eco-anarquismo influye en movimientos de defensa territorial en América
          Latina, en la teoría del Buen Vivir indígena y en el debate sobre el decrecimiento. Earth First!
          y grupos como Deep Green Resistance siguen activos. El municipalismo libertario kurdo aplica
          principios eco-anarquistas a nivel institucional. La crisis climática ha renovado el interés
          en sus propuestas de descentralización y autonomía.
        commonCriticisms: El socialismo de Estado critica que la descentralización radical dificulta la
          planificación coordinada de la transición energética a escala industrial. Los verdes institucionales
          señalan que el rechazo de la política parlamentaria reduce la influencia en decisiones que afectan
          ecosistemas reales. El primitivismo tecnológico critica que Bookchin confía demasiado en la
          tecnología como solución.
        keyThinkers:
        - Murray Bookchin
        - Arne Naess
        - David Foreman
        - Élisée Reclus
        - Peter Marshall
        historicalExamples:
        - Earth First! — sabotaje y defensa de bosques (EE. UU., 1980-presente)
        - Movimiento Chipko contra deforestación (India, 1973)
        - Municipalismo ecológico de Rojava (Kurdistán sirio, 2012-presente)
        - Comunidades de permacultura en el movimiento de transición (Global, 2006-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarquismo_verde
      - id: religious-anarchism
        name: Anarquismo religioso
        nameEn: Religious Anarchism
        weight: 2
        description: Corriente que deriva su rechazo al Estado y a la autoridad de convicciones religiosas
          (cristianas, budistas, etc.).
        keyThinkers:
        - Lev Tolstói
        - Dorothy Day
        - Jacques Ellul
        - Peter Maurin
        - Vinoba Bhave
        longDescription: 'El anarquismo religioso sostiene que la obediencia a principios espirituales
          o divinos es superior a toda ley humana y todo Estado, y que la autoridad coercitiva del gobierno
          contradice los mandatos éticos de las grandes tradiciones religiosas. A diferencia del anarquismo
          secular, no deriva la libertad de la razón ilustrada sino de la dimensión espiritual de la existencia
          humana.


          Lev Tolstói es la figura central de esta corriente en Occidente. En El reino de Dios está en
          vosotros (1894) y El evangelio en síntesis (1883), Tolstói argumentó que el Sermón del Monte
          —especialmente la enseñanza sobre la no-resistencia al mal mediante la violencia— hace incompatible
          el cristianismo con el Estado, el ejército y los tribunales. Su influencia sobre Gandhi fue
          directa y reconocida.


          El anarquismo religioso no se limita al cristianismo: las corrientes budistas del movimiento
          Sarvodaya en Sri Lanka, el hinduismo gandhiano, el anarquismo islámico (Ali Shariati desde una
          posición heterodoxa) y las comunidades anabaptistas históricas representan versiones de esta
          corriente en diversas tradiciones.


          Entre los pensadores occidentales contemporáneos, Jacques Ellul —calvinista y crítico radical
          de la tecnología— y Doménico Losurdo abordan desde distintos ángulos la tensión entre fe y política
          institucional. En América Latina, la teología de la liberación de Gustavo Gutiérrez comparte
          con el anarquismo religioso la crítica al Estado, aunque sin rechazar la organización política.


          La tensión interna central es entre el pacifismo absoluto tolstoiano y las corrientes que justifican
          la resistencia activa a la injusticia desde principios religiosos, como algunas vertientes de
          la teología de la liberación.'
        historicalContext: El anarquismo religioso moderno se consolida con Tolstói en la segunda mitad
          del siglo XIX. Las comunidades tolstoianas proliferaron en Rusia, Gran Bretaña y Canadá a finales
          del XIX. La influencia de Tolstói sobre Gandhi conectó el anarquismo religioso con la independencia
          india. En Estados Unidos, la Catholic Worker Movement fundada por Dorothy Day (1933) articuló
          catolicismo con pacifismo y acción directa.
        contemporaryRelevance: El anarquismo religioso se mantiene vivo en la Catholic Worker Movement
          (EE. UU.), en comunidades menonitas y anabaptistas y en sectores del movimiento de desobediencia
          civil cristiano. La teología de la liberación latinoamericana comparte raíces con esta corriente.
          Ante el auge del autoritarismo religioso, representa una alternativa interna a las iglesias
          que apuestan por el poder político.
        commonCriticisms: Los anarquistas seculares sostienen que basar la política en autoridades espirituales
          reproduce la lógica de la obediencia que el anarquismo pretende abolir. Los socialistas señalan
          que el rechazo de la violencia puede legitimar la pasividad ante la opresión estructural. Pensadores
          laicos critican que el anarquismo religioso no tiene mecanismos para resolver diferencias doctrinales
          sin recurrir a la autoridad interpretativa.
        historicalExamples:
        - Comunidades tolstoianas en Rusia y Gran Bretaña (Rusia/UK, 1890-1910)
        - Catholic Worker Movement — casas de hospitalidad y pacifismo (EE. UU., 1933-presente)
        - Comunidades anabaptistas-menonitas de resistencia al Estado (Europa/América, siglos XVI-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarquismo_religioso
      - id: anarcho-pacifism
        name: Anarco-pacifismo
        nameEn: Anarcho-Pacifism
        weight: 2
        description: Variante anarquista que combina rechazo del Estado con no-violencia absoluta como
          principio ético y estratégico.
        longDescription: 'El anarco-pacifismo combina el rechazo del Estado y toda forma de dominación
          jerárquica —propio del anarquismo— con el rechazo absoluto de la violencia como medio de transformación
          social. A diferencia del anarquismo en general, que admite debates sobre la violencia revolucionaria,
          el anarco-pacifismo postula que toda violencia —incluso la revolucionaria— reproduce lógicas
          de dominación y corrompe el proceso emancipatorio.


          Bartolomeo Vanzetti, en sus cartas desde la prisión, y más sistemáticamente el filósofo holandés
          Bart de Ligt en La conquista de la violencia (1937) son sus principales teóricos. De Ligt argumentó
          que la no-violencia no es pasividad sino poder social activo: huelgas, desobediencia civil,
          boicots y resistencia no armada son más transformadores que la insurrección armada porque no
          reconstruyen la lógica del poder que pretenden destruir.


          El anarco-pacifismo se distingue del anarco-primitivismo en que no rechaza la modernidad tecnológica;
          del anarcocomunismo, en que condiciona la revolución al método; y del gandhismo, en que no requiere
          una fundamentación espiritual. Es, en este sentido, la versión más puramente táctica del principio
          de no-violencia.


          En la práctica ha influido en el movimiento por el desarme nuclear, en el activismo anti-OTAN
          europeo y en organizaciones como War Resisters International (fundada en 1921), que articula
          la desobediencia civil con la crítica al militarismo y al Estado.


          Internamente existe tensión con corrientes anarquistas que consideran el pacifismo absoluto
          incompatible con la legítima defensa de comunidades amenazadas por la violencia estatal o fascista.'
        historicalContext: El anarco-pacifismo se consolida en el período de entreguerras, con Bart de
          Ligt como principal teórico y War Resisters International (1921) como organización central.
          Sus raíces están en el tolstoísmo y en la objeción de conciencia a la Primera Guerra Mundial.
          Durante la Guerra Civil española fue una posición minoritaria ante el avance del fascismo. Resurgió
          con fuerza en los movimientos antinucleares de los años cincuenta y ochenta.
        contemporaryRelevance: War Resisters International sigue activa en más de 40 países. El anarco-pacifismo
          influye en movimientos de desobediencia civil contra bases militares, en la objetividad de conciencia
          y en el activismo por el desarme. En Colombia, organizaciones de resistencia civil en zonas
          de conflicto aplican principios anarco-pacifistas en la defensa territorial sin armas.
        commonCriticisms: Los anarcocomunistas y socialistas revolucionarios sostienen que el pacifismo
          absoluto desaima a las comunidades frente a la violencia estatal y fascista, convirtiéndose
          en una ventaja estructural para los opresores. Los marxistas-leninistas critican que niega la
          necesidad histórica de la defensa armada de las conquistas revolucionarias. Algunos feministas
          señalan que impone una disciplina de no-violencia que históricamente han soportado más las mujeres.
        keyThinkers:
        - Bart de Ligt
        - Lev Tolstói
        - Dorothy Day
        - Alex Comfort
        - Howard Zinn
        historicalExamples:
        - War Resisters International — desobediencia civil global (Internacional, 1921-presente)
        - Movimiento antinuclear — bloqueos a bases militares (Europa/EE. UU., 1958-1980)
        - Comunidades de paz en zonas de conflicto (Colombia, 1997-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcopacifismo
      - id: situationism
        name: Situacionismo
        nameEn: Situationism
        weight: 1
        description: Movimiento de vanguardia de los 1960s que criticaba la "sociedad del espectáculo"
          y buscaba la transformación revolucionaria de la vida cotidiana.
        keyThinkers:
        - Guy Debord
        - Raoul Vaneigem
        - Asger Jorn
        - René Viénet
        - T.J. Clark
        longDescription: 'El situacionismo —corriente teórica y práctica de la Internacional Situacionista
          (IS, 1957-1972)— sostiene que el capitalismo avanzado ha transformado la vida social en un «espectáculo»:
          un sistema de representaciones mediadas que sustituyen la experiencia vivida directa y producen
          pasividad y alienación. La emancipación requiere construir «situaciones» —momentos de vida intensa
          y no alienada— que quiebren la lógica espectacular.


          Guy Debord, en La sociedad del espectáculo (1967), es el texto central de la corriente. Debord
          argumentó que las mercancías y sus imágenes han colonizado no solo la producción sino la vida
          cotidiana, el tiempo libre y el deseo. El espectáculo no es un conjunto de imágenes sino una
          relación social mediada por imágenes que se ha naturalizado como realidad.


          Las estrategias situacionistas incluyen la dérive —deambulación psicogeográfica que explora
          la ciudad sin itinerario predeterminado— y el détournement —reutilización subversiva de materiales
          culturales dominantes para producir significados contrarios. Ambas buscan recuperar la agencia
          creativa frente a la pasividad espectacular.


          El mayo de 1968 en Francia es el momento de mayor visibilidad histórica del situacionismo: sus
          consignas —«La imaginación al poder», «Bajo los adoquines, la playa»— circularon ampliamente
          en las barricadas. La IS misma se disolvió en 1972 en medio de debates sobre la cooptación y
          la burocratización.


          Su influencia posterior es amplia y heterogénea: el punk británico de los años setenta, la cultura
          del zine, los medialabs, el hacktivismo y las teorías del espectáculo digital de Retort y Franco
          Berardi retoman elementos situacionistas.'
        historicalContext: La Internacional Situacionista fue fundada en Cosio d'Arroscia, Italia, en
          1957, fusionando la Internacional Letrista, el Movimiento Internacional por una Bauhaus Imaginista
          y el grupo CoBrA. Publicó la revista Internationale Situationniste entre 1958 y 1969. Su influencia
          en el mayo francés de 1968 fue significativa. Guy Debord disolvió la IS en 1972 tras expulsar
          sucesivos grupos por compromiso con el espectáculo.
        contemporaryRelevance: La crítica situacionista del espectáculo es referencia ineludible en el
          análisis de las redes sociales, la cultura del selfie y la política mediática del siglo XXI.
          Franco Berardi, Mark Fisher y el colectivo Retort actualizan sus herramientas para el capitalismo
          digital. Movimientos como Adbusters invocan explícitamente el détournement. Su influencia persiste
          en estudios culturales, teoría crítica de medios y arte político.
        commonCriticisms: Los marxistas ortodoxos sostienen que el situacionismo reduce la crítica económica
          a crítica cultural, ignorando las condiciones materiales de la explotación. Los liberales critican
          que su rechazo del trabajo y la producción es incompatible con la organización de sociedades
          complejas. Académicos como Perry Anderson señalaron que la grandilocuencia teórica de Debord
          oculta la falta de programa político concreto.
        historicalExamples:
        - Mayo de 1968 — influencia en barricadas y consignas (Francia, 1968)
        - Movimiento punk como détournement cultural (Reino Unido, 1976-1978)
        - Adbusters — détournement publicitario (Canadá/Internacional, 1989-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Internacional_Situacionista
      - id: minarcho-socialism
        name: Minarco-socialismo
        nameEn: Minarcho-Socialism
        weight: 1
        description: Síntesis hipotética entre Estado mínimo y propiedad social de los medios de producción.
        longDescription: 'El minarco-socialismo es una corriente teórica minoritaria que busca combinar
          el Estado mínimo del minarchismo —reducido a funciones de seguridad, contratos y propiedad—
          con principios socialistas de propiedad colectiva de los medios de producción y gestión cooperativa
          de la economía. Propone que el Estado preserve la infraestructura legal básica mientras la economía
          se organiza horizontalmente mediante cooperativas, sindicatos y mutuales.


          Es una posición teórica sin partido ni movimiento organizado propio. Surge del intento de ciertos
          teóricos libertarios de izquierda de trazar una línea intermedia entre el anarquismo —que rechaza
          todo Estado— y el socialismo de Estado —que requiere un aparato burocrático extenso—. El argumento
          central es que se puede garantizar la propiedad colectiva y la autogestión económica con una
          instancia estatal reducida al mínimo de arbitraje y defensa.


          Se distingue del socialismo libertario en que preserva, aunque sea formalmente, alguna institución
          estatal; del anarco-capitalismo en que rechaza la propiedad privada de los medios de producción;
          y del minarchismo liberal clásico en que la «propiedad» que protege el Estado mínimo es colectiva,
          no individual.


          Su coherencia interna ha sido cuestionada por representantes de ambas tradiciones: los anarquistas
          señalan que cualquier Estado tiende a expandirse y perpetuarse, mientras que los socialistas
          de Estado señalan que sin burocracia planificadora es imposible coordinar una economía industrial.


          Dado su carácter especulativo, su relevancia es principalmente académica, aunque aporta perspectivas
          interesantes al debate sobre el mínimo institucional compatible con la autogestión.'
        historicalContext: El minarco-socialismo como corriente teórica diferenciada tiene escaso desarrollo
          histórico sistemático. Aparece en debates académicos sobre las fronteras entre anarquismo y
          Estado mínimo, especialmente en la filosofía política anglosajona de los años ochenta y noventa.
          No ha dado lugar a organizaciones ni movimientos de escala. Es un ejercicio de teoría normativa
          más que un programa político con antecedentes históricos propios.
        contemporaryRelevance: El minarco-socialismo permanece como posición teórica en debates académicos
          sobre filosofía política y economía normativa. No tiene presencia en partidos ni movimientos
          sociales significativos. Su interés reside en que obliga a precisar qué funciones estatales
          son incompatibles con la autogestión y cuáles serían neutrales o necesarias, enriqueciendo el
          debate entre anarquistas y socialistas sobre las instituciones mínimas.
        commonCriticisms: Los anarquistas sostienen que todo Estado, por mínimo que sea, tiende a expandir
          su poder y reproducir jerarquía. Los marxistas señalan que sin planificación central la coordinación
          económica a escala industrial es imposible. Los liberales clásicos argumentan que la propiedad
          colectiva bajo cualquier sistema —incluso con Estado mínimo— elimina los incentivos individuales
          para la innovación.
        keyThinkers:
        - Hillel Steiner
        - Peter Vallentyne
        - Michael Otsuka
        historicalExamples:
        - Debates académicos en filosofía política anglosajona sobre el Estado mínimo y la propiedad colectiva
          (EE. UU./UK, 1980-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Minarchismo
      - id: mutualism
        name: Mutualismo
        nameEn: Mutualism
        weight: 2
        description: Corriente anarquista de Proudhon que defiende propiedad basada en el uso, intercambio
          mutuo y crédito libre sin interés.
        keyThinkers:
        - Pierre-Joseph Proudhon
        - Pi i Margall
        - Benjamin Tucker
        - Kevin Carson
        - Voltairine de Cleyre
        longDescription: 'El mutualismo es la corriente anarquista fundada por Pierre-Joseph Proudhon
          que propone organizar la economía mediante el intercambio recíproco entre trabajadores y pequeños
          productores, eliminando la renta, el interés y el beneficio capitalista sin abolir completamente
          la propiedad individual de los instrumentos de trabajo. El lema proudhoniano «la propiedad es
          un robo» se aplica a la propiedad absentista —que extrae renta sin trabajar— no a la posesión
          directa del trabajador sobre su herramienta.


          El mecanismo central del mutualismo es el banco del pueblo (banque du peuple), que Proudhon
          intentó fundar en 1849: una institución de crédito gratuito o a coste mínimo donde los trabajadores
          depositarían su trabajo como garantía y obtendrían préstamos sin interés, eliminando así la
          usura como forma de explotación. La idea fue precursora del movimiento cooperativo y de las
          cajas de ahorro populares.


          Económicamente, el mutualismo acepta el mercado como mecanismo de coordinación descentralizado,
          a diferencia del anarcocomunismo que lo rechaza. Pero a diferencia del capitalismo, el mercado
          mutualista elimina la explotación al garantizar que cada productor recibe el equivalente de
          su trabajo gracias al crédito sin interés y a la competencia entre trabajadores libres.


          Politicamente, Proudhon defendió el federalismo como alternativa al Estado centralizado: una
          confederación de municipios y sindicatos con competencias limitadas por contratos recíprocos.
          Esta visión influyó en el federalismo español del siglo XIX y en el pensamiento de Pi i Margall.


          El mutualismo se distingue del anarco-capitalismo en que rechaza la usura, la renta y la corporación;
          y del anarcocomunismo en que preserva el mercado y la remuneración según el trabajo. Es, en
          este sentido, una tercera vía entre el comunismo libertario y el mercado capitalista.'
        historicalContext: Pierre-Joseph Proudhon sistematizó el mutualismo en ¿Qué es la propiedad? (1840)
          y en El sistema de las contradicciones económicas (1846). Intentó fundar la Banque du Peuple
          en París (1849), que fue disuelta por el gobierno. Su influencia en la Primera Internacional
          (1864-1876) fue determinante hasta la llegada de Bakunin. En España, Pi i Margall tradujo sus
          obras y el federalismo proudhoniano influyó en la Primera República Española (1873-1874).
        contemporaryRelevance: El mutualismo influye en el movimiento de cooperativas de crédito, en las
          finanzas islámicas sin interés, en el movimiento de economía solidaria y en teóricos del mercado
          libre libertario como Kevin Carson. En América Latina, las cajas populares y las cooperativas
          de ahorro y crédito recogen elementos mutualistas. El debate sobre las criptomonedas y las monedas
          locales complementarias reactiva algunas ideas proudhonianas.
        commonCriticisms: Los anarcocomunistas, siguiendo a Kropotkin, sostienen que mantener el mercado
          y la remuneración salarial perpetúa la lógica mercantil y la competencia que produce desigualdad.
          Los marxistas señalan que sin abolir el mercado es imposible superar la fetichización de la
          mercancía. Los liberales clásicos argumentan que el crédito a coste cero distorsiona las señales
          de precio necesarias para la asignación eficiente del capital.
        historicalExamples:
        - Banque du Peuple de Proudhon (Francia, 1849)
        - Primera Internacional — predominio mutualista hasta 1868 (Internacional, 1864-1868)
        - Federalismo proudhoniano en la Primera República Española (España, 1873-1874)
        - Movimiento cooperativo de crédito — cajas populares (Europa/América Latina, siglo XIX-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Mutualismo_(econom%C3%ADa)
  lib_right:
    color: '#eab308'
    families:
    - name: liberalismo-clasico
      weight: 4
      children:
      - id: classical-liberalism
        name: Liberalismo clásico
        nameEn: Classical Liberalism
        weight: 3
        description: Tradición filosófica que defiende el libre mercado, las libertades individuales fundamentales,
          el Estado mínimo y el imperio de la ley.
        keyThinkers:
        - John Locke
        - Adam Smith
        - John Stuart Mill
        - Friedrich Hayek
        - Ludwig von Mises
        - Herbert Spencer
        longDescription: 'El liberalismo clásico es la corriente política y económica que surgió en Europa
          occidental entre los siglos XVII y XIX con la tesis central de que la libertad individual —civil,
          política y económica— es el valor supremo de la organización social. Propone que el Estado debe
          limitarse a garantizar la seguridad, la propiedad privada y el cumplimiento de contratos, dejando
          la mayor parte de las decisiones económicas y personales al individuo.


          Sus raíces intelectuales están en John Locke, quien formuló los derechos naturales a la vida,
          la libertad y la propiedad, y en Adam Smith, cuya obra ''La riqueza de las naciones'' (1776)
          argumentó que los mercados libres generan prosperidad colectiva mediante la coordinación descentralizada.
          John Stuart Mill añadió el principio del daño: el Estado solo puede coercionar al individuo
          para evitar perjuicio a terceros.


          A diferencia del liberalismo social (que acepta intervención redistributiva) y del neoliberalismo
          (que incorpora herramientas de política monetaria y fiscal), el liberalismo clásico mantiene
          una postura más estricta sobre el laissez-faire. Sin embargo, no rechaza el Estado en su totalidad
          —ese es el terreno del anarcocapitalismo— sino que defiende un Estado mínimo y bajo el imperio
          de la ley.


          Históricamente se asocia con las revoluciones burguesas del siglo XVIII y con el apogeo del
          libre comercio en Gran Bretaña victoriana. En el siglo XX fue desplazado por el keynesianismo,
          pero experimentó un renacimiento con la Escuela de Chicago y pensadores como Friedrich Hayek
          y Ludwig von Mises, quienes lo actualizaron frente al auge del Estado benefactor.


          En el compás ideológico ocupa la región libertaria-derecha moderada: defiende mercados libres
          (eje económico derecha) pero rechaza el autoritarismo estatal (eje político libertario), distinguiéndose
          del conservadurismo por su énfasis en la razón individual y el progreso frente a la tradición.'
        historicalContext: Emergió con la Revolución Gloriosa inglesa (1688) y las ideas de Locke. Se
          consolidó con la Ilustración escocesa (Hume, Smith) y la Revolución Francesa. Dominó el pensamiento
          político occidental durante el siglo XIX, culminando en el libre comercio de la era victoriana.
          Fue desplazado en el siglo XX por el keynesianismo y el Estado benefactor, pero revivió con
          la Mont Pelerin Society (1947), Hayek y von Mises. Hoy convive con corrientes derivadas como
          el neoliberalismo y el libertarismo.
        contemporaryRelevance: Sigue siendo referencia obligada en debates sobre regulación económica,
          libre comercio y derechos individuales. Partidos y think tanks como el Cato Institute, el Institute
          of Economic Affairs (Reino Unido) y diversas organizaciones de América Latina invocan esta tradición.
          Reaparece en debates sobre libertad de expresión, propiedad intelectual y límites del Estado
          regulador.
        commonCriticisms: Los críticos socialdemócratas señalan que ignora las desigualdades estructurales
          de mercado y que la libertad formal sin recursos materiales es vacía. Pensadores comunitaristas
          como Michael Sandel argumentan que reduce al individuo a un agente atomizado, desvinculado de
          sus comunidades. Desde la izquierda se sostiene que legitima la concentración de riqueza bajo
          el manto de la libertad.
        historicalExamples:
        - Libre comercio victoriano en Gran Bretaña (1846-1914)
        - Constitución de Estados Unidos y Bill of Rights (1788-1791)
        - Reformas liberales en Chile bajo influencia Chicago Boys (1975-1989)
        wikipediaUrl: https://es.wikipedia.org/wiki/Liberalismo_cl%C3%A1sico
      - id: social-liberalism
        name: Liberalismo social
        nameEn: Social Liberalism
        weight: 2
        description: Variante del liberalismo que acepta intervención estatal moderada para corregir fallos
          de mercado y garantizar igualdad de oportunidades.
        keyThinkers:
        - T.H. Green
        - Leonard Hobhouse
        - John Maynard Keynes
        - John Rawls
        - Isaiah Berlin
        - Amartya Sen
        longDescription: 'El liberalismo social es la variante del pensamiento liberal que reconoce que
          la libertad individual requiere condiciones materiales mínimas para ser real y efectiva. A diferencia
          del liberalismo clásico, acepta que el Estado puede —y debe— intervenir para corregir fallas
          de mercado, garantizar derechos sociales básicos y reducir desigualdades extremas, sin por ello
          abandonar el compromiso con la democracia representativa y la economía de mercado.


          Su tesis central es que la libertad negativa (ausencia de interferencia) es insuficiente; se
          necesita también libertad positiva: capacidad real de ejercer los derechos. Isaiah Berlin formuló
          esta distinción en 1958. John Rawls elaboró su teoría de la justicia (1971) argumentando que
          las desigualdades solo son justificables si benefician a los más desfavorecidos, fundamento
          filosófico del liberalismo social contemporáneo.


          Históricamente se separa del liberalismo clásico a finales del siglo XIX con pensadores como
          T.H. Green y Leonard Hobhouse en Gran Bretaña, quienes argumentaron que la pobreza extrema coarta
          la libertad tanto como la tiranía estatal. Esta tradición inspiró el New Deal rooseveltiano,
          el Estado de bienestar nórdico y los programas de los partidos liberales europeos del siglo
          XX.


          Se distingue del socialismo porque mantiene la propiedad privada y el mercado como mecanismos
          principales de asignación; y del conservadurismo porque prioriza derechos individuales y reforma
          social progresiva. En el compás ocupa una posición moderada: algo más estatista que el liberalismo
          clásico pero claramente en el polo libertario frente al autoritarismo.'
        historicalContext: Se consolidó a finales del siglo XIX con la 'nueva escuela liberal' británica
          (Green, Hobhouse, Keynes). Influyó en las reformas del Partido Liberal británico (1906-1914),
          el New Deal de Roosevelt (1933) y la construcción del Estado de bienestar europeo de posguerra.
          En las últimas décadas ha dialogado con el rawlsianismo y el republicanismo cívico, manteniéndose
          como corriente dominante en partidos liberales de Europa occidental.
        contemporaryRelevance: Es la base filosófica de partidos como los Demócratas de Estados Unidos
          en su ala moderada, el Partido Liberal de Canadá, los liberales alemanes (FDP en sus versiones
          más sociales) y varios partidos liberales europeos. Informa debates sobre renta básica universal,
          acceso a salud y reforma fiscal progresiva dentro de marcos de mercado.
        commonCriticisms: Los liberales clásicos y libertarios señalan que la intervención estatal que
          propone tiende a expandirse indefinidamente, creando dependencia y erosionando incentivos. Los
          socialistas argumentan que sus reformas son insuficientes y solo moderan sin transformar estructuras
          de poder económico. Los comunitaristas critican que sigue siendo demasiado individualista y
          abstracto.
        historicalExamples:
        - Reformas sociales del Partido Liberal británico (1906-1914)
        - New Deal de Franklin D. Roosevelt en EE.UU. (1933-1939)
        - Estado de bienestar nórdico (Suecia, Noruega, siglo XX)
        wikipediaUrl: https://es.wikipedia.org/wiki/Liberalismo_social
      - id: democratic-liberalism
        name: Liberalismo democrático
        nameEn: Democratic Liberalism
        weight: 2
        description: Síntesis entre democracia representativa robusta y libre mercado con regulación moderada.
        longDescription: 'El liberalismo democrático articula la síntesis entre el proyecto liberal de
          libertades individuales y el principio democrático de soberanía popular y gobierno representativo.
          Su premisa es que la democracia y el liberalismo se refuerzan mutuamente: sin libertades civiles
          y derechos individuales no hay democracia real, y sin participación popular el liberalismo degenera
          en gobierno de élites.


          Esta corriente sostiene que el sistema político deseable es la democracia constitucional liberal:
          elecciones libres y periódicas, separación de poderes, independencia judicial, protección de
          minorías frente a mayorías y garantías robustas de derechos civiles. Se opone tanto al autoritarismo
          como a las democracias iliberales que usan el voto popular para erosionar el Estado de derecho.


          Históricamente, la tensión entre democracia y liberalismo fue advertida por Tocqueville, quien
          temía la ''tiranía de la mayoría''. La resolución de esa tensión —mediante garantías constitucionales
          y contrapesos institucionales— es precisamente el aporte del liberalismo democrático. Figuras
          como James Madison, en El Federalista, diseñaron mecanismos para esa síntesis.


          En el siglo XX, autores como Karl Popper (''La sociedad abierta y sus enemigos'', 1945) y Robert
          Dahl (teoría de la poliarquía) desarrollaron las bases teóricas de esta corriente. Hoy el concepto
          enfrenta desafíos desde el populismo —que invoca la voluntad mayoritaria contra las instituciones
          liberales— y desde el tecnocratismo, que prefiere decisiones expertas a las electorales.


          En el compás ideológico se ubica en la zona libertaria-derecha moderada, cercana al liberalismo
          clásico, pero con mayor énfasis en las instituciones democráticas como garantía de la libertad.'
        historicalContext: Sus raíces están en el constitucionalismo inglés (Magna Carta, 1215; Revolución
          Gloriosa, 1688) y en los Padres Fundadores estadounidenses. Tocqueville (1835) analizó sus tensiones
          internas. Se consolidó como modelo dominante en Occidente tras la Segunda Guerra Mundial con
          el diseño de instituciones multilaterales liberales. Hoy enfrenta el reto del populismo iliberal
          en Europa del Este, América Latina y Estados Unidos.
        contemporaryRelevance: Es el marco político de referencia de la mayoría de las democracias occidentales
          establecidas. Organizaciones como Freedom House y el V-Dem Institute lo usan como estándar para
          medir calidad democrática. Debates contemporáneos sobre populismo, desinformación y erosión
          institucional giran en torno a sus principios.
        commonCriticisms: Los populistas de izquierda y derecha critican que el liberalismo democrático
          privilegia a élites ilustradas y burocracias sobre la voluntad popular directa. Pensadores republicanos
          señalan que sin participación activa el liberalismo democrático se vuelve procedimental y vacío.
          Los marxistas argumentan que las instituciones liberales protegen estructuras de poder económico.
        keyThinkers:
        - James Madison
        - Alexis de Tocqueville
        - Karl Popper
        - Robert Dahl
        - Giovanni Sartori
        - Fareed Zakaria
        historicalExamples:
        - Constitución de Estados Unidos y sistema de frenos y contrapesos (1788)
        - Transiciones democráticas de Europa del Sur (España, Portugal, Grecia, 1974-1978)
        - Ampliación democrática en Europa del Este post-1989
        wikipediaUrl: https://es.wikipedia.org/wiki/Liberalismo_democr%C3%A1tico
      - id: nordic-liberalism
        name: Liberalismo nórdico
        nameEn: Nordic Liberalism
        weight: 2
        description: Modelo escandinavo que combina mercados libres con fuerte Estado de bienestar universal.
        longDescription: 'El liberalismo nórdico designa la tradición política liberal desarrollada en
          los países escandinavos y nórdicos que combina mercados abiertos, libre comercio y derechos
          individuales con un Estado de bienestar robusto, alta confianza institucional y fuerte énfasis
          en la igualdad de oportunidades. No es simplemente socialismo con nombre diferente: mantiene
          la economía de mercado, la propiedad privada y el sector empresarial privado como columna vertebral,
          pero con impuestos elevados que financian servicios públicos universales.


          Su singularidad reside en la compatibilidad que demuestra entre eficiencia económica y bienestar
          social: los países nórdicos figuran consistentemente entre los más competitivos del mundo (según
          el Foro Económico Mundial) y también entre los más igualitarios. Este modelo ha sido denominado
          ''flexiseguridad'' (flexicurity) en el ámbito laboral: mercados laborales flexibles para los
          empleadores combinados con redes de seguridad generosas para los trabajadores.


          Filosóficamente, el liberalismo nórdico bebe del liberalismo social de Mill y Green, pero también
          de tradiciones luteranas de responsabilidad comunitaria y de las organizaciones cooperativas
          y sindicales del siglo XIX. Partidos liberales como Venstre (Dinamarca), el Centro (Finlandia)
          y el Partido Liberal de Noruega han encarnado históricamente esta tradición.


          En el compás, se ubica ligeramente más al centro que el liberalismo clásico en el eje económico
          —por la aceptación del Estado de bienestar— pero igualmente en la zona libertaria en el eje
          político-civil.'
        historicalContext: Emergió con los movimientos de reforma agraria y cooperativismo escandinavo
          del siglo XIX. Se consolidó en la primera mitad del siglo XX con los pactos sociales entre sindicatos,
          empresas y Estado (modelo sueco de Saltsjöbaden, 1938). Alcanzó su apogeo en las décadas de
          1960-1980. Desde los años 1990 ha incorporado reformas de mercado (privatizaciones parciales,
          competencia en servicios públicos) sin desmantelar las redes de bienestar.
        contemporaryRelevance: El 'modelo nórdico' es referencia en debates globales sobre desigualdad,
          bienestar y crecimiento. Países como Dinamarca, Suecia, Finlandia y Noruega ocupan posiciones
          de liderazgo en índices de felicidad, competitividad y movilidad social. Su relevancia ha aumentado
          con la crisis de desigualdad en economías anglosajonas.
        commonCriticisms: Los liberales clásicos argumentan que su replicabilidad es limitada por factores
          culturales e históricos únicos (cohesión social, tamaño poblacional, homogeneidad inicial).
          Los conservadores señalan tensiones con la inmigración masiva que desafía la cohesión del modelo.
          Los socialistas señalan que depende de un capitalismo exportador que externalizaría sus costos.
        keyThinkers:
        - Gunnar Myrdal
        - Gösta Esping-Andersen
        - Per Albin Hansson
        - Thorvald Stoltenberg
        historicalExamples:
        - Modelo sueco de bienestar y acuerdos de Saltsjöbaden (1938)
        - Flexiseguridad danesa desde los años 1990
        - Estado de bienestar finlandés y reforma educativa (siglo XX)
        wikipediaUrl: https://es.wikipedia.org/wiki/Modelo_n%C3%B3rdico
      - id: liberal-corporatism
        name: Corporativismo liberal
        nameEn: Liberal Corporatism
        weight: 1
        description: Sistema donde organizaciones empresariales y sindicales negocian directamente con
          el Estado dentro de un marco democrático liberal.
        longDescription: 'El corporatismo liberal —también llamado neocorporatismo o corporatismo democrático—
          es el modelo de organización política-económica en el cual el Estado coordina las decisiones
          macroeconómicas mediante acuerdos tripartitos estables entre el gobierno, las organizaciones
          patronales y los sindicatos. A diferencia del corporatismo autoritario (fascista), opera dentro
          de un marco democrático y pluralista: las organizaciones participantes son autónomas y la negociación
          es voluntaria.


          Su premisa es que los mercados libres no son suficientes para estabilizar economías complejas;
          se requiere coordinación entre actores organizados. El Estado actúa como árbitro y garante de
          acuerdos que incluyen políticas salariales, empleo, formación profesional e inversión. A cambio
          de moderación salarial, los sindicatos reciben acceso real a decisiones de política económica
          y protección social.


          Filosóficamente bebe del ordoliberalismo alemán (que acepta mercados pero con instituciones
          que los encuadren), del keynesianismo y de la tradición socialcristiana europea. Austria, Alemania,
          Holanda, Bélgica y Suiza son sus casos paradigmáticos de posguerra.


          Se distingue del neoliberalismo en que no confía solo en el mercado; del socialismo en que no
          suprime la propiedad privada ni el mercado; y del liberalismo clásico en que acepta actores
          colectivos organizados como agentes legítimos frente al individuo atomizado.


          En el compás ocupa una posición centrada en el eje económico —más estatista que el liberalismo
          clásico pero más liberal que la socialdemocracia pura— y moderadamente libertaria en el eje
          político.'
        historicalContext: Sus raíces están en el corporatismo socialcristiano europeo y en los acuerdos
          de posguerra (Plan Marshall, reconstrucción europea). Alcanzó su apogeo en los 'años dorados'
          del capitalismo (1950-1975) en Europa occidental. Sufrió presiones con la crisis del petróleo
          (1973) y el auge neoliberal de los 1980. En Austria y Alemania mantuvo estructuras corporatistas
          más robustas que en el mundo anglosajón.
        contemporaryRelevance: Sigue vigente en economías coordinadas de mercado (Alemania, Austria, países
          nórdicos). El debate sobre codecisión empresarial (Mitbestimmung alemana), negociación colectiva
          sectorial y diálogo social europeo lo mantienen relevante. La pandemia de COVID-19 renovó el
          interés en modelos de coordinación entre Estado, empresas y trabajadores.
        commonCriticisms: Los neoliberales y libertarios argumentan que los carteles tripartitos crean
          rigideces, protegen a los actores organizados a expensas de los no organizados (jóvenes, informales)
          y reducen la dinámica de innovación. Los socialistas critican que legitima el poder empresarial
          dentro del Estado. Los liberales clásicos ven en él una forma de socialismo encubierto.
        keyThinkers:
        - Philippe Schmitter
        - Gerhard Lehmbruch
        - Wolfgang Streeck
        - Peter Katzenstein
        historicalExamples:
        - Modelo austro-corporatista (Österreichisches Modell, 1945-1990)
        - Concertación tripartita alemana y codecisión (Mitbestimmung, desde 1952)
        - Pactos de La Moncloa en España (1977)
        wikipediaUrl: https://es.wikipedia.org/wiki/Corporativismo
      - id: neo-liberalism
        name: Neoliberalismo
        nameEn: Neo-Liberalism
        weight: 3
        description: 'Corriente dominante desde los 1980s: privatización, desregulación, libre comercio
          y disciplina fiscal global.'
        keyThinkers:
        - Friedrich Hayek
        - Milton Friedman
        - George Stigler
        - James Buchanan
        - Gary Becker
        longDescription: 'El neoliberalismo es la corriente de pensamiento económico y político que, desde
          la segunda mitad del siglo XX, propuso restaurar y radicalizar los principios del liberalismo
          de mercado frente al avance del Estado benefactor keynesiano. Su tesis central es que los mercados
          libres —con mínima intervención estatal— asignan recursos de manera más eficiente que cualquier
          planificación o redistribución pública, y que el crecimiento económico sostenido es el mejor
          mecanismo para mejorar el bienestar general.


          Intelectualmente, el neoliberalismo tiene dos grandes pilares: la Escuela de Chicago (Milton
          Friedman, George Stigler) con su monetarismo y su crítica de la intervención estatal; y la Escuela
          Austríaca actualizada (Hayek), que enfatizó el conocimiento disperso y la imposibilidad del
          cálculo socialista. La Mont Pelerin Society (1947), fundada por Hayek, fue el espacio fundacional
          de articulación de estas ideas.


          Su aplicación política se aceleró con los gobiernos de Thatcher (Reino Unido, 1979) y Reagan
          (EE.UU., 1981), que pusieron en práctica privatizaciones, desregulación financiera, reducción
          del gasto social y debilitamiento sindical. El ''Consenso de Washington'' (1989) exportó estas
          recetas a América Latina y países en desarrollo bajo la batuta del FMI y el Banco Mundial.


          A diferencia del liberalismo clásico decimonónico, el neoliberalismo no es solo una doctrina
          de laissez-faire pasivo: acepta que el Estado intervenga activamente para crear y mantener las
          condiciones del mercado (propiedad intelectual, orden público, sistemas monetarios estables),
          pero rechaza la redistribución y la planificación.


          En el compás ocupa la zona libertaria-derecha, con posición más extrema en el eje económico
          que el liberalismo social, y énfasis en instituciones que protejan el mercado.'
        historicalContext: La Mont Pelerin Society (1947) marcó el arranque intelectual. Las crisis del
          petróleo (1973) y la estanflación de los 1970s legitimaron sus críticas al keynesianismo. Thatcher
          y Reagan lo llevaron al poder en los 1980s. El Consenso de Washington (1989) lo globalizó. La
          crisis financiera de 2008 inauguró una fase de cuestionamiento académico y político, aunque
          sus instituciones y marcos regulatorios siguen vigentes.
        contemporaryRelevance: Sigue estructurando las políticas de organismos como el FMI y el Banco
          Mundial, aunque con matices crecientes. En América Latina es referente obligado en debates electorales
          (Chile, Colombia, Argentina). La reacción populista de izquierda y derecha en los 2010s se define
          en gran medida como crítica al legado neoliberal.
        commonCriticisms: Los críticos de izquierda (Stiglitz, Piketty) señalan que aumentó la desigualdad,
          debilitó los derechos laborales y desestabilizó economías a través de la desregulación financiera.
          Los comunitaristas (Sandel) argumentan que mercantiliza esferas de la vida que deberían estar
          fuera del mercado. Los conservadores tradicionales critican su cosmopolitismo y su erosión de
          comunidades locales.
        historicalExamples:
        - Gobierno Thatcher en Reino Unido (1979-1990)
        - Reaganomics en EE.UU. (1981-1989)
        - Reformas del Consenso de Washington en América Latina (1989-2000s)
        - Chile bajo Chicago Boys (1975-1989)
        wikipediaUrl: https://es.wikipedia.org/wiki/Neoliberalismo
      - id: neoclassical-liberalism
        name: Liberalismo neoclásico
        nameEn: Neoclassical Liberalism
        weight: 1
        description: Variante académica del liberalismo basada en la economía neoclásica marginalista.
        longDescription: 'El liberalismo neoclásico es una corriente contemporánea que busca reconciliar
          los fundamentos del liberalismo clásico —derechos individuales, mercados libres, Estado limitado—
          con el reconocimiento de que algunas instituciones redistributivas o regulatorias mínimas son
          compatibles con, e incluso necesarias para, el buen funcionamiento de una sociedad liberal.
          Se distingue del neoliberalismo en que es más filosóficamente fundamentado en derechos y menos
          puramente economicista.


          El término ha sido utilizado con distintos matices. En economía, el neoclasicismo se refiere
          a la síntesis marginalista de Alfred Marshall, Stanley Jevons y Léon Walras que dominó la disciplina
          desde finales del siglo XIX: énfasis en equilibrio de mercado, utilidad marginal y eficiencia
          de precios. En filosofía política, el ''liberalismo neoclásico'' contemporáneo (asociado a autores
          como Randy Barnett) reafirma los principios lockeanos de derechos naturales con rigor analítico
          actualizado.


          Algunos autores usan el término para describir una posición intermedia entre el liberalismo
          social rawlsiano (que acepta redistribución significativa) y el libertarismo estricto (que rechaza
          toda coacción fiscal): acepta impuestos para bienes públicos puros (defensa, justicia) pero
          rechaza el Estado de bienestar extenso.


          En el debate contemporáneo, el liberalismo neoclásico reaparece en discusiones sobre el fundamento
          de los derechos de propiedad, los límites de la regulación y la relación entre eficiencia económica
          y justicia.


          En el compás se sitúa entre el liberalismo clásico y el neoliberalismo: mismo polo libertario
          pero con base filosófica más elaborada sobre derechos individuales.'
        historicalContext: La economía neoclásica emergió en la revolución marginalista de la década de
          1870 (Jevons, Menger, Walras). Como posición filosófico-política, el 'liberalismo neoclásico'
          es en parte una construcción académica del siglo XX para distinguir el liberalismo de derechos
          del utilitarismo de mercado puro. Randy Barnett y otros filósofos libertarios han revitalizado
          esta tradición desde los años 1990.
        contemporaryRelevance: Relevante en debates académicos sobre filosofía del derecho y economía
          política. Informa posiciones de think tanks como el Cato Institute y el Institute for Justice.
          Aparece en discusiones sobre propiedad intelectual, regulación de plataformas digitales y límites
          constitucionales al poder estatal.
        commonCriticisms: Los liberales sociales argumentan que subestima las fallas de mercado y las
          desigualdades de poder. Los libertarios puros critican que acepta demasiado Estado. Los críticos
          marxistas lo ven como legitimación filosófica sofisticada de privilegios de clase.
        keyThinkers:
        - Alfred Marshall
        - Randy Barnett
        - Richard Epstein
        - Jan Narveson
        historicalExamples:
        - Síntesis neoclásica en economía académica anglosajona (1870-1950)
        - Jurisprudencia económica de la Escuela de Chicago en tribunales de EE.UU. (1970s-1990s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Econom%C3%ADa_neocl%C3%A1sica
      - id: general-capitalism
        name: Capitalismo general
        nameEn: General Capitalism
        weight: 2
        description: Término paraguas para las variantes estándar del capitalismo de mercado sin compromiso
          ideológico específico.
        longDescription: 'El capitalismo, en su formulación general, es el sistema económico basado en
          la propiedad privada de los medios de producción, la acumulación de capital, el trabajo asalariado
          y la asignación de recursos a través del mecanismo de precios de mercado. Como ideología, defiende
          estos principios como los más eficientes y compatibles con la libertad individual.


          No es una doctrina monolítica: existe en múltiples variantes (capitalismo de libre mercado,
          capitalismo regulado, capitalismo de Estado, capitalismo de bienestar) y ha sido justificado
          filosóficamente desde el utilitarismo (mayor bienestar agregado), desde los derechos naturales
          (propiedad como extensión de la persona) y desde el pragmatismo (funciona mejor que las alternativas).


          Adam Smith, en ''La riqueza de las naciones'' (1776), ofreció la primera defensa sistemática
          del mercado libre como mecanismo de coordinación social a través de la ''mano invisible''. Posteriormente,
          Joseph Schumpeter describió la ''destrucción creativa'' como el motor de la innovación capitalista.
          Milton Friedman argumentó que la libertad económica y la libertad política son inseparables.


          Históricamente, el capitalismo industrial emergió en Gran Bretaña en el siglo XVIII, se expandió
          globalmente en el siglo XIX y dominó las economías occidentales, con diversas reformas y regulaciones,
          a lo largo del siglo XX. Tras la caída del bloque soviético (1991), el modelo capitalista se
          convirtió en el referente económico global hegemónico.


          En el compás ideológico, ''capitalismo general'' funciona como categoría paraguas que abarca
          desde posiciones centro-derecha hasta el libertarismo extremo, unidas por la defensa del mercado
          y la propiedad privada.'
        historicalContext: El capitalismo mercantil precedió al industrial desde el siglo XV. La Revolución
          Industrial en Gran Bretaña (siglo XVIII) estableció el capitalismo como sistema dominante. El
          siglo XIX vio su expansión global. El siglo XX alternó entre regulación (New Deal, Estado de
          bienestar) y liberalización (1980s). Desde 1991 es el sistema económico dominante a nivel mundial,
          con variantes desde el capitalismo renano hasta el anglosajón.
        contemporaryRelevance: El capitalismo sigue siendo el sistema económico dominante globalmente,
          aunque bajo creciente cuestionamiento por desigualdad, crisis climática y concentración de poder
          en plataformas digitales. Debates sobre 'capitalismo de vigilancia', 'capitalismo stakeholder'
          y regulación de monopolios tecnológicos lo mantienen en el centro del debate contemporáneo.
        commonCriticisms: Los críticos marxistas señalan que el capitalismo genera explotación estructural
          del trabajo y alienación. Los ecologistas argumentan que su lógica de acumulación infinita es
          incompatible con los límites planetarios. Los comunitaristas señalan la erosión de lazos sociales
          y la mercantilización de la vida. Los conservadores tradicionales critican su disrupción constante
          de comunidades y valores.
        keyThinkers:
        - Adam Smith
        - David Ricardo
        - Joseph Schumpeter
        - Milton Friedman
        - Friedrich Hayek
        historicalExamples:
        - Revolución Industrial en Gran Bretaña (siglo XVIII-XIX)
        - Capitalismo de posguerra en EE.UU. y Europa occidental (1945-1975)
        - Globalización capitalista post-1991
        wikipediaUrl: https://es.wikipedia.org/wiki/Capitalismo
    - name: libertarismo
      weight: 5
      children:
      - id: minarchism
        name: Minarquismo
        nameEn: Minarchism
        weight: 3
        description: Estado mínimo limitado a defensa, policía y justicia, dejando el resto a la iniciativa
          privada voluntaria.
        keyThinkers:
        - Robert Nozick
        - Murray Rothbard (en diálogo)
        - Ayn Rand
        - Herbert Spencer
        - John Locke
        longDescription: 'El minarquismo es la posición filosófico-política que defiende la existencia
          de un Estado mínimo, reducido a sus funciones más básicas: proteger a los ciudadanos de la agresión,
          el robo y el fraude, y hacer cumplir los contratos. Más allá de estas funciones (ejército, policía,
          tribunales), el minarquista considera que toda acción estatal es ilegítima. El término fue acuñado
          por Samuel Edward Konkin III en los años 1980, precisamente para distinguir esta posición del
          anarcocapitalismo.


          El minarquismo parte del principio de no agresión (PNA): ningún agente, incluido el Estado,
          puede iniciar la fuerza contra un individuo. Sin embargo, a diferencia del anarcocapitalismo,
          concede que la provisión de seguridad, justicia y defensa es un bien público que puede justificar
          un monopolio estatal mínimo, pues la provisión privada generaría conflictos irresolubles.


          Robert Nozick en ''Anarquía, Estado y Utopía'' (1974) ofreció la defensa filosófica más influyente
          del Estado mínimo: argumentó que este puede surgir de manera legítima desde un estado de naturaleza
          sin violar derechos individuales, mediante una ''mano invisible'' de agencias de protección
          que convergen. Nozick distinguió entre el Estado mínimo (legítimo) y el Estado ultraminimalista
          o el Estado benefactor (ilegítimos).


          En el compás ocupa una posición extrema en el eje libertario: máxima libertad individual, rechazo
          de casi toda redistribución y regulación, pero admite el Estado como institución necesaria mínima.


          Se distingue del libertarismo moderado (que acepta más funciones estatales) y del anarcocapitalismo
          (que rechaza cualquier Estado).'
        historicalContext: Sus raíces filosóficas están en Locke y Spencer. Como posición teórica explícita
          se desarrolló en el siglo XX, sobre todo en el ambiente intelectual libertario estadounidense
          de los años 1960-1970. La obra de Nozick (1974) le dio rigor académico. El Partido Libertario
          de EE.UU. (fundado en 1971) incorporó posiciones minarquistas junto con tendencias más radicales.
        contemporaryRelevance: Es posición referencial en el movimiento libertario estadounidense y en
          comunidades libertarias latinoamericanas. Aparece en debates sobre privatización de seguridad,
          reforma policial, abolición de agencias regulatorias y reducción drástica del Estado. Influye
          en corrientes del think tank Cato Institute y en el ala libertaria del Partido Republicano.
        commonCriticisms: 'Los anarcocapitalistas sostienen que Nozick no logró justificar el monopolio
          estatal sin violar el PNA. Los liberales sociales critican que abandona a los más vulnerables
          sin redes de protección. Los conservadores señalan que su individualismo extremo socava las
          comunidades. Los socialistas argumentan que es incoherente: cualquier Estado mínimo históricamente
          tiende a expandirse.'
        historicalExamples:
        - Partido Libertario de EE.UU. (fundado 1971)
        - Propuestas de 'Estado mínimo' en plataformas libertarias latinoamericanas contemporáneas
        wikipediaUrl: https://es.wikipedia.org/wiki/Minarquismo
      - id: anarcho-capitalism
        name: Anarco-capitalismo
        nameEn: Anarcho-Capitalism
        weight: 3
        description: Abolición total del Estado, reemplazado por instituciones privadas voluntarias en
          un libre mercado irrestricto.
        keyThinkers:
        - Murray Rothbard
        - David Friedman
        - Hans-Hermann Hoppe
        - Walter Block
        - Lysander Spooner
        longDescription: 'El anarcocapitalismo es la doctrina que propone la abolición completa del Estado
          y su sustitución por un orden social basado exclusivamente en contratos voluntarios, mercados
          libres y agencias privadas de seguridad y justicia. Combina el rechazo anarquista de toda autoridad
          coercitiva con el capitalismo de libre mercado, argumentando que la propiedad privada y los
          contratos son suficientes para organizar una sociedad justa y eficiente sin necesidad de ninguna
          institución estatal.


          Murray Rothbard es su figura fundacional. En ''Man, Economy, and State'' (1962) y ''For a New
          Liberty'' (1973) desarrolló una teoría económica austriaca combinada con una ética de derechos
          naturales absolutos de propiedad. Rothbard argumentó que el Estado es inherentemente una institución
          criminal: se financia mediante impuestos (coerción) y monopoliza servicios que el mercado puede
          proveer mejor.


          Desde el principio de no agresión (PNA), toda iniciación de la fuerza es ilegítima. Ello incluye
          los impuestos, el servicio militar obligatorio, las regulaciones económicas y la emisión de
          moneda de curso legal. En un orden anarcocapitalista, las agencias privadas de protección y
          arbitraje competirían en el mercado para proveer seguridad y justicia.


          David Friedman, desde una perspectiva más utilitaria (en ''The Machinery of Freedom'', 1973),
          llegó a conclusiones similares por una ruta diferente: no desde derechos absolutos sino desde
          la eficiencia del mercado competitivo.


          En el compás ocupa el extremo del cuadrante libertario-derecha: máxima libertad individual,
          rechazo total del Estado, defensa absoluta de la propiedad privada.'
        historicalContext: Sus antecedentes están en el individualismo anarquista americano del siglo
          XIX (Lysander Spooner, Benjamin Tucker) y en la economía austriaca. Murray Rothbard articuló
          la síntesis moderna en los años 1960-1970 en el ambiente intelectual de Nueva York. El Partido
          Libertario de EE.UU. incorporó algunas de sus ideas. Ha ganado visibilidad global con internet
          y comunidades libertarias del siglo XXI.
        contemporaryRelevance: Influyente en comunidades libertarias online, el movimiento cypherpunk
          y los entusiastas de las criptomonedas (Bitcoin es visto por muchos como infraestructura anarcocapitalista).
          Javier Milei en Argentina se ha declarado admirador de Rothbard, aunque su gobierno ejerce poder
          estatal. Genera debate vivo en foros académicos y comunidades políticas de internet.
        commonCriticisms: Los minarquistas (Nozick) señalan que las agencias privadas de seguridad sin
          árbitro final conducen a guerra perpetua entre proveedores. Los liberales sostienen que sin
          Estado los poderosos simplemente privatizan la coerción. Los socialistas argumentan que generaliza
          la mercantilización más allá de cualquier límite ético. Los conservadores rechazan su utopismo
          individualista que destruye comunidad y tradición.
        historicalExamples:
        - Experimentos de territorios sin Estado en el Lejano Oeste americano (siglo XIX, debatido)
        - Comunidades cripto y proyectos de 'seasteading' contemporáneos
        - Influencia en el movimiento libertario de EE.UU. desde los 1970s
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarcocapitalismo
      - id: objectivism
        name: Objetivismo
        nameEn: Objectivism
        weight: 2
        description: Filosofía de Ayn Rand que defiende el egoísmo racional, el capitalismo laissez-faire
          y el rechazo de todo colectivismo.
        keyThinkers:
        - Ayn Rand
        - Nathaniel Branden
        - Leonard Peikoff
        - Alan Greenspan (temprano)
        longDescription: 'El objetivismo es el sistema filosófico desarrollado por la novelista y filósofa
          ruso-estadounidense Ayn Rand, que defiende la razón como único medio de conocimiento, el interés
          propio racional como fundamento de la ética y el capitalismo laissez-faire como único sistema
          político-económico moralmente justificable. No es simplemente una defensa del mercado: es una
          filosofía integral que abarca metafísica, epistemología, ética, estética y política.


          La tesis ética central de Rand es que el altruismo —la subordinación del yo a otros— es una
          doctrina destructiva que niega la vida del individuo. En su lugar propone el ''egoísmo racional'':
          cada persona debe vivir por sí misma, usando la razón para identificar sus valores y perseguirlos
          consistentemente. Las obras ''El manantial'' (1943) y ''La rebelión de Atlas'' (1957) dramatizaron
          estas ideas.


          Políticamente, el objetivismo defiende un Estado limitado a proteger derechos individuales (vida,
          libertad, propiedad), finanzas voluntarias (sin impuestos coercitivos en el ideal), separación
          completa de economía y Estado, y capitalismo sin concesiones. Rechaza tanto el Estado de bienestar
          como la regulación económica.


          Rand se distinguía del libertarismo (al que criticó por falta de fundamento filosófico) y del
          conservadurismo (al que rechazaba por su base religiosa). Fundó el Colectivo —grupo de discípulos—
          y el Ayn Rand Institute promueve hoy su filosofía.


          En el compás se sitúa en el extremo libertario-derecha: individualismo radical, rechazo del
          Estado social, defensa del capitalismo de libre mercado.'
        historicalContext: Ayn Rand emigró de la URSS a EE.UU. en 1926, experiencia que informó profundamente
          su rechazo al colectivismo. 'El manantial' (1943) y 'La rebelión de Atlas' (1957) tuvieron enormes
          ventas. Fundó el objetivismo como sistema filosófico formal en los años 1950-1960. Tras su muerte
          (1982), el Ayn Rand Institute y el Atlas Society continuaron su legado. Influyó en figuras como
          Alan Greenspan (presidente de la Fed).
        contemporaryRelevance: '''La rebelión de Atlas'' sigue siendo uno de los libros más vendidos en
          EE.UU. El objetivismo influye en el movimiento Tea Party, en sectores del Partido Republicano
          y en la cultura empresarial de Silicon Valley. Su crítica al Estado benefactor resuena en debates
          sobre impuestos y regulación. Paul Ryan (congresista republicano) citó a Rand como influencia.'
        commonCriticisms: Los filósofos académicos critican sus argumentos epistemológicos y éticos como
          circulares y mal fundamentados. Los liberales sociales señalan que su individualismo absoluto
          ignora las condiciones sociales del éxito individual. Los conservadores religiosos rechazan
          su ateísmo militante. Los libertarios cuestionan su rechazo a las drogas recreativas y otras
          libertades personales inconsistentes con su individualismo.
        historicalExamples:
        - Influencia en movimiento Tea Party en EE.UU. (2009-2012)
        - Ayn Rand Institute y su influencia en política pública americana (desde 1985)
        - Impacto en cultura empresarial de Silicon Valley (siglo XXI)
        wikipediaUrl: https://es.wikipedia.org/wiki/Objetivismo_(Ayn_Rand)
      - id: voluntaryism
        name: Voluntarismo
        nameEn: Voluntaryism
        weight: 2
        description: Rechazo de toda relación coercitiva, incluyendo el Estado. Toda interacción humana
          debe ser voluntaria y consensuada.
        longDescription: 'El voluntarismo (o voluntaryismo) es la posición filosófico-política que sostiene
          que toda interacción humana debe ser voluntaria —sin coacción, fraude ni engaño— y que ninguna
          institución, incluyendo el Estado, puede imponer obligaciones a los individuos sin su consentimiento
          explícito. Es una extensión radical del principio de no agresión (PNA) que rechaza incluso las
          formas más mínimas de Estado coercitivo.


          El término fue popularizado por Carl Watner y Wendy McElroy en los años 1980 a través del boletín
          ''The Voluntaryist''. A diferencia del anarcocapitalismo rothbardiano, el voluntarismo no es
          estrictamente capitalista en su orientación económica: acepta cualquier forma de organización
          económica voluntaria, sea cooperativismo, socialismo de mercado o capitalismo, siempre que sea
          libre de coacción.


          Su tesis es simple pero radical: el consentimiento es el fundamento de toda legitimidad moral.
          Los impuestos no consentidos son robo, el servicio militar obligatorio es esclavitud, las regulaciones
          coercitivas son agresión. Un voluntarista puede aceptar gobierno privado, comunidades con reglas
          propias o cualquier organización, siempre que la membresía sea genuinamente voluntaria y haya
          salida posible.


          Conecta con el individualismo anarquista americano del siglo XIX (Spooner, Tucker) que argumentaba
          que los contratos sociales no obligan a quienes no los firmaron.


          En el compás se ubica en el extremo libertario, cercano al anarcocapitalismo pero con neutralidad
          mayor respecto a la organización económica.'
        historicalContext: Sus raíces intelectuales están en el anarquismo individualista americano del
          siglo XIX (Lysander Spooner, Benjamin Tucker). La denominación moderna fue desarrollada por
          Carl Watner desde los años 1970s. El boletín 'The Voluntaryist' (1982-presente) articuló la
          tradición. Se desarrolló en paralelo al libertarismo de Rothbard pero manteniendo mayor distancia
          del capitalismo como doctrina normativa.
        contemporaryRelevance: Activo en comunidades libertarias online y en el movimiento por la soberanía
          individual. Aparece en debates sobre criptomonedas (como infraestructura de intercambio voluntario),
          seasteading y contratos privados como alternativa al derecho estatal. Tiene presencia en podcasts,
          comunidades de Reddit y foros libertarios.
        commonCriticisms: Los críticos señalan que en ausencia de Estado, los actores poderosos imponen
          sus condiciones a los débiles, haciendo el consentimiento nominal pero no real. Los minarquistas
          argumentan que la provisión privada de seguridad sin árbitro final colapsa en conflicto. Los
          socialistas sostienen que las relaciones económicas bajo desigualdad no pueden ser genuinamente
          voluntarias.
        keyThinkers:
        - Carl Watner
        - Wendy McElroy
        - Lysander Spooner
        - Benjamin Tucker
        historicalExamples:
        - Anarquismo individualista americano (Spooner, Tucker, siglo XIX)
        - Comunidades intentionales con membresía voluntaria (siglos XIX-XXI)
        - Proyectos de seasteading y ciudades charter contemporáneas
        wikipediaUrl: https://es.wikipedia.org/wiki/Voluntarismo_pol%C3%ADtico
      - id: agorism
        name: Agorismo
        nameEn: Agorism
        weight: 2
        description: Estrategia libertaria de Konkin que busca el colapso del Estado mediante mercados
          contraeconómicos (mercados grises).
        keyThinkers:
        - Samuel Edward Konkin III
        - J. Neil Schulman
        - Brad Spangler
        longDescription: 'El agorismo es una estrategia política y filosófica desarrollada por Samuel
          Edward Konkin III (SEK3) que propone la construcción de una sociedad libre mediante la ''contraeconomía'':
          la práctica sistemática de actividades económicas que ocurren fuera del alcance del Estado.
          El nombre proviene del griego ''ágora'' (mercado), y su tesis central es que la libertad no
          se logra mediante la política electoral sino mediante la acción directa de vivir al margen del
          Estado.


          Konkin articuló el agorismo en ''The New Libertarian Manifesto'' (1980) como crítica al Partido
          Libertario: los procesos electorales legitiman el Estado y son ineficaces. En cambio, la contraeconomía
          —mercados negros, trabajo informal, truque, criptomonedas, comercio no regulado— vacía al Estado
          de recursos y poder sin necesidad de enfrentarlo directamente.


          El agorismo distingue entre mercado negro (actividades ilegales pero sin víctimas: drogas, armas,
          evasión de impuestos), mercado gris (actividades legales pero no declaradas) y mercado blanco
          (legal y declarado). Cuanto más actúen las personas en los mercados negro y gris, más se debilita
          el Estado y más se construye la agorá libre.


          Es una posición anarcocapitalista en términos de objetivo final, pero con una metodología de
          resistencia gradual y no violenta diferente del purismo teórico rothbardiano. Anticipa conceptualmente
          las criptomonedas como herramienta contraconómica.


          En el compás se sitúa en el extremo libertario-derecha, con énfasis en la acción práctica de
          evasión estatal más que en la teorización.'
        historicalContext: Desarrollado por Samuel Edward Konkin III en los años 1970-1980 en el ambiente
          libertario californiano como alternativa estratégica al Partido Libertario. 'The New Libertarian
          Manifesto' (1980) es el texto fundacional. Permaneció como corriente minoritaria hasta que internet
          y las criptomonedas —especialmente Bitcoin tras 2009— le dieron herramientas concretas y visibilidad
          global.
        contemporaryRelevance: Las criptomonedas, los mercados de dark web (Silk Road fue visto por algunos
          como aplicación agorista), las redes de intercambio descentralizadas y la economía informal
          digital han revitalizado el interés en el agorismo. Comunidades de agoristas activos operan
          en varias ciudades de EE.UU. y online.
        commonCriticisms: Los críticos señalan que depende de la tolerancia del Estado hacia la informalidad
          y no puede escalar sin represión. Los libertarios electoralistas (Partido Libertario) argumentan
          que sin cambio institucional la contraeconomía es vulnerable. Los socialistas señalan que la
          economía informal suele ser la más explotadora para los trabajadores.
        historicalExamples:
        - Economía informal y mercados negros como práctica histórica universal
        - Silk Road como mercado contraconómico digital (2011-2013)
        - Uso de Bitcoin y criptomonedas como herramienta agorista (2009-presente)
        wikipediaUrl: https://es.wikipedia.org/wiki/Agorismo
      - id: hoppeanism
        name: Hoppeanismo
        nameEn: Hoppeanism
        weight: 2
        description: Variante paleolibertaria de Hans-Hermann Hoppe que combina anarco-capitalismo con
          conservadurismo social tradicional.
        keyThinkers:
        - Hans-Hermann Hoppe
        - Murray Rothbard
        - Jörg Guido Hülsmann
        longDescription: 'El hoppeanism es la corriente del pensamiento libertario y paleoconservador
          desarrollada por el filósofo austro-estadounidense Hans-Hermann Hoppe, que combina el anarcocapitalismo
          rothbardiano con una teoría cultural conservadora radical. Su obra ''Democracia: el dios que
          falló'' (2001) es el texto central: argumenta que la democracia es peor que la monarquía porque
          incentiva el cortoplacismo, el gasto público descontrolado y la descivilización cultural.


          Hoppe desarrolla una teoría de propiedad basada en la ''ética de la argumentación'': la propiedad
          privada y el principio de no agresión son los únicos principios que no se contradicen al ser
          defendidos en un debate, pues quien argumenta ya está implícitamente reconociendo su derecho
          a su propio cuerpo y recursos.


          Culturalmente, Hoppe sostiene que una sociedad libre requiere normas conservadoras: familia
          tradicional, comunidad homogénea, rechazo del multiculturalismo estatal, y el derecho de las
          comunidades privadas a expulsar a quienes no comparten sus normas (''physically remove''). Esta
          dimensión lo separa radicalmente del libertarismo cosmopolita y de la izquierda libertaria.


          En política exterior defiende el no intervencionismo absoluto. Critica las guerras de EE.UU.
          tanto desde la derecha (costosas e ineficaces) como desde el principio de no agresión.


          En el compás se ubica en el extremo libertario-derecha con inclinación cultural conservadora:
          más allá del anarcocapitalismo en radicalidad antiestatal, pero con valores sociales que lo
          acercan al paleoconservadurismo.'
        historicalContext: Hans-Hermann Hoppe nació en Alemania, fue discípulo de Murray Rothbard en la
          New York University y emigró a EE.UU. Publicó sus obras principales en los 1980s-2000s. Fundó
          la Property and Freedom Society (2006) en Bodrum, Turquía, que se convirtió en espacio de encuentro
          entre libertarios, paleoconservadores y disidentes de derecha. Fue despedido de la Universidad
          de Nevada Las Vegas (2005) tras una controversia sobre sus comentarios sobre homosexualidad.
        contemporaryRelevance: Influye en la alt-right intelectual, en comunidades paleolibertarias y
          en foros de internet de derecha disidente. Sus ideas sobre 'covenant communities' (comunidades
          con normas propias y derecho de exclusión) se discuten en círculos de derecha alternativa. La
          Property and Freedom Society sigue activa.
        commonCriticisms: Los libertarios cosmopolitas señalan que su conservadurismo cultural contradice
          el principio de no agresión cuando implica exclusión coercitiva. Los liberales clásicos rechazan
          su crítica a la democracia como elitismo antidemocrático. Los críticos de izquierda señalan
          que sus posiciones sobre inmigración y comunidades homogéneas alimentan la xenofobia. Rothbard
          mismo tuvo diferencias con sus derivaciones culturales.
        historicalExamples:
        - Property and Freedom Society (Bodrum, desde 2006)
        - Influencia en el movimiento paleolibertario estadounidense (1990s-2000s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Hans-Hermann_Hoppe
      - id: paleo-libertarianism
        name: Paleo-libertarismo
        nameEn: Paleo-Libertarianism
        weight: 2
        description: Síntesis entre libertarismo económico y conservadurismo cultural tradicionalista
          estadounidense.
        longDescription: 'El paleolibertarismo es la corriente del libertarismo estadounidense que surgió
          a finales de los años 1980 como intento de conectar el libertarismo de mercado con los valores
          culturales y sociales del paleoconservadurismo: familia tradicional, comunidades locales, identidad
          nacional, anti-intervencionismo exterior y rechazo del cosmopolitismo liberal de izquierda.


          Fue articulado por Murray Rothbard y Lew Rockwell como reacción al libertarismo ''fusionista''
          del Cato Institute, al que consideraban demasiado cercano al establishment liberal-izquierdista
          en temas culturales. La estrategia fue acercarse a la derecha populista y paleoconservadora
          (Pat Buchanan) en lugar de a la izquierda cultural, usando el slogan ''libertad y tradición''.


          El paleolibertarismo acepta el anarcocapitalismo o el minarquismo en economía, pero a diferencia
          del libertarismo cosmopolita, rechaza el multiculturalismo promovido por el Estado, la inmigración
          masiva subsidiada y las políticas de identidad. Sostiene que una sociedad libre requiere sustrato
          cultural cohesionado y que la diversidad forzada por el Estado contradice la libertad de asociación.


          Se diferencia del hoppeanism en que mantiene mayor anclaje en la tradición americana y republicana,
          mientras Hoppe es más radical en su crítica de la democracia.


          En el compás se ubica en el extremo libertario-derecha con inclinación cultural conservadora,
          distinguiéndose del libertarismo estándar por su énfasis en la comunidad y la tradición.'
        historicalContext: La 'estrategia paleo' fue articulada por Rothbard y Rockwell en el boletín
          Rothbard-Rockwell Report a principios de los 1990s. Se propuso una alianza con el paleoconservadurismo
          de Pat Buchanan. La estrategia fue parcialmente abandonada tras la muerte de Rothbard (1995)
          y el auge de la alt-right en los 2010s la reconfiguró. El Ludwig von Mises Institute (Auburn,
          Alabama), fundado por Rockwell, sigue siendo su centro institucional.
        contemporaryRelevance: El Ludwig von Mises Institute mantiene viva la tradición, con publicaciones,
          conferencias y formación académica. Influyó en el movimiento Ron Paul (2008-2012). El auge del
          nacionalismo populista en los 2010s reactivó su relevancia como punto de encuentro entre libertarios
          y conservadores nacionalistas.
        commonCriticisms: Los libertarios cosmopolitas critican que su conservadurismo cultural es incompatible
          con el principio de no agresión, especialmente respecto a derechos de minorías. Los liberales
          señalan que su nativismo y anti-inmigracionismo contradicen los principios de libre mercado
          de trabajo. Los conservadores tradicionales los ven como extremistas en lo económico.
        keyThinkers:
        - Murray Rothbard
        - Lew Rockwell
        - Pat Buchanan (referente político)
        historicalExamples:
        - Movimiento Ron Paul en EE.UU. (2008-2012)
        - Ludwig von Mises Institute y su producción académica (Auburn, desde 1982)
        - Rothbard-Rockwell Report (1990s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Paleolibertarismo
      - id: national-libertarianism
        name: Libertarismo nacional
        nameEn: National Libertarianism
        weight: 2
        description: Libertarismo con énfasis en soberanía nacional y restricción migratoria estricta.
        longDescription: 'El libertarismo nacional es una corriente híbrida que intenta combinar el libertarismo
          económico —libre mercado, mínima intervención estatal en economía— con el nacionalismo político
          y cultural —énfasis en la nación, la identidad y la soberanía nacional frente a organismos supranacionales
          y globalización—. Es una posición que los libertarios clásicos suelen considerar contradictoria,
          pues el nacionalismo implica un Estado con fuertes fronteras y control migratorio que choca
          con el principio de libre circulación.


          Sus adherentes responden que la nación es la comunidad cultural que hace posible la confianza
          social necesaria para los mercados libres; que la soberanía nacional es condición del autogobierno
          real frente a tecnocracias supranacionales como la UE o el FMI; y que las fronteras protegen
          el contrato social interno que sustenta los derechos de propiedad y las libertades civiles.


          Se distingue del paleolibertarismo en que el elemento nacional es más explícito y central, no
          meramente cultural-conservador. Se diferencia del nationalismo tradicional en que rechaza el
          estatismo económico (proteccionismo, empresas estatales) que muchos nacionalistas defienden.


          En Europa ha tenido expresión en sectores de partidos como el UKIP (en su facción más libertaria)
          o en movimientos nacionales de derecha que combinan euroescepticismo con políticas de mercado.
          En América Latina aparece en discursos que combinan soberanismo con crítica a regulaciones estatales
          internas.


          En el compás se ubica en la intersección entre el eje libertario-derecha económico y tendencias
          moderadamente autoritarias en lo político, por el énfasis en control migratorio y soberanía.'
        historicalContext: No tiene un texto fundacional único; emergió como síntesis en ambientes políticos
          de los 2000s-2010s en respuesta a la globalización. Tiene antecedentes en el libertarismo americano
          que enfatizaba la soberanía estadounidense (Robert Taft, no-intervencionismo) y en el euroescepticismo
          británico. El auge del populismo nacional en Europa y EE.UU. tras 2008 le dio mayor visibilidad.
        contemporaryRelevance: Aparece en debates sobre Brexit, soberanía monetaria frente al euro y control
          de fronteras como condición del autogobierno. Sectores del movimiento MAGA en EE.UU. combinan
          retórica libertaria económica con nacionalismo. En América Latina, algunos partidos de derecha
          combinan apertura económica con soberanismo.
        commonCriticisms: Los libertarios clásicos señalan que el control de fronteras y la preferencia
          nacional violan el principio de no agresión y la libertad de circulación. Los liberales sociales
          critican que su nacionalismo deriva fácilmente en xenofobia. Los globalistas señalan que el
          soberanismo económico implica proteccionismo que reduce bienestar.
        keyThinkers:
        - Nigel Farage (referente político)
        - Hans-Hermann Hoppe (influyente)
        - Pat Buchanan
        historicalExamples:
        - UKIP en su fase libertaria-euroescéptica (Reino Unido, 2010s)
        - Sectores del movimiento Tea Party con retórica soberanista (EE.UU., 2009-2014)
        wikipediaUrl: https://es.wikipedia.org/wiki/Libertarismo_nacional
      - id: libertarian-conservatism
        name: Conservadurismo libertario
        nameEn: Libertarian Conservatism
        weight: 2
        description: Combina valores tradicionales (familia, religión, nación) con economía libertaria
          de mínima intervención estatal.
        longDescription: 'El libertarismo conservador —también denominado conservadurismo libertario o
          fusionismo— es la síntesis entre el libertarismo económico y el conservadurismo cultural y moral.
          Propone que la libertad de mercado y los valores tradicionales son complementarios y se refuerzan
          mutuamente: la familia, la religión, la comunidad local y la propiedad privada son las instituciones
          que hacen posible la libertad individual frente al Estado.


          Frank Meyer fue el articulador intelectual del ''fusionismo'' en la revista National Review
          a partir de los años 1960, arguyendo que los conservadores y los libertarios debían unirse frente
          al estatismo de izquierda. La idea fue que el mercado libre requiere virtud moral —que el conservadurismo
          provee— y que los valores tradicionales necesitan libertad —que el libertarismo garantiza.


          Se distingue del paleolibertarismo en que no es explícitamente anti-cosmopolita ni etnonacionalista;
          del libertarismo clásico en que acepta el papel de la tradición y la religión en la vida pública;
          y del neoconservadurismo en que rechaza el intervencionismo exterior y el Estado de seguridad
          nacional.


          El Partido Republicano estadounidense en su ala libertaria (Ron Paul, Rand Paul), el Partido
          Conservador británico en sus sectores thatcheristas y partidos de derecha liberal de América
          Latina han encarnado variantes de esta posición.


          En el compás se sitúa en la zona libertaria-derecha moderada, con valores sociales conservadores
          pero economía de libre mercado.'
        historicalContext: El fusionismo de Meyer surgió en los años 1960 en la revista National Review.
          La presidencia Reagan (1981-1989) fue el momento de mayor influencia política, combinando desregulación
          económica con valores conservadores. En los 1990s la Contract with America de Gingrich intentó
          consolidar la síntesis. En los 2000s-2010s el movimiento Ron Paul representa su expresión más
          pura.
        contemporaryRelevance: El ala libertaria del Partido Republicano (Rand Paul, Freedom Caucus) mantiene
          viva la síntesis en EE.UU. En Colombia, sectores del Centro Democrático y del Partido Conservador
          combinan libre mercado con valores tradicionales. En Chile, la UDI histórica representó una
          versión de esta fusión. En toda América Latina es la posición de muchos partidos de derecha
          'moderna'.
        commonCriticisms: Los libertarios puros señalan que la adhesión conservadora a leyes morales (drogas,
          matrimonio, aborto) es incompatible con el principio de no interferencia. Los socialdemócratas
          señalan que su reducción del Estado desprotege a los vulnerables. Los paleoconservadores argumentan
          que su mercado libre destruye las comunidades que el conservadurismo quiere preservar.
        keyThinkers:
        - Frank Meyer
        - Milton Friedman
        - Rand Paul
        - Friedrich Hayek
        - Barry Goldwater
        historicalExamples:
        - Revolución Reagan en EE.UU. (1981-1989)
        - Thatcherismo en Reino Unido (1979-1990)
        - Movimiento Ron Paul (2008-2012)
        wikipediaUrl: https://es.wikipedia.org/wiki/Libertarismo_conservador
    - name: libertarismo-contemporaneo
      weight: 3
      children:
      - id: techno-libertarianism
        name: Tecnolibertarismo
        nameEn: Techno-Libertarianism
        weight: 2
        description: 'Libertarismo aplicado a la era digital: criptomonedas, descentralización, rechazo
          a la regulación estatal del ciberespacio.'
        longDescription: 'El tecnolibertarismo es la corriente ideológica, predominante en Silicon Valley,
          que combina el libertarismo de libre mercado con un optimismo radical sobre la tecnología como
          fuerza liberadora que puede resolver los problemas sociales sin necesidad de intervención estatal.
          Su premisa es que la innovación tecnológica —internet, inteligencia artificial, biotecnología,
          blockchain— es el motor del progreso humano y que la regulación estatal frena ese progreso.


          El tecnolibertarismo surgió en la cultura hacker de los años 1970-1980 con la idea de que la
          información quiere ser libre y que las redes descentralizadas erosionan el poder de los Estados
          y las corporaciones. La Declaración de Independencia del Ciberespacio de John Perry Barlow (1996)
          es uno de sus textos fundacionales: el ciberespacio es un territorio soberano donde las leyes
          estatales no deben aplicar.


          Figuras como Peter Thiel, Elon Musk y Marc Andreessen representan versiones distintas: Thiel
          es más explícitamente libertario y pesimista sobre la democracia; Musk combina optimismo tecnológico
          con crítica estatal; Andreessen publicó el ''Manifiesto Tecno-Optimista'' (2023) afirmando que
          la tecnología es inherentemente buena y que frenarla equivale a frenar la vida humana.


          El tecnolibertarismo tiene tensiones internas: algunos son minarquistas (quieren Estado mínimo),
          otros son más cercanos al anarcocapitalismo (criptomonedas, contratos inteligentes, DAOs como
          alternativas estatales). En común: rechazo de la regulación tecnológica, fe en el mercado tecnológico
          y desconfianza del Estado.


          En el compás se ubica en el extremo libertario-derecha con un rasgo generacional y sectorial
          específico: Silicon Valley.'
        historicalContext: Sus raíces están en la cultura hacker de los 1960s-1970s (Whole Earth Catalog,
          Stewart Brand), en el movimiento cypherpunk de los 1980s-1990s y en la explosión de internet
          en los 1990s. La burbuja dotcom (2000) y el auge de las grandes plataformas (2010s) consolidaron
          su influencia económica y política. En los 2020s ha tomado formas más explícitamente políticas
          con el aceleracionismo tecnológico.
        contemporaryRelevance: 'Extremely relevant: Peter Thiel, Elon Musk y Marc Andreessen son figuras
          políticas de primer orden. Su influencia en el gobierno Trump (2025) es significativa. Las criptomonedas,
          la IA desregulada y la crítica a la moderación de contenidos en plataformas son sus batallas
          contemporáneas. En América Latina influye en el mileísmo argentino y en sectores libertarios.'
        commonCriticisms: Los críticos señalan que la concentración de poder en grandes plataformas tecnológicas
          contradice sus principios de descentralización. Los ecologistas señalan el enorme costo ambiental
          de la infraestructura digital. Los demócratas advierten que su optimismo tecnológico justifica
          la erosión de regulaciones de seguridad, privacidad y condiciones laborales. Los conservadores
          tradicionales temen la disrupción cultural de la aceleración tecnológica.
        keyThinkers:
        - John Perry Barlow
        - Peter Thiel
        - Marc Andreessen
        - Elon Musk
        - Timothy May (cypherpunk)
        historicalExamples:
        - Declaración de Independencia del Ciberespacio (Barlow, 1996)
        - PayPal Mafia y cultura libertaria de Silicon Valley (2000s)
        - Manifiesto Tecno-Optimista de Andreessen (2023)
        wikipediaUrl: https://es.wikipedia.org/wiki/Tecnolibertarismo
      - id: georgism
        name: Georgismo
        nameEn: Georgism
        weight: 2
        description: Propuesta de Henry George de un impuesto único al valor de la tierra como fuente
          principal de ingresos fiscales.
        keyThinkers:
        - Henry George
        - Mason Gaffney
        - Fred Harrison
        - Joseph Stiglitz (favorable al LVT)
        longDescription: 'El georgismo es la doctrina económica y política desarrollada por el economista
          estadounidense Henry George (1839-1897) que propone que la tierra —y más ampliamente, los recursos
          naturales y el valor generado por la ubicación— es propiedad común de la humanidad, y que el
          único impuesto legítimo y eficiente es el que grava el valor de la tierra (Land Value Tax, LVT),
          no el trabajo ni el capital.


          George desarrolló su teoría en ''Progress and Poverty'' (1879), el libro más vendido en EE.UU.
          del siglo XIX después de la Biblia. Su argumento central: el valor de la tierra no es creado
          por quien la posee sino por la comunidad que la rodea (infraestructura, vecindario, servicios).
          Gravar ese valor es justo y eficiente; no distorsiona la producción, a diferencia de los impuestos
          al trabajo o al capital.


          El georgismo ocupa una posición singular en el espectro político: defiende la propiedad privada
          del capital producido y el libre mercado (por eso se ubica en la derecha económica), pero considera
          la tierra como bien común que no puede privatizarse indefinidamente (lo que lo distingue del
          liberalismo clásico estricto). Algunos lo ubican en la tradición liberal-progresista; otros
          en la libertaria.


          Sus implicaciones prácticas incluyen abolir impuestos al ingreso y al capital, sustituidos por
          el LVT, lo que desincentivaría la especulación inmobiliaria, liberaría tierra subutilizada para
          uso productivo y reduciría la desigualdad sin afectar la eficiencia económica.


          Economistas tan distintos como Milton Friedman y Joseph Stiglitz han elogiado el LVT como el
          ''impuesto menos malo''. En el compás se sitúa en la región libertaria-derecha moderada.'
        historicalContext: Henry George publicó 'Progress and Poverty' en 1879 en plena era del Gilded
          Age estadounidense. Su movimiento político fue masivo en los 1880s-1890s; casi ganó la alcaldía
          de Nueva York en 1886. La Single Tax League y el Partido del Impuesto Único tuvieron presencia
          en EE.UU., Australia y Gran Bretaña. El georgismo declinó a principios del siglo XX pero ha
          experimentado renacimientos académicos periódicos.
        contemporaryRelevance: Ha ganado interés con la crisis de vivienda en ciudades de todo el mundo.
          Estonia aplica un LVT parcial. Singapur tiene políticas de captura de valor del suelo. Economistas
          de distintas orientaciones (desde Stiglitz hasta libertarios) coinciden en sus méritos técnicos.
          Movimientos de reforma urbana en EE.UU., Reino Unido y Australia citan el georgismo.
        commonCriticisms: Los libertarios puros (Rothbard) argumentan que el LVT es también una forma
          de confiscación estatal. Los conservadores señalan que erosiona la propiedad intergeneracional
          de la tierra. Los propietarios tradicionales señalan dificultades prácticas de valoración. Los
          marxistas señalan que no cuestiona la explotación del trabajo por el capital.
        historicalExamples:
        - Movimiento del Impuesto Único en EE.UU. (1880s-1890s)
        - Política de suelo en Singapur y Hong Kong (siglo XX)
        - LVT en Estonia (desde 1993)
        - Experimento georgista en Arden, Delaware (fundada 1900)
        wikipediaUrl: https://es.wikipedia.org/wiki/Georgismo
      - id: green-libertarianism
        name: Libertarismo verde
        nameEn: Green Libertarianism
        weight: 1
        description: Síntesis entre libertarismo económico y protección ambiental mediante derechos de
          propiedad sobre recursos naturales.
        longDescription: 'El libertarismo verde es la corriente que busca integrar los principios del
          libertarismo —propiedad privada, libre mercado, no agresión, mínimo Estado— con la preocupación
          ecológica y la sostenibilidad ambiental. Su tesis es que la degradación ambiental es en gran
          medida resultado de la falta de derechos de propiedad bien definidos sobre los recursos naturales,
          de los subsidios estatales a industrias contaminantes y de la externalización de costos que
          el Estado permite.


          Desde una perspectiva libertaria, la contaminación es una violación del principio de no agresión:
          contaminar el aire, el agua o la tierra de otro es una agresión a su propiedad. Por tanto, la
          solución ecológica correcta no es regulación estatal discrecional sino extensión de derechos
          de propiedad a recursos naturales y responsabilidad legal plena por daños ambientales.


          Hay variantes dentro del libertarismo verde: algunos aceptan impuestos pigouvianos (como el
          impuesto al carbono) como mecanismo de internalización de externalidades; otros rechazan todo
          impuesto y prefieren derechos de propiedad ampliados y litigación privada; un tercer grupo,
          más cercano al ecoanarquismo, rechaza tanto el Estado como las grandes corporaciones contaminadoras.


          Se distingue del ecologismo verde convencional en que rechaza el estatismo ambiental (regulaciones,
          organismos públicos, planificación estatal de la economía verde) y del libertarismo estándar
          en que toma en serio el problema ambiental como falla genuina del mercado cuando los derechos
          de propiedad son incompletos.


          En el compás se ubica en el cuadrante libertario-derecha, pero con una sensibilidad ambiental
          que lo distingue del neoliberalismo.'
        historicalContext: Sus raíces intelectuales están en el ambientalismo de derechos de propiedad
          de la tradición de la Escuela de Chicago y en economistas como Ronald Coase (Teorema de Coase,
          1960). El Free Market Environmentalism fue articulado por Terry Anderson y Donald Leal en los
          1980s. En los 1990s-2000s el Cato Institute y el Property and Environment Research Center (PERC)
          desarrollaron la corriente.
        contemporaryRelevance: Relevante en debates sobre derechos de agua, gestión privada de recursos
          naturales y mecanismos de mercado para la reducción de emisiones (mercados de carbono). El PERC
          (Property and Environment Research Center) en Montana es su principal think tank. Aparece en
          debates sobre cambio climático donde se buscan soluciones de mercado.
        commonCriticisms: Los ecologistas convencionales señalan que los derechos de propiedad no pueden
          extenderse a todos los bienes ambientales (clima global, biodiversidad) y que el mercado no
          resuelve problemas de acción colectiva a escala planetaria. Los libertarios puros rechazan incluso
          los impuestos pigouvianos como intervención ilegítima. Los socialistas señalan que privatizar
          recursos naturales agrava la desigualdad.
        keyThinkers:
        - Terry Anderson
        - Donald Leal
        - Fred Smith
        - Murray Rothbard (ecología de propiedad)
        historicalExamples:
        - Property and Environment Research Center (PERC), Montana (desde 1980)
        - Gestión privada de pesquerías en Islandia (cuotas transferibles)
        - Mercados de derechos de emisión como mecanismo de mercado (desde 1990s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Ecolog%C3%ADa_de_libre_mercado
      - id: neo-libertarianism
        name: Neo-libertarismo
        nameEn: Neo-Libertarianism
        weight: 1
        description: Variante contemporánea del libertarismo con ajustes pragmáticos para el contexto
          político moderno.
        longDescription: 'El neolibertarismo es una corriente surgida principalmente en el contexto estadounidense
          post-11 de septiembre que intenta reconciliar el libertarismo de libre mercado y derechos individuales
          con un papel activo en política exterior para defender y promover los valores liberales internacionalmente.
          Se distingue del libertarismo clásico en que acepta —con condicionantes— el uso del poder militar
          para proteger la libertad en el exterior, rechazando el aislacionismo libertario tradicional.


          Esta posición fue articulada por bloggers y comentaristas como Neal Boortz y Randy Barnett tras
          el 11-S, argumentando que la amenaza del terrorismo islamista y de regímenes autoritarios justificaba
          un libertarismo ''musculoso'' en política exterior. Rechazaba tanto el pacifismo libertario
          como el imperialismo neoconservador, buscando una tercera vía: intervención selectiva cuando
          se amenaza la libertad individual.


          El neolibertarismo tiene también una dimensión más amplia: como actualización del libertarismo
          al contexto contemporáneo, incorporando temas como derechos de minorías, igualdad de género
          y diversidad dentro del marco libertario. En ese sentido, representa el libertarismo ''cosmopolita''
          y socialmente liberal que contrasta con el paleolibertarismo y el hoppeanism.


          En el compás se sitúa en el cuadrante libertario-derecha, pero menos extremo que el anarcocapitalismo
          y con posiciones más matizadas en política exterior que el libertarismo clásico aislacionista.'
        historicalContext: El término surgió en el debate anglosajón post-2001, sobre todo en blogosfera.
          Como posición política organizada tiene poca institucionalidad propia. El Cato Institute representa
          muchas posiciones neolibertarias en su versión cosmopolita. En los 2010s el libertarismo cosmopolita
          se distanció explícitamente del paleolibertarismo y del hoppeanism.
        contemporaryRelevance: Aparece en debates del movimiento libertario sobre inmigración, derechos
          LGBTQ+, política exterior y uso de la tecnología. Es la facción dominante en el Cato Institute.
          En el contexto de las guerras de Ucrania y Gaza (2020s) ha renovado el debate sobre hasta dónde
          llega el no intervencionismo libertario.
        commonCriticisms: Los paleolibertarios señalan que aceptar intervenciones exteriores contradice
          el principio de no agresión y reproduce el imperialismo angloamericano. Los libertarios clásicos
          cuestionan la coherencia de defender la libertad con medios militares estatales. Los progresistas
          señalan que su retórica de derechos individuales es selectiva respecto a la libertad económica.
        keyThinkers:
        - Randy Barnett
        - Nick Gillespie
        - Matt Welch
        historicalExamples:
        - Debate post-11-S sobre política exterior libertaria (EE.UU., 2001-2005)
        - Cato Institute y Reason Magazine como plataformas del libertarismo cosmopolita (desde 1970s-2000s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Libertarismo
      - id: dark-enlightenment
        name: Ilustración Oscura
        nameEn: Dark Enlightenment
        weight: 2
        description: Movimiento intelectual reaccionario contemporáneo (neorreacción) que rechaza la democracia
          liberal en favor de formas monárquicas o corporativas.
        keyThinkers:
        - Curtis Yarvin (Mencius Moldbug)
        - Nick Land
        - Michael Anissimov
        longDescription: 'La Ilustración Oscura (Dark Enlightenment) o Neorreaccionarismo (NRx) es una
          corriente filosófica-política contemporánea, desarrollada principalmente en internet desde mediados
          de los 2000s, que rechaza el proyecto ilustrado liberal-democrático moderno como fracaso o engaño,
          y propone formas de gobierno post-democráticas como alternativas. Su nombre es una inversión
          irónica de la Ilustración: en lugar de progreso hacia la libertad, la Ilustración habría llevado
          a la decadencia civilizacional.


          Curtis Yarvin (bajo el seudónimo Mencius Moldbug) es su figura central. En su blog Unqualified
          Reservations (2007-2013) y en textos como ''A Formalist Manifesto'' desarrolló la tesis de que
          la democracia es un sistema de gobierno ineficiente, corrupto y que encubre el poder real de
          una clase intelectual-burocrática (''la Catedral''). Propone como alternativa el ''neocameralismo'':
          el Estado como empresa dirigida por un CEO soberano que maximiza el valor para sus ciudadanos-accionistas.


          Nick Land, filósofo británico, desarrolló la vertiente aceleracionista del NRx: el capitalismo
          y la tecnología se aceleran hacia una singularidad posthumana que disuelve el control estatal
          y humano en procesos impersonales de mercado e IA. Esta corriente (''aceleracionismo de derecha''
          o r/acc) conecta con el tecnolibertarismo extremo.


          El NRx rechaza la igualdad como valor político, critica el universalismo moral liberal, reivindica
          jerarquías naturales y acepta diferencias civilizacionales y biológicas que el pensamiento moderno
          tabúa.


          En el compás se ubica en la zona oscura del extremo libertario-derecha, en frontera con posiciones
          autoritarias: rechaza la democracia y el Estado moderno por distintas razones que el autoritarismo
          tradicional.'
        historicalContext: Mencius Moldbug (Curtis Yarvin) comenzó a publicar en 2007. Nick Land había
          publicado 'The Dark Enlightenment' como texto web en 2012-2013. El movimiento se desarrolló
          en la blogosfera y luego en plataformas como Twitter. Influyó en la alt-right de los 2010s aunque
          se distingue de ella en sofisticación filosófica. Peter Thiel ha mostrado simpatía con algunos
          argumentos de Yarvin.
        contemporaryRelevance: Yarvin tiene acceso documentado a figuras del gobierno Trump en 2025. Sus
          ideas sobre el 'Estado administrativo' y la 'Catedral' han permeado al populismo de derecha
          estadounidense. Nick Land es referencia en comunidades aceleracionistas y de especulación filosófica
          de derecha. Debates sobre IA, tecnocracia y post-democracia lo mantienen en el circuito intelectual.
        commonCriticisms: Los liberales señalan que su crítica a la democracia conduce al autoritarismo
          sin importar el envoltorio filosófico. Los conservadores tradicionales rechazan su nihilismo
          y falta de anclaje moral. Los libertarios señalan que el Estado-empresa de Yarvin es incompatible
          con los derechos individuales. Los académicos critican la falta de rigor y el elitismo implícito.
        historicalExamples:
        - Blog Unqualified Reservations de Yarvin (2007-2013)
        - Influencia en alt-right y populismo trumpiano (2015-2025)
        - Aceleracionismo de derecha en comunidades online (2010s-2020s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Neorreaccionarismo
      - id: consequentialism-libright
        name: Consecuencialismo
        nameEn: Consequentialism
        weight: 1
        description: Posición ética que juzga acciones por sus resultados, frecuentemente aplicada a favor
          del libertarismo por sus resultados de bienestar.
        longDescription: 'El consecuencialismo libertario-derecha es la justificación del libre mercado
          y las instituciones liberales desde la ética consecuencialista: no porque existan derechos naturales
          inviolables (como en Rothbard o Nozick), sino porque los mercados libres producen mejores resultados
          para el bienestar humano que cualquier alternativa colectivista o estatal. Es una posición filosófica
          y no un movimiento político con nombre propio, pero informa a muchos defensores del capitalismo.


          A diferencia del libertarismo basado en derechos (deontológico), el consecuencialismo libertario
          acepta que si una intervención estatal demostrara empíricamente mejorar el bienestar, debería
          aceptarse. Pero argumenta que históricamente y teóricamente los mercados libres superan sistemáticamente
          a la intervención estatal: asignan recursos eficientemente, generan innovación, reducen la pobreza
          y producen prosperidad general.


          Milton Friedman es quizás el ejemplo paradigmático: sus argumentos en ''Capitalismo y Libertad''
          (1962) mezclan consideraciones de eficiencia económica con argumentos de libertad individual.
          Friedrich Hayek también tiene dimensiones consecuencialistas: el mercado como procesador de
          información dispersa que ningún planificador puede replicar.


          Esta postura convive con el utilitarismo clásico (Bentham, Mill): maximizar la utilidad agregada.
          Pero donde el utilitarismo puede justificar redistribución si aumenta la utilidad total, el
          consecuencialismo de mercado argumenta que la redistribución reduce la producción de riqueza
          y el bienestar a largo plazo.


          En el compás se ubica en el cuadrante libertario-derecha, pero su posición exacta depende de
          cuánto peso da a las consecuencias frente a los derechos: puede ser moderado (acepta correcciones
          de fallas de mercado) o radical.'
        historicalContext: El utilitarismo benthamiano del siglo XIX ya tenía afinidades con el liberalismo
          de mercado. La economía del bienestar (welfare economics) del siglo XX articuló el argumento
          de eficiencia del mercado con rigor técnico. La Escuela de Chicago (Friedman, Stigler) popularizó
          argumentos consecuencialistas para la desregulación en los 1960s-1980s.
        contemporaryRelevance: Dominante en economía académica y en política económica de organismos internacionales.
          Los argumentos consecuencialistas de mercado informan debates sobre desregulación, libre comercio,
          privatización y reforma tributaria. Es la posición filosófica implícita de la mayoría de los
          economistas liberales.
        commonCriticisms: 'Los libertarios de derechos (Rothbard, Nozick) señalan que justificar la libertad
          solo por resultados la hace contingente: si el socialismo produjera mejores resultados, sería
          justificado. Los igualitaristas (Rawls) argumentan que la utilidad agregada ignora cómo se distribuyen
          los beneficios. Los críticos marxistas señalan que las métricas de bienestar utilizadas ocultan
          la distribución de poder.'
        keyThinkers:
        - Milton Friedman
        - Friedrich Hayek
        - George Stigler
        - Gary Becker
        - Jeremy Bentham (antecedente)
        historicalExamples:
        - Reformas de liberalización económica con justificación técnica-consecuencialista (décadas 1980-2000
          globalmente)
        - Escuela de Chicago y su influencia en políticas de competencia en EE.UU.
        wikipediaUrl: https://es.wikipedia.org/wiki/Consecuencialismo
      - id: pink-capitalism
        name: Capitalismo rosa
        nameEn: Pink Capitalism
        weight: 1
        description: Síntesis entre libre mercado y progresismo cultural LGBTIQ+, donde las empresas asumen
          políticas de diversidad.
        longDescription: 'El capitalismo rosa (pink capitalism) o capitalismo arcoíris es la integración
          de la agenda LGBTQ+ —específicamente su visibilidad y derechos civiles— dentro del sistema capitalista
          de mercado, ya sea mediante el marketing corporativo inclusivo, el consumo como afirmación identitaria
          o el apoyo empresarial a causas de diversidad sexual. El término es en parte descriptivo y en
          parte crítico: describe cómo el capitalismo ha absorbido las identidades queer convirtiéndolas
          en nicho de mercado y herramienta de imagen corporativa.


          El fenómeno se aceleró desde los años 1990 con la publicidad dirigida al ''mercado gay'' (rainbow
          capitalism en inglés) y se consolidó en los 2000s-2010s cuando grandes corporaciones comenzaron
          a adoptar colores del orgullo en sus logos durante junio. El capitalismo rosa argumenta que
          las empresas y el mercado —no el Estado— son los agentes más eficaces de la inclusión LGBTQ+:
          crean empleo, son sancionados por el mercado si discriminan y tienen incentivos para atraer
          talento diverso.


          Esta posición tiene defensores explícitos en la intersección entre libertarismo y progresismo
          LGBTQ+: el mercado libre como garantía de la igualdad de derechos, sin necesidad de Estado.
          Sin embargo, su crítica más frecuente viene desde dentro de los movimientos queer: el ''rainbow
          washing'' corporativo vacía el contenido político de la lucha por derechos, la reduce a consumo
          y excluye a quienes no tienen poder adquisitivo.


          En el compás se ubica en el cuadrante libertario-derecha con acento social progresista: mercado
          libre como mecanismo de inclusión, pero sin redistribución estatal significativa.'
        historicalContext: El mercado gay como segmento de consumo fue identificado por marketers en los
          años 1980s en EE.UU. y Europa. Las primeras campañas de publicidad abiertamente inclusivas aparecieron
          en los 1990s. El giro masivo corporativo hacia el Orgullo ocurrió en los 2010s con la legalización
          del matrimonio igualitario en EE.UU. (2015). La crítica interna al 'rainbow capitalism' se intensificó
          en los 2010s-2020s.
        contemporaryRelevance: Las marcas globales adoptan el arcoíris en junio mientras operan en países
          con leyes anti-LGBTQ+, lo que genera la crítica de 'pinkwashing'. El debate sobre si las empresas
          deben tomar posición política en temas de identidad (como la controversia Bud Light en EE.UU.,
          2023) mantiene el tema en la agenda. Es también relevante en debates sobre capitalismo stakeholder.
        commonCriticisms: Críticos queer de izquierda señalan que reduce la lucha por derechos a consumo,
          excluye a migrantes y personas pobres LGBTQ+ y da cobertura a corporaciones que explotan trabajadores.
          Los conservadores señalan que impone una agenda cultural mediante el mercado que muchos consumidores
          rechazan. Los libertarios clásicos ven en él una expresión normal del mercado respondiendo a
          preferencias.
        keyThinkers:
        - Alexandra Chasin (crítica)
        - Lisa Duggan (homonormatividad)
        - Peter Thiel (como figura de capitalismo gay conservador)
        historicalExamples:
        - Marketing dirigido a comunidad gay en EE.UU. (desde 1990s)
        - Campaña de Starbucks y otras marcas con logos arcoíris (2010s)
        - Controversia Bud Light/Dylan Mulvaney en EE.UU. (2023)
        wikipediaUrl: https://es.wikipedia.org/wiki/Capitalismo_rosa
      - id: christian-libertarianism
        name: Libertarismo cristiano
        nameEn: Christian Libertarianism
        weight: 2
        description: Combinación de fe cristiana con libertarismo económico basado en la idea de libre
          albedrío como principio teológico.
        longDescription: 'El libertarismo cristiano es la posición que defiende la libertad individual
          y el libre mercado desde una fundamentación teológica cristiana, argumentando que el respeto
          a la autonomía de la persona —incluyendo su libre albedrío— es exigencia de la fe cristiana,
          y que el Estado social coercitivo contradice tanto la dignidad humana como la caridad auténtica.
          Distingue entre las obligaciones morales que los cristianos tienen voluntariamente (ayudar al
          prójimo) y las que el Estado impone coercitivamente (redistribución).


          Su argumento central es que la caridad cristiana es un acto libre: el Estado que redistribuye
          mediante impuestos no practica caridad sino coacción. Gary North, economista y teólogo reformado,
          desarrolló un ''libertarismo teocrático'' que combina la ley mosaica con el libre mercado. Gary
          Chartier y otros han argumentado que el anarquismo de mercado es consistente con el cristianismo
          primitivo.


          En Colombia, la corriente tiene expresión política en el partido Colombia Justa Libres (CJL),
          que combina valores conservadores protestantes y evangélicos con posiciones de libre mercado,
          crítica al Estado benefactor y defensa de la familia tradicional. Esta síntesis es característica
          de sectores evangélicos latinoamericanos que políticamente se ubican en la derecha libertaria.


          Se distingue del socialcristianismo (que acepta el Estado de bienestar) y del integrismo teocrático
          (que busca imponer la ley cristiana mediante el Estado). El libertario cristiano quiere Estado
          mínimo y valores cristianos en la sociedad civil, no en las leyes.


          En el compás se ubica en el cuadrante libertario-derecha con valores sociales conservadores.'
        historicalContext: Tiene raíces en el protestantismo histórico que enfatizaba la responsabilidad
          individual ante Dios. En el siglo XX, autores como R.J. Rushdoony (reconstruccionismo) y Gary
          North desarrollaron versiones teológicamente elaboradas. En América Latina el crecimiento evangélico
          desde los años 1980s generó una nueva derecha religiosa con orientación libertaria económica.
          Colombia Justa Libres (fundado 2018) es su expresión colombiana más visible.
        contemporaryRelevance: Muy relevante en América Latina con el crecimiento del evangelismo político.
          En Colombia, CJL es actor político de peso en coaliciones de derecha. En Brasil, el evangelismo
          político tiene dimensiones libertario-conservadoras. En EE.UU., la intersección entre libertarismo
          y evangelismo informa al Tea Party y sectores del Partido Republicano.
        commonCriticisms: Los libertarios seculares señalan que la fundamentación religiosa introduce
          valores no universalizables en el debate político. Los socialcristianos argumentan que la doctrina
          social de la Iglesia exige justicia estructural que el libertarismo no garantiza. Los progresistas
          señalan que el libertarismo cristiano suele combinar libre mercado con restricciones a derechos
          de minorías y mujeres.
        keyThinkers:
        - Gary North
        - Gary Chartier
        - Robert Sirico
        - Álvaro Corzo (CJL Colombia)
        historicalExamples:
        - Colombia Justa Libres como partido político en Colombia (desde 2018)
        - Intersección de evangelismo y libertarismo en EE.UU. (Tea Party, 2009-2014)
        - Reconstruccionismo cristiano y economía de libre mercado (North, desde 1970s)
        wikipediaUrl: https://es.wikipedia.org/wiki/Libertarismo_cristiano
      - id: individualist-anarchism
        name: Anarquismo individualista
        nameEn: Individualist Anarchism
        weight: 2
        description: Corriente anarquista que prioriza la soberanía individual sobre cualquier forma de
          colectivo o mercado organizado.
        keyThinkers:
        - Max Stirner
        - Lysander Spooner
        - Benjamin Tucker
        - William Godwin
        - Voltairine de Cleyre
        longDescription: 'El anarquismo individualista es la corriente del anarquismo que pone el énfasis
          en la autonomía y la soberanía del individuo como valores supremos, rechazando tanto el Estado
          como cualquier forma de autoridad colectiva no consentida —incluyendo el capitalismo corporativo,
          el sindicalismo coercitivo o las iglesias. Se distingue del anarquismo colectivista y comunista
          en que no propone la propiedad colectiva como alternativa al Estado; mantiene la propiedad personal
          y acepta el mercado como mecanismo de intercambio voluntario.


          Tiene raíces filosóficas en William Godwin (primer anarquista sistemático, finales del siglo
          XVIII), Max Stirner (''El Único y su Propiedad'', 1844), quien llevó el individualismo a su
          extremo egocéntrico, y en el anarquismo americano del siglo XIX: Lysander Spooner (crítico del
          Estado y defensor de la propiedad) y Benjamin Tucker, quien fusionó el mutualismo proudhoniano
          con el individualismo americano.


          Tucker argumentaba que el capitalismo era injusto no porque hubiera propiedad privada sino porque
          el Estado protegía monopolios (monetario, de tierras, de patentes y de tarifas) que permitían
          la explotación. Eliminar esos monopolios estatales mediante una economía de libre mercado genuina
          produciría relaciones justas sin Estado ni capitalismo corporativo.


          Se ubica en una posición liminal en el compás: por su defensa del mercado y la propiedad individual
          se sitúa en el eje económico liberal; por su rechazo del Estado y toda autoridad, en el extremo
          libertario. Es un antecesor del anarcocapitalismo pero con mayor crítica al capitalismo corporativo.'
        historicalContext: Godwin (1793) y Stirner (1844) son sus fundadores europeos. El anarquismo americano
          del siglo XIX (Tucker, Spooner, Voltairine de Cleyre) fue su expresión más organizada. Las publicaciones
          Liberty (Tucker, 1881-1908) y The Word articularon la corriente. Declinó en el siglo XX con
          el auge del sindicalismo y el socialismo. Revivió parcialmente con el libertarismo americano
          de los 1960s-1970s.
        contemporaryRelevance: Influye en el libertarismo de izquierda ('left-libertarianism'), en corrientes
          'anarco-mutualistas' y en el debate sobre propiedad en la economía digital. Autores como Kevin
          Carson ('Studies in Mutualist Political Economy') actualizan la tradición tuckeriana. Tiene
          presencia en comunidades anarquistas anglosajonas que rechazan tanto el comunismo como el capitalismo
          corporativo.
        commonCriticisms: Los anarquistas comunistas critican que la propiedad individual inevitablemente
          genera acumulación y dominación. Los anarcocapitalistas señalan que sin propiedad plena del
          capital no hay mercado genuinamente libre. Los marxistas argumentan que sin abolir la propiedad
          del capital no se supera la explotación. Los liberales señalan que su rechazo a todo Estado
          es utópico.
        historicalExamples:
        - Publicación Liberty de Benjamin Tucker (Boston, 1881-1908)
        - Anarquismo individualista americano en el siglo XIX
        - Mutualismo contemporáneo y economía participativa (Kevin Carson, siglo XXI)
        wikipediaUrl: https://es.wikipedia.org/wiki/Anarquismo_individualista
    - name: conservadurismo-fiscal
      weight: 3
      children:
      - id: fiscal-conservatism
        name: Conservadurismo fiscal
        nameEn: Fiscal Conservatism
        weight: 3
        description: Énfasis en balances fiscales sostenibles, bajo gasto público, bajos impuestos y desregulación
          económica.
        longDescription: 'El conservadurismo fiscal es la posición política que defiende la disciplina
          presupuestaria del Estado —gastos equilibrados o superávit, deuda pública baja o decreciente,
          impuestos moderados y eficientes— como principio de buena gobernanza. No es una ideología comprehensiva
          sino una postura sobre finanzas públicas que puede combinarse con distintas posiciones sobre
          valores sociales, política exterior o regulación económica.


          Su tesis central es que los gobiernos, al igual que las familias o las empresas, no pueden gastar
          indefinidamente más de lo que ingresan sin consecuencias negativas: deuda creciente, inflación,
          crisis de solvencia y carga sobre las generaciones futuras. La responsabilidad fiscal es presentada
          como una obligación moral intergeneracional y como condición de la estabilidad económica.


          El conservadurismo fiscal se asocia históricamente con el partido Whig y luego el Conservador
          en Gran Bretaña, con el ala republicana en EE.UU. (antes del giro deficitario de Reagan), con
          los partidos liberales europeos del siglo XIX y con las políticas de ajuste recomendadas por
          el FMI. En la práctica, muchos gobiernos que invocan el conservadurismo fiscal terminan aumentando
          el déficit (Reagan, Bush), lo que genera la crítica de que es una doctrina selectivamente aplicada.


          Se distingue del neoliberalismo en que no requiere privatización ni desregulación amplia; del
          liberalismo clásico en que puede aceptar un Estado de bienestar moderado siempre que sea financieramente
          sostenible; y del paleoconservadurismo en que es más tecnocrático que culturalmente reactivo.


          En el compás se ubica en la zona libertaria-derecha moderada, cercano al centro, definido por
          la posición fiscal más que por valores sociales.'
        historicalContext: La disciplina fiscal como doctrina de buen gobierno tiene raíces en el liberalismo
          económico del siglo XIX. El Pacto de Estabilidad y Crecimiento de la UE (1997) institucionalizó
          el conservadurismo fiscal en Europa. Los acuerdos presupuestarios del Congreso de EE.UU. en
          los 1990s (Clinton-Gingrich) produjeron superávit. La crisis de 2008 y la pandemia de 2020 erosionaron
          la ortodoxia fiscal globalmente.
        contemporaryRelevance: La deuda pública récord de economías desarrolladas tras la pandemia ha
          relanzado el debate sobre sostenibilidad fiscal. La crisis de deuda soberana en Europa (2010-2015)
          fue el episodio más agudo. En América Latina, Colombia, Chile y Perú tienen reglas fiscales
          inspiradas en el conservadurismo fiscal. El debate sobre la regla fiscal en Colombia es un ejemplo
          contemporáneo directo.
        commonCriticisms: Los keynesianos señalan que en recesiones la austeridad fiscal agrava la caída
          del PIB (multiplicador fiscal negativo). Los progresistas argumentan que la austeridad recorta
          servicios sociales que afectan más a los vulnerables. Los MMT (Teoría Monetaria Moderna) cuestionan
          que la deuda de un Estado soberano sea comparable a la deuda familiar.
        keyThinkers:
        - Adam Smith
        - David Ricardo
        - Friedrich Hayek
        - Milton Friedman
        - Alberto Alesina
        historicalExamples:
        - Superávit fiscal Clinton-Gingrich en EE.UU. (1998-2001)
        - Pacto de Estabilidad y Crecimiento de la UE (1997)
        - Ajuste fiscal de Nueva Zelanda en los 1980s-1990s
        - Regla fiscal de Colombia (Ley 1473 de 2011)
        wikipediaUrl: https://es.wikipedia.org/wiki/Conservadurismo_fiscal
      - id: third-way
        name: Tercera Vía
        nameEn: Third Way
        weight: 2
        description: Síntesis centrista de los 1990s entre socialdemocracia y liberalismo de mercado,
          asociada a Blair y Clinton.
        keyThinkers:
        - Anthony Giddens
        - Tony Blair
        - Bill Clinton
        - Gerhard Schröder
        - Ulrich Beck
        longDescription: 'La Tercera Vía es la corriente de la centroizquierda y la socialdemocracia que
          surgió en los años 1990 como revisión del socialismo clásico y alternativa al neoliberalismo:
          acepta el mercado como mecanismo esencial de asignación de recursos y la globalización como
          realidad irreversible, pero propone que el Estado debe gestionar sus consecuencias sociales
          mediante inversión en capital humano, servicios públicos eficientes y políticas de igualdad
          de oportunidades —no de igualdad de resultados—.


          Tony Blair (con su New Labour en Gran Bretaña), Bill Clinton (con los New Democrats en EE.UU.)
          y Gerhard Schröder (con la ''Agenda 2010'' en Alemania) fueron sus protagonistas políticos más
          influyentes de los años 1990-2000. Anthony Giddens, sociólogo de la London School of Economics,
          fue su teórico principal en ''La Tercera Vía'' (1998): describió el proyecto como la renovación
          de la socialdemocracia en la era de la globalización.


          A diferencia de la socialdemocracia tradicional, la Tercera Vía rechaza la renacionalización
          de empresas, prioriza la flexibilidad laboral y el equilibrio presupuestario, acepta privatizaciones
          de servicios públicos cuando mejoran la eficiencia y enfatiza la responsabilidad individual
          junto a los derechos sociales. Sus críticos de izquierda la llaman ''neoliberalismo con rostro
          humano''.


          En el compás se ubica en la zona entre el centro y el centro-derecha económico, en la región
          libertaria moderada: más estatista que el neoliberalismo pero más pro-mercado que la socialdemocracia
          tradicional.'
        historicalContext: El término circulaba desde los años 1980s (Mario Cuomo en EE.UU., Olof Palme
          en Suecia) pero se consolidó políticamente con el New Labour de Blair (1994-2007) y los Clinton
          Democrats (1992-2001). Schröder aplicó reformas similares en Alemania (2003-2005). En América
          Latina influyó en el PT de Lula en su primera fase (2003-2010) y en partidos socialdemócratas
          que se adaptaron al giro pro-mercado de los 1990s.
        contemporaryRelevance: 'Aunque el término está políticamente desgastado, sus políticas siguen
          siendo referencia: el ''centrismo'' de Macron en Francia, el SPD posSchröder y los demócratas
          moderados de EE.UU. son herederos de la Tercera Vía. En América Latina, partidos como el PSDB
          brasileño (en sus años de gobierno) y el Partido de la U en Colombia tienen afinidades. El debate
          sobre su legado es central en la izquierda occidental.'
        commonCriticisms: La izquierda tradicional señala que abandonó la redistribución y el sindicalismo,
          aceptó la desigualdad creciente y legitimó el neoliberalismo. Los socialistas señalan que sus
          reformas laborales precarizaron el empleo. Los liberales y conservadores la critican por insuficientemente
          reformista en el desmantelamiento del Estado. El surgimiento de Corbyn, Sanders y Podemos fue
          en parte una reacción contra la Tercera Vía.
        historicalExamples:
        - New Labour de Tony Blair en Reino Unido (1997-2007)
        - New Democrats de Clinton en EE.UU. (1993-2001)
        - Agenda 2010 de Schröder en Alemania (2003-2005)
        - Reformas del PT de Lula en Brasil (2003-2010)
        wikipediaUrl: https://es.wikipedia.org/wiki/Tercera_v%C3%ADa_(pol%C3%ADtica)
      - id: national-liberalism
        name: Liberalismo nacional
        nameEn: National Liberalism
        weight: 2
        description: Liberalismo económico combinado con nacionalismo cultural moderado, común en Europa
          central del siglo XIX.
        longDescription: 'El liberalismo nacional es la corriente política del siglo XIX y XX que combinó
          el proyecto liberal —constitucionalismo, mercado libre, derechos civiles individuales— con el
          proyecto nacional de construcción y consolidación de los Estados-nación. En su contexto histórico
          original, fue la ideología de las burguesías que buscaban simultáneamente libertades políticas
          y unificación o independencia nacional frente a los imperios multinacionales (Austro-Húngaro,
          Otomano, Ruso).


          Su premisa es que la nación es el marco natural de la democracia y el mercado: la comunidad
          nacional crea la confianza, las instituciones y la cohesión necesarias para que funcionen los
          derechos liberales. Sin nación no hay ciudadanos, sin ciudadanos no hay liberalismo. Por eso
          la construcción nacional es condición del proyecto liberal, no su contradicción.


          En Alemania, el Partido Nacional Liberal (fundado en 1867) apoyó a Bismarck en la unificación
          alemana desde posiciones liberales. En Italia, el liberalismo risorgimentale fusionó liberalismo
          y nacionalismo. En los países latinoamericanos del siglo XIX, los partidos liberales frecuentemente
          combinaron constitucionalismo con identidad nacional frente a las potencias externas.


          Se distingue del nacionalismo étnico (que prioriza la identidad étnica sobre los derechos individuales)
          y del liberalismo cosmopolita (que considera la nación un accidente, no un bien). Acepta la
          nación como comunidad política legítima pero dentro del marco constitucional.


          En el compás se ubica en la zona libertaria-derecha moderada, con énfasis en la soberanía nacional
          como condición del constitucionalismo liberal.'
        historicalContext: Fue la ideología dominante de las burguesías europeas entre 1848 y 1914 (Primavera
          de los Pueblos, unificaciones italiana y alemana, independencias balcánicas). En América Latina
          informó a los partidos liberales del siglo XIX que construyeron los Estados nacionales post-coloniales.
          Declinó con el auge del fascismo (que lo absorbió y deformó) y el internacionalismo liberal
          de posguerra. Resurge en el siglo XXI como euroescepticismo liberal-nacional.
        contemporaryRelevance: El debate sobre soberanía nacional vs. integración supranacional (UE, Mercosur)
          reactiva el liberalismo nacional. Partidos que combinan euroescepticismo con democracia constitucional
          y mercado libre (ciertos conservadores británicos, polacos o checos) encarnan versiones contemporáneas.
          En Colombia, el debate sobre soberanía y TLCs tiene ecos de esta tradición.
        commonCriticisms: Los liberales cosmopolitas señalan que el énfasis nacional puede derivar en
          proteccionismo, xenofobia y conflicto. Los marxistas señalan que el nacionalismo burgués sirve
          para dividir a la clase trabajadora. Los multiculturalistas argumentan que la identidad nacional
          homogeneizante oprime a las minorías.
        keyThinkers:
        - Giuseppe Mazzini
        - John Stuart Mill (naciones y gobierno representativo)
        - Friedrich Naumann
        - Ernest Renan
        historicalExamples:
        - Partido Nacional Liberal alemán y unificación bismarckiana (1867-1918)
        - Liberalismo risorgimentale italiano (1848-1870)
        - Partidos liberales latinoamericanos en la construcción estatal del siglo XIX
        wikipediaUrl: https://es.wikipedia.org/wiki/Liberalismo_nacional
      - id: capitalist-transhumanism
        name: Transhumanismo capitalista
        nameEn: Capitalist Transhumanism
        weight: 1
        description: Visión que combina libre mercado con modificación tecnológica voluntaria de la especie
          humana mediante innovación privada.
        longDescription: 'El transhumanismo capitalista es la corriente que defiende el uso de tecnologías
          avanzadas —inteligencia artificial, biotecnología, ingeniería genética, interfaces cerebro-computador,
          nanotecnología— para trascender las limitaciones biológicas humanas (enfermedad, envejecimiento,
          muerte), y que considera que el capitalismo de libre mercado es el sistema más eficiente para
          financiar, desarrollar y distribuir estas tecnologías.


          Su premisa es que la innovación tecnológica es el mayor bien para la humanidad, y que los mercados
          competitivos —no el Estado ni la planificación— generan los incentivos para la investigación
          y desarrollo acelerado. Las grandes inversiones de capital de riesgo en biotecnología, longevidad,
          IA y neurociencia son vistas como el camino más prometedor hacia la mejora humana.


          Figuras como Peter Thiel (co-fundador de PayPal, inversor en longevidad), Ray Kurzweil (director
          de ingeniería de Google, teoría de la Singularidad), Aubrey de Grey (SENS Research Foundation
          para revertir el envejecimiento) y Elon Musk (Neuralink) encarnan distintas vertientes. El vínculo
          con Silicon Valley es estrecho.


          El transhumanismo capitalista se distingue del transhumanismo de izquierda (que aboga por acceso
          universal garantizado por el Estado a las mejoras tecnológicas) en que acepta que las innovaciones
          serán inicialmente costosas y accesibles solo para quienes puedan pagarlas, justificando esto
          como etapa necesaria antes de la democratización vía reducción de costos.


          En el compás se sitúa en el extremo libertario-derecha con énfasis futurista: máxima libertad
          económica como motor de la mejora humana.'
        historicalContext: El transhumanismo como movimiento surgió en los años 1980s con Nick Bostrom,
          Max More y la Extropy Institute. La versión capitalista se consolidó con el auge de Silicon
          Valley en los 1990s-2000s. El Singularity University (2009) y las inversiones masivas en longevidad
          (Calico de Google, empresa de Thiel) en los 2010s-2020s lo convirtieron en fenómeno con recursos
          reales.
        contemporaryRelevance: Las inversiones en longevidad, edición genética (CRISPR), interfaces cerebro-computador
          (Neuralink) e IA hacen que el transhumanismo capitalista esté pasando de la filosofía a proyectos
          concretos. Debates sobre acceso desigual a mejoras humanas, biohacking regulatorio y 'humanos
          mejorados' en mercados laborales son urgentes.
        commonCriticisms: Los bioéticos señalan que profundizará desigualdades al crear una 'clase de
          mejorados' inasequible para pobres. Los conservadores religiosos rechazan la transgresión de
          los límites de la naturaleza humana. Los ecologistas señalan el costo ambiental de la infraestructura
          tecnológica. Los humanistas señalan que la obsesión con superar la muerte distrae de problemas
          urgentes del presente.
        keyThinkers:
        - Ray Kurzweil
        - Peter Thiel
        - Aubrey de Grey
        - Nick Bostrom
        - Max More
        - Elon Musk
        historicalExamples:
        - Singularity University (NASA Ames, fundada 2009)
        - Calico (Google) investigación en longevidad (desde 2013)
        - Neuralink de Elon Musk (desde 2016)
        - Extropy Institute (1988-2006)
        wikipediaUrl: https://es.wikipedia.org/wiki/Transhumanismo
      - id: centrelism
        name: Centrelismo
        nameEn: Centr-elism
        weight: 1
        description: Posición política de centro pragmático sin compromiso ideológico fuerte con ninguno
          de los cuadrantes extremos.
        longDescription: 'El centrismo es la posición política que se ubica en el punto medio del espectro
          ideológico, rechazando los extremos tanto de izquierda como de derecha, y que en su variante
          liberal-derecha propone la combinación de mercados libres con instituciones democráticas sólidas,
          reformas graduales y pragmatismo en la gestión pública. No es una ideología comprehensiva sino
          una postura de moderación y equilibrio que toma elementos de distintas tradiciones sin adherirse
          dogmáticamente a ninguna.


          El centrismo liberal-derecha —lo que en Europa se denomina ''centro-derecha''— defiende la economía
          de mercado, la propiedad privada y la iniciativa individual como motores del desarrollo, pero
          acepta regulación prudente, algunos servicios públicos básicos y la necesidad de amortiguar
          las consecuencias más severas del mercado. Es pragmático: privilegia lo que funciona sobre la
          coherencia ideológica.


          Filosóficamente, el centrismo no tiene padres fundadores tan claramente identificados como el
          marxismo o el libertarismo; su naturaleza es precisamente sincrética. Se nutre del liberalismo
          clásico, del liberalismo social moderado, del conservadurismo reformista y de la socialdemocracia
          pro-mercado. Su virtud política reivindicada es la estabilidad y el consenso; su crítica más
          frecuente es que carece de visión transformadora.


          Partidos como el PPE en Europa, el Partido Demócrata en sus versiones moderadas, los liberales
          canadienses y australianos, y partidos de centro-derecha latinoamericanos representan variantes
          del centrismo liberal.


          En el compás se ubica deliberadamente cerca del centro, en el cuadrante libertario-derecha moderado.'
        historicalContext: 'El centrismo como posición política consciente de sí misma emergió con el
          sistema de partidos de masas del siglo XX, que obligó a los partidos a buscar mayorías amplias.
          El Partido Demócrata-Cristiano en Europa de posguerra fue su expresión más exitosa. La ''corriente
          del agua caliente'' o catch-all party (Otto Kirchheimer) describe la lógica centrista: agregar
          apoyos amplios moderando posiciones.'
        contemporaryRelevance: 'Partidos centristas de centro-derecha siguen gobernando en Alemania (CDU/CSU),
          Francia (Macron), Canadá (liberales) y muchos países latinoamericanos. El ''centrismo vaciado''
          es también fenómeno: partidos que renuncian a posiciones claras para no perder votantes y terminan
          siendo percibidos como sin proyecto. En Colombia, el Partido de la U y sectores del Partido
          Conservador representan versiones del centrismo.'
        commonCriticisms: La izquierda señala que el centrismo normaliza el statu quo y las desigualdades
          existentes. La derecha señala que carece de principios firmes y cede ante la presión progresista.
          Los populistas de ambos lados lo acusan de defender los intereses del establishment contra la
          gente común. Los teóricos políticos lo critican como posición que solo tiene sentido en oposición
          a otros extremos.
        keyThinkers:
        - Anthony Giddens (Tercera Vía)
        - Karl Mannheim
        - Otto Kirchheimer (catch-all party)
        historicalExamples:
        - Democracia Cristiana europea de posguerra (Italia, Alemania, 1945-1990s)
        - Partido Liberal de Canadá (tradición centrista, siglo XX-XXI)
        - Emmanuel Macron y La République En Marche (Francia, desde 2017)
        wikipediaUrl: https://es.wikipedia.org/wiki/Centrismo
      - id: technocracy
        name: Tecnocracia
        nameEn: Technocracy
        weight: 3
        description: Forma de gobierno o proyecto político basado en la toma de decisiones por expertos
          técnicos (economistas, ingenieros) antes que por políticos electos. En Colombia tiene expresión
          en proyectos como el de Sergio Fajardo (Gobernador de Antioquia, alcalde de Medellín), Juan
          Manuel Galán (Nuevo Liberalismo), y en figuras de centro con perfil técnico (ex-ministros de
          hacienda, ex-directores del DANE). Enfatiza gobierno basado en evidencia por encima de ideología.
        keyThinkers:
        - Thorstein Veblen
        - William Henry Smyth
        - Technocracy Inc.
        - Jean Monnet (tecnocracia europea)
        - Mario Draghi (como tecnócrata político)
        historicalExamples:
        - Technocracy Inc. en Norteamérica (1930s)
        - Tecnócratas del Opus Dei en España (Plan de Estabilización, 1959)
        - Gobierno Monti en Italia (2011-2013)
        - Banco Central Europeo y gestión de la crisis del euro (2010-2015)
        longDescription: 'La tecnocracia es el modelo de gobierno o de gestión pública en el que las decisiones
          políticas son tomadas —o fuertemente condicionadas— por expertos técnicos (economistas, ingenieros,
          científicos, administradores) con base en criterios de eficiencia, racionalidad y conocimiento
          especializado, en lugar de por representantes electos que responden a preferencias populares.
          El término fue acuñado en 1919 por William Henry Smyth y popularizado por el movimiento Technocracy
          Inc. en los años 1930.


          Su premisa es que los problemas complejos de la sociedad moderna —la economía, la salud pública,
          la infraestructura, el cambio climático— requieren conocimiento técnico que los políticos generalmente
          no poseen, y que las decisiones populistas o electorales suelen producir peores resultados que
          los basados en evidencia científica. La tecnocracia no necesariamente rechaza la democracia,
          pero sí subordina la voluntad popular a la competencia técnica en dominios específicos.


          Históricamente, la tecnocracia ha tenido múltiples expresiones: los planificadores del New Deal
          (technocrats en el sentido norteamericano), los tecnócratas del Opus Dei en España franquista
          que liberalizaron la economía en los 1960s, los economistas del FMI y el Banco Mundial que diseñan
          programas de ajuste, los bancos centrales independientes, y la Comisión Europea como institución
          supranacional de expertos con poder normativo.


          Se ubica en una posición ideológicamente ambigua en el compás: puede ser de izquierda (planificación
          científica) o de derecha (eficiencia de mercado gestionada por economistas), pero su énfasis
          en la competencia experta sobre la participación popular lo sitúa en tensión con el eje libertario.
          En su versión liberal, se ubica en el cuadrante libertario-derecha moderado.'
        historicalContext: El movimiento Technocracy Inc. fue activo en Norteamérica en los años 1930s.
          Los tecnócratas del Opus Dei transformaron la economía española (1959-1975). El Banco Central
          Europeo y el FMI representan tecnocracia supranacional desde los 1990s. Los gobiernos 'tecnocráticos'
          (Monti en Italia 2011, Papademos en Grecia 2011) durante la crisis europea son casos recientes.
          La pandemia de COVID-19 renovó el debate sobre el papel de los expertos en la política.
        contemporaryRelevance: Muy relevante con el auge de la 'gobernanza basada en evidencia', la independencia
          de bancos centrales y organismos reguladores, y el debate sobre el rol de la IA en la toma de
          decisiones públicas. En América Latina, los equipos económicos de los ministerios de hacienda
          suelen funcionar tecnocráticamente. La tensión entre expertos y representantes electos es central
          en el debate democrático contemporáneo.
        commonCriticisms: Los demócratas señalan que la tecnocracia desplaza la soberanía popular a decisiones
          que afectan profundamente la vida de la gente sin rendición de cuentas electoral. Los populistas
          la critican como coartada de élites ilustradas para gobernar sin legitimidad. Los críticos académicos
          señalan que la 'evidencia técnica' en ciencias sociales es siempre contestada y politizada.
          Los libertarios temen que la tecnocracia justifique expansión del Estado bajo ropaje neutral.
        wikipediaUrl: https://es.wikipedia.org/wiki/Tecnocracia
