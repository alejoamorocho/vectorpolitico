[project]
name = "brujula-etl"
version = "0.1.0"
description = "ETL pipelines de Brújula Política: clasificación, validación, ingesta"
readme = "../../README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "SSI — Soluciones Superiores de Ingeniería" }]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "dist", "data/raw", "data/news"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
